# Athena工作平台 - 统一Docker Compose配置
# Athena Platform - Unified Docker Compose Configuration
#
# 使用Profile区分不同环境：
# - dev (默认): 开发环境
# - test: 测试环境
# - prod: 生产环境
# - monitoring: 监控服务
#
# 使用示例:
#   docker-compose --profile dev up -d              # 开发环境
#   docker-compose --profile test up -d             # 测试环境
#   docker-compose --profile prod up -d             # 生产环境
#   docker-compose --profile monitoring up -d       # 监控服务
#   docker-compose --profile dev --profile monitoring up -d  # 开发+监控

version: '3.8'

# ==================== 开发环境服务 (默认) ====================
services:
  # Redis缓存服务 (开发环境)
  redis:
    image: redis:7-alpine
    container_name: athena-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis-dev-data:/data
    networks:
      - athena-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - dev

  # Qdrant向量数据库 (开发环境)
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: athena-qdrant-dev
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant-dev-data:/qdrant/storage
    networks:
      - athena-dev-network
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - dev

  # Neo4j图数据库 (开发环境)
  neo4j:
    image: neo4j:5.15-community
    container_name: athena-neo4j-dev
    restart: unless-stopped
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j-dev-data:/data
    networks:
      - athena-dev-network
    environment:
      - NEO4J_AUTH=neo4j/athena_neo4j_2024
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=256m
    healthcheck:
      test: ["CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/7474' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    profiles:
      - dev

# ==================== 测试环境服务 ====================

  # PostgreSQL 数据库 (测试环境)
  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: athena-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: athena_test
      POSTGRES_PASSWORD: athena_test_password_2024
      POSTGRES_DB: athena_test_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"  # 使用5433避免与本地PostgreSQL冲突
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql
    networks:
      - athena-test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U athena_test -d athena_test_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    labels:
      - "com.athena.service=postgres-test"
      - "com.athena.environment=test"
    profiles:
      - test

  # Redis 缓存 (测试环境)
  redis-test:
    image: redis:7-alpine
    container_name: athena-redis-test
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly no
      --save ""
    ports:
      - "6380:6379"  # 使用6380避免与本地Redis冲突
    networks:
      - athena-test-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    labels:
      - "com.athena.service=redis-test"
      - "com.athena.environment=test"
    profiles:
      - test

  # Qdrant 向量数据库 (测试环境)
  qdrant-test:
    image: qdrant/qdrant:latest
    container_name: athena-qdrant-test
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: DEBUG
      QDRANT__SERVICE__MAX_REQUEST_SIZE_MB: 32
    ports:
      - "6334:6333"  # HTTP API (使用6334避免冲突)
      - "6335:6334"  # gRPC API
    volumes:
      - qdrant-test-data:/qdrant/storage
    networks:
      - athena-test-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    labels:
      - "com.athena.service=qdrant-test"
      - "com.athena.environment=test"
    profiles:
      - test

  # Neo4j 图数据库 (测试环境)
  neo4j-test:
    image: neo4j:5-community
    container_name: athena-neo4j-test
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/athena_test_2024
      NEO4J_dbms_default__database: neo4j
      NEO4J_dbms_memory_pagecache_size: 256M
      NEO4J_dbms_memory_heap_initial__size: 128M
      NEO4J_dbms_memory_heap_max__size: 128M
      NEO4J_dbms_connector_bolt_advertised__address: :7688
      NEO4J_dbms_connector_http_advertised__address: :7475
      NEO4J_dbms_logs_debug_level: WARN
      NEO4J_dbms_ssl_policy_bolt_tls__level: DISABLED
    ports:
      - "7475:7474"  # HTTP (使用7475避免冲突)
      - "7688:7687"  # Bolt (使用7688避免冲突)
    volumes:
      - neo4j-test-data:/data
      - neo4j-test-logs:/logs
    networks:
      - athena-test-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    labels:
      - "com.athena.service=neo4j-test"
      - "com.athena.environment=test"
    profiles:
      - test

  # MinIO (测试环境)
  minio-test:
    image: minio/minio:latest
    container_name: athena-minio-test
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9001:9000"  # API
      - "9002:9001"  # Console
    volumes:
      - minio-test-data:/data
    networks:
      - athena-test-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    labels:
      - "com.athena.service=minio-test"
      - "com.athena.environment=test"
    profiles:
      - test

# ==================== 生产环境服务 ====================

  # Qdrant向量数据库 (生产环境)
  qdrant-prod:
    image: qdrant/qdrant:latest
    container_name: athena-qdrant-prod
    ports:
      - "6335:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - athena-prod-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - prod

  # Neo4j图数据库 (生产环境)
  neo4j-prod:
    image: neo4j:5.15-community
    container_name: athena-neo4j-prod
    restart: unless-stopped
    ports:
      - "7476:7474"  # HTTP (使用7476避免冲突)
      - "7688:7687"  # Bolt (使用7688避免冲突)
    volumes:
      - neo4j-prod-data:/data
    networks:
      - athena-prod-network
    environment:
      - NEO4J_AUTH=neo4j/athena_prod_neo4j_2024
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=512m
    healthcheck:
      test: ["CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/7474' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    profiles:
      - prod

# ==================== 监控服务 ====================

  # Prometheus监控
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: athena-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/docker/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - athena-monitoring-network
    profiles:
      - monitoring

  # Grafana可视化
  grafana:
    image: grafana/grafana:10.2.2
    container_name: athena-grafana
    restart: unless-stopped
    ports:
      - "3005:3000"  # 使用3005端口避免冲突
    volumes:
      - ./config/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - athena-monitoring-network
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    depends_on:
      - prometheus
    profiles:
      - monitoring

  # Alertmanager告警
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: athena-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./config/docker/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - athena-monitoring-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

# ==================== 网络配置 ====================
networks:
  athena-dev-network:
    name: athena-dev-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

  athena-test-network:
    name: athena-test-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16

  athena-prod-network:
    name: athena-prod-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.26.0.0/16

  athena-monitoring-network:
    name: athena-monitoring-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.27.0.0/16

# ==================== 数据卷配置 ====================
volumes:
  # 开发环境数据卷
  redis-dev-data:
    name: athena-redis-dev-data
  qdrant-dev-data:
    name: athena-qdrant-dev-data
  neo4j-dev-data:
    name: athena-neo4j-dev-data

  # 测试环境数据卷
  postgres-test-data:
    name: athena-postgres-test-data
  redis-test-data:
    name: athena-redis-test-data
  qdrant-test-data:
    name: athena-qdrant-test-data
  neo4j-test-data:
    name: athena-neo4j-test-data
  neo4j-test-logs:
    name: athena-neo4j-test-logs
  minio-test-data:
    name: athena-minio-test-data

  # 生产环境数据卷
  qdrant-prod-data:
    name: athena-qdrant-prod-data
  neo4j-prod-data:
    name: athena-neo4j-prod-data

  # 监控服务数据卷
  prometheus-data:
    name: athena-prometheus-data
  grafana-data:
    name: athena-grafana-data
  alertmanager-data:
    name: athena-alertmanager-data

# ==================== 使用说明 ====================
#
# 📖 快速开始
# -----------
# 1. 启动开发环境:
#    docker-compose --profile dev up -d
#
# 2. 启动测试环境:
#    docker-compose --profile test up -d
#
# 3. 启动生产环境:
#    docker-compose --profile prod up -d
#
# 4. 启动监控服务:
#    docker-compose --profile monitoring up -d
#
# 5. 启动开发环境+监控:
#    docker-compose --profile dev --profile monitoring up -d
#
# 6. 停止服务:
#    docker-compose --profile <profile> down
#
# 7. 清理数据卷:
#    docker-compose --profile <profile> down -v
#
# 🔗 端口映射
# -----------
# 开发环境:
#   - Redis: 6379
#   - Qdrant: 6333 (HTTP), 6334 (gRPC)
#   - Neo4j: 7474 (HTTP), 7687 (Bolt)
#
# 测试环境:
#   - PostgreSQL: 5433
#   - Redis: 6380
#   - Qdrant: 6334 (HTTP), 6335 (gRPC)
#   - Neo4j: 7475 (HTTP), 7688 (Bolt)
#   - MinIO: 9001 (API), 9002 (Console)
#
# 生产环境:
#   - Qdrant: 6335
#   - NebulaGraph: 9670, 19670
#
# 监控服务:
#   - Prometheus: 9090
#   - Grafana: 3005
#   - Alertmanager: 9093
#
# 🔐 环境变量
# -----------
# 创建 .env 文件:
#
# # Redis密码
# REDIS_PASSWORD=redis123
#
# # Grafana配置
# GRAFANA_ADMIN_USER=admin
# GRAFANA_ADMIN_PASSWORD=admin123
# GRAFANA_ROOT_URL=http://localhost:3000
#
# ====================
