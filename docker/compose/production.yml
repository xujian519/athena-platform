# Athena工作平台 - 生产环境配置
# 继承base.yml，添加生产优化

version: '3.8'

services:
  # Athena主应用（生产模式）
  athena:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: athena_prod
    restart: always
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      - WORKERS=4
    ports:
      - "${ATHENA_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - athena_network
    profiles:
      - prod

  # API网关（生产模式）
  api_gateway:
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    container_name: athena_api_gateway_prod
    restart: always
    environment:
      - ENVIRONMENT=production
      - NGINX_WORKER_PROCESSES=auto
      - NGINX_WORKER_CONNECTIONS=1024
    ports:
      - "${API_GATEWAY_PORT:-80}:80"
      - "${API_GATEWAY_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - nginx_logs:/var/log/nginx
    depends_on:
      - athena
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - athena_network
    profiles:
      - prod

  # 爬虫服务（生产模式）
  crawler:
    build:
      context: ../..
      dockerfile: services/crawler/Dockerfile
    container_name: athena_crawler_prod
    restart: always
    environment:
      - ENVIRONMENT=production
      - CRAWLER_SERVICE_PORT=8300
      - CRAWLER_WORKERS=8
      - CRAWLER_LOG_LEVEL=INFO
    depends_on:
      - redis
      - postgres
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
    networks:
      - athena_network
    profiles:
      - prod

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    container_name: athena_prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - athena_network
    profiles:
      - monitoring

  # Grafana可视化
  grafana:
    image: grafana/grafana:latest
    container_name: athena_grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - athena_network
    profiles:
      - monitoring

  # 日志收集 - Elasticsearch
  elasticsearch:
    extends:
      file: base.yml
      service: elasticsearch
    environment:
      - cluster.name=athena-logs
      - node.name=athena-es-node-1
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-elastic123}
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    profiles:
      - logging

  # 日志收集 - Logstash
  logstash:
    image: docker.elastic.co/logstash/logstash:8.5.0
    container_name: athena_logstash
    restart: always
    environment:
      - "LS_JAVA_OPTS=-Xmx1g -Xms1g"
    volumes:
      - ./logging/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
      - /var/log/app:/var/log/app:ro
    depends_on:
      - elasticsearch
    networks:
      - athena_network
    profiles:
      - logging

  # 日志收集 - Kibana
  kibana:
    image: docker.elastic.co/kibana/kibana:8.5.0
    container_name: athena_kibana
    restart: always
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-elastic123}
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    depends_on:
      - elasticsearch
    networks:
      - athena_network
    profiles:
      - logging

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  athena_network:
    external: true