content: |
  # 法律文书写作技能

  本技能用于撰写各类法律文书。

  ## 支持的文书类型

  - 起诉状
  - 答辩状
  - 上诉状
  - 代理词
  - 法律意见书
  - 合同草案

  ## 使用场景

  1. 诉讼文书起草
  2. 合同条款撰写
  3. 法律意见表达
  4. 律师函起草
