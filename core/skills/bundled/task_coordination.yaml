content: |
  # 任务协调技能

  本技能用于协调多个Agent完成复杂任务。

  ## 协作模式

  - **串行模式**: 按顺序执行任务
  - **并行模式**: 同时执行多个任务
  - **层级模式**: 主从式任务分配
  - **共识模式**: 多Agent投票决策

  ## 使用场景

  1. 复杂专利分析（检索+分析+写作）
  2. 多维度案件评估
  3. 并行数据采集
  4. 多方案对比分析

  ## 示例工作流

  ```
  用户请求 → 任务分解 → Agent分配 → 并行执行 → 结果聚合 → 输出
  ```
