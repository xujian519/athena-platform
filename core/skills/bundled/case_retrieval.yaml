content: |
  # 案例检索技能

  本技能用于检索相关法律案例，支持多种检索方式。

  ## 检索方式

  - 关键词检索
  - 法条引用检索
  - 语义向量检索
  - 当事人检索
  - 案由检索

  ## 使用场景

  1. 诉讼前案例调研
  2. 法律论证支持
  3. 判例趋势分析
  4. 类似案例查找
