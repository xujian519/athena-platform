# Prometheus监控告警规则配置
# Prometheus Alert Rules for Cognitive & Decision Module

groups:
  - name: cognitive_module_alerts
    interval: 30s
    rules:
      # 认知模块性能告警
      - alert: HighCognitiveLatency
        expr: histogram_quantile(0.95, rate(cognitive_processing_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
          component: cognitive_module
        annotations:
          summary: "认知处理延迟过高"
          description: "95分位延迟超过5秒，当前值: {{ $value }}秒"

      - alert: CriticalCognitiveLatency
        expr: histogram_quantile(0.95, rate(cognitive_processing_duration_seconds_bucket[5m])) > 10
        for: 2m
        labels:
          severity: critical
          component: cognitive_module
        annotations:
          summary: "认知处理严重延迟"
          description: "95分位延迟超过10秒，需要立即处理"

      # 决策模块错误率告警
      - alert: HighDecisionErrorRate
        expr: rate(decision_errors_total[5m]) / rate(decision_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          component: decision_module
        annotations:
          summary: "决策错误率过高"
          description: "错误率超过5%，当前值: {{ $value | humanizePercentage }}"

      - alert: CriticalDecisionErrorRate
        expr: rate(decision_errors_total[5m]) / rate(decision_requests_total[5m]) > 0.15
        for: 2m
        labels:
          severity: critical
          component: decision_module
        annotations:
          summary: "决策错误率严重"
          description: "错误率超过15%，服务可能不可用"

      # 超级推理引擎告警
      - alert: SuperReasoningHighMemory
        expr: super_reasoning_memory_bytes > 2147483648
        for: 5m
        labels:
          severity: warning
          component: super_reasoning
        annotations:
          summary: "超级推理引擎内存使用过高"
          description: "内存使用超过2GB，当前: {{ $value | humanize }}B"

      # 意图识别告警
      - alert: IntentRecognitionFailure
        expr: rate(intent_classification_failures_total[5m]) / rate(intent_classification_total[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
          component: intent_recognition
        annotations:
          summary: "意图识别失败率过高"
          description: "意图识别失败率超过10%"

  - name: system_resource_alerts
    interval: 30s
    rules:
      # CPU使用率告警
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total{job="athena_cognitive"}[5m]) * 100 > 70
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "认知模块CPU使用率过高"
          description: "CPU使用率超过70%，当前: {{ $value }}%"

      - alert: CriticalCPUUsage
        expr: rate(process_cpu_seconds_total{job="athena_cognitive"}[5m]) * 100 > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "认知模块CPU严重过载"
          description: "CPU使用率超过90%，需要立即扩容"

      # 内存使用告警
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes{job="athena_cognitive"} / 1073741824 > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "认知模块内存使用过高"
          description: "内存使用超过2GB，当前: {{ $value | humanize }}GB"

      # GC暂停时间告警
      - alert: LongGCPause
        expr: rate(go_gc_duration_seconds_sum[5m]) / rate(go_gc_duration_seconds_count[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GC暂停时间过长"
          description: "平均GC暂停超过100ms"

  - name: llm_integration_alerts
    interval: 30s
    rules:
      # LLM调用延迟告警
      - alert: HighLLMLatency
        expr: histogram_quantile(0.95, rate(llm_request_duration_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
          component: llm_integration
        annotations:
          summary: "LLM响应延迟过高"
          description: "95分位延迟超过30秒，当前: {{ $value }}秒"

      - alert: LLMHighFailureRate
        expr: rate(llm_request_errors_total[5m]) / rate(llm_requests_total[5m]) > 0.1
        for: 3m
        labels:
          severity: critical
          component: llm_integration
        annotations:
          summary: "LLM请求失败率过高"
          description: "失败率超过10%，可能影响核心功能"

      # Token使用告警
      - alert: HighTokenUsage
        expr: sum(rate(llm_tokens_total[1h])) > 10000
        labels:
          severity: info
        annotations:
          summary: "Token使用量较高"
          description: "小时Token使用量: {{ $value }}"

  - name: agent_collaboration_alerts
    interval: 30s
    rules:
      # Agent协作告警
      - alert: AgentTaskBacklog
        expr: agent_task_queue_length > 100
        for: 5m
        labels:
          severity: warning
          component: agent_collaboration
        annotations:
          summary: "Agent任务积压"
          description: "任务队列长度: {{ $value }}"

      - alert: AgentFailureRate
        expr: rate(agent_task_failures_total[5m]) / rate(agent_tasks_total[5m]) > 0.15
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Agent失败率过高"
          description: "任务失败率超过15%"

      - alert: AgentTimeoutRate
        expr: rate(agent_timeouts_total[5m]) / rate(agent_tasks_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Agent超时率过高"
          description: "任务超时率超过5%"

  - name: memory_system_alerts
    interval: 30s
    rules:
      # 记忆系统告警
      - alert: MemoryCacheLowHit
        expr: rate(memory_cache_hits_total[5m]) / (rate(memory_cache_hits_total[5m]) + rate(memory_cache_misses_total[5m])) < 0.7
        for: 10m
        labels:
          severity: warning
          component: memory_system
        annotations:
          summary: "记忆缓存命中率过低"
          description: "缓存命中率低于70%，当前: {{ $value | humanizePercentage }}"

      - alert: VectorSearchHighLatency
        expr: histogram_quantile(0.95, rate(vector_search_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          component: vector_search
        annotations:
          summary: "向量搜索延迟过高"
          description: "95分位延迟超过2秒"

  - name: quality_gates
    interval: 60s
    rules:
      # 质量门禁告警
      - alert: TechnicalDebtHigh
        expr: technical_debt_count > 50
        labels:
          severity: warning
        annotations:
          summary: "技术债务过多"
          description: "当前技术债务项: {{ $value }}"

      - alert: TestCoverageLow
        expr: code_coverage_percent < 70
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "测试覆盖率不足"
          description: "覆盖率: {{ $value }}%，目标: 70%"

      - alert: SyntaxErrorsPresent
        expr: syntax_error_count > 0
        labels:
          severity: critical
        annotations:
          summary: "存在语法错误"
          description: "发现{{ $value }}个语法错误，违反零容忍原则"
