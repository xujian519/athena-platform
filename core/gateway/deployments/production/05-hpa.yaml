# ================================
# Athena API Gateway - 水平Pod自动扩缩容
# ================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: athena-gateway-hpa
  namespace: athena-gateway
  labels:
    app: athena-gateway
    tier: frontend
    environment: production
  annotations:
    kubernetes.io/description: "Athena API Gateway HPA - CPU和内存自动扩缩容"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: athena-gateway
  minReplicas: 3
  maxReplicas: 20
  metrics:
  # CPU指标
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  # 内存指标
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  # 自定义指标 - QPS
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "100"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Min

---
# ================================
# Athena API Gateway - 垂直Pod自动扩缩容
# ================================
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: athena-gateway-vpa
  namespace: athena-gateway
  labels:
    app: athena-gateway
    tier: frontend
    environment: production
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: athena-gateway
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: athena-gateway
      minAllowed:
        cpu: 100m
        memory: 256Mi
      maxAllowed:
        cpu: 2
        memory: 4Gi
      controlledResources: ["cpu", "memory"]
    - containerName: log-collector
      minAllowed:
        cpu: 50m
        memory: 32Mi
      maxAllowed:
        cpu: 500m
        memory: 512Mi
      controlledResources: ["cpu", "memory"]