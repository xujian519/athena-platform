# ================================
# PostgreSQL 生产数据库 - 主节点
# ================================
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-primary
  namespace: database
  labels:
    app: postgres
    tier: database
    environment: production
    role: primary
  annotations:
    cnpg.io/loadedConfigmap: postgres-config
spec:
  instances: 3
  primaryUpdateStrategy: unsupervised
  
  # PostgreSQL 配置
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
      maintenance_work_mem: "64MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      work_mem: "4MB"
      min_wal_size: "1GB"
      max_wal_size: "4GB"
      max_worker_processes: "8"
      max_parallel_workers_per_gather: "2"
      max_parallel_workers: "8"
      max_parallel_maintenance_workers: "4"
      jit: "off"
      
    # PostgreSQL 扩展
    extensions:
    - name: pg_stat_statements
    - name: pg_trgm
    - name: btree_gin
    - name: btree_gist
    - name: pg_prewarm
    - name: pg_stat_kcache
    
  # 引导配置
  bootstrap:
    initdb:
      database: athena_gateway
      owner: athena_user
      secret:
        name: postgres-credentials
        
  # 存储配置
  storage:
    size: 100Gi
    storageClass: ssd-storage
    walStorage:
      size: 20Gi
      storageClass: ssd-storage
      
  # 网络配置
  enablePDB: true
  primaryUpdateStrategy: unsupervised
  
  # 监控配置
  monitoring:
    enabled: true
    
  # 备份配置
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: "s3://postgres-backups/athena-gateway"
      s3Credentials:
        accessKeyId:
          name: backup-credentials
          key: AWS_ACCESS_KEY_ID
        secretAccessKey:
          name: backup-credentials
          key: AWS_SECRET_ACCESS_KEY
      wal:
        retentionPolicy: "7d"
        compression: "gzip"
      data:
        retentionPolicy: "30d"
        compression: "gzip"
        jobs: 2
        immediateCheckpoint: false
        
  # 连接池配置
  connectionPooler:
    enabled: true
    type: pgBouncer
    instances: 2
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    pgBouncer:
      poolMode: transaction
      maxClientConnections: 2000
      
  # 额外的Pod配置
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
    
  # 调度配置
  affinity:
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
    
  # 资源配置
  resources:
    requests:
      memory: "2Gi"
      cpu: "1000m"
    limits:
      memory: "4Gi"
      cpu: "2000m"

---
# ================================
# PostgreSQL 生产数据库 - 只读副本
# ================================
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-replica
  namespace: database
  labels:
    app: postgres
    tier: database
    environment: production
    role: replica
spec:
  instances: 2
  
  # 复制源
  replica:
    enabled: true
    source: postgres-primary
    
  # PostgreSQL 配置
  postgresql:
    parameters:
      max_connections: "150"
      shared_buffers: "128MB"
      effective_cache_size: "512MB"
      hot_standby: "on"
      max_standby_archive_delay: "300s"
      max_standby_streaming_delay: "300s"
      
  # 存储配置
  storage:
    size: 50Gi
    storageClass: ssd-storage
    walStorage:
      size: 10Gi
      storageClass: ssd-storage
      
  # 资源配置
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"