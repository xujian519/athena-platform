---
# ================================
# NetworkPolicy - 网络策略
# ================================
# Athena Gateway 网络策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: athena-gateway-netpol
  namespace: athena-gateway
  labels:
    app: athena-gateway
    environment: production
spec:
  podSelector:
    matchLabels:
      app: athena-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # 允许来自 Ingress Controller 的流量
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
      podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090
    - protocol: TCP
      port: 8081
  
  # 允许来自相同命名空间的流量
  - from:
    - podSelector:
        matchLabels: {}
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090
    - protocol: TCP
      port: 8081
  
  # 允许来自监控系统的流量
  - from:
    - namespaceSelector:
        matchLabels:
          name: observability
      podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 9090
  
  egress:
  # 允许访问 PostgreSQL
  - to:
    - ipBlock:
        cidr: ${POSTGRES_IP}/32
    ports:
    - protocol: TCP
      port: 5432
  
  # 允许访问 Redis
  - to:
    - podSelector:
        matchLabels:
          app: redis
      namespaceSelector:
        matchLabels:
          name: cache
    ports:
    - protocol: TCP
      port: 6379
  
  # 允许 DNS 查询
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  
  # 允许 HTTP/HTTPS 出站流量
  - to: []
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443

---
# 监控系统网络策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: observability-netpol
  namespace: observability
  labels:
    app: monitoring
    environment: production
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # 允许来自 Ingress Controller 的流量
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
      podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000  # Grafana
    - protocol: TCP
      port: 9090  # Prometheus
    - protocol: TCP
      port: 9093  # AlertManager
    - protocol: TCP
      port: 3100  # Loki
  
  # 允许来自内部网络的流量
  - from:
    - ipBlock:
        cidr: 10.0.0.0/8
    - ipBlock:
        cidr: 172.16.0.0/12
    - ipBlock:
        cidr: 192.168.0.0/16
  
  egress:
  # 允许监控其他服务
  - to: []
    ports:
    - protocol: TCP
      port: 8080  # Athena Gateway
    - protocol: TCP
      port: 6379  # Redis
    - protocol: TCP
      port: 5432  # PostgreSQL
  
  # 允许 DNS
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53