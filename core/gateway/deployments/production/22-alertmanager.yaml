# ================================
# AlertManager 告警管理器
# ================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: observability
  labels:
    app: alertmanager
    tier: monitoring
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: 'smtp.company.com:587'
      smtp_from: 'alerts@company.com'
      smtp_auth_username: 'alerts@company.com'
      smtp_auth_password: 'smtp-password'
      resolve_timeout: 5m
      
    templates:
    - '/etc/alertmanager/templates/*.tmpl'
    
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'default'
      routes:
      # 关键告警 - 立即通知
      - match:
          severity: critical
        receiver: 'critical-alerts'
        group_wait: 0s
        repeat_interval: 5m
        continue: true
        
      # Athena Gateway 服务告警
      - match:
          service: athena-gateway
        receiver: 'athena-team'
        group_wait: 30s
        repeat_interval: 2h
        
      # 数据库告警
      - match:
          service: postgres
        receiver: 'dba-team'
        group_wait: 1m
        repeat_interval: 4h
        
      # 缓存告警
      - match:
          service: redis
        receiver: 'cache-team'
        group_wait: 1m
        repeat_interval: 4h
        
    receivers:
    - name: 'default'
      email_configs:
      - to: 'ops-team@company.com'
        subject: '[Athena] {{ .GroupLabels.alertname }} - {{ .Status | toUpper }}'
        body: |
          {{ range .Alerts }}
          告警: {{ .Annotations.summary }}
          描述: {{ .Annotations.description }}
          时间: {{ .StartsAt }}
          标签: {{ range .Labels.SortedPairs }}{{ .Name }}={{ .Value }} {{ end }}
          {{ end }}
          
    - name: 'critical-alerts'
      email_configs:
      - to: 'oncall@company.com'
        subject: '[CRITICAL] {{ .GroupLabels.alertname }} - 立即处理'
        body: |
          🚨 关键告警 - 需要立即处理 🚨
          
          {{ range .Alerts }}
          服务: {{ .Labels.service }}
          告警: {{ .Annotations.summary }}
          描述: {{ .Annotations.description }}
          时间: {{ .StartsAt }}
          运行手册: {{ .Annotations.runbook_url }}
          {{ end }}
          
          请立即检查并处理此告警！
      slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#alerts-critical'
        title: '🚨 关键告警'
        text: |
          {{ range .Alerts }}
          *服务*: {{ .Labels.service }}
          *告警*: {{ .Annotations.summary }}
          *时间*: {{ .StartsAt }}
          {{ end }}
          
    - name: 'athena-team'
      email_configs:
      - to: 'athena-team@company.com'
        subject: '[Athena Gateway] {{ .GroupLabels.alertname }}'
        body: |
          Athena API Gateway 告警
          
          {{ range .Alerts }}
          {{ .Annotations.summary }}
          {{ .Annotations.description }}
          Pod: {{ .Labels.pod }}
          时间: {{ .StartsAt }}
          {{ end }}
          
    - name: 'dba-team'
      email_configs:
      - to: 'dba-team@company.com'
        subject: '[Database] {{ .GroupLabels.alertname }}'
        body: |
          数据库告警 (本地PostgreSQL实例)
          
          {{ range .Alerts }}
          {{ .Annotations.summary }}
          {{ .Annotations.description }}
          时间: {{ .StartsAt }}
          {{ end }}
          
    - name: 'cache-team'
      email_configs:
      - to: 'cache-team@company.com'
        subject: '[Cache] {{ .GroupLabels.alertname }}'
        body: |
          Redis缓存告警
          
          {{ range .Alerts }}
          {{ .Annotations.summary }}
          {{ .Annotations.description }}
          时间: {{ .StartsAt }}
          {{ end }}
          
    inhibit_rules:
    # 如果服务已下线，抑制其他告警
    - source_match:
        alertname: 'AthenaGatewayDown'
      target_match_re:
        service: 'athena-gateway'
      equal: ['pod']
      
    # 如果PostgreSQL连接失败，抑制性能告警
    - source_match:
        alertname: 'PostgresDown'
      target_match:
        service: 'postgres'
      equal: ['instance']

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: observability
  labels:
    app: alertmanager
    tier: monitoring
    environment: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alertmanager
      tier: monitoring
  template:
    metadata:
      labels:
        app: alertmanager
        tier: monitoring
    spec:
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      serviceAccountName: alertmanager
      containers:
      - name: alertmanager
        image: prom/alertmanager:v0.26.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: alertmanager
          containerPort: 9093
          protocol: TCP
        - name: cluster
          containerPort: 9094
          protocol: TCP
        args:
        - '--config.file=/etc/alertmanager/alertmanager.yml'
        - '--storage.path=/alertmanager'
        - '--data.retention=120h'
        - '--cluster.listen-address=0.0.0.0:9094'
        - '--cluster.peer=alertmanager-0.alertmanager:9094'
        - '--cluster.peer=alertmanager-1.alertmanager:9094'
        - '--web.external-url=https://alertmanager.company.com'
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        volumeMounts:
        - name: alertmanager-config
          mountPath: /etc/alertmanager
          readOnly: true
        - name: alertmanager-data
          mountPath: /alertmanager
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: alertmanager
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /-/ready
            port: alertmanager
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: alertmanager-config
        configMap:
          name: alertmanager-config
      - name: alertmanager-data
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: observability
  labels:
    app: alertmanager
    tier: monitoring
spec:
  type: ClusterIP
  ports:
  - name: alertmanager
    port: 9093
    targetPort: 9093
    protocol: TCP
  - name: cluster
    port: 9094
    targetPort: 9094
    protocol: TCP
  selector:
    app: alertmanager
    tier: monitoring

---
# ================================
# 本地PostgreSQL外部监控配置
# ================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: external-postgres-exporter
  namespace: observability
  labels:
    app: postgres-exporter
    tier: monitoring
data:
  config.yml: |
    # 本地PostgreSQL实例监控配置
    targets:
      - name: "local-postgres-primary"
        host: "your-postgres-host.local"  # 替换为实际PostgreSQL主机地址
        port: 5432
        database: "athena_gateway"
        user: "athena_user"
        password_file: "/etc/secrets/postgres-password"
        
      - name: "local-postgres-replica"
        host: "your-postgres-replica.local"  # 替换为实际副本地址
        port: 5432
        database: "athena_gateway"
        user: "athena_ro_user"
        password_file: "/etc/secrets/postgres-ro-password"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: observability
  labels:
    app: postgres-exporter
    tier: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
      tier: monitoring
  template:
    metadata:
      labels:
        app: postgres-exporter
        tier: monitoring
    spec:
      containers:
      - name: postgres-exporter
        image: prometheuscommunity/postgres-exporter:v0.12.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: metrics
          containerPort: 9187
          protocol: TCP
        env:
        - name: DATA_SOURCE_NAME
          value: "postgresql://athena_user:$(POSTGRES_PASSWORD)@your-postgres-host.local:5432/athena_gateway?sslmode=disable"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: external-postgres-credentials
              key: password
        args:
        - "--extend.query-path=/etc/custom-queries"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
        volumeMounts:
        - name: custom-queries
          mountPath: /etc/custom-queries
          readOnly: true
        livenessProbe:
          httpGet:
            path: /metrics
            port: metrics
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /metrics
            port: metrics
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: custom-queries
        configMap:
          name: postgres-custom-queries

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-custom-queries
  namespace: observability
  labels:
    app: postgres-exporter
    tier: monitoring
data:
  custom-queries.yaml: |
    # PostgreSQL 自定义查询
    queries:
      - name: "athena_gateway_metrics"
        query: |
          SELECT 
            'athena_gateway_stats' as metric_name,
            COUNT(*) as total_requests,
            COUNT(CASE WHEN status_code >= 400 THEN 1 END) as error_requests,
            AVG(response_time) as avg_response_time,
            MAX(created_at) as last_request_time
          FROM api_requests 
          WHERE created_at > NOW() - INTERVAL '5 minutes'
        metrics:
          - total_requests:
              usage: "GAUGE"
              description: "5分钟内总请求数"
          - error_requests:
              usage: "GAUGE"
              description: "5分钟内错误请求数"
          - avg_response_time:
              usage: "GAUGE"
              description: "平均响应时间(毫秒)"
          - last_request_time:
              usage: "GAUGE"
              description: "最后请求时间"

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: observability
  labels:
    app: postgres-exporter
    tier: monitoring
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9187"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 9187
    targetPort: 9187
    protocol: TCP
  selector:
    app: postgres-exporter
    tier: monitoring