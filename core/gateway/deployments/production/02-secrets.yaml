# ================================
# Athena API Gateway - 生产密钥配置
# ================================
apiVersion: v1
kind: Secret
metadata:
  name: athena-gateway-secrets
  namespace: athena-gateway
  labels:
    app: athena-gateway
    tier: frontend
    environment: production
type: Opaque
data:
  # JWT 密钥 (已生成)
  jwt-secret-key: bXlfYWtZXlfc2N0cmV5X3JZcW5zcmV5Y2NzdHZmQ2Nj
  
  # Redis 密码
  redis-password: <BASE64_ENCODED_REDIS_PASSWORD>
  
  # 数据库密码
  db-password: <BASE64_ENCODED_DB_PASSWORD>
  
  # 数据库连接字符串
  database-url: <BASE64_ENCODED_DB_URL>
  
  # 加密密钥
  encryption-key: <BASE64_ENCODED_ENCRYPTION_KEY>
  
  # API 密钥 (用于服务间通信)
  api-key: <BASE64_ENCODED_API_KEY>
  
  # TLS 证书密钥
  tls-key: <BASE64_ENCODED_TLS_KEY>
  tls-crt: <BASE64_ENCODED_TLS_CERT>
  
  # 监控系统密钥
  prometheus-token: <BASE64_ENCODED_PROMETHEUS_TOKEN>
  jaeger-token: <BASE64_ENCODED_JAEGER_TOKEN>
  
  # 外部服务密钥
  oauth-client-secret: <BASE64_ENCODED_OAUTH_SECRET>
  webhook-secret: <BASE64_ENCODED_WEBHOOK_SECRET>