# ================================
# Athena API Gateway - 生产服务配置
# ================================
apiVersion: v1
kind: Service
metadata:
  name: athena-gateway
  namespace: athena-gateway
  labels:
    app: athena-gateway
    tier: frontend
    environment: production
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:us-east-1:123456789012:certificate/12345678-1234-1234-1234-123456789012"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "https"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: https
    port: 443
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  - name: health
    port: 8081
    targetPort: 8081
    protocol: TCP
  selector:
    app: athena-gateway
    tier: frontend
    environment: production

---
# ================================
# Athena API Gateway - 指标服务
# ================================
apiVersion: v1
kind: Service
metadata:
  name: athena-gateway-metrics
  namespace: athena-gateway
  labels:
    app: athena-gateway
    tier: frontend
    environment: production
    service-type: metrics
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: athena-gateway
    tier: frontend
    environment: production