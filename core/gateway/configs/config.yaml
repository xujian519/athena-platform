# Athena API Gateway - Default Configuration
# 注意：此文件仅用于开发环境，生产环境请使用config.prod.yaml

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  max_header_bytes: 1048576  # 1MB

# 日志配置
logging:
  level: "info"
  format: "json"
  output: "stdout"

# Redis配置
redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 100
  min_idle_conns: 10
  max_retries: 3
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s

# 认证配置 - 开发环境
auth:
  jwt_secret: "athena-gateway-dev-jwt-secret-not-for-production"  # 仅用于开发，生产环境必须使用环境变量
  token_expire: 24h
  refresh_expire: 168h  # 7 days
  issuer: "athena-gateway"
  skip_paths:
    - "/health"
    - "/metrics"
    - "/ready"
  required_scopes:
    - "read"
    - "write"

# 限流配置
limiter:
  enabled: true
  requests_per_minute: 1000
  burst: 100
  strategies:
    - type: "ip"
      limit: 100
      match: ""
    - type: "user"
      limit: 50
      match: ""
  distributed_enabled: false
  redis_key_prefix: "gateway:limiter:"

# 代理配置
proxy:
  timeout: 30s
  retry_attempts: 3
  retry_delay: 1s
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    recovery_timeout: 30s
    success_threshold: 3
    timeout: 60s
  load_balancer:
    strategy: "round_robin"
    nodes: []
  health_check:
    enabled: true
    path: "/health"
    interval: 30s
    timeout: 5s
    unhealthy_threshold: 3
    healthy_threshold: 2

# 监控配置
monitoring:
  prometheus:
    enabled: true
    path: "/metrics"
    port: 9090
  tracing:
    enabled: false
    provider: "jaeger"
    jaeger_endpoint: "http://localhost:14268/api/traces"
    service_name: "athena-gateway"
    sample_rate: 0.1
  health_check:
    enabled: true
    path: "/health"
    interval: 30s
    timeout: 5s
    unhealthy_threshold: 3
    healthy_threshold: 2

# 安全配置
security:
  cors:
    enabled: true
    allowed_origins:
      - "*"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed_headers:
      - "*"
    exposed_headers:
      - "Content-Length"
    allow_credentials: true
    max_age: 12
  csrf:
    enabled: false
    secret: "athena-gateway-csrf-secret"
    cookie_name: "_csrf"
    domain: ""
    path: "/"
    max_age: 86400
    secure: false
    http_only: false
  rate_limit:
    enabled: true
    limit: 1000
  ip_whitelist:
    enabled: false
    ips: []

# 服务配置
services:
  - name: "user-service"
    url: "http://localhost:8001"
    health_check: "/health"
    timeout: 30s
    retries: 3
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      recovery_timeout: 30s
      success_threshold: 3
      timeout: 60s
    load_balancer:
      strategy: "round_robin"
      nodes: []
    metadata:
      description: "用户管理服务"
      version: "1.0.0"
  
  - name: "order-service"
    url: "http://localhost:8002"
    health_check: "/health"
    timeout: 30s
    retries: 3
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      recovery_timeout: 30s
      success_threshold: 3
      timeout: 60s
    load_balancer:
      strategy: "round_robin"
      nodes: []
    metadata:
      description: "订单管理服务"
      version: "1.0.0"

  - name: "payment-service"
    url: "http://localhost:8003"
    health_check: "/health"
    timeout: 30s
    retries: 3
    circuit_breaker:
      enabled: true
      failure_threshold: 3
      recovery_timeout: 60s
      success_threshold: 5
      timeout: 120s
    load_balancer:
      strategy: "round_robin"
      nodes: []
    metadata:
      description: "支付服务"
      version: "1.0.0"

  - name: "notification-service"
    url: "http://localhost:8004"
    health_check: "/health"
    timeout: 15s
    retries: 2
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      recovery_timeout: 30s
      success_threshold: 3
      timeout: 45s
    load_balancer:
      strategy: "round_robin"
      nodes: []
    metadata:
      description: "通知服务"
      version: "1.0.0"

# 环境配置
environment: "development"