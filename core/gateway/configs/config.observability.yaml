server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  max_header_bytes: 1048576

logging:
  level: "info"
  format: "json"
  output: "stdout"

redis:
  host: "redis"
  port: 6379
  password: ""
  db: 0
  pool_size: 100
  min_idle_conns: 10
  max_retries: 3
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s

auth:
  jwt_secret: "your-secret-key-change-in-production"
  token_expire: 24h
  refresh_expire: 168h
  issuer: "athena-gateway"
  skip_paths: ["/health", "/ready", "/metrics"]
  required_scopes: ["read", "write"]

limiter:
  enabled: true
  requests_per_minute: 1000
  burst: 100
  strategies:
    - type: "ip"
      limit: 100
      match: "*"
    - type: "user"
      limit: 50
      match: "authenticated"
  distributed_enabled: true
  redis_key_prefix: "gateway:ratelimit:"

proxy:
  timeout: 30s
  retry_attempts: 3
  retry_delay: 1s
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    recovery_timeout: 30s
    success_threshold: 3
    timeout: 60s
  load_balancer:
    strategy: "round_robin"
    nodes: []
  health_check:
    enabled: true
    path: "/health"
    interval: 30s
    timeout: 5s
    unhealthy_threshold: 3
    healthy_threshold: 2

monitoring:
  prometheus:
    enabled: true
    path: "/metrics"
    port: 9090
  tracing:
    enabled: true
    service_name: "athena-gateway"
    service_version: "1.0.0"
    environment: "development"
    jaeger:
      endpoint: "http://jaeger:14268/api/traces"
      insecure: true
    sampling:
      type: "probabilistic"
      param: 0.1
    batch_timeout: "5s"
    export_timeout: "30s"
    max_export_batch_size: 512
  health_check:
    enabled: true
    path: "/health"
    interval: 30s
    timeout: 5s
    unhealthy_threshold: 3
    healthy_threshold: 2

security:
  cors:
    enabled: true
    allowed_origins: ["*"]
    allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allowed_headers: ["*"]
    exposed_headers: []
    allow_credentials: true
    max_age: 86400
  csrf:
    enabled: false
    secret: "csrf-secret-change-in-production"
    cookie_name: "_csrf"
    domain: ""
    path: "/"
    max_age: 86400
    secure: false
    http_only: true
  rate_limit:
    enabled: true
    limit: 100
  ip_whitelist:
    enabled: false
    ips: []

services:
  - name: "user-service"
    url: "http://user-service:8001"
    health_check: "/health"
    timeout: 30s
    retries: 3
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      recovery_timeout: 30s
      success_threshold: 3
      timeout: 60s
    load_balancer:
      strategy: "round_robin"
      nodes: []
    metadata: {}

environment: "development"