tracing:
  enabled: true
  service_name: "athena-gateway"
  service_version: "1.0.0"
  environment: "development"
  
  jaeger:
    endpoint: "http://localhost:14268/api/traces"
    insecure: true
  
  sampling:
    type: "probabilistic"
    param: 0.1
  
  batch_timeout: "5s"
  export_timeout: "30s"
  max_export_batch_size: 512