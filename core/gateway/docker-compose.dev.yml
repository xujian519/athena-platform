version: '3.8'

services:
  # 开发环境API网关
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - GATEWAY_PORT=8080
      - GATEWAY_HOST=0.0.0.0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=athena-gateway-dev-jwt-secret
      - LOG_LEVEL=debug
      - LOG_FORMAT=text
      - ENV=development
      - PROMETHEUS_ENABLED=true
      - TRACING_ENABLED=true
      - TRACING_SAMPLE_RATE=1.0
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
      - CORS_ENABLED=true
      - CSRF_ENABLED=false
    depends_on:
      - redis
      - jaeger
    networks:
      - dev-network
    restart: unless-stopped
    volumes:
      - .:/app
      - /tmp/air:/tmp/air
    command: air -c .air.toml

  # Redis开发实例
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    networks:
      - dev-network
    restart: unless-stopped
    volumes:
      - redis_dev_data:/data

  # Jaeger开发实例
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - dev-network
    restart: unless-stopped

  # Prometheus开发实例
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=24h'
      - '--web.enable-lifecycle'
    networks:
      - dev-network
    restart: unless-stopped
    volumes:
      - ./configs/prometheus-dev.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_dev_data:/prometheus

  # 模拟用户服务（开发）
  user-service:
    image: mockserver/mockserver:latest
    ports:
      - "8001:1080"
    networks:
      - dev-network
    restart: unless-stopped

  # 模拟订单服务（开发）
  order-service:
    image: mockserver/mockserver:latest
    ports:
      - "8002:1080"
    networks:
      - dev-network
    restart: unless-stopped

  # 模拟支付服务（开发）
  payment-service:
    image: mockserver/mockserver:latest
    ports:
      - "8003:1080"
    networks:
      - dev-network
    restart: unless-stopped

  # 模拟通知服务（开发）
  notification-service:
    image: mockserver/mockserver:latest
    ports:
      - "8004:1080"
    networks:
      - dev-network
    restart: unless-stopped

# 开发网络配置
networks:
  dev-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

# 开发数据卷
volumes:
  redis_dev_data:
    driver: local
  prometheus_dev_data:
    driver: local