version: '3.8'

services:
  # API网关服务
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - GATEWAY_PORT=8080
      - GATEWAY_HOST=0.0.0.0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-athena-gateway-jwt-secret}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - ENV=production
      - PROMETHEUS_ENABLED=true
      - TRACING_ENABLED=true
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      - redis
      - jaeger
      - prometheus
    networks:
      - gateway-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    volumes:
      - ./configs:/app/configs:ro
      - ./logs:/app/logs

  # Redis服务
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    networks:
      - gateway-network
    restart: unless-stopped
    volumes:
      - redis_data:/data
      - ./configs/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - gateway-network
    restart: unless-stopped
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  # Jaeger链路追踪
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - gateway-network
    restart: unless-stopped
    volumes:
      - jaeger_data:/badger

  # Grafana仪表板
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    networks:
      - gateway-network
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    networks:
      - gateway-network
    restart: unless-stopped
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./configs/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - gateway

  # 模拟用户服务
  user-service:
    image: mockserver/mockserver:latest
    ports:
      - "8001:1080"
    environment:
      - MOCKSERVER_PROPERTY_FILE=/config/mockserver.properties
    networks:
      - gateway-network
    restart: unless-stopped
    volumes:
      - ./configs/mockserver/user-service.json:/config/mockserver.properties:ro

  # 模拟订单服务
  order-service:
    image: mockserver/mockserver:latest
    ports:
      - "8002:1080"
    environment:
      - MOCKSERVER_PROPERTY_FILE=/config/mockserver.properties
    networks:
      - gateway-network
    restart: unless-stopped
    volumes:
      - ./configs/mockserver/order-service.json:/config/mockserver.properties:ro

  # 模拟支付服务
  payment-service:
    image: mockserver/mockserver:latest
    ports:
      - "8003:1080"
    environment:
      - MOCKSERVER_PROPERTY_FILE=/config/mockserver.properties
    networks:
      - gateway-network
    restart: unless-stopped
    volumes:
      - ./configs/mockserver/payment-service.json:/config/mockserver.properties:ro

  # 模拟通知服务
  notification-service:
    image: mockserver/mockserver:latest
    ports:
      - "8004:1080"
    environment:
      - MOCKSERVER_PROPERTY_FILE=/config/mockserver.properties
    networks:
      - gateway-network
    restart: unless-stopped
    volumes:
      - ./configs/mockserver/notification-service.json:/config/mockserver.properties:ro

# 网络配置
networks:
  gateway-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# 数据卷
volumes:
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  jaeger_data:
    driver: local
  nginx_logs:
    driver: local