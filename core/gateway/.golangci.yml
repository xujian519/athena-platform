run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  skip-dirs:
    - vendor
    - tmp
  skip-files:
    - ".*\\.pb\\.go$"
    - ".*_generated\\.go$"
  modules-download-mode: readonly

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  uniq-by-line: true
  sort-results: true

linters-settings:
  govet:
    check-shadowing: true
    enable-all: true
    disable:
      - fieldalignment # too strict for this project

  golint:
    min-confidence: 0.8

  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/athena-workspace/core/gateway

  gocyclo:
    min-complexity: 15

  maligned:
    suggest-new: true

  dupl:
    threshold: 100

  goconst:
    min-len: 3
    min-occurrences: 3

  misspell:
    locale: US

  lll:
    line-length: 120

  goimports:
    local-prefixes: github.com/athena-workspace/core/gateway

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - dupImport # https://github.com/go-critic/go-critic/issues/845
      - ifElseChain
      - octalLiteral
      - whyNoLint
      - wrapperFunc

  funlen:
    lines: 100
    statements: 50

  gocognit:
    min-complexity: 20

  nestif:
    min-complexity: 4

  gomnd:
    settings:
      mnd:
        checks: argument,case,condition,operation,return,assign

  gocyclo:
    min-complexity: 15

  godox:
    keywords:
      - TODO
      - BUG
      - FIXME

  testpackage:
    skip-regexp: (export|internal)_test\.go

  prealloc:
    simple: true
    range-loops: true
    for-loops: false

  unconvert:
    unsafe: false

  forbidigo:
    forbid:
      - 'fmt\.Print.*'
      - 'ioutil\.*'
      - 'http\.Client'
      - 'log\.Print.*'

  exhaustive:
    check-generated: false
    default-signifies-exhaustive: false

  errcheck:
    check-type-assertions: true
    check-blank: false

  errorlint:
    errorf: true
    asserts: true
    comparison: true

  nakedret:
    max-func-lines: 30

  predeclared:
    check: true
    ignore: "append,make,any"

  revive:
    rules:
      - name: exported
        severity: warning
        arguments:
          - "checkPrivateReceivers"
          - "sayRepetitiveInsteadOfStutters"
      - name: var-naming
        arguments:
          - [["ID"], [""]] # Allow uppercase ID in struct fields
      - name: package-comments
        disabled: true
      - name: dot-imports
        disabled: true
      - name: error-naming
        disabled: true

linters:
  disable-all: true
  enable:
    - bodyclose
    - deadcode
    - depguard
    - dogsled
    - dupl
    - errcheck
    - exportloopref
    - exhaustive
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - gofmt
    - goimports
    - golint
    - gomnd
    - goprintffuncname
    - gosec
    - gosimple
    - govet
    - ineffassign
    - interfacer
    - lll
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - rowserrcheck
    - scopelint
    - staticcheck
    - structcheck
    - stylecheck
    - typecheck
    - unconvert
    - unparam
    - unused
    - varcheck
    - whitespace
    - gocognit
    - nestif
    - prealloc
    - testpackage
    - forbidigo
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - nolintlint
    - revive

issues:
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - lll
        - funlen
        - gocognit
        - nestif
        - goconst
        - gomnd

    # Exclude known linter issues
    - text: "weak cryptographic primitive"
      linters:
        - gosec

    # Exclude shadow checking on err variables
    - text: "shadow: declaration of \"err\""
      linters:
        - govet

    # Exclude certain golint issues
    - text: "should have a package comment"
      linters:
        - golint

    # Exclude magic number warnings for common constants
    - text: "Magic number: [0-2]"
      linters:
        - gomnd

    # Exclude long line warnings for import statements
    - text: "line is [0-9]+ characters"
      source: "^import"
      linters:
        - lll

  max-issues-per-linter: 0
  max-same-issues: 0
  new: false

severity:
  default-severity: error
  case-sensitive: false
  rules:
    - linters:
        - dupl
        - gosec
        - funlen
        - gocyclo
        - goconst
        - gocognit
        - nestif
      severity: info

    - linters:
        - golint
      severity: warning

    - linters:
        - gomnd
        - lll
        - gofmt
        - goimports
      severity: warning