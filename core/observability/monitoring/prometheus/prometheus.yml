# Prometheus配置文件
# Prometheus Configuration for Athena Platform

global:
  scrape_interval: 15s  # 每15秒采集一次指标
  evaluation_interval: 15s  # 每15秒评估一次规则
  external_labels:
    cluster: 'athena-platform'
    environment: 'production'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# 规则文件
rule_files:
  # - "alert_rules.yml"

# 抓取配置
scrape_configs:
  # =============================================================================
  # Athena平台服务监控
  # =============================================================================

  # Prometheus自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # 专利执行服务
  - job_name: 'patent-execution-service'
    static_configs:
      - targets: ['patent-service:8000']  # 替换为实际地址
        labels:
          service: 'patent-execution'
          team: 'patent-platform'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # 爬虫服务
  - job_name: 'crawler-service'
    static_configs:
      - targets: ['crawler-service:8001']
        labels:
          service: 'crawler'
          team: 'data-acquisition'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # AI服务
  - job_name: 'ai-service'
    static_configs:
      - targets: ['ai-service:8002']
        labels:
          service: 'ai'
          team: 'ai-services'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # 多模态服务
  - job_name: 'multimodal-service'
    static_configs:
      - targets: ['multimodal-service:8003']
        labels:
          service: 'multimodal'
          team: 'ai-services'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # =============================================================================
  # 基础设施监控
  # =============================================================================

  # Redis监控（需要redis_exporter）
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
    scrape_interval: 15s

  # PostgreSQL监控（需要postgres_exporter）
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'
    scrape_interval: 15s

  # Node Exporter（系统指标）
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
    scrape_interval: 15s

  # cAdvisor（容器指标）
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'
    scrape_interval: 15s

  # =============================================================================
  # Kubernetes服务发现（可选）
  # =============================================================================

  # Kubernetes API Server
  - job_name: 'kubernetes-apiservers'
    kubernetes_sd_configs:
      - role: endpoints
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https

  # Kubernetes Nodes
  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

  # =============================================================================
  # 服务发现（consul，可选）
  # =============================================================================

  # - job_name: 'consul'
  #   consul_sd_configs:
  #     - server: 'localhost:8500'
  #       services: ['patent-service', 'crawler-service', 'ai-service']
  #   relabel_configs:
  #     - source_labels: [__meta_consul_tags]
  #       regex: ',metrics,'
  #       action: keep
  #     - source_labels: [__meta_consul_service]
  #       target_label: service
