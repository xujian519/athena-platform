version: '3.8'

services:
  # =============================================================================
  # Prometheus - 指标收集和存储
  # =============================================================================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: athena-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      # 配置文件
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # 数据持久化
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - athena-monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Grafana - 可视化仪表板
  # =============================================================================
  grafana:
    image: grafana/grafana:10.1.0
    container_name: athena-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Grafana配置
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=athena123
      - GF_INSTALL_PLUGINS=
      # 数据库
      - GF_USERS_DEFAULT_THEME=dark
      # 告警
      - GF_ALERTING_ENABLED=true
      - GF_UNIFIED_ALERTING_ENABLED=true
    volumes:
      # 数据持久化
      - grafana-data:/var/lib/grafana
      # 仪表板配置
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      # 数据源配置
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - athena-monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Jaeger - 分布式追踪
  # =============================================================================
  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: athena-jaeger
    restart: unless-stopped
    ports:
      - "5775:5775/udp"        # accept zipkin.thrift over compact thrift protocol
      - "6831:6831/udp"        # accept jaeger.thrift over compact thrift protocol
      - "6832:6832/udp"        # accept jaeger.thrift over binary thrift protocol
      - "5778:5778"            # serve configs
      - "16686:16686"          # serve frontend (Jaeger UI)
      - "14268:14268"          # accept jaeger.thrift directly from clients
      - "14250:14250"          # accept model.proto
      - "9411:9411"            # Zipkin compatible endpoint
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - athena-monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Node Exporter - 系统指标收集（可选）
  # =============================================================================
  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: athena-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - athena-monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file="3"

  # =============================================================================
  # cAdvisor - 容器指标收集（可选）
  # =============================================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: athena-cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - athena-monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# =============================================================================
# 数据卷
# =============================================================================
volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# =============================================================================
# 网络
# =============================================================================
networks:
  athena-monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
