[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    unit: 单元测试（快速、无外部依赖）
    integration: 集成测试（需要外部服务）
    e2e: 端到端测试（完整流程）
    performance: 性能测试
    stress: 压力测试
    security: 安全测试
    slow: 慢速测试
    fast: 快速测试
    network: 需要网络连接
    database: 需要数据库连接
    docker: 需要Docker容器
    gpu: 需要GPU支持
    redis: 需要Redis服务
    cache: 缓存相关测试
    agents: 智能体相关测试
    perception: 感知模块测试
    memory: 记忆系统测试
    nlp: NLP模块测试
    intent: 意图识别相关测试
    regression: 回归测试
    flaky: 不稳定测试
    benchmark: 基准测试
    smoke: 冒烟测试
    skip: 跳过测试

EOF
echo "✅ pytest_new.ini 已创建"