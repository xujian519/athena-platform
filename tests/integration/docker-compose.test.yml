version: '3.8'

services:
  postgres-test:
    image: postgres:14-alpine
    container_name: athena-postgres-test
    environment:
      POSTGRES_DB: athena_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - test-network

  redis-test:
    image: redis:7-alpine
    container_name: athena-redis-test
    ports:
      - "6380:6379"
    volumes:
      - redis_test_data:/data
    networks:
      - test-network

  elasticsearch-test:
    image: elasticsearch:8.8.0
    container_name: athena-elasticsearch-test
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9201:9200"
    volumes:
      - es_test_data:/usr/share/elasticsearch/data
    networks:
      - test-network

  mock-agents:
    build:
      context: ../../
      dockerfile: tests/integration/Dockerfile.test
    container_name: athena-mock-agents
    ports:
      - "8081:8080"
    environment:
      - TEST_MODE=true
      - MOCK_AGENTS=true
    depends_on:
      - postgres-test
      - redis-test
      - elasticsearch-test
    networks:
      - test-network

volumes:
  postgres_test_data:
  redis_test_data:
  es_test_data:

networks:
  test-network:
    driver: bridge