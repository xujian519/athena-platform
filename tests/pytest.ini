# Pytest配置文件
# XiaoNuo统一编排器测试配置

[pytest]
# 测试发现
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试路径
testpaths = tests

# Python路径
pythonpath = . production

# 最小Python版本
minversion = 7.0

# 异步测试支持
asyncio_mode = auto

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    -p no:anyio

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    e2e: 端到端测试
    slow: 慢速测试
    fast: 快速测试
    network: 需要网络的测试
    database: 需要数据库的测试
    docker: 需要Docker的测试
    security: 安全测试
    performance: 性能测试
    stress: 压力测试
    gpu: 需要GPU的测试
    edge_cases: 边界情况测试
    benchmark: 基准测试
    smoke: 冒烟测试
    regression: 回归测试
    agents: 智能体相关测试
    nlp: NLP模块测试
    intent: 意图识别测试
    memory: 记忆系统测试
    skip: 跳过测试

# 覆盖率配置
[coverage:run]
source = core
omit =
    */tests/*
    */__init__.py
    */migrations/*
    */conftest.py

[coverage:report]
precision = 2
show_missing = true
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == "__main__":
    if TYPE_CHECKING:
    @abstract
