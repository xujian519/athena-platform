# Athena工作平台端口分配表
# Port Allocation Configuration

# 端口分配原则：
# 8000-8099: 核心服务
# 8100-8199: AI和模型服务
# 8200-8299: 数据处理服务
# 8300-8399: 爬虫和搜索服务
# 9000-9099: 管理和监控服务
# 9100-9199: 开发和测试服务

services:
  # 核心服务 (8000-8099)
  api_gateway:
    port: 8080
    description: "API网关 - 统一入口"
    
  athena_platform:
    port: 8000
    description: "Athena平台主服务"
    env_var: "ATHENA_PORT"
    
  # AI和模型服务 (8100-8199)
  deepseek_service:
    port: 8100
    description: "DeepSeek模型服务"
    
  glm_service:
    port: 8101
    description: "GLM模型服务"
    
  pqai_service:
    port: 8102
    description: "PQAI专利分析服务"
    
  # 数据处理服务 (8200-8299)
  vector_search:
    port: 8200
    description: "向量搜索服务"
    
  patent_analysis:
    port: 8201
    description: "专利分析服务"
    
  knowledge_graph:
    port: 8202
    description: "知识图谱服务"
    
  # 爬虫和搜索服务 (8300-8399)
  crawler_service:
    port: 8300
    description: "爬虫服务"
    env_var: "CRAWLER_SERVICE_PORT"
    
  search_service:
    port: 8301
    description: "搜索引擎服务"
    
  # 管理和监控服务 (9000-9099)
  xiaonuo_control:
    port: 9000
    description: "小诺控制中心"
    
  monitoring_service:
    port: 9090
    description: "监控服务"
    env_var: "CRAWLER_METRICS_PORT"
    
  # 数据库服务 (内部端口，不对外暴露)
  databases:
    postgresql:
      port: 5432
      description: "PostgreSQL数据库"
      
    redis:
      port: 6379
      description: "Redis缓存"
      
    qdrant:
      port: 6333
      description: "Qdrant向量数据库"
      
    neo4j:
      port: 7687
      description: "Neo4j图数据库"

# 端口使用说明：
# 1. 所有服务应使用环境变量配置端口
# 2. 新增服务必须在此文件中注册端口
# 3. 避免使用已分配的端口
# 4. 开发环境可使用9100-9199端口范围