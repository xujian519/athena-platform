# ============================================================================
# 小诺 (Xiaonuo) 协调器配置
# Xiaonuo Coordinator Configuration
# ============================================================================

service:
  name: xiaonuo
  type: coordinator
  version: "2.0"

# 协调配置
coordination:
  max_parallel_agents: 3
  task_timeout: 600
  retry_max_attempts: 3
  retry_delay: 5

# Agent注册表
agents:
  xiaona:
    enabled: true
    priority: high

  yunxi:
    enabled: true
    priority: medium

# 规划配置
planning:
  enable_smart_planning: true
  planner_type: hierarchical
  max_depth: 3

# 通信配置
communication:
  max_queue_size: 10000
  message_timeout: 30
