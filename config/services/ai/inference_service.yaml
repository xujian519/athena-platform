# Athena工作平台 - AI推理服务配置

# 服务基本信息
service:
  name: "ai-inference-service"
  version: "2.1.0"
  environment: "${ENVIRONMENT:-development}"

  # 服务地址
  host: "0.0.0.0"
  port: 8011
  workers: 2

  # 日志配置
  log_level: "${LOG_LEVEL:-INFO}"
  log_format: "json"

# 安全配置
security:
  # CORS 配置
  cors:
    enabled: true
    origins:
      - "http://localhost:3000"
      - "http://localhost:8080"
      - "https://athena-platform.com"
    methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    headers: ["Content-Type", "Authorization", "X-Requested-With"]

  # 认证配置
  authentication:
    enabled: true
    jwt_secret_key: "${JWT_SECRET_KEY}"
    token_expiry: 3600
    refresh_token_expiry: 86400

  # 限流配置
  rate_limiting:
    enabled: true
    requests_per_minute: 1000
    burst_size: 100
    storage: "redis"

# 模型配置
models:
  # 文本分析模型
  text_analysis:
    model_id: "text-analysis"
    type: "text_classification"
    version: "2.1"
    description: "文本分析模型"

    capabilities:
      - "sentiment"
      - "classification"
      - "entity_extraction"
      - "keyword_extraction"

    # 性能配置
    max_concurrent_requests: 10
    timeout_seconds: 30
    cache_enabled: true
    cache_ttl_seconds: 300

    # 资源限制
    memory_mb: 512
    cpu_cores: 1

  # 专利分析模型
  patent_analysis:
    model_id: "patent-analysis"
    type: "patent_classification"
    version: "1.5"
    description: "专利分析模型"

    capabilities:
      - "patent_classification"
      - "similarity"
      - "relevance"
      - "prior_art_search"

    # 性能配置
    max_concurrent_requests: 5
    timeout_seconds: 60
    cache_enabled: true
    cache_ttl_seconds: 600

    # 资源限制
    memory_mb: 1024
    cpu_cores: 2

  # 语义搜索模型
  semantic_search:
    model_id: "semantic-search"
    type: "embedding"
    version: "3.0"
    description: "语义搜索模型"

    capabilities:
      - "text_embedding"
      - "similarity_search"
      - "semantic_matching"

    # 性能配置
    max_concurrent_requests: 15
    timeout_seconds: 20
    cache_enabled: false

    # 资源限制
    memory_mb: 2048
    cpu_cores: 2

    # 模型参数
    embedding_size: 1024
    max_sequence_length: 512

# 资源限制
resource_limits:
  max_memory_mb: 4096
  max_cpu_percent: 80
  max_concurrent_requests: 50
  max_request_size_mb: 10

# 监控配置
monitoring:
  metrics:
    enabled: true
    endpoint: "/metrics"
    interval: 60

  health_check:
    enabled: true
    endpoint: "/health"
    interval: 30
    timeout: 5

  performance:
    enabled: true
    tracking: true
    error_tracking: true
    slow_query_threshold: 1000

# 外部服务依赖
external_services:
  # 模型注册中心
  model_registry:
    name: "model-registry"
    url: "http://localhost:8012"
    timeout: 10
    retries: 3
    health_check: true

  # 缓存服务
  cache_service:
    name: "cache-service"
    url: "http://localhost:8021"
    timeout: 5
    retries: 2
    health_check: true

  # 数据库服务
  database:
    name: "database"
    url: "${DATABASE_URL}"
    timeout: 30
    retries: 3
    health_check: true

# 部署配置
deployment:
  # 优雅关闭
  graceful_shutdown:
    enabled: true
    timeout: 30

  # 健康检查
  health_check:
    enabled: true
    path: "/health"
    interval: 30

  # 重启策略
  restart_policy:
    max_retries: 3
    delay: 10