# Athena工作平台 - 执行模块本地开发环境配置
# Local Development Configuration for Execution Module
# 版本: 2.0.0
# 更新日期: 2026-01-27
# 
# 说明：此配置文件针对本地开发环境进行了优化
# - 使用项目内的相对路径
# - 降低资源限制以适应本地开发
# - 启用调试模式以便开发
# - 使用不同的端口避免与生产服务冲突

# =============================================================================
# 执行引擎配置 (Execution Engine)
# =============================================================================
execution_engine:
  # 基础配置
  agent_id: "athena_local_agent"
  
  # 工作线程配置（本地开发环境使用较少线程）
  max_workers: 8               # 最大工作线程数（本地开发建议：CPU核心数）
  min_workers: 2               # 最小工作线程数
  worker_idle_timeout: 60      # 工作线程空闲超时（秒，本地环境缩短超时）
  
  # 并发控制
  max_concurrent_tasks: 50     # 最大并发任务数（降低到50）
  queue_max_size: 1000         # 任务队列最大容量（降低到1000）
  
  # 超时配置
  task_timeout: 300.0          # 任务默认超时时间（秒，5分钟）
  task_shutdown_timeout: 30.0  # 关闭时任务等待时间（秒，30秒）
  initialization_timeout: 10.0 # 初始化超时时间（秒）
  
  # 重试配置
  max_retries: 2               # 默认最大重试次数（降低到2）
  retry_backoff_base: 1.0      # 重试退避基数（秒，缩短）
  retry_backoff_max: 10.0      # 重试退避最大时间（秒，缩短）
  retry_jitter: true           # 启用重试抖动
  
  # 资源限制（本地开发环境降低限制）
  enable_resource_monitoring: true
  max_memory_mb: 1024          # 最大内存使用（MB，降低到1GB）
  max_cpu_percent: 90.0        # 最大CPU使用率（%），本地环境可以使用更多
  gc_threshold: 0.85           # 触发GC的内存使用率阈值

# =============================================================================
# 并行执行器配置 (Parallel Executor)
# =============================================================================
parallel_executor:
  # 线程池配置
  max_workers: 8
  min_workers: 2
  thread_keepalive: 30         # 线程保活时间（秒，缩短）
  
  # 并发任务控制
  max_concurrent_tasks: 50
  queue_size: 1000
  
  # 超时配置
  default_timeout: 300.0       # 默认任务超时（秒，5分钟）
  shutdown_timeout: 30.0       # 关闭超时（秒）
  
  # 错误处理
  continue_on_error: true      # 单个任务失败时是否继续
  error_threshold: 5           # 错误阈值（降低到5）
  error_window: 30             # 错误统计时间窗口（秒，缩短）

# =============================================================================
# 任务管理器配置 (Task Manager)
# =============================================================================
task_manager:
  # 并发控制
  max_concurrent_tasks: 25     # 降低到25
  max_pending_tasks: 500       # 降低到500
  max_completed_tasks: 1000    # 最大保留完成任务数（降低到1000）
  
  # 超时配置
  default_timeout: 180.0       # 默认超时（秒，3分钟）
  check_interval: 0.5          # 任务状态检查间隔（秒，更频繁）
  
  # 清理配置
  enable_auto_cleanup: true
  cleanup_interval: 1800       # 清理间隔（秒，30分钟）
  completed_retention: 3600    # 完成任务保留时间（秒，1小时）
  failed_retention: 86400      # 失败任务保留时间（秒，24小时）
  
  # 持久化配置
  enable_persistence: false    # 本地开发不启用持久化
  persistence_path: "data/tasks"  # 使用相对路径
  persistence_interval: 60     # 持久化间隔（秒）

# =============================================================================
# 优先级配置 (Priority Configuration)
# =============================================================================
priority:
  # 优先级权重（用于调度决策）
  weights:
    CRITICAL: 1000
    HIGH: 100
    NORMAL: 10
    LOW: 1
    BACKGROUND: 0.1
  
  # 优先级队列配置（本地环境降低队列大小）
  queue_size_per_priority:
    CRITICAL: 20
    HIGH: 50
    NORMAL: 200
    LOW: 100
    BACKGROUND: 50
  
  # 优先级提升配置
  enable_aging: true           # 启用等待时间优先级提升
  aging_threshold: 120         # 等待时间阈值（秒，2分钟）
  aging_boost: 1               # 提升级别数

# =============================================================================
# 日志配置 (Logging Configuration)
# =============================================================================
logging:
  # 日志级别（本地开发使用DEBUG级别）
  level: "DEBUG"               # DEBUG, INFO, WARNING, ERROR, CRITICAL
  executor_level: "INFO"       # 执行器日志级别
  
  # 日志格式
  format: "%(asctime)s - %(name)s - %(levelname)s - [%(funcName)s:%(lineno)d] - %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  
  # 日志文件（使用项目内的logs目录）
  enable_file_logging: true
  log_dir: "logs/execution"     # 使用相对路径
  log_file: "execution.log"
  max_bytes: 52428800          # 50MB（降低）
  backup_count: 5              # 保留5个备份文件（降低）
  
  # 特殊日志
  enable_task_logging: true    # 记录每个任务的详细信息
  task_log_file: "tasks.log"
  enable_error_log: true       # 单独的错误日志
  error_log_file: "errors.log"
  
  # 性能日志
  enable_performance_log: true
  performance_log_file: "performance.log"
  performance_log_interval: 30 # 性能日志间隔（秒，更频繁）

# =============================================================================
# 监控配置 (Monitoring Configuration)
# =============================================================================
monitoring:
  # 启用监控
  enabled: true
  
  # 指标收集
  metrics_collection_interval: 5   # 指标收集间隔（秒，更频繁）
  
  # 性能指标
  performance_metrics:
    - "task_count"              # 任务总数
    - "task_success_rate"       # 任务成功率
    - "task_average_duration"   # 平均任务执行时间
    - "queue_size"              # 队列大小
    - "queue_wait_time"         # 队列等待时间
    - "worker_utilization"      # 工作线程利用率
    - "memory_usage"            # 内存使用
    - "cpu_usage"               # CPU使用率
  
  # 告警阈值（本地开发环境放宽阈值）
  alert_thresholds:
    queue_size_critical: 900    # 队列大小告警阈值（90%）
    queue_size_warning: 700
    error_rate_critical: 0.2    # 错误率20%以上（放宽）
    error_rate_warning: 0.1     # 错误率10%以上
    avg_duration_critical: 180  # 平均执行时间3分钟以上
    avg_duration_warning: 120   # 平均执行时间2分钟以上
    memory_usage_critical: 0.95 # 内存使用95%以上
    memory_usage_warning: 0.85  # 内存使用85%以上
  
  # 监控端点（使用不同的端口避免冲突）
  enable_metrics_endpoint: true
  metrics_port: 9091            # Prometheus metrics端口（使用9091避免冲突）
  enable_health_endpoint: true
  health_port: 8081             # Health check端口（使用8081避免冲突）

# =============================================================================
# 安全配置 (Security Configuration)
# =============================================================================
security:
  # 资源限制
  enable_resource_limits: true
  max_task_memory_mb: 256       # 单个任务最大内存（降低到256MB）
  max_task_duration: 1800       # 单个任务最大时长（秒，30分钟）
  
  # 任务隔离
  enable_sandboxing: false      # 本地开发不启用沙箱
  
  # 权限控制
  enable_permission_check: false # 本地开发禁用权限检查
  default_permission: "execute"
  
  # 审计日志
  enable_audit_log: false       # 本地开发禁用审计日志
  audit_log_path: "logs/audit.log"
  audit_events:
    - "task_created"
    - "task_started"
    - "task_completed"
    - "task_failed"
    - "task_cancelled"
    - "system_started"
    - "system_stopped"

# =============================================================================
# 健康检查配置 (Health Check Configuration)
# =============================================================================
health_check:
  enabled: true
  
  # 检查间隔
  interval: 15                  # 健康检查间隔（秒，更频繁）
  timeout: 5                    # 检查超时（秒，缩短）
  
  # 检查项
  checks:
    - name: "queue_health"
      enabled: true
      threshold: 0.9            # 队列使用率阈值
    
    - name: "worker_health"
      enabled: true
      min_active_workers: 1     # 最少活跃工作线程
    
    - name: "memory_health"
      enabled: true
      threshold: 0.95           # 内存使用率阈值（放宽）
    
    - name: "error_rate_health"
      enabled: true
      threshold: 0.2            # 错误率阈值（放宽）
    
    - name: "task_duration_health"
      enabled: true
      threshold: 180            # 任务执行时间阈值（秒，3分钟）
  
  # 失败处理
  failure_threshold: 5          # 连续失败次数阈值（放宽）
  recovery_threshold: 2         # 恢复判断次数

# =============================================================================
# 优雅关闭配置 (Graceful Shutdown Configuration)
# =============================================================================
shutdown:
  # 超时配置
  timeout: 30                   # 总关闭超时（秒，缩短）
  task_wait_timeout: 15         # 等待任务完成的超时（秒）
  force_kill_timeout: 10        # 强制终止超时（秒）
  
  # 关闭步骤
  steps:
    - name: "stop_accepting_new_tasks"
      timeout: 5
    - name: "wait_for_active_tasks"
      timeout: 15
    - name: "drain_queue"
      timeout: 5
    - name: "shutdown_workers"
      timeout: 3
    - name: "cleanup_resources"
      timeout: 2
  
  # 状态保存
  save_state: true
  state_path: "data/state/shutdown.json"  # 使用相对路径

# =============================================================================
# 开发/调试配置 (Development/Debug Configuration)
# =============================================================================
# 注意：本地开发环境启用调试功能
development:
  debug_mode: true              # 启用调试模式
  profile_performance: true     # 启用性能分析
  trace_memory: true            # 启用内存追踪
  log_all_tasks: true           # 记录所有任务
  
  # 调试选项
  enable_debug_endpoints: true  # 启用调试端点
  enable_pprof: false           # Go pprof兼容的性能分析

# =============================================================================
# 环境变量覆盖 (Environment Variable Overrides)
# =============================================================================
# 可以通过环境变量覆盖任何配置项
# 格式：ATHENA_EXECUTION__SECTION__KEY
# 例如：ATHENA_EXECUTION__EXECUTION_ENGINE__MAX_WORKERS=16

# =============================================================================
# 配置验证 (Configuration Validation)
# =============================================================================
# 启动时会验证所有配置项
# 验证失败的配置会导致启动失败
validation:
  strict: false                 # 本地开发使用宽松模式
  warnings_as_errors: false     # 不将警告视为错误

# =============================================================================
# 版本信息 (Version Information)
# =============================================================================
version:
  config_version: "2.0.0"
  min_compatible_version: "2.0.0"
  max_compatible_version: "2.999.999"
