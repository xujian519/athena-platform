# Athena工作平台Ollama配置
# Ollama Configuration

# 服务器配置
server:
  host: localhost
  port: 11434
  timeout: 300
  retries: 3

# 模型配置
models:
  # 默认模型
  default: "qwen2.5:7b"

  # 可用模型列表
  available:
    - name: "qwen2.5:7b"
      description: "通义千问2.5 7B参数模型"
      size: "4.7GB"
      type: "chat"
      context_length: 32768
      embedding: false

    - name: "qwen2.5:14b"
      description: "通义千问2.5 14B参数模型"
      size: "9.0GB"
      type: "chat"
      context_length: 32768
      embedding: false

    - name: "qwen3-embedding:4b"
      description: "通义千问3 4B参数嵌入模型"
      size: "2.5GB"
      type: "embedding"
      context_length: 8192
      embedding: true
      dimensions: 768

    - name: "llama3.1:8b"
      description: "Llama 3.1 8B参数模型"
      size: "4.7GB"
      type: "chat"
      context_length: 131072
      embedding: false

    - name: "nomic-embed-text:latest"
      description: "Nomic文本嵌入模型"
      size: "0.5GB"
      type: "embedding"
      context_length: 8192
      embedding: true
      dimensions: 768

# 专利分析专用配置
patent_analysis:
  # 摘要生成模型
  summarization:
    model: "qwen2.5:7b"
    max_tokens: 500
    temperature: 0.3
    system_prompt: |
      你是一个专利技术专家，请为给定的专利内容生成简洁准确的技术摘要。
      摘要应包括：
      1. 技术领域
      2. 核心创新点
      3. 主要应用场景
      4. 技术优势

  # 技术分析模型
  technical_analysis:
    model: "qwen2.5:14b"
    max_tokens: 1000
    temperature: 0.2
    system_prompt: |
      你是一个资深专利分析师，请对专利技术进行深入分析。
      分析应包括：
      1. 技术背景和问题
      2. 解决方案的核心思想
      3. 技术实现的关键点
      4. 与现有技术的对比
      5. 潜在的技术风险和改进空间

  # 侵权风险分析模型
  infringement_analysis:
    model: "qwen2.5:7b"
    max_tokens: 800
    temperature: 0.1
    system_prompt: |
      你是一个专利法律专家，请分析专利的侵权风险。
      分析应包括：
      1. 权利要求保护范围
      2. 可能的侵权场景
      3. 风险等级评估
      4. 规避建议

# 向量嵌入配置
embedding:
  # 文本嵌入模型
  text_model: "qwen3-embedding:4b"
  dimensions: 768

  # 批量处理配置
  batch:
    size: 32
    overlap: 0.1

  # 文本预处理
  preprocessing:
    chunk_size: 512
    chunk_overlap: 50
    normalize: true

# 性能配置
performance:
  # 并发配置
  concurrency:
    max_concurrent_requests: 5
    queue_size: 100

  # 缓存配置
  cache:
    enabled: true
    ttl: 3600  # 1小时
    max_size: 1000

  # 资源限制
  resources:
    max_memory_usage: "8GB"
    max_gpu_usage: "80%"

# 监控配置
monitoring:
  # 指标收集
  metrics:
    enabled: true
    interval: 30

  # 性能监控
  performance:
    response_time_threshold: 5000  # 毫秒
    error_rate_threshold: 0.05      # 5%

# 安全配置
security:
  # API密钥
  api_key: null

  # 访问控制
  access_control:
    enabled: false
    allowed_ips: []

  # 内容过滤
  content_filter:
    enabled: true
    sensitive_words: ["机密", "内部", "秘密"]