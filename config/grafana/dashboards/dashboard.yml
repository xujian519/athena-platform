# Grafana仪表板配置
# Grafana Dashboard Configuration

apiVersion: 1

providers:
  - name: 'Athena Dashboards'
    orgId: 1
    folder: 'Athena'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
