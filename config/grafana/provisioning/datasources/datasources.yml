# Grafana 数据源自动配置
# 这些数据源会在Grafana启动时自动添加

apiVersion: 1

datasources:
  # Jaeger数据源
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    isDefault: false
    editable: true
    jsonData:
      tracesToLogs:
        datasourceUid: 'elasticsearch'
      tracesToMetrics:
        datasourceUid: 'prometheus'

  # Elasticsearch数据源
  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: otel-traces-*
    isDefault: false
    editable: true
    jsonData:
      esVersion: "8.11.0"
      timeField: "@timestamp"
      maxConcurrentShardRequests: 5
      logMessageField: "message"
      logLevelField: "severity"

  # Prometheus数据源（如果有Prometheus）
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: "POST"
