# Athena Gateway 路由配置文件
# Gateway Route Configuration

routes:
  # 小娜法律专家服务
  - id: "xiaona-legal"
    path: "/api/xiaona/*"
    target_service: "xiaona-legal"
    methods:
      - GET
      - POST
      - PUT
      - DELETE
    strip_prefix: true
    timeout: 30
    retries: 3
    auth_required: true
    priority: 100
    weight: 10
    enabled: true
    metadata:
      description: "小娜法律专家服务 - 专利分析、法律咨询"
      version: "1.0.0"
      owner: "xiaona"

  # 小诺协调器服务
  - id: "xiaonuo-coordinator"
    path: "/api/xiaonuo/*"
    target_service: "xiaonuo-coordinator"
    methods:
      - GET
      - POST
    strip_prefix: true
    timeout: 20
    retries: 2
    auth_required: true
    priority: 90
    weight: 10
    enabled: true
    metadata:
      description: "小诺任务协调服务 - Agent调度、任务分配"
      version: "1.0.0"
      owner: "xiaonuo"

  # 云熙IP管理服务
  - id: "yunxi-ip"
    path: "/api/yunxi/*"
    target_service: "yunxi-ip"
    methods:
      - GET
      - POST
      - PUT
    strip_prefix: true
    timeout: 25
    retries: 2
    auth_required: true
    priority: 80
    weight: 10
    enabled: true
    metadata:
      description: "云熙IP管理服务 - 客户关系、项目管理"
      version: "1.0.0"
      owner: "yunxi"

  # 记忆服务
  - id: "memory-service"
    path: "/api/memory/*"
    target_service: "memory-service"
    methods:
      - GET
      - POST
      - PUT
      - DELETE
    strip_prefix: true
    timeout: 15
    retries: 3
    auth_required: false
    priority: 70
    weight: 5
    enabled: true
    metadata:
      description: "记忆服务 - 四层记忆架构"
      version: "1.0.0"

  # 知识图谱服务
  - id: "knowledge-graph"
    path: "/api/kg/*"
    target_service: "knowledge-graph"
    methods:
      - GET
      - POST
    strip_prefix: true
    timeout: 20
    retries: 2
    auth_required: false
    priority: 60
    weight: 5
    enabled: true
    metadata:
      description: "知识图谱服务 - Neo4j图数据库"
      version: "1.0.0"

  # 向量检索服务
  - id: "vector-search"
    path: "/api/vector/*"
    target_service: "vector-search"
    methods:
      - GET
      - POST
    strip_prefix: true
    timeout: 10
    retries: 2
    auth_required: false
    priority: 50
    weight: 5
    enabled: true
    metadata:
      description: "向量检索服务 - Qdrant向量数据库"
      version: "1.0.0"
