# Prometheus配置文件
# Prometheus Configuration

global:
  # 抓取间隔
  scrape_interval: 15s
  # 规则评估间隔
  evaluation_interval: 15s
  # 外部标签
  external_labels:
    cluster: 'athena'
    environment: 'development'

# 告警规则配置
rule_files:
  - '/etc/prometheus/rules/*.yml'

# 抓取配置
scrape_configs:
  # Prometheus自身指标
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 小娜专利服务
  - job_name: 'xiaona-patents'
    static_configs:
      - targets: ['xiaona-patents:8001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'xiaona-patents'

  # 小诺协作服务
  - job_name: 'xiaonuo-collaboration'
    static_configs:
      - targets: ['xiaonuo-collaboration:8002']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'xiaonuo-collaboration'

  # Gateway网关服务
  - job_name: 'athena-gateway'
    static_configs:
      - targets: ['athena-gateway:8005']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'athena-gateway'

  # 知识图谱服务
  - job_name: 'knowledge-graph'
    static_configs:
      - targets: ['knowledge-graph:8003']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'knowledge-graph'

  # 多模态服务
  - job_name: 'multimodal-service'
    static_configs:
      - targets: ['multimodal-service:8004']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'multimodal-service'

  # Node Exporter（系统指标）
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
