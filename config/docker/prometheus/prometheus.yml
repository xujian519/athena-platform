# Prometheus主配置文件
# Prometheus Main Configuration for Athena Platform

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'athena-platform'
    environment: 'production'

# 告警规则文件
rule_files:
  - 'cognitive_decision_alerts.yml'
  # 添加更多规则文件
  # - 'infrastructure_alerts.yml'
  # - 'application_alerts.yml'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# 抓取配置
scrape_configs:
  # Prometheus自监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          tier: 'monitoring'

  # Redis监控
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'redis'
          tier: 'infrastructure'
    metrics_path: /metrics

  # Qdrant监控
  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
        labels:
          service: 'qdrant'
          tier: 'infrastructure'

  # Neo4j监控
  - job_name: 'neo4j'
    static_configs:
      - targets: ['neo4j:7474']
        labels:
          service: 'neo4j'
          tier: 'infrastructure'

  # Node Exporter (主机监控，可选)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['host.docker.internal:9100']
  #       labels:
  #         service: 'node'
  #         tier: 'infrastructure'

  # cAdvisor (容器监控，可选)
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']
  #       labels:
  #         service: 'cadvisor'
  #         tier: 'monitoring'
