# 认知与决策模块Prometheus告警规则
# Prometheus Alert Rules for Cognitive & Decision Module

groups:
  # ==================== 认知模块告警 ====================
  - name: cognitive_module_alerts
    interval: 30s
    rules:
      # 认知处理延迟过高
      - alert: HighCognitiveLatency
        expr: histogram_quantile(0.95, rate(cognitive_processing_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
          service: cognitive
        annotations:
          summary: "认知处理延迟过高"
          description: "认知模块P95延迟超过5秒，当前值: {{ $value }}秒"

      # 认知处理严重延迟
      - alert: CriticalCognitiveLatency
        expr: histogram_quantile(0.95, rate(cognitive_processing_duration_seconds_bucket[5m])) > 30
        for: 2m
        labels:
          severity: critical
          service: cognitive
        annotations:
          summary: "认知处理严重延迟"
          description: "认知模块P95延迟超过30秒，当前值: {{ $value }}秒"

      # 认知置信度异常
      - alert: HighCognitiveConfidence
        expr: cognitive_confidence > 0.95
        for: 10m
        labels:
          severity: warning
          service: cognitive
        annotations:
          summary: "认知置信度异常高"
          description: "认知置信度持续超过95%，可能存在模型过拟合，当前值: {{ $value }}"

  # ==================== 决策模块告警 ====================
  - name: decision_module_alerts
    interval: 30s
    rules:
      # 决策错误率过高
      - alert: HighDecisionErrorRate
        expr: |
          (
            rate(decision_errors_total[5m]) /
            rate(decision_requests_total[5m])
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          service: decision
        annotations:
          summary: "决策错误率过高"
          description: "决策错误率超过5%，当前值: {{ $value | humanizePercentage }}"

      # 决策错误率严重
      - alert: CriticalDecisionErrorRate
        expr: |
          (
            rate(decision_errors_total[5m]) /
            rate(decision_requests_total[5m])
          ) > 0.15
        for: 2m
        labels:
          severity: critical
          service: decision
        annotations:
          summary: "决策错误率严重"
          description: "决策错误率超过15%，当前值: {{ $value | humanizePercentage }}"

      # 决策队列积压
      - alert: DecisionQueueBacklog
        expr: sum(decision_queue_length) > 100
        for: 10m
        labels:
          severity: warning
          service: decision
        annotations:
          summary: "决策队列积压"
          description: "决策队列长度超过100，当前值: {{ $value }}"

  # ==================== 超级推理引擎告警 ====================
  - name: super_reasoning_alerts
    interval: 30s
    rules:
      # 内存使用过高
      - alert: SuperReasoningHighMemory
        expr: super_reasoning_memory_bytes > 1073741824  # 1GB
        for: 10m
        labels:
          severity: warning
          service: super_reasoning
        annotations:
          summary: "超级推理引擎内存使用过高"
          description: "超级推理引擎内存使用超过1GB，当前值: {{ $value | humanize }}B"

      # 推理超时
      - alert: SuperReasoningTimeout
        expr: |
          (
            rate(super_reasoning_duration_seconds_count[5m]) -
            rate(super_reasoning_duration_seconds_bucket{le="300"}[5m])
          ) > 0
        for: 5m
        labels:
          severity: warning
          service: super_reasoning
        annotations:
          summary: "超级推理超时"
          description: "检测到推理时间超过5分钟的请求"

  # ==================== LLM集成告警 ====================
  - name: llm_integration_alerts
    interval: 30s
    rules:
      # LLM响应延迟过高
      - alert: HighLLMLatency
        expr: histogram_quantile(0.95, rate(llm_request_duration_seconds_bucket[5m])) > 60
        for: 5m
        labels:
          severity: warning
          service: llm
        annotations:
          summary: "LLM响应延迟过高"
          description: "LLM P95响应延迟超过60秒，当前值: {{ $value }}秒"

      # LLM请求失败率过高
      - alert: LLMHighFailureRate
        expr: |
          (
            rate(llm_request_errors_total[5m]) /
            rate(llm_requests_total[5m])
          ) > 0.1
        for: 5m
        labels:
          severity: critical
          service: llm
        annotations:
          summary: "LLM请求失败率过高"
          description: "LLM请求失败率超过10%，当前值: {{ $value | humanizePercentage }}"

      # Token使用量异常
      - alert: HighTokenUsage
        expr: rate(llm_tokens_total[5m]) > 10000
        for: 10m
        labels:
          severity: warning
          service: llm
        annotations:
          summary: "Token使用量异常"
          description: "Token使用速率超过10000/秒，当前值: {{ $value }}/秒"

  # ==================== Agent协作告警 ====================
  - name: agent_collaboration_alerts
    interval: 30s
    rules:
      # Agent任务积压
      - alert: AgentTaskBacklog
        expr: sum(agent_task_queue_length) > 50
        for: 10m
        labels:
          severity: warning
          service: agent_collaboration
        annotations:
          summary: "Agent任务积压"
          description: "Agent任务队列长度超过50，当前值: {{ $value }}"

      # Agent失败率过高
      - alert: AgentFailureRate
        expr: |
          (
            rate(agent_task_failures_total[5m]) /
            rate(agent_tasks_total[5m])
          ) > 0.1
        for: 5m
        labels:
          severity: warning
          service: agent_collaboration
        annotations:
          summary: "Agent失败率过高"
          description: "Agent任务失败率超过10%，当前值: {{ $value | humanizePercentage }}"

      # Agent超时率过高
      - alert: AgentTimeoutRate
        expr: |
          (
            rate(agent_timeouts_total[5m]) /
            rate(agent_tasks_total[5m])
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          service: agent_collaboration
        annotations:
          summary: "Agent超时率过高"
          description: "Agent任务超时率超过5%，当前值: {{ $value | humanizePercentage }}"

  # ==================== 记忆系统告警 ====================
  - name: memory_system_alerts
    interval: 30s
    rules:
      # 记忆缓存命中率过低
      - alert: MemoryCacheLowHit
        expr: |
          (
            rate(memory_cache_hits_total[5m]) /
            (rate(memory_cache_hits_total[5m]) + rate(memory_cache_misses_total[5m]))
          ) < 0.7
        for: 15m
        labels:
          severity: warning
          service: memory
        annotations:
          summary: "记忆缓存命中率过低"
          description: "记忆缓存命中率低于70%，当前值: {{ $value | humanizePercentage }}"

      # 向量搜索延迟过高
      - alert: VectorSearchHighLatency
        expr: histogram_quantile(0.95, rate(vector_search_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: memory
        annotations:
          summary: "向量搜索延迟过高"
          description: "向量搜索P95延迟超过2秒，当前值: {{ $value }}秒"

  # ==================== 质量门禁告警 ====================
  - name: quality_gate_alerts
    interval: 60s
    rules:
      # 技术债务过多
      - alert: TechnicalDebtHigh
        expr: sum(technical_debt_count) > 50
        for: 1h
        labels:
          severity: warning
          service: quality
        annotations:
          summary: "技术债务过多"
          description: "技术债务数量超过50个，当前值: {{ $value }}"

      # 测试覆盖率不足
      - alert: TestCoverageLow
        expr: code_coverage_percent{module="cognition"} < 70
        for: 1h
        labels:
          severity: warning
          service: quality
        annotations:
          summary: "测试覆盖率不足"
          description: "认知模块测试覆盖率低于70%，当前值: {{ $value }}%"

      # 语法错误存在
      - alert: SyntaxErrorsPresent
        expr: sum(syntax_error_count) > 0
        for: 30m
        labels:
          severity: critical
          service: quality
        annotations:
          summary: "存在语法错误"
          description: "检测到{{ $value }}个语法错误，需要立即修复"
