# Athena知识图谱Neo4j优化配置
# Neo4j Performance Optimization Configuration

# =============================================================================
# 内存配置优化
# =============================================================================

# 堆内存设置 - 增加以支持复杂查询
server.memory.heap.initial_size=2G
server.memory.heap.max_size=4G

# 页面缓存设置 - 提升查询性能
server.memory.pagecache.size=2G

# =============================================================================
# 查询性能优化
# =============================================================================

# 查询缓存
server.memory.query_cache.size=1000
server.memory.query_cache.enable=true

# 查询超时设置
dbms.transaction.timeout=60s
dbms.transaction.maximum_read_query_timeout=300s

# 查询计划缓存
dbms.query_cache_size=1000

# =============================================================================
# 连接配置
# =============================================================================

# 最大连接数
server.bolt.thread_pool_min_size=5
server.bolt.thread_pool_max_size=400

# HTTP连接池
server.http.thread_pool_min_size=5
server.http.thread_pool_max_size=200

# =============================================================================
# 日志配置
# =============================================================================

# 查询日志 - 开发环境启用，生产环境可关闭
server.logs.query.enabled=true
server.logs.query.threshold=1s
server.logs.query.parameter_logging_enabled=true

# =============================================================================
# 安全配置
# =============================================================================

# 网络访问
server.default_listen_address=0.0.0.0
server.bolt.listen_address=0.0.0.0:7687
server.http.listen_address=0.0.0.0:7474

# =============================================================================
# 事务和锁配置
# =============================================================================

# 事务配置
dbms.transaction.concurrent.maximum=1000

# 锁配置
dbms.lock_manager.active_locks=100000

# =============================================================================
# JVM特定优化
# =============================================================================

# GC策略优化（已在启动参数中设置G1GC）
# 额外的JVM参数可以通过环境变量设置

# =============================================================================
# 统计和监控
# =============================================================================

# 启用JMX监控
server.jvm.additional=-XX:+UnlockCommercialFeatures
server.jvm.additional=-XX:+FlightRecorder

# =============================================================================
# 文件和存储优化
# =============================================================================

# 文件描述符限制
server.windows.process_file_descriptor_max_low=20000
server.windows.process_file_descriptor_max_high=40000

# =============================================================================
# 注意事项
# =============================================================================
# 1. 此配置适用于开发和测试环境
# 2. 生产环境请根据实际硬件配置调整
# 3. 建议系统可用内存至少8GB以上
# 4. 重启Neo4j服务使配置生效