backup:
  postgres:
    compression: gzip
    enabled: true
    retention_days: 7
    s3_bucket: ${BACKUP_S3_BUCKET:athena-backups}
    schedule: 0 2 * * *
  qdrant:
    enabled: true
    retention_weeks: 4
    schedule: 0 4 * * 6
  redis:
    enabled: true
    retention_days: 3
    schedule: 0 3 * * *
databases:
  neo4j:
    bolt_port: 7687
    connection_type: local
    database: neo4j
    host: localhost
    http_port: 7474
    password: neo4j
    type: graph_db
    uri: bolt://localhost:7687
    user: neo4j
  patents_readonly:
    database: ${POSTGRES_DB_READONLY}
    host: ${POSTGRES_HOST}
    password: ${POSTGRES_PASSWORD}
    pool:
      max_size: 10
      min_size: 2
      timeout: 30
    port: ${POSTGRES_PORT}
    readonly: true
    type: postgresql
    user: ${POSTGRES_USER}
  postgres:
    database: ${POSTGRES_DB}
    host: ${POSTGRES_HOST}
    options:
      -c search_path: public,patents
    password: ${POSTGRES_PASSWORD}
    pool:
      idle_timeout: 300
      max_lifetime: 3600
      max_size: 20
      min_size: 5
      timeout: 30
    port: ${POSTGRES_PORT}
    ssl_mode: prefer
    type: postgresql
    user: ${POSTGRES_USER}
  qdrant:
    collection: ${QDRANT_COLLECTION}
    distance: Cosine
    hnsw_config:
      ef_construct: 64
      ef_search: 64
      m: 16
    host: ${QDRANT_HOST}
    port: ${QDRANT_PORT}
    type: vector_db
    vector_size: 768
  redis:
    connection_pool:
      health_check_interval: 30
      retry_on_timeout: true
    db: ${REDIS_DB}
    host: ${REDIS_HOST}
    max_connections: 20
    password: ${REDIS_PASSWORD}
    port: ${REDIS_PORT}
    type: redis
environment_variables:
  NEO4J_BOLT_PORT: '7687'
  NEO4J_DB: ${NEO4J_DB:neo4j}
  NEO4J_HTTP_PORT: '7474'
  NEO4J_PASSWORD: neo4j
  NEO4J_URI: bolt://localhost:7687
  NEO4J_USER: neo4j
  POSTGRES_DB: ${POSTGRES_DB:patent_db}
  POSTGRES_DB_READONLY: ${POSTGRES_DB_READONLY:patents_original}
  POSTGRES_HOST: ${POSTGRES_HOST:localhost}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:5432}
  POSTGRES_USER: ${POSTGRES_USER:postgres}
  QDRANT_COLLECTION: ${QDRANT_COLLECTION:patents}
  QDRANT_HOST: ${QDRANT_HOST:localhost}
  QDRANT_PORT: ${QDRANT_PORT:6333}
  REDIS_DB: ${REDIS_DB:0}
  REDIS_HOST: ${REDIS_HOST:localhost}
  REDIS_PASSWORD: ${REDIS_PASSWORD:}
  REDIS_PORT: ${REDIS_PORT:6379}
initialization:
  indexes:
    postgres:
    - columns:
      - title
      name: idx_patents_title
      table: patents
    - columns:
      - abstract
      name: idx_patents_abstract
      operator: gin_trgm_ops
      table: patents
      type: gin
      using: gin
    qdrant:
      collection_config:
        hnsw_config:
          ef_construct: 64
          m: 16
        vectors:
          distance: Cosine
          size: 768
  migrations:
    auto_migrate: true
    path: ./database/migrations
  seeds:
    auto_seed: false
    path: ./database/seeds
monitoring:
  enabled: true
  metrics:
    postgres:
      connection_pool: true
      query_count: true
      query_time: true
    qdrant:
      collection_size: true
      indexing_status: true
      search_latency: true
    redis:
      command_stats: true
      connection_count: true
      memory_usage: true
