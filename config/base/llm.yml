# ============================================================================
# Athena工作平台 - LLM基础配置
# LLM Base Configuration
# ============================================================================

llm:
  # 默认提供商
  default_provider: anthropic

  # 模型配置
  models:
    claude:
      provider: anthropic
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY:-}
      temperature: 0.7
      max_tokens: 4096
      timeout: 60

    gpt4:
      provider: openai
      model: gpt-4
      api_key: ${OPENAI_API_KEY:-}
      temperature: 0.7
      max_tokens: 4096
      timeout: 60

    deepseek:
      provider: deepseek
      model: deepseek-chat
      api_key: ${DEEPSEEK_API_KEY:-}
      temperature: 0.7
      max_tokens: 4096
      timeout: 60

  # 响应缓存
  cache_enabled: true
  cache_ttl: 3600

  # 重试配置
  max_retries: 3
  retry_delay: 1
