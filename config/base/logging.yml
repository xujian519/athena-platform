# 统一日志系统配置
# Unified Logging System Configuration

# 默认配置
default:
  # 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: INFO

  # 日志处理器
  handlers:
    # 控制台输出
    - type: console
      formatter: text

    # 文件输出（开发环境）
    - type: file
      filename: logs/xiaona.log
      max_bytes: 10485760  # 10MB
      backup_count: 5
      compress: true

    # 异步处理器（生产环境）
    # - type: async
    #   capacity: 1000
    #   handler:
    #     type: file
    #     filename: logs/xiaona.log
    #     max_bytes: 10485760
    #     backup_count: 5

    # 远程收集（可选）
    # - type: remote
    #   url: http://log-collector:9000/logs
    #   batch_size: 10
    #   batch_timeout: 5.0

  # 日志过滤器
  filters:
    # 敏感信息过滤
    - type: sensitive
      mask_char: "*"
      mask_ratio: 0.5

# 服务特定配置
services:
  # 小娜服务
  xiaona:
    level: INFO
    handlers:
      - type: console
        formatter: json
      - type: file
        filename: logs/xiaona.log
        max_bytes: 10485760
        backup_count: 10

  # 小诺服务
  xiaonuo:
    level: INFO
    handlers:
      - type: console
        formatter: json
      - type: file
        filename: logs/xiaonuo.log
        max_bytes: 10485760
        backup_count: 10

  # Gateway服务
  gateway:
    level: WARNING
    handlers:
      - type: console
        formatter: json
      - type: file
        filename: logs/gateway.log
        max_bytes: 10485760
        backup_count: 10
