# ============================================================================
# Athena工作平台 - Redis基础配置
# Redis Base Configuration
# ============================================================================

redis:
  # 主配置
  host: localhost
  port: 6379
  password: ${REDIS_PASSWORD:-}
  db: 0

  # 连接池配置
  pool_size: 10
  max_connections: 50
  socket_timeout: 5
  socket_connect_timeout: 5

  # TTL配置
  default_ttl: 3600
  hot_ttl: 300        # 5分钟
  warm_ttl: 86400     # 1天
  cold_ttl: 604800    # 1周

  # 内存配置
  maxmemory: 2gb
  maxmemory_policy: allkeys-lru
