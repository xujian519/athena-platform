# Prometheus告警规则配置
# Athena上下文管理系统监控告警

groups:
  - name: athena_context_management
    interval: 30s
    rules:
      # 高错误率告警
      - alert: HighContextErrorRate
        expr: |
          rate(athena_context_management_operations_total{status="error"}[5m]) 
          / rate(athena_context_management_operations_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: athena_context
        annotations:
          summary: "上下文管理错误率过高"
          description: "过去5分钟内上下文操作错误率为 {{ $value | humanizePercentage }} (操作: {{ $labels.operation }})"

      # 严重错误率告警
      - alert: CriticalContextErrorRate
        expr: |
          rate(athena_context_management_operations_total{status="error"}[5m]) 
          / rate(athena_context_management_operations_total[5m]) > 0.10
        for: 2m
        labels:
          severity: critical
          service: athena_context
        annotations:
          summary: "上下文管理错误率严重"
          description: "过去5分钟内上下文操作错误率为 {{ $value | humanizePercentage }} (操作: {{ $labels.operation }})"

      # 高延迟告警 (P95)
      - alert: HighContextLatencyP95
        expr: |
          histogram_quantile(0.95, 
            rate(athena_context_management_operation_duration_seconds_bucket[5m])
          ) > 0.1
        for: 5m
        labels:
          severity: warning
          service: athena_context
        annotations:
          summary: "上下文操作P95延迟过高"
          description: "过去5分钟内P95延迟为 {{ $value }}s (操作: {{ $labels.operation }})"

      # 严重延迟告警 (P99)
      - alert: CriticalContextLatencyP99
        expr: |
          histogram_quantile(0.99, 
            rate(athena_context_management_operation_duration_seconds_bucket[5m])
          ) > 0.5
        for: 2m
        labels:
          severity: critical
          service: athena_context
        annotations:
          summary: "上下文操作P99延迟严重"
          description: "过去5分钟内P99延迟为 {{ $value }}s (操作: {{ $labels.operation }})"

      # 活跃上下文过多告警
      - alert: TooManyActiveContexts
        expr: athena_context_management_active_contexts > 500
        for: 10m
        labels:
          severity: warning
          service: athena_context
        annotations:
          summary: "活跃上下文数量过多"
          description: "当前活跃上下文数量为 {{ $value }} (类型: {{ $labels.context_type }})"

      # 对象池接近满载告警
      - alert: ObjectPoolNearlyFull
        expr: |
          athena_context_management_pool_size{pool_type="current"} 
          / athena_context_management_pool_size{pool_type="max"} > 0.9
        for: 5m
        labels:
          severity: warning
          service: athena_context
        annotations:
          summary: "对象池接近满载"
          description: "对象池使用率为 {{ $value | humanizePercentage }}"

      # 缓存命中率低告警
      - alert: LowCacheHitRate
        expr: athena_context_management_cache_hit_rate < 0.7
        for: 15m
        labels:
          severity: info
          service: athena_context
        annotations:
          summary: "缓存命中率偏低"
          description: "缓存命中率为 {{ $value | humanizePercentage }} (缓存类型: {{ $labels.cache_type }})"

      # 严重缓存命中率低告警
      - alert: VeryLowCacheHitRate
        expr: athena_context_management_cache_hit_rate < 0.5
        for: 10m
        labels:
          severity: warning
          service: athena_context
        annotations:
          summary: "缓存命中率严重偏低"
          description: "缓存命中率为 {{ $value | humanizePercentage }} (缓存类型: {{ $labels.cache_type }})"

      # 上下文创建失败告警
      - alert: ContextCreateErrors
        expr: |
          rate(athena_context_management_operations_total{operation="create",status="error"}[5m]) > 0
        for: 2m
        labels:
          severity: error
          service: athena_context
        annotations:
          summary: "上下文创建持续失败"
          description: "上下文创建错误率为 {{ $value }} ops/s"

      # 上下文读取失败告警
      - alert: ContextReadErrors
        expr: |
          rate(athena_context_management_operations_total{operation="read",status="error"}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: athena_context
        annotations:
          summary: "上下文读取错误频繁"
          description: "上下文读取错误率为 {{ $value }} ops/s"
