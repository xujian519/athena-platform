# Prometheus配置文件
# Prometheus Configuration for Athena Execution Module Monitoring
# 版本: 2.0.0
# 更新日期: 2026-01-27

global:
  scrape_interval: 15s         # 默认抓取间隔
  evaluation_interval: 15s     # 规则评估间隔
  external_labels:
    cluster: 'athena-local'
    environment: 'development'

# 告警管理器配置（可选，用于接收告警）
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - localhost:9093  # 如果有AlertManager，取消注释

# 规则文件
rule_files:
  # 执行模块告警规则
  - 'config/monitoring/prometheus_alerts.yml'

# 抓取配置
scrape_configs:
  # =============================================================================
  # Prometheus自身监控
  # =============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # =============================================================================
  # Athena执行模块监控 - 本地开发环境
  # =============================================================================
  - job_name: 'athena-execution'
    scrape_interval: 10s        # 更频繁的抓取间隔用于开发
    metrics_path: '/metrics'     # Prometheus metrics端点
    static_configs:
      - targets: ['localhost:9091']  # 本地开发使用9091端口
        labels:
          service: 'athena-execution'
          environment: 'local'
          cluster: 'athena-local'

  # =============================================================================
  # Athena执行模块监控 - 生产环境（参考）
  # =============================================================================
  # 取消注释以下内容用于生产环境
  # - job_name: 'athena-execution-production'
  #   scrape_interval: 30s
  #   metrics_path: '/metrics'
  #   static_configs:
  #     - targets: 
  #       - 'prod-execution-01:9090'
  #       - 'prod-execution-02:9090'
  #       - 'prod-execution-03:9090'
  #       labels:
  #         service: 'athena-execution'
  #         environment: 'production'
  #         cluster: 'athena-production'

  # =============================================================================
  # Node Exporter监控（可选，用于系统级监控）
  # =============================================================================
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['localhost:9100']

  # =============================================================================
  # 其他服务监控（根据需要添加）
  # =============================================================================
  # 例如：数据库、缓存、消息队列等
