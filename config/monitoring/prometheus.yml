# Prometheus监控配置
# Prometheus Monitoring Configuration for PatentDraftingProxy

global:
  scrape_interval: 15s  # 抓取间隔
  evaluation_interval: 15s  # 规则评估间隔
  external_labels:
    cluster: 'athena-platform'
    environment: 'production'
    service: 'patent-drafting-proxy'

# 告警规则文件
rule_files:
  - '/etc/prometheus/rules/*.yml'

# 抓取配置
scrape_configs:
  # ==================== PatentDraftingProxy主服务 ====================
  - job_name: 'patent-drafting-proxy'
    static_configs:
      - targets:
          - 'patent-drafting-api:8010'
        labels:
          service: 'patent-drafting-api'
          environment: 'production'
          team: 'xiaona'
    scrape_interval: 15s
    metrics_path: '/metrics'
    honor_labels: true
    honor_timestamps: true

  # ==================== Prometheus自监控 ====================
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'
        labels:
          service: 'prometheus'
          environment: 'production'

  # ==================== PostgreSQL监控 ====================
  - job_name: 'postgres'
    static_configs:
      - targets:
          - 'postgres-exporter:9187'
        labels:
          service: 'postgres'
          environment: 'production'
    scrape_interval: 30s

  # ==================== Redis监控 ====================
  - job_name: 'redis'
    static_configs:
      - targets:
          - 'redis-exporter:9121'
        labels:
          service: 'redis'
          environment: 'production'
    scrape_interval: 30s

# Alertmanager配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'
      timeout: 10s
      api_version: v2
