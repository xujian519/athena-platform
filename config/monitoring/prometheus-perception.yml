# Prometheus 配置文件 - 感知模块监控
# 文件位置: config/monitoring/prometheus-perception.yml
# 最后更新: 2026-01-26

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'athena-platform'
    environment: 'production'

# ========================================
# 告警规则文件
# ========================================
rule_files:
  - 'perception-alerts.yml'

# ========================================
# 服务发现配置
# ========================================
scrape_configs:
  # ========================================
  # 感知模块主服务
  # ========================================
  - job_name: 'perception-service'
    static_configs:
      - targets:
          - 'host.docker.internal:9070'  # 感知模块Prometheus端口
        labels:
          service: 'perception'
          module: 'multimodal'
          team: 'ai-platform'

    scrape_interval: 10s
    scrape_timeout: 5s
    metrics_path: '/metrics'

  # ========================================
  # 感知模块Exporter
  # ========================================
  - job_name: 'perception-exporter'
    static_configs:
      - targets:
          - 'athena_perception_exporter:9121'  # exporter端口
        labels:
          service: 'perception-exporter'
          module: 'cache'

    scrape_interval: 30s

  # ========================================
  # PostgreSQL Exporter（感知模块专用）
  # ========================================
  - job_name: 'perception-postgres'
    static_configs:
      - targets:
          - 'postgres_exporter:9187'
        labels:
          service: 'postgresql'
          database: 'athena_perception'

    scrape_interval: 30s

  # ========================================
  # Redis Exporter
  # ========================================
  - job_name: 'perception-redis'
    static_configs:
      - targets:
          - 'athena_perception_exporter:9121'
        labels:
          service: 'redis'
          db: '1'  # 感知模块使用Redis DB 1

    scrape_interval: 30s

  # ========================================
  # Qdrant监控
  # ========================================
  - job_name: 'qdrant-metrics'
    static_configs:
      - targets:
          - 'athena-qdrant:6333'
        labels:
          service: 'qdrant'
          collection: 'perception_vectors'

    scrape_interval: 30s
    metrics_path: '/metrics'

  # ========================================
  # Neo4j监控
  # ========================================
  - job_name: 'neo4j-metrics'
    static_configs:
      - targets:
          - 'athena_neo4j:2004'
        labels:
          service: 'neo4j'

    scrape_interval: 30s

  # ========================================
  # 系统监控（Node Exporter）
  # ========================================
  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - 'node-exporter:9100'
        labels:
          service: 'system'

    scrape_interval: 15s

# ========================================
# 告警管理器配置
# ========================================
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'athena-alertmanager:9093'
      timeout: 10s
      api_version: v2

# ========================================
# 远程写入配置（可选）
# ========================================
# remote_write:
#   - url: "http://thanos-receiver:19291/api/v1/receive"
#     queue_config:
#       capacity: 10000
#       max_shards: 200
#       min_shards: 1
#       max_samples_per_send: 5000
#       batch_send_deadline: 5s
#       min_backoff: 30ms
#       max_backoff: 100ms

# ========================================
# 存储配置
# ========================================
storage:
  tsdb:
    path: /prometheus/data
    retention.time: 15d
    retention.size: 50GB

# ========================================
# 追踪配置
# ========================================
tracing:
  endpoint: "athena-jaeger:4318"
  client_type: grpc
  headers:
    X-Trace-Enabled: "true"

# ========================================
# 使用说明
# ========================================
#
# 1. 将此文件复制到Prometheus配置目录：
#    cp prometheus-perception.yml /etc/prometheus/
#
# 2. 更新Prometheus主配置文件，包含此配置：
#    prometheus --config.file=/etc/prometheus/prometheus.yml \
#               --config.file=/etc/prometheus/prometheus-perception.yml
#
# 3. 或者在docker-compose中挂载此配置：
#    volumes:
#      - ./prometheus-perception.yml:/etc/prometheus/perception.yml
#
# 4. 重新加载Prometheus配置：
#    kill -HUP $(pidof prometheus)
#
# ========================================
