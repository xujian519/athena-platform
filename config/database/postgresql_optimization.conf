# PostgreSQL 优化配置文件
# 适用于3800万+专利数据库的优化设置

# 内存配置
shared_buffers = 4GB                    # 系统内存的25%
effective_cache_size = 12GB              # 系统内存的75%
work_mem = 256MB                         # 排序和哈希操作内存
maintenance_work_mem = 1GB               # 维护操作内存

# 查询优化
random_page_cost = 1.1                   # SSD优化
effective_io_concurrency = 200           # SSD并发数
seq_page_cost = 1.0                      # 顺序扫描成本
cpu_tuple_cost = 0.003                   # 元组处理成本

# 连接配置
max_connections = 200                    # 最大连接数
shared_preload_libraries = 'pg_stat_statements'  # 统计插件

# 日志配置
log_min_duration_statement = 1000        # 记录慢查询（1秒）
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# 检查点和WAL配置
checkpoint_completion_target = 0.9
wal_buffers = 64MB
max_wal_size = 4GB
min_wal_size = 1GB

# 自动清理配置
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 50000
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_threshold = 50000
autovacuum_analyze_scale_factor = 0.05

# 统计信息
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all