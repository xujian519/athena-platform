# PostgreSQL 专利数据库优化配置文件
# 适用于48GB内存系统，3800万+专利数据
# 文件位置: config/database/postgresql_optimized.conf

# =============================================================================
# 内存配置优化 (针对48GB系统)
# =============================================================================

# 共享缓冲区 - 系统内存的25% (12GB)
shared_buffers = 12GB

# 有效缓存大小 - 系统内存的75% (36GB)
effective_cache_size = 36GB

# 工作内存 - 用于排序、哈希操作等 (512MB)
work_mem = 512MB

# 维护工作内存 - 用于VACUUM、CREATE INDEX等 (2GB)
maintenance_work_mem = 2GB

# =============================================================================
# 查询优化器配置 (SSD优化)
# =============================================================================

# 随机页面成本 - SSD优化 (降低到1.1)
random_page_cost = 1.1

# 有效IO并发 - SSD并发支持 (300)
effective_io_concurrency = 300

# 顺序页面成本
seq_page_cost = 1.0

# CPU元组处理成本
cpu_tuple_cost = 0.003

# =============================================================================
# 连接配置
# =============================================================================

# 最大连接数
max_connections = 200

# 预加载库 - 统计信息收集
shared_preload_libraries = 'pg_stat_statements,auto_explain'

# =============================================================================
# WAL和检查点配置
# =============================================================================

# 检查点完成目标
checkpoint_completion_target = 0.9

# WAL缓冲区
wal_buffers = 256MB

# 最大WAL大小
max_wal_size = 8GB

# 最小WAL大小
min_wal_size = 2GB

# =============================================================================
# 自动清理配置 (针对大表优化)
# =============================================================================

# 启用自动清理
autovacuum = on

# 自动清理最大工作进程
autovacuum_max_workers = 6

# 自动清理休眠时间
autovacuum_naptime = 20s

# 自动清理阈值
autovacuum_vacuum_threshold = 50000
autovacuum_vacuum_scale_factor = 0.05

# 自动分析阈值
autovacuum_analyze_threshold = 50000
autovacuum_analyze_scale_factor = 0.025

# =============================================================================
# 日志配置 (监控和调试)
# =============================================================================

# 慢查询日志阈值 (记录超过500ms的查询)
log_min_duration_statement = 500

# 启用检查点日志
log_checkpoints = on

# 启用连接日志
log_connections = on

# 启用断开连接日志
log_disconnections = on

# 启用锁等待日志
log_lock_waits = on

# 启用临时文件日志
log_temp_files = 10MB

# =============================================================================
# 统计信息配置
# =============================================================================

# 跟踪活动
track_activities = on

# 跟踪计数
track_counts = on

# 跟踪IO时间
track_io_timing = on

# 跟踪函数
track_functions = all

# 跟踪活动会话
track_activity_query_size = 2048

# =============================================================================
# 语句统计配置
# =============================================================================

# pg_stat_statements最大值
pg_stat_statements.max = 10000

# 是否跟踪工具用户
pg_stat_statements.track = all

# 是否跟踪实用程序命令
pg_stat_statements.track_utility = off

# 是否保存查询文本
pg_stat_statements.save = on

# =============================================================================
# 自动解释配置 (慢查询自动分析)
# =============================================================================

# 自动解释阈值 (超过1秒的查询自动解释)
auto_explain.log_min_duration = 1000

# 自动解释格式
auto_explain.log_format = json

# 是否分析查询
auto_explain.analyze = on

# 是否包含详细统计
auto_explain.verbose = on

# 是否包含缓冲区使用统计
auto_explain.buffers = on

# 是否包含WAL统计
auto_explain.wal = on

# 是否包含timing信息
auto_explain.timing = on

# =============================================================================
# 锁配置
# =============================================================================

# 死锁超时
deadlock_timeout = 1s

# 锁等待超时
lock_timeout = 30s

# 语句超时
statement_timeout = 0  # 不设置全局超时

# =============================================================================
# 并行查询配置
# =============================================================================

# 最大并行工作进程
max_parallel_workers = 16

# 每次Gather的最大并行工作进程
max_parallel_workers_per_gather = 8

# 并行查询的最小表大小
min_parallel_table_scan_size = 8MB

# 并行索引扫描的最小表大小
min_parallel_index_scan_size = 512kB

# =============================================================================
# 背景写入器配置
# =============================================================================

# 背景写入器延迟
bgwriter_delay = 200ms

# 背景写入器脏页百分比
bgwriter_lru_maxpages = 100

# 背景写入器脏页百分比阈值
bgwriter_lru_multiplier = 2.0

# =============================================================================
# 优化器配置
# =============================================================================

# 默认统计目标
default_statistics_target = 1000

# 启用位图扫描
enable_bitmapscan = on

# 启用哈希连接
enable_hashjoin = on

# 启用索引扫描
enable_indexscan = on

# 启用索引排序扫描
enable_indexonlyscan = on

# 启用材料化
enable_material = on

# 启用合并连接
enable_mergejoin = on

# 启用嵌套循环连接
enable_nestloop = on

# 启用顺序扫描
enable_seqscan = on

# 启用排序
enable_sort = on

# 启用TID扫描
enable_tidscan = on

# =============================================================================
# 内存配置调整 (避免OOM)
# =============================================================================

# 逻辑复制工作内存
logical_decoding_work_mem = 64MB

# 临时文件限制
temp_file_limit = -1  # 无限制

# =============================================================================
# 客户端连接默认配置
# =============================================================================

# 默认隔离级别
default_transaction_isolation = 'read committed'

# 默认只读
default_transaction_read_only = off

# 默认可延迟
default_transaction_deferrable = off

# =============================================================================
# 检查点和恢复配置
# =============================================================================

# 恢复配置
restore_command = ''

# 归档配置
archive_mode = off
archive_command = ''

# =============================================================================
# 复制配置 (如果需要主从复制)
# =============================================================================

# WAL级别
wal_level = replica

# 最大WAL发送者数量
max_wal_senders = 3

# WAL保留段数
wal_keep_segments = 64

# 热备
hot_standby = on

# =============================================================================
# 注释
# =============================================================================

# 配置说明:
# 1. 针对48GB内存系统进行了全面优化
# 2. 优化了SSD性能参数
# 3. 增强了自动清理和统计信息收集
# 4. 启用了详细的日志和性能监控
# 5. 优化了并行查询性能
# 6. 适合3800万+专利数据的高并发访问
#
# 使用方法:
# 在postgresql.conf中添加:
# include_dir = '/Users/xujian/Athena工作平台/config/database'
#
# 重启PostgreSQL服务使配置生效
# brew services restart postgresql@17