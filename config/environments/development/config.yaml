# Athena工作平台 - 开发环境配置

# 环境标识
environment: "development"

# 应用配置
app:
  name: "athena-work-platform"
  version: "2.0.0"
  debug: true
  log_level: "DEBUG"

# 服务端口配置
ports:
  athena_main: 8000
  athena_memory: 8008
  xiaonuo_memory: 8083
  athena_identity: 8010
  memory_integration: 8011
  pdf_processing: 8090
  memgpt_core: 8899
  memgpt_gateway: 8901
  paraformer_api: 8003
  vector_memory: 8004
  web_crawler: 8902
  web_crawler_alt: 8900

# 数据库配置
database:
  host: "localhost"
  port: 5432
  name: "athena_dev"
  user: "dev_user"
  password: "${DEV_DB_PASSWORD}"
  sslmode: "disable"

  # 连接池配置
  pool:
    min_size: 2
    max_size: 10
    max_idle: 300
    timeout: 30

# Redis配置
redis:
  host: "localhost"
  port: 6379
  db: 1
  password: ""
  ssl: false

  # 连接池配置
  pool:
    max_connections: 10
    retry_on_timeout: true

# 缓存配置
cache:
  enabled: true
  default_ttl: 1800  # 30分钟
  debug: true

# API配置
api:
  # 限流配置（开发环境宽松）
  rate_limiting:
    enabled: false

  # CORS配置
  cors:
    enabled: true
    origins:
      - "http://localhost:3000"
      - "http://localhost:8080"
      - "http://127.0.0.1:3000"

# 监控配置
monitoring:
  # 性能监控
  performance_monitoring:
    enabled: true
    detailed_metrics: true

  # 健康检查
  health_check:
    enabled: true
    interval: 30

# 日志配置
logging:
  level: "DEBUG"
  format: "detailed"
  file_output: true
  console_output: true

  # 开发环境日志文件
  file:
    path: "documentation/logs/athena-dev.log"
    max_size: "50MB"
    backup_count: 3

# 测试配置
testing:
  # 测试数据
  test_data:
    enabled: true
    auto_refresh: true

  # Mock服务
  mock_services:
    enabled: true
    external_apis: true

# 安全配置（开发环境相对宽松）
security:
  # 认证配置
  authentication:
    jwt_expiry: 86400  # 开发环境延长到24小时
    refresh_token_expiry: 604800  # 7天

  # 加密配置
  encryption:
    at_rest: false  # 开发环境可以关闭静态加密
    key_rotation: false

  # 访问控制
  access_control:
    ip_whitelist: false  # 开发环境不限制IP
    rate_limiting: false  # 开发环境不限流
    audit_logging: true

  # CORS配置已移至api.cors段
  # HTTPS强制跳转
  force_https: false  # 开发环境HTTP即可

# 开发工具配置
dev_tools:
  # 热重载
  hot_reload:
    enabled: true
    watch_paths:
      - "src/"
      - "config/"

  # 调试配置
  debug:
    profiler: true
    sql_debug: true
    request_debug: true