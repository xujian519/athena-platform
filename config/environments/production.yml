# 生产环境配置
# 注意：敏感配置通过环境变量注入

database:
  host: ${DATABASE_HOST}
  port: 5432
  user: ${DATABASE_USER}
  password: ${DATABASE_PASSWORD}
  name: athena

redis:
  host: ${REDIS_HOST}
  port: 6379
  password: ${REDIS_PASSWORD}

llm:
  provider: ${LLM_PROVIDER}
  api_key: ${LLM_API_KEY}
  model: ${LLM_MODEL}

gateway:
  log_level: warning

agents:
  log_level: warning

debug: false

# Patent专利库配置（生产环境）
patent:
  host: ${PATENT_DB_HOST}
  port: 5432
  name: ${PATENT_DB_NAME}

# Neo4j法律世界模型配置（生产环境）
neo4j:
  host: ${NEO4J_HOST}
  port: 7687
  name: neo4j
  database: ${NEO4J_DATABASE}
