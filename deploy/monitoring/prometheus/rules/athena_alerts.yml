# Athena AI平台告警规则
# 生成时间: 2025-12-11
# 功能: 智能告警规则、阈值监控、根因分析

groups:
  - name: athena_system_alerts
    rules:
      # 系统资源告警
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "高CPU使用率告警"
          description: "实例 {{ $labels.instance }} CPU使用率超过80%，当前值: {{ $value }}%"
          runbook_url: "https://wiki.athena-ai.com/runbooks/high-cpu"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "高内存使用率告警"
          description: "实例 {{ $labels.instance }} 内存使用率超过85%，当前值: {{ $value }}%"
          runbook_url: "https://wiki.athena-ai.com/runbooks/high-memory"

      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 90
        for: 5m
        labels:
          severity: critical
          category: system
        annotations:
          summary: "磁盘空间不足告警"
          description: "实例 {{ $labels.instance }} 磁盘使用率超过90%，当前值: {{ $value }}%"
          runbook_url: "https://wiki.athena-ai.com/runbooks/disk-space"

      - alert: HighLoadAverage
        expr: node_load15 > (count by (instance) (node_cpu_seconds_total{mode="idle"}) * 1.5)
        for: 10m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "系统负载过高告警"
          description: "实例 {{ $labels.instance }} 15分钟平均负载过高，当前值: {{ $value }}"
          runbook_url: "https://wiki.athena-ai.com/runbooks/high-load"

  - name: athena_application_alerts
    rules:
      # 应用服务告警
      - alert: ApplicationDown
        expr: up{job=~"athena-.*"} == 0
        for: 1m
        labels:
          severity: critical
          category: application
        annotations:
          summary: "应用服务不可用"
          description: "应用 {{ $labels.job }} 在实例 {{ $labels.instance }} 上不可用"
          runbook_url: "https://wiki.athena-ai.com/runbooks/application-down"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          category: application
        annotations:
          summary: "应用错误率过高"
          description: "应用 {{ $labels.job }} 错误率超过5%，当前值: {{ $value | humanizePercentage }}"
          runbook_url: "https://wiki.athena-ai.com/runbooks/high-error-rate"

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          category: application
        annotations:
          summary: "应用响应时间过长"
          description: "应用 {{ $labels.job }} 95%响应时间超过2秒，当前值: {{ $value }}s"
          runbook_url: "https://wiki.athena-ai.com/runbooks/high-response-time"

      - alert: LowThroughput
        expr: rate(http_requests_total[5m]) < 10
        for: 10m
        labels:
          severity: warning
          category: application
        annotations:
          summary: "应用吞吐量过低"
          description: "应用 {{ $labels.job }} 每秒请求数低于10，当前值: {{ $value }}"
          runbook_url: "https://wiki.athena-ai.com/runbooks/low-throughput"

  - name: athena_database_alerts
    rules:
      # 数据库告警
      - alert: PostgreSQLDown
        expr: up{job="postgres-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          category: database
        annotations:
          summary: "PostgreSQL数据库不可用"
          description: "PostgreSQL数据库在实例 {{ $labels.instance }} 上不可用"
          runbook_url: "https://wiki.athena-ai.com/runbooks/postgresql-down"

      - alert: PostgreSQLHighConnections
        expr: pg_stat_activity_count > (pg_settings_max_connections * 0.8)
        for: 5m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "PostgreSQL连接数过高"
          description: "PostgreSQL连接数超过80%，当前值: {{ $value }}"
          runbook_url: "https://wiki.athena-ai.com/runbooks/postgresql-high-connections"

      - alert: PostgreSQLSlowQueries
        expr: rate(pg_stat_statements_mean_time_seconds[5m]) > 1
        for: 10m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "PostgreSQL慢查询告警"
          description: "PostgreSQL平均查询时间超过1秒，当前值: {{ $value }}s"
          runbook_url: "https://wiki.athena-ai.com/runbooks/postgresql-slow-queries"

      - alert: RedisDown
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          category: database
        annotations:
          summary: "Redis缓存不可用"
          description: "Redis缓存在实例 {{ $labels.instance }} 上不可用"
          runbook_url: "https://wiki.athena-ai.com/runbooks/redis-down"

      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "Redis内存使用率过高"
          description: "Redis内存使用率超过90%，当前值: {{ $value | humanizePercentage }}"
          runbook_url: "https://wiki.athena-ai.com/runbooks/redis-high-memory"

  - name: athena_ai_service_alerts
    rules:
      # AI服务告警
      - alert: AIServiceDown
        expr: up{job="athena-ai-service"} == 0
        for: 1m
        labels:
          severity: critical
          category: ai_service
        annotations:
          summary: "AI服务不可用"
          description: "AI服务在实例 {{ $labels.instance }} 上不可用"
          runbook_url: "https://wiki.athena-ai.com/runbooks/ai-service-down"

      - alert: AIModelLoadFailure
        expr: increase(ai_model_load_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
          category: ai_service
        annotations:
          summary: "AI模型加载失败"
          description: "AI模型加载失败次数: {{ $value }}"
          runbook_url: "https://wiki.athena-ai.com/runbooks/ai-model-load-failure"

      - alert: AIPredictionLatencyHigh
        expr: histogram_quantile(0.95, rate(ai_prediction_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
          category: ai_service
        annotations:
          summary: "AI预测延迟过高"
          description: "AI预测95%延迟超过5秒，当前值: {{ $value }}s"
          runbook_url: "https://wiki.athena-ai.com/runbooks/ai-prediction-latency"

      - alert: AIModelAccuracyDrop
        expr: ai_model_accuracy < 0.85
        for: 10m
        labels:
          severity: warning
          category: ai_service
        annotations:
          summary: "AI模型准确率下降"
          description: "AI模型准确率低于85%，当前值: {{ $value | humanizePercentage }}"
          runbook_url: "https://wiki.athena-ai.com/runbooks/ai-model-accuracy"

  - name: athena_container_alerts
    rules:
      # 容器告警
      - alert: ContainerOOMKilled
        expr: increase(container_oom_events_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "容器OOM被杀死"
          description: "容器 {{ $labels.name }} 在实例 {{ $labels.instance }} 上被OOM杀死"
          runbook_url: "https://wiki.athena-ai.com/runbooks/container-oom"

      - alert: ContainerHighCPUUsage
        expr: rate(container_cpu_usage_seconds_total{name!=""}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "容器CPU使用率过高"
          description: "容器 {{ $labels.name }} CPU使用率超过80%，当前值: {{ $value }}%"
          runbook_url: "https://wiki.athena-ai.com/runbooks/container-high-cpu"

      - alert: ContainerHighMemoryUsage
        expr: (container_memory_usage_bytes{name!=""} / container_spec_memory_limit_bytes) * 100 > 90
        for: 5m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "容器内存使用率过高"
          description: "容器 {{ $labels.name }} 内存使用率超过90%，当前值: {{ $value }}%"
          runbook_url: "https://wiki.athena-ai.com/runbooks/container-high-memory"

      - alert: ContainerRestarts
        expr: increase(container_start_time_seconds[5m]) > 3
        for: 5m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "容器频繁重启"
          description: "容器 {{ $labels.name }} 在5分钟内重启超过3次"
          runbook_url: "https://wiki.athena-ai.com/runbooks/container-restarts"

  - name: athena_business_alerts
    rules:
      # 业务指标告警
      - alert: UserRegistrationDrop
        expr: rate(user_registrations_total[1h]) < 0.1
        for: 30m
        labels:
          severity: warning
          category: business
        annotations:
          summary: "用户注册率下降"
          description: "用户注册率过低，当前值: {{ $value }} 每小时"
          runbook_url: "https://wiki.athena-ai.com/runbooks/user-registration-drop"

      - alert: APIKeyUsageHigh
        expr: rate(api_key_requests_total[5m]) > 1000
        for: 5m
        labels:
          severity: warning
          category: business
        annotations:
          summary: "API密钥使用率过高"
          description: "API密钥 {{ $labels.api_key }} 使用率过高，当前值: {{ $value }} 请求/秒"
          runbook_url: "https://wiki.athena-ai.com/runbooks/api-key-usage"

      - alert: TaskQueueBacklog
        expr: task_queue_length > 1000
        for: 10m
        labels:
          severity: warning
          category: business
        annotations:
          summary: "任务队列积压"
          description: "任务队列 {{ $labels.queue }} 长度超过1000，当前值: {{ $value }}"
          runbook_url: "https://wiki.athena-ai.com/runbooks/task-queue-backlog"

      - alert: FileProcessingDelay
        expr: file_processing_duration_seconds > 300
        for: 5m
        labels:
          severity: warning
          category: business
        annotations:
          summary: "文件处理延迟"
          description: "文件处理时间超过5分钟，当前值: {{ $value }}秒"
          runbook_url: "https://wiki.athena-ai.com/runbooks/file-processing-delay"

  - name: athena_security_alerts
    rules:
      # 安全告警
      - alert: HighFailedLoginAttempts
        expr: rate(login_failed_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          category: security
        annotations:
          summary: "登录失败次数过高"
          description: "5分钟内登录失败次数: {{ $value }}"
          runbook_url: "https://wiki.athena-ai.com/runbooks/high-failed-login"

      - alert: SuspiciousAPIAccess
        expr: rate(api_requests_total{status="403"}[5m]) > 5
        for: 5m
        labels:
          severity: warning
          category: security
        annotations:
          summary: "可疑API访问"
          description: "5分钟内403错误次数: {{ $value }}"
          runbook_url: "https://wiki.athena-ai.com/runbooks/suspicious-api-access"

      - alert: UnusualDataExport
        expr: rate(data_export_bytes_total[1h]) > 104857600  # 100MB/hour
        for: 10m
        labels:
          severity: warning
          category: security
        annotations:
          summary: "异常数据导出"
          description: "每小时数据导出量超过100MB，当前值: {{ $value | humanizeBytes }}"
          runbook_url: "https://wiki.athena-ai.com/runbooks/unusual-data-export"

  - name: athena_infrastructure_alerts
    rules:
      # 基础设施告警
      - alert: ElasticsearchClusterRed
        expr: elasticsearch_cluster_health_status{color="red"} == 1
        for: 1m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "Elasticsearch集群状态为红色"
          description: "Elasticsearch集群 {{ $labels.cluster }} 状态为红色"
          runbook_url: "https://wiki.athena-ai.com/runbooks/elasticsearch-cluster-red"

      - alert: ElasticsearchDiskLow
        expr: elasticsearch_filesystem_data_available_bytes / elasticsearch_filesystem_data_size_bytes < 0.1
        for: 5m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "Elasticsearch磁盘空间不足"
          description: "Elasticsearch节点 {{ $labels.node }} 磁盘可用空间低于10%"
          runbook_url: "https://wiki.athena-ai.com/runbooks/elasticsearch-disk-low"

      - alert: NginxHighErrorRate
        expr: rate(nginx_http_requests_total{status=~"5.."}[5m]) / rate(nginx_http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: "Nginx错误率过高"
          description: "Nginx 5xx错误率超过5%，当前值: {{ $value | humanizePercentage }}"
          runbook_url: "https://wiki.athena-ai.com/runbooks/nginx-high-error"