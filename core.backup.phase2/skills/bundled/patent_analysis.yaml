content: |
  # 专利分析技能

  本技能用于深度分析专利的技术方案、创新点和法律状态。

  ## 功能

  - 技术方案分析
  - 创造性评估
  - 法律状态查询
  - 同族专利检索
  - 引用分析

  ## 使用场景

  1. 专利申请前评估
  2. 侵权风险分析
  3. 无效宣告检索
  4. 技术趋势研究
