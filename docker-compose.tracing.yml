# OpenTelemetry 追踪环境 Docker Compose 配置
# 用于Athena平台的分布式追踪、日志聚合和可视化分析
#
# 服务包括:
# - OTEL Collector: 追踪数据收集和处理
# - Jaeger: 分布式追踪UI
# - Elasticsearch: 追踪数据存储
# - Grafana: 可视化仪表板
#
# 启动: docker-compose -f docker-compose.tracing.yml up -d
# 停止: docker-compose -f docker-compose.tracing.yml down

version: '3.8'

services:
  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: athena-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "13133:13133" # health check
    depends_on:
      - jaeger
      - elasticsearch
    networks:
      - tracing
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13133"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Jaeger Query UI
  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: athena-jaeger
    ports:
      - "16686:16686" # Jaeger UI
      - "14268:14268" # Jaeger collector HTTP
      - "14250:14250" # Jaeger collector gRPC
      - "6831:6831"   # Jaeger agent (compact Thrift)
      - "6832:6832"   # Jaeger agent (binary Thrift)
    environment:
      - SPAN_STORAGE_TYPE=elasticsearch
      - ES_SERVER_URLS=http://elasticsearch:9200
      - ES_TAGS_AS_FIELDS_ALL=true
    networks:
      - tracing
    restart: unless-stopped
    depends_on:
      - elasticsearch

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: athena-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=athena-tracing
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - tracing
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Grafana
  grafana:
    image: grafana/grafana:10.2.0
    container_name: athena-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=grafana-opentelemetry-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - tracing
    restart: unless-stopped
    depends_on:
      - elasticsearch

volumes:
  es-data:
    driver: local
  grafana-data:
    driver: local

networks:
  tracing:
    driver: bridge
    name: athena-tracing
