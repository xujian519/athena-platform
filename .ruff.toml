# Ruff配置文件
# 用于控制Ruff Linter的行为

[lint]
# 忽略的规则
ignore = [
    "E402",  # 模块级导入不在顶部（动态导入导致）
    "E501",  # 行长度超过100字符（代码风格问题）
]

# 启用的规则
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "UP",    # pyupgrade
]

# 排除的文件
exclude = [
    ".git",
    "__pycache__",
    "venv",
    "env",
    ".venv",
    "build",
    "dist",
    "*.egg-info",
]

# 每行最大字符数（仅用于检查，不用于自动修复）
line-length = 100

# 目标Python版本
target-version = "py39"

[format]
# 格式化配置
indent-style = "space"
quote-style = "double"
skip-magic-trailing-comma = false

[per-file-ignores]
# 特定文件的忽略规则
"tests/*" = ["S101"]  # 允许测试中使用assert
"__init__.py" = ["F401"]  # 允许__init__.py中的未使用导入
