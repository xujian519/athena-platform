# Athena工作平台服务配置
# Services Configuration

# 服务端口配置
ports:
  patent_search: 8080
  patent_analysis: 8081
  vector_service: 8082
  user_interface: 8083
  api_gateway: 8000

# 服务发现配置
service_discovery:
  enabled: true
  registry: consul
  host: localhost
  port: 8500

# 负载均衡配置
load_balancer:
  algorithm: round_robin
  health_check_interval: 30
  timeout: 5

# 微服务配置
microservices:
  patent_search:
    replicas: 2
    resources:
      cpu: 0.5
      memory: 1Gi
    health_check:
      path: /health
      interval: 30

  patent_analysis:
    replicas: 1
    resources:
      cpu: 1.0
      memory: 2Gi
    health_check:
      path: /health
      interval: 30

  vector_service:
    replicas: 1
    resources:
      cpu: 0.8
      memory: 4Gi
    health_check:
      path: /health
      interval: 30

# API网关配置
api_gateway:
  enabled: true
  routes:
    - path: /api/search
      service: patent_search
      methods: [GET, POST]
    - path: /api/analysis
      service: patent_analysis
      methods: [GET, POST]
    - path: /api/vector
      service: vector_service
      methods: [GET, POST]

  rate_limiting:
    requests_per_minute: 100
    burst_size: 20

  cors:
    enabled: true
    origins: ["http://localhost:3000", "http://localhost:8083"]
    methods: [GET, POST, PUT, DELETE, OPTIONS]
    headers: ["Content-Type", "Authorization"]