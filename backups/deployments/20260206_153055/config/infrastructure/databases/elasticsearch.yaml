# Athena工作平台 - Elasticsearch 配置

# 连接配置
connection:
  hosts:
    - host: "localhost"
      port: 9200
      scheme: "http"

  # 认证配置（如果需要）
  authentication:
    enabled: false
    username: ""
    password: ""

  # 连接参数
  max_retries: 3
  timeout: 30
  retry_on_timeout: true
  ssl_verify: true

# 索引配置
indices:
  # 主索引前缀
  prefix: "athena_legal"

  # 专利索引
  patents:
    name: "patents"
    shards: 3
    replicas: 1
    mappings:
      properties:
        title:
          type: "text"
          analyzer: "ik_max_word"
          search_analyzer: "ik_smart"
        abstract:
          type: "text"
          analyzer: "ik_max_word"
          search_analyzer: "ik_smart"
        content:
          type: "text"
          analyzer: "ik_max_word"
          search_analyzer: "ik_smart"
        vector:
          type: "dense_vector"
          dims: 1024
          similarity: "cosine"
        metadata:
          type: "object"
          dynamic: true

  # 案卷索引
  cases:
    name: "cases"
    shards: 2
    replicas: 1
    mappings:
      properties:
        case_number:
          type: "keyword"
        case_title:
          type: "text"
          analyzer: "ik_max_word"
        case_type:
          type: "keyword"
        parties:
          type: "text"
          analyzer: "ik_max_word"
        content:
          type: "text"
          analyzer: "ik_max_word"
        tags:
          type: "keyword"

# 性能配置
performance:
  # 批量操作配置
  bulk:
    size: 1000
    timeout: 60
    max_retries: 3

  # 查询配置
  query:
    default_size: 20
    max_size: 10000
    timeout: 30

  # 索引配置
  index:
    refresh_interval: "1s"
    max_result_window: 50000

# 集群配置
cluster:
  # 集群健康检查
  health_check:
    enabled: true
    interval: 30
    timeout: 5
    wait_for_status: "yellow"

  # 节点配置
  nodes:
    master_nodes: 1
    data_nodes: 2
    coordinating_nodes: 1

# 监控配置
monitoring:
  enabled: true
  metrics_interval: 60

  # 慢查询日志
  slow_query:
    enabled: true
    threshold: 1000  # 毫秒

  # 索引性能监控
  index_performance:
    enabled: true
    collection_interval: 60