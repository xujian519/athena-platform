# Prometheus配置文件
# 文档: docs/monitoring_setup_guide.md

# 全局配置
global:
  scrape_interval: 15s        # 抓取间隔
  evaluation_interval: 15s    # 规则评估间隔
  external_labels:
    cluster: 'athena-gateway'
    environment: 'production'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'localhost:9093'

# 告警规则文件
rule_files:
  - 'alerts/athena_alerts.yml'

# 抓取目标配置
scrape_configs:
  # 网关主服务指标 (通过监控服务器暴露)
  - job_name: 'gateway-unified'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'gateway-unified'
          component: 'core'

  # 网关主服务直接暴露 (备选)
  - job_name: 'gateway-main'
    static_configs:
      - targets: ['localhost:8005']
        labels:
          service: 'gateway-main'
          component: 'api'

  # MCP服务器指标
  - job_name: 'mcp_servers'
    static_configs:
      - targets: ['localhost:3003']
        labels:
          service: 'local-search-engine'
      - targets: ['localhost:7860']
        labels:
          service: 'mineru-parser'

  # 知识图谱服务 (如果暴露metrics)
  - job_name: 'knowledge-graph'
    static_configs:
      - targets: ['localhost:8100']
        labels:
          service: 'knowledge-graph'

  # 向量数据库 (如果暴露metrics)
  - job_name: 'vector-db'
    static_configs:
      - targets: ['localhost:6333']
        labels:
          service: 'qdrant'

  # Prometheus自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
