<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena Gateway WebSocket Hub 测试</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .panel {
            background-color: #252526;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            padding: 15px;
        }
        h2 {
            color: #4ec9b0;
            margin-top: 0;
        }
        button {
            background-color: #0e639c;
            color: white;
            border: none;
            padding: 8px 16px;
            margin: 5px;
            border-radius: 2px;
            cursor: pointer;
        }
        button:hover {
            background-color: #1177bb;
        }
        button:disabled {
            background-color: #3e3e42;
            cursor: not-allowed;
        }
        input, textarea, select {
            background-color: #3c3c3c;
            color: #d4d4d4;
            border: 1px solid #3e3e42;
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }
        #log {
            background-color: #1e1e1e;
            border: 1px solid #3e3e42;
            padding: 10px;
            height: 400px;
            overflow-y: auto;
            font-size: 12px;
        }
        .log-entry {
            margin: 2px 0;
            padding: 2px 5px;
        }
        .log-info { color: #4ec9b0; }
        .log-success { color: #6a9955; }
        .log-error { color: #f48771; }
        .log-warn { color: #dcdcaa; }
        .status {
            padding: 5px 10px;
            border-radius: 2px;
            display: inline-block;
            font-weight: bold;
        }
        .status-connected { background-color: #6a9955; }
        .status-disconnected { background-color: #f48771; }
    </style>
</head>
<body>
    <h1>🌸 Athena Gateway WebSocket Hub 测试</h1>

    <div class="container">
        <!-- 连接面板 -->
        <div class="panel">
            <h2>📡 连接控制</h2>
            <div>
                <label>WebSocket URL:</label>
                <input type="text" id="wsUrl" value="ws://localhost:8005/ws/hub">
            </div>
            <div>
                <label>Session ID:</label>
                <input type="text" id="sessionId" value="test_session_001">
            </div>
            <div>
                <button id="connectBtn" onclick="connect()">连接</button>
                <button id="disconnectBtn" onclick="disconnect()" disabled>断开</button>
            </div>
            <div style="margin-top: 10px;">
                状态: <span id="status" class="status status-disconnected">未连接</span>
            </div>
        </div>

        <!-- 消息发送面板 -->
        <div class="panel">
            <h2>📨 消息发送</h2>
            <div>
                <label>消息类型:</label>
                <select id="messageType">
                    <option value="task_create">创建任务</option>
                    <option value="task_start">开始任务</option>
                    <option value="task_pause">暂停任务</option>
                    <option value="task_resume">恢复任务</option>
                    <option value="task_cancel">取消任务</option>
                    <option value="user_confirm_response">用户确认</option>
                    <option value="user_interrupt">用户中断</option>
                </select>
            </div>
            <div>
                <label>任务ID:</label>
                <input type="text" id="taskId" value="task_001">
            </div>
            <div>
                <label>任务类型:</label>
                <input type="text" id="taskType" value="patent_search">
            </div>
            <div>
                <label>用户输入:</label>
                <textarea id="userInput" rows="3">检索自动驾驶相关专利</textarea>
            </div>
            <div>
                <label>优先级:</label>
                <select id="priority">
                    <option value="low">低</option>
                    <option value="medium" selected>中</option>
                    <option value="high">高</option>
                </select>
            </div>
            <div>
                <button id="sendBtn" onclick="sendMessage()" disabled>发送消息</button>
                <button onclick="sendTaskCreate()">发送任务创建</button>
                <button onclick="sendTaskCancel()">发送任务取消</button>
            </div>
        </div>
    </div>

    <!-- 日志面板 -->
    <div class="panel" style="margin-top: 20px;">
        <h2>📋 消息日志</h2>
        <button onclick="clearLog()">清空日志</button>
        <div id="log"></div>
    </div>

    <script>
        let ws = null;
        let sessionId = 'test_session_001';

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        function updateStatus(connected) {
            const statusEl = document.getElementById('status');
            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');
            const sendBtn = document.getElementById('sendBtn');

            if (connected) {
                statusEl.textContent = '已连接';
                statusEl.className = 'status status-connected';
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                sendBtn.disabled = false;
            } else {
                statusEl.textContent = '未连接';
                statusEl.className = 'status status-disconnected';
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                sendBtn.disabled = true;
            }
        }

        function connect() {
            const url = document.getElementById('wsUrl').value;
            sessionId = document.getElementById('sessionId').value;

            // 添加session_id参数
            const wsUrl = url + (url.includes('?') ? '&' : '?') + 'session_id=' + sessionId;

            log(`连接到 ${wsUrl}...`, 'info');

            ws = new WebSocket(wsUrl);

            ws.onopen = function(event) {
                log('WebSocket连接已建立', 'success');
                updateStatus(true);
            };

            ws.onmessage = function(event) {
                log(`收到消息: ${event.data}`, 'success');
                try {
                    const msg = JSON.parse(event.data);
                    log(`解析消息: type=${msg.type}, session_id=${msg.session_id}`, 'info');
                } catch (e) {
                    log(`JSON解析失败: ${e.message}`, 'error');
                }
            };

            ws.onerror = function(error) {
                log(`WebSocket错误: ${error}`, 'error');
            };

            ws.onclose = function(event) {
                log(`WebSocket连接已关闭: code=${event.code}, reason=${event.reason}`, 'warn');
                updateStatus(false);
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
                log('主动断开连接', 'info');
            }
        }

        function sendMessage() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('WebSocket未连接', 'error');
                return;
            }

            const messageType = document.getElementById('messageType').value;
            const taskId = document.getElementById('taskId').value;
            const taskType = document.getElementById('taskType').value;
            const userInput = document.getElementById('userInput').value;
            const priority = document.getElementById('priority').value;

            let payload = {};

            switch (messageType) {
                case 'task_create':
                    payload = {
                        task_id: taskId,
                        task_type: taskType,
                        user_input: userInput,
                        priority: priority
                    };
                    break;
                case 'task_start':
                    payload = { task_id: taskId };
                    break;
                case 'task_pause':
                    payload = { task_id: taskId, reason: '用户暂停' };
                    break;
                case 'task_resume':
                    payload = { task_id: taskId };
                    break;
                case 'task_cancel':
                    payload = { task_id: taskId, reason: '用户取消' };
                    break;
                default:
                    log(`未知消息类型: ${messageType}`, 'error');
                    return;
            }

            const message = {
                type: messageType,
                session_id: sessionId,
                timestamp: new Date().toISOString(),
                payload: payload
            };

            ws.send(JSON.stringify(message));
            log(`发送消息: type=${messageType}`, 'info');
        }

        function sendTaskCreate() {
            document.getElementById('messageType').value = 'task_create';
            sendMessage();
        }

        function sendTaskCancel() {
            document.getElementById('messageType').value = 'task_cancel';
            sendMessage();
        }

        // 页面加载完成
        window.onload = function() {
            log('WebSocket Hub 测试页面已加载', 'info');
            log('点击"连接"按钮开始测试', 'info');
        };
    </script>
</body>
</html>
