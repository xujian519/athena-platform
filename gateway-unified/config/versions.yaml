# Gateway API版本配置
# 定义所有支持的API版本及其状态

# 版本列表
versions:
  # v1 - 当前稳定版本
  - version: v1
    deprecated: false
    sunset_date: ""
    removed_date: ""
    migration_guide: ""

  # v2 - 测试中的新版本
  - version: v2
    deprecated: false
    sunset_date: ""
    removed_date: ""
    migration_guide: ""

# 默认版本
default_version: v1

# 版本检测配置
version_detection:
  # 是否启用版本检测
  enabled: true

  # 是否在响应头中返回版本信息
  include_version_header: true

  # 版本检测优先级 (从高到低)
  # 1. URL路径 (/api/v1/...)
  # 2. 请求头 (X-API-Version, Accept-Version, API-Version)
  # 3. 查询参数 (?version=v1)
  # 4. 默认版本
