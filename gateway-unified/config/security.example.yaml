# Athena Gateway 安全配置示例
# 此文件包含所有安全功能的配置选项
# 生产环境请根据实际需求调整

# JWT认证配置
jwt:
  enabled: true
  secret: "${JWT_SECRET}"
  issuer: "athena-gateway"
  access_token_expire: 24
  refresh_token_expire: 168
  cookie_name: "athena_token"
  cookie_domain: ""
  cookie_path: "/"
  cookie_secure: false
  cookie_http_only: true
  transmission:
    cookie: false
    header: true
    query: false
  header_name: "Authorization"
  header_prefix: "Bearer"

# CORS配置
cors:
  enabled: true
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
    - "https://athena.example.com"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "PATCH"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Origin"
    - "Content-Type"
    - "Accept"
    - "Authorization"
    - "X-API-Key"
  exposed_headers:
    - "Content-Length"
    - "X-Total-Count"
  allow_credentials: true
  max_age: 3600
  allow_wildcard: false
  debug: false

# 安全响应头配置
security_headers:
  enabled: true
  frame_options: "SAMEORIGIN"
  content_type_options: "nosniff"
  xss_protection: "1; mode=block"
  hsts: "max-age=31536000; includeSubDomains"
  csp: "default-src 'self'; script-src 'self' 'unsafe-inline'"
  referrer_policy: "strict-origin-when-cross-origin"
  permissions_policy: "geolocation=(), microphone=()"
  coop: "same-origin"
  corp: "same-origin"

# 速率限制配置
rate_limit:
  enabled: true
  requests_per_minute: 100
  burst_size: 20
  by_ip: true
  by_api_key: true
  whitelist:
    - "127.0.0.1"
  storage_type: "memory"

# IP白名单配置
ip_whitelist:
  enabled: false
  mode: "whitelist"
  allowed_ips:
    - "127.0.0.1/32"
    - "10.0.0.0/8"
  trust_proxy: true
  proxy_header: "X-Forwarded-For"

# API密钥认证配置
api_key:
  enabled: true
  keys:
    - "${API_KEY_1}"
    - "${API_KEY_2}"
  header_name: "X-API-Key"
  expose_key: false

# 审计日志配置
audit_log:
  enabled: true
  level: "info"
  output: "stdout"
  log_requests: true
  log_responses: false
  log_errors: true
  log_latency: true
  sensitive_fields:
    - "password"
    - "token"
    - "secret"

# TLS/SSL配置
tls:
  enabled: false
  cert_file: "/path/to/cert.pem"
  key_file: "/path/to/key.pem"
  min_version: "1.2"
