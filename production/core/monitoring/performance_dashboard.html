
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena性能监控仪表板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .header .subtitle {
            color: #666;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #666;
            font-size: 14px;
        }

        .metric-value {
            font-weight: bold;
            color: #333;
        }

        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status.healthy {
            background: #d4edda;
            color: #155724;
        }

        .status.warning {
            background: #fff3cd;
            color: #856404;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s ease;
        }

        .refresh-btn:hover {
            background: #5a67d8;
        }

        .timestamp {
            color: #999;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Athena性能监控仪表板</h1>
            <p class="subtitle">实时性能优化指标监控</p>
            <button class="refresh-btn" onclick="location.reload()">🔄 刷新数据</button>
            <span class="timestamp" id="timestamp"></span>
        </div>

        <div class="grid" id="metrics">
            <!-- 指标卡片将通过JavaScript动态生成 -->
        </div>
    </div>

    <script>
        // 更新时间戳
        document.getElementById('timestamp').textContent = '最后更新: ' + new Date().toLocaleString('zh-CN');

        // 从API获取指标数据
        async function fetchMetrics() {
            try {
                const response = await fetch('/api/performance/stats');
                const data = await response.json();
                renderMetrics(data);
            } catch (error) {
                console.error('获取指标失败:', error);
                renderError();
            }
        }

        // 渲染指标
        function renderMetrics(data) {
            const container = document.getElementById('metrics');
            container.innerHTML = '';

            if (data.optimizations) {
                // API限流器
                if (data.optimizations.api_limiter) {
                    container.innerHTML += createCard('API限流器', data.optimizations.api_limiter, [
                        { key: 'total_requests', label: '总请求数' },
                        { key: 'peak_concurrent', label: '峰值并发' },
                        { key: 'utilization', label: '利用率' }
                    ]);
                }

                // 数据库限流器
                if (data.optimizations.db_limiter) {
                    container.innerHTML += createCard('数据库限流器', data.optimizations.db_limiter, [
                        { key: 'total_requests', label: '总请求数' },
                        { key: 'peak_concurrent', label: '峰值并发' },
                        { key: 'utilization', label: '利用率' }
                    ]);
                }

                // 速率限制器
                if (data.optimizations.rate_limiter) {
                    container.innerHTML += createCard('速率限制器', data.optimizations.rate_limiter, [
                        { key: 'rate', label: '速率' },
                        { key: 'utilization', label: '利用率' }
                    ]);
                }
            }
        }

        // 创建卡片
        function createCard(title, data, fields) {
            let metricsHTML = fields.map(field => {
                const value = data[field.key];
                return `
                    <div class="metric">
                        <span class="metric-label">${field.label}</span>
                        <span class="metric-value">${value}</span>
                    </div>
                `;
            }).join('');

            return `
                <div class="card">
                    <h3>${title}</h3>
                    ${metricsHTML}
                </div>
            `;
        }

        // 渲染错误
        function renderError() {
            document.getElementById('metrics').innerHTML = `
                <div class="card" style="grid-column: 1 / -1;">
                    <h3>❌ 无法获取指标数据</h3>
                    <p style="color: #999;">请确保API服务正在运行</p>
                </div>
            `;
        }

        // 页面加载时获取指标
        fetchMetrics();

        // 每30秒自动刷新
        setInterval(fetchMetrics, 30000);
    </script>
</body>
</html>
