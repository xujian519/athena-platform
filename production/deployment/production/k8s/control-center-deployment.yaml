---
# 小诺总控平台 - 控制中心API部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xiaonuo-control-center
  namespace: athena-control-center
  labels:
    app: xiaonuo-control-center
    component: api
    version: v1.0.0
    environment: production
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: xiaonuo-control-center
      component: api
  template:
    metadata:
      labels:
        app: xiaonuo-control-center
        component: api
        version: v1.0.0
        environment: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9002"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: control-center-api
        image: athena/xiaonuo-control-center:v1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 9002
          name: http
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: athena-secrets
              key: redis-url
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: athena-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: athena-secrets
              key: jwt-secret
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 9002
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 9002
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
        - name: logs-volume
          mountPath: /app/logs
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities:
            drop:
            - ALL
      volumes:
      - name: config-volume
        configMap:
          name: control-center-config
      - name: logs-volume
        emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - xiaonuo-control-center
              topologyKey: kubernetes.io/hostname

---
# 控制中心API服务
apiVersion: v1
kind: Service
metadata:
  name: xiaonuo-control-center-service
  namespace: athena-control-center
  labels:
    app: xiaonuo-control-center
    component: api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9002"
spec:
  type: ClusterIP
  ports:
  - port: 9002
    targetPort: 9002
    protocol: TCP
    name: http
  selector:
    app: xiaonuo-control-center
    component: api

---
# 智能预测引擎部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: intelligent-predictor
  namespace: athena-control-center
  labels:
    app: intelligent-predictor
    component: ai-engine
    version: v1.0.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: intelligent-predictor
      component: ai-engine
  template:
    metadata:
      labels:
        app: intelligent-predictor
        component: ai-engine
        version: v1.0.0
    spec:
      containers:
      - name: predictor
        image: athena/intelligent-predictor:v1.0.0
        imagePullPolicy: Always
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: MODEL_PATH
          value: "/app/models"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: athena-secrets
              key: redis-url
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: models-volume
          mountPath: /app/models
        - name: config-volume
          mountPath: /app/config
      volumes:
      - name: models-volume
        persistentVolumeClaim:
          claimName: ai-models-pvc
      - name: config-volume
        configMap:
          name: predictor-config

---
# HorizontalPodAutoscaler - 自动扩缩容
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: xiaonuo-control-center-hpa
  namespace: athena-control-center
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: xiaonuo-control-center
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max

---
# PodDisruptionBudget - 确保高可用
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: xiaonuo-control-center-pdb
  namespace: athena-control-center
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: xiaonuo-control-center

---
# NetworkPolicy - 网络安全策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: control-center-netpolicy
  namespace: athena-control-center
spec:
  podSelector:
    matchLabels:
      app: xiaonuo-control-center
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          name: athena-services
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: athena-services
  - to:
    - namespaceSelector:
        matchLabels:
          name: athena-monitoring
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53