      app: xiaochen-media-service
      ai-agent: xiaochen
  template:
    metadata:
      labels:
        app: xiaochen-media-service
        ai-agent: xiaochen
        scenario: media-operations
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
      - name: xiaochen-agent
        image: athena/xiaochen-agent:v1.0.0
        imagePullPolicy: Always
        env:
        - name: AI_AGENT
          value: "xiaochen"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: athena-secrets
              key: redis-url
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 45
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: 8090
          initialDelaySeconds: 15
          periodSeconds: 5
        volumeMounts:
        - name: media-content
          mountPath: /data/media
      - name: content-creation
        image: athena/content-creation-service:v1.0.0
        imagePullPolicy: Always
        env:
        - name: AI_AGENT
          value: "xiaochen"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: athena-secrets
              key: redis-url
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8030
          initialDelaySeconds: 45
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: 8030
          initialDelaySeconds: 15
          periodSeconds: 5
        volumeMounts:
        - name: creation-assets
          mountPath: /app/assets
      volumes:
      - name: media-content
        persistentVolumeClaim:
          claimName: media-content-pvc
      - name: creation-assets
        persistentVolumeClaim:
          claimName: creation-assets-pvc
      restartPolicy: Always

---
# 服务发现配置
apiVersion: v1
kind: Service
metadata:
  name: xiaona-patent-service
  namespace: athena-services
  labels:
    app: xiaona-patent-service
    ai-agent: xiaona
spec:
  type: ClusterIP
  ports:
  - name: patent-analysis
    port: 8010
    targetPort: 8010
  - name: legal-parser
    port: 8011
    targetPort: 8011
  selector:
    app: xiaona-patent-service

---
apiVersion: v1
kind: Service
metadata:
  name: yunxi-baochen-service
  namespace: athena-services
  labels:
    app: yunxi-baochen-service
    ai-agent: yunxi
spec:
  type: ClusterIP
  ports:
  - name: yunxi-agent
    port: 8087
    targetPort: 8087
  - name: patent-retrieval
    port: 8020
    targetPort: 8020
  selector:
    app: yunxi-baochen-service

---
apiVersion: v1
kind: Service
metadata:
  name: xiaochen-media-service
  namespace: athena-services
  labels:
    app: xiaochen-media-service
    ai-agent: xiaochen
spec:
  type: ClusterIP
  ports:
  - name: xiaochen-agent
    port: 8090
    targetPort: 8090
  - name: content-creation
    port: 8030
    targetPort: 8030
  selector:
    app: xiaochen-media-service

---
# Ingress - 外部访问配置
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: athena-services-ingress
  namespace: athena-services
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - api.athena-platform.com
    secretName: athena-tls
  rules:
  - host: api.athena-platform.com
    http:
      paths:
      - path: /api/v1/control-center
        pathType: Prefix
        backend:
          service:
            name: xiaonuo-control-center-service
            port:
              number: 9002
      - path: /patent-legal
        pathType: Prefix
        backend:
          service:
            name: xiaona-patent-service
            port:
              number: 8010
      - path: /baochen-business
        pathType: Prefix
        backend:
          service:
            name: yunxi-baochen-service
            port:
              number: 8087
      - path: /media-operations
        pathType: Prefix
        backend:
          service:
            name: xiaochen-media-service
            port:
              number: 8090

---
# 资源配额
apiVersion: v1
kind: ResourceQuota
metadata:
  name: athena-services-quota
  namespace: athena-services
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    persistentvolumeclaims: "10"
    pods: "30"
    services: "20"
    secrets: "10"
    configmaps: "20"

---
# 限制范围
apiVersion: v1
kind: LimitRange
metadata:
  name: athena-services-limits
  namespace: athena-services
spec:
  limits:
  - default:
      cpu: "2000m"
      memory: "4Gi"
    defaultRequest:
      cpu: "500m"
      memory: "1Gi"
  - type: Container
    max:
      cpu: "4000m"
      memory: "8Gi"
    min:
      cpu: "100m"
      memory: "128Mi"