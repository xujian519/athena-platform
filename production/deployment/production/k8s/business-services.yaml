---
# 业务场景服务部署配置
# Business Services Deployment Configuration

# 专利法律服务 - 小娜服务
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xiaona-patent-service
  namespace: athena-services
  labels:
    app: xiaona-patent-service
    ai-agent: xiaona
    scenario: patent-legal
    version: v1.0.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: xiaona-patent-service
      ai-agent: xiaona
  template:
    metadata:
      labels:
        app: xiaona-patent-service
        ai-agent: xiaona
        scenario: patent-legal
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
      - name: patent-analysis
        image: athena/patent-analysis-service:v1.0.0
        imagePullPolicy: Always
        env:
        - name: AI_AGENT
          value: "xiaona"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: athena-secrets
              key: redis-url
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: athena-secrets
              key: database-url
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8010
          initialDelaySeconds: 45
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: 8010
          initialDelaySeconds: 15
          periodSeconds: 5
        volumeMounts:
        - name: patent-data
          mountPath: /data/patents
        - name: models-volume
          mountPath: /app/models
      - name: legal-document-parser
        image: athena/legal-document-parser:v1.0.0
        imagePullPolicy: Always
        env:
        - name: AI_AGENT
          value: "xiaona"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: athena-secrets
              key: redis-url
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8011
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8011
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: legal-docs
          mountPath: /data/legal-docs
      volumes:
      - name: patent-data
        persistentVolumeClaim:
          claimName: patent-data-pvc
      - name: legal-docs
        persistentVolumeClaim:
          claimName: legal-docs-pvc
      - name: models-volume
        persistentVolumeClaim:
          claimName: ai-models-pvc
      restartPolicy: Always

---
# 宝宸公司事务 - 云熙服务
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yunxi-baochen-service
  namespace: athena-services
  labels:
    app: yunxi-baochen-service
    ai-agent: yunxi
    scenario: baochen-business
    version: v1.0.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: yunxi-baochen-service
      ai-agent: yunxi
  template:
    metadata:
      labels:
        app: yunxi-baochen-service
        ai-agent: yunxi
        scenario: baochen-business
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
      - name: yunxi-agent
        image: athena/yunxi-agent:v1.0.0
        imagePullPolicy: Always
        env:
        - name: AI_AGENT
          value: "yunxi"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: athena-secrets
              key: redis-url
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: athena-secrets
              key: database-url
        - name: QDRANT_URL
          value: "http://qdrant.athena-services.svc.cluster.local:6333"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8087
          initialDelaySeconds: 45
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: 8087
          initialDelaySeconds: 15
          periodSeconds: 5
        volumeMounts:
        - name: baochen-data
          mountPath: /data/baochen
      - name: patent-retrieval
        image: athena/patent-retrieval-engine:v1.0.0
        imagePullPolicy: Always
        env:
        - name: AI_AGENT
          value: "yunxi"
        - name: QDRANT_URL
          value: "http://qdrant.athena-services.svc.cluster.local:6333"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: athena-secrets
              key: redis-url
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8020
          initialDelaySeconds: 60
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: 8020
          initialDelaySeconds: 20
          periodSeconds: 5
        volumeMounts:
        - name: retrieval-cache
          mountPath: /app/cache
      volumes:
      - name: baochen-data
        persistentVolumeClaim:
          claimName: baochen-data-pvc
      - name: retrieval-cache
        emptyDir: {}
      restartPolicy: Always

---
