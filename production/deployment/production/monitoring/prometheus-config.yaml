---
# Prometheus 监控配置
# Prometheus Monitoring Configuration

# Prometheus 配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: athena-monitoring
  labels:
    app: prometheus
    component: config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: athena-production
        region: cn-east-1

    rule_files:
      - "/etc/prometheus/rules/*.yml"

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - alertmanager:9093

    scrape_configs:
      # 自身监控
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # 控制中心监控
      - job_name: 'xiaonuo-control-center'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - athena-control-center
        relabel_configs:
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: http
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: service
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
        metrics_path: /metrics
        scrape_interval: 10s
        scrape_timeout: 5s

      # 业务服务监控
      - job_name: 'athena-business-services'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - athena-services
        relabel_configs:
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: http
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: service
          - source_labels: [__meta_kubernetes_pod_label_ai_agent]
            action: replace
            target_label: ai_agent
          - source_labels: [__meta_kubernetes_pod_label_scenario]
            action: replace
            target_label: scenario
        metrics_path: /metrics
        scrape_interval: 15s
        scrape_timeout: 5s

      # Kubernetes 集群监控
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

      # 节点监控
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
            replacement: $1
            target_label: $1

      # 容器监控
      - job_name: 'kubernetes-cadvisor'
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
            replacement: $1
            target_label: $1
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_address]
            regex: (.+)
            target_label: __param_target

      # Redis 监控
      - job_name: 'redis'
        static_configs:
          - targets:
            - 'redis-0.redis-cluster.athena-control-center.svc.cluster.local:6379'
        metrics_path: /metrics

      # PostgreSQL 监控
      - job_name: 'postgres'
        static_configs:
          - targets:
            - 'postgres-postgresql.athena-control-center.svc.cluster.local:5432'

      # Qdrant 向量数据库监控
      - job_name: 'qdrant'
        static_configs:
          - targets:
            - 'qdrant.athena-services.svc.cluster.local:6333'

    remote_write:
      - url: "https://prometheus-remote.example.com/api/v1/write"
        queue_config:
          max_samples_per_send: 1000
          max_shards: 200
          capacity: 2500

  # 告警规则
  alert_rules.yml: |
    groups:
    - name: athena-platform.rules
      rules:
      # 服务可用性告警
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "服务 {{ $labels.service }} 已停止"
          description: "服务 {{ $labels.service }} 在 {{ $labels.namespace }} 命名空间中已停止超过1分钟"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "服务错误率过高"
          description: "服务 {{ $labels.service }} 的5xx错误率在过去5分钟内超过10%"

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "服务响应时间过长"
          description: "服务 {{ $labels.service }} 的95%分位响应时间超过1秒"

      # 资源使用告警
      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "容器内存使用率过高"
          description: "容器 {{ $labels.pod }} 的内存使用率超过85%"

      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "容器CPU使用率过高"
          description: "容器 {{ $labels.pod }} 的CPU使用率超过80%"

      # AI服务特定告警
      - alert: AIServiceUnhealthy
        expr: ai_service_health_status == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "AI服务健康检查失败"
          description: "AI代理 {{ $labels.ai_agent }} 健康检查失败"

      - alert: PredictionAccuracyLow
        expr: ai_prediction_accuracy < 0.7
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "AI预测准确率过低"
          description: "AI预测准确率低于70%，需要重新训练模型"

      # 场景切换告警
      - alert: ScenarioSwitchFailed
        expr: increase(scenario_switch_failures_total[10m]) > 3
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "场景切换失败次数过多"
          description: "过去10分钟内场景切换失败次数超过3次"

      # 业务逻辑告警
      - alert: OrphanedServices
        expr: count(container_memory_usage_bytes{pod=~".+-stopped-.*"}) > 0
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "发现孤立的服务实例"
          description: "检测到已停止但未清理的服务实例"

    - name: athena-platform.rules.system
      rules:
      # 系统资源告警
      - alert: NodeMemoryHigh
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "节点可用内存过低"
          description: "节点 {{ $labels.instance }} 可用内存低于10%"

      - alert: NodeDiskHigh
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "节点磁盘空间不足"
          description: "节点 {{ $labels.instance }} 磁盘可用空间低于15%"

      - alert: KubernetesPodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod频繁重启"
          description: "Pod {{ $labels.pod }} 在过去15分钟内频繁重启"

---
# AlertManager 配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: athena-monitoring
  labels:
    app: alertmanager
    component: config
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: smtp.athena-platform.com
      smtp_from: alerts@athena-platform.com
      smtp_require_tls: true

    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'default'
      routes:
      - match:
          severity: critical
        receiver: 'critical-alerts'
      - match:
          severity: warning
        receiver: 'warning-alerts'
      - match:
          severity: info
        receiver: 'info-alerts'

    receivers:
    - name: 'default'
      email_configs:
        - to: 'ops-team@athena-platform.com'
          subject: '[ATHENA] {{ .GroupLabels.alertname }}'
          body: |
            {{ range .Alerts }}
            告警: {{ .Annotations.summary }}
            描述: {{ .Annotations.description }}
            标签: {{ range .Labels.SortedPairs }}{{ .Name }}={{ .Value }}{{ end }}
            时间: {{ .StartsAt }}
            {{ end }}
      slack_configs:
        - api_url: https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK
          channel: '#athena-alerts'
          title: '[ATHENA] {{ .GroupLabels.alertname }}'
          text: |
            {{ range .Alerts }}
            {{ .Annotations.summary }}
            {{ .Annotations.description }}
            {{ end }}

    - name: 'critical-alerts'
      email_configs:
        - to: 'oncall@athena-platform.com'
          subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
          body: |
            🔴 紧急告警 🔴

            {{ range .Alerts }}
            告警: {{ .Annotations.summary }}
            描述: {{ .Annotations.description }}
            严重级别: {{ .Labels.severity }}
            服务: {{ .Labels.service }}
            命名空间: {{ .Labels.namespace }}
            时间: {{ .StartsAt }}
            {{ end }}
      slack_configs:
        - api_url: https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK
          channel: '#athena-critical'
          title: '🚨 CRITICAL ALERT'
          text: |
            {{ range .Alerts }}
            {{ .Annotations.summary }}
            {{ .Annotations.description }}
            {{ end }}
      webhook_configs:
        - url: http://dingtalk-webhook.athena-platform.com/alerts
          send_resolved: true

    - name: 'warning-alerts'
      email_configs:
        - to: 'dev-team@athena-platform.com'
          subject: '[WARNING] {{ .GroupLabels.alertname }}'
          body: |
            ⚠️ 警告 ⚠️

            {{ range .Alerts }}
            告警: {{ .Annotations.summary }}
            描述: {{ .Annotations.description }}
            服务: {{ .Labels.service }}
            {{ end }}

    - name: 'info-alerts'
      email_configs:
        - to: 'info@athena-platform.com'
          subject: '[INFO] {{ .GroupLabels.alertname }}'
          body: |
            ℹ️ 信息 ℹ️

            {{ range .Alerts }}
            告警: {{ .Annotations.summary }}
            描述: {{ .Annotations.description }}
            {{ end }}

    inhibit_rules:
    - source_match:
        severity: 'critical'
      target_match:
        severity: 'warning'
      equal: ['alertname', 'service']

---
# Grafana 仪表板配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: athena-monitoring
  labels:
    app: grafana
    component: dashboards
data:
  athena-platform-overview.json: |
    {
      "dashboard": {
        "title": "Athena平台总览",
        "panels": [
          {
            "title": "服务状态",
            "type": "stat",
            "targets": [
              {
                "expr": "sum(up{namespace=~\"athena-\"})",
                "legendFormat": "运行中服务"
              }
            ]
          },
          {
            "title": "内存使用",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(container_memory_usage_bytes{namespace=~\"athena-\"}) / 1024 / 1024",
                "legendFormat": "{{{namespace}} 内存使用"
              }
            ]
          },
          {
            "title": "CPU使用",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=~\"athena-\"}[5m])) * 100",
                "legendFormat": "{{{namespace}}} CPU使用率"
              }
            ]
          }
        ]
      }
    }