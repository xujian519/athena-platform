# 生产环境Athena主应用部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: athena-api-deployment
  namespace: athena-production
  labels:
    app: athena-platform
    component: api
    version: v1.0.0
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "Athena工作平台API服务生产环境部署"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: athena-platform
      component: api
  template:
    metadata:
      labels:
        app: athena-platform
        component: api
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      
      # 服务账户
      serviceAccountName: athena-service-account
      
      # 容器配置
      containers:
      - name: athena-api
        image: athena-platform/api:1.0.0
        imagePullPolicy: Always
        
        # 端口配置
        ports:
        - name: http
          containerPort: 8005
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        
        # 环境变量
        envFrom:
        - configMapRef:
            name: athena-app-config
        - secretRef:
            name: athena-app-secrets
        
        # 资源限制
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        
        # 健康检查
        livenessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        
        readinessProbe:
          httpGet:
            path: /ready
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
          successThreshold: 1
        
        # 启动探针
        startupProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
          successThreshold: 1
        
        # 安全上下文
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 1000
        
        # 卷挂载
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: tmp
          mountPath: /app/tmp
        - name: config
          mountPath: /app/config
          readOnly: true
        - name: ssl-certs
          mountPath: /etc/ssl/certs
          readOnly: true
      
      # 卷配置
      volumes:
      - name: logs
        emptyDir:
          sizeLimit: 1Gi
      
      - name: tmp
        emptyDir:
          sizeLimit: 500Mi
      
      - name: config
        configMap:
          name: athena-logging-config
          items:
          - key: logging.yaml
            path: logging.yaml
      
      - name: ssl-certs
        secret:
          secretName: athena-ssl-certs
          items:
          - key: tls.crt
            path: server.crt
          - key: tls.key
            path: server.key
      
      # 节点选择
      nodeSelector:
        node-type: application
        environment: production
      
      # 容忍度
      tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "application"
        effect: "NoSchedule"
      
      # 亲和性
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - athena-platform
              topologyKey: kubernetes.io/hostname
---
# 生产环境Redis部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  namespace: athena-production
  labels:
    app: athena-platform
    component: redis
    version: v7.0.0
  annotations:
    description: "Redis缓存服务生产环境部署"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: athena-platform
      component: redis
  template:
    metadata:
      labels:
        app: athena-platform
        component: redis
        version: v7.0.0
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      
      containers:
      - name: redis
        image: redis:7.0-alpine
        imagePullPolicy: Always
        
        ports:
        - name: redis
          containerPort: 6379
          protocol: TCP
        
        command:
        - redis-server
        - --requirepass
        - $(REDIS_PASSWORD)
        - --appendonly
        - "yes"
        - --appendfsync
        - "everysec"
        - --maxmemory
        - "1gb"
        - --maxmemory-policy
        - "allkeys-lru"
        
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: athena-app-secrets
              key: REDIS_PASSWORD
        
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        
        livenessProbe:
          exec:
            command:
            - redis-cli
            - -a
            - $(REDIS_PASSWORD)
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          exec:
            command:
            - redis-cli
            - -a
            - $(REDIS_PASSWORD)
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        
        volumeMounts:
        - name: redis-data
          mountPath: /data
        - name: redis-config
          mountPath: /usr/local/etc/redis
          readOnly: true
      
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: redis-pvc
      
      - name: redis-config
        configMap:
          name: redis-config
---
# 生产环境PostgreSQL部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: athena-production
  labels:
    app: athena-platform
    component: postgres
    version: v15.0
  annotations:
    description: "PostgreSQL数据库生产环境部署"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: athena-platform
      component: postgres
  template:
    metadata:
      labels:
        app: athena-platform
        component: postgres
        version: v15.0
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      
      containers:
      - name: postgres
        image: postgres:15-alpine
        imagePullPolicy: Always
        
        ports:
        - name: postgres
          containerPort: 5432
          protocol: TCP
        
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: athena-app-config
              key: DB_NAME
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: athena-app-secrets
              key: DB_USERNAME
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: athena-app-secrets
              key: DB_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - $(POSTGRES_USER)
            - -d
            - $(POSTGRES_DB)
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - $(POSTGRES_USER)
            - -d
            - $(POSTGRES_DB)
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: postgres-config
          mountPath: /etc/postgresql/postgresql.conf
          subPath: postgresql.conf
          readOnly: true
      
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-pvc
      
      - name: postgres-config
        configMap:
          name: postgres-config
      
      nodeSelector:
        node-type: database