# 生产环境网络策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: athena-api-network-policy
  namespace: athena-production
  labels:
    app: athena-platform
    component: api
    policy-type: network
spec:
  podSelector:
    matchLabels:
      app: athena-platform
      component: api
  policyTypes:
  - Ingress
  - Egress
  
  # 入站流量规则
  ingress:
  # 允许来自Nginx的HTTP/HTTPS流量
  - from:
    - podSelector:
        matchLabels:
          app: athena-platform
          component: nginx
    ports:
    - protocol: TCP
      port: 8005
    - protocol: TCP
      port: 9090
  
  # 允许来自Ingress Controller的流量
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8005
    - protocol: TCP
      port: 9090
  
  # 允许来自监控系统的流量
  - from:
    - namespaceSelector:
        matchLabels:
          name: athena-monitoring
    ports:
    - protocol: TCP
      port: 9090
  
  # 出站流量规则
  egress:
  # 允许访问DNS
  - to: []
    ports:
    - protocol: UDP
      port: 53
  
  # 允许访问PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: athena-platform
          component: postgres
    ports:
    - protocol: TCP
      port: 5432
  
  # 允许访问Redis
  - to:
    - podSelector:
        matchLabels:
          app: athena-platform
          component: redis
    ports:
    - protocol: TCP
      port: 6379
  
  # 允许访问Qdrant
  - to:
    - podSelector:
        matchLabels:
          app: athena-platform
          component: qdrant
    ports:
    - protocol: TCP
      port: 6333
    - protocol: TCP
      port: 6334
  
  # 允许HTTPS外网访问（用于AI API调用）
  - to: []
    ports:
    - protocol: TCP
      port: 443
  
  # 允许HTTP外网访问
  - to: []
    ports:
    - protocol: TCP
      port: 80
---
# Redis网络策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-network-policy
  namespace: athena-production
  labels:
    app: athena-platform
    component: redis
    policy-type: network
spec:
  podSelector:
    matchLabels:
      app: athena-platform
      component: redis
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # 只允许来自Athena API的访问
  - from:
    - podSelector:
        matchLabels:
          app: athena-platform
          component: api
    ports:
    - protocol: TCP
      port: 6379
  
  # 允许来自监控系统的访问
  - from:
    - namespaceSelector:
        matchLabels:
          name: athena-monitoring
    ports:
    - protocol: TCP
      port: 6379
  
  egress:
  # 允许DNS查询
  - to: []
    ports:
    - protocol: UDP
      port: 53
---
# PostgreSQL网络策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-network-policy
  namespace: athena-production
  labels:
    app: athena-platform
    component: postgres
    policy-type: network
spec:
  podSelector:
    matchLabels:
      app: athena-platform
      component: postgres
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # 只允许来自Athena API的访问
  - from:
    - podSelector:
        matchLabels:
          app: athena-platform
          component: api
    ports:
    - protocol: TCP
      port: 5432
  
  # 允许来自监控系统的访问
  - from:
    - namespaceSelector:
        matchLabels:
          name: athena-monitoring
    ports:
    - protocol: TCP
      port: 5432
  
  # 允许来自备份服务的访问
  - from:
    - podSelector:
        matchLabels:
          app: athena-platform
          component: backup
    ports:
    - protocol: TCP
      port: 5432
  
  egress:
  # 允许DNS查询
  - to: []
    ports:
    - protocol: UDP
      port: 53
  
  # 允许访问外部备份存储
  - to: []
    ports:
    - protocol: TCP
      port: 443
---
# 监控系统网络策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-network-policy
  namespace: athena-monitoring
  labels:
    app: athena-platform
    component: monitoring
    policy-type: network
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # 允许来自Ingress Controller的访问
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 9090  # Prometheus
    - protocol: TCP
      port: 3000  # Grafana
    - protocol: TCP
      port: 9093  # AlertManager
  
  # 允许来自生产应用的访问
  - from:
    - namespaceSelector:
        matchLabels:
          name: athena-production
    ports:
    - protocol: TCP
      port: 9090  # Prometheus
  
  egress:
  # 允许DNS查询
  - to: []
    ports:
    - protocol: UDP
      port: 53
  
  # 允许监控生产环境应用
  - to:
    - namespaceSelector:
        matchLabels:
          name: athena-production
    ports:
    - protocol: TCP
      port: 8005   # API应用
    - protocol: TCP
      port: 9090   # 应用指标
    - protocol: TCP
      port: 5432   # PostgreSQL
    - protocol: TCP
      port: 6379   # Redis
    - protocol: TCP
      port: 6333   # Qdrant
  
  # 允许外部通知服务访问
  - to: []
    ports:
    - protocol: TCP
      port: 443
---
# 默认拒绝所有流量策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: athena-production
  labels:
    app: athena-platform
    policy-type: default-deny
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# 监控命名空间默认拒绝策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all-monitoring
  namespace: athena-monitoring
  labels:
    app: athena-platform
    policy-type: default-deny
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress