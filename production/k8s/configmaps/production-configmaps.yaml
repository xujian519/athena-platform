# 生产环境应用配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: athena-app-config
  namespace: athena-production
  labels:
    app: athena-platform
    component: config
data:
  # 应用基础配置
  ATHENA_ENV: "production"
  ATHENA_LOG_LEVEL: "INFO"
  ATHENA_DEBUG: "false"
  
  # 服务配置
  API_HOST: "0.0.0.0"
  API_PORT: "8005"
  API_WORKERS: "4"
  API_TIMEOUT: "60"
  
  # 数据库配置
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "athena_prod"
  DB_POOL_SIZE: "20"
  DB_MAX_OVERFLOW: "30"
  
  # Redis配置
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_POOL_SIZE: "50"
  
  # 向量数据库配置
  QDRANT_HOST: "qdrant-service"
  QDRANT_PORT: "6333"
  QDRANT_TIMEOUT: "30"
  
  # 内存系统配置
  MEMORY_HOT_SIZE: "104857600"    # 100MB
  MEMORY_WARM_SIZE: "524288000"   # 500MB
  MEMORY_COLD_SIZE: "10737418240" # 10GB
  
  # 缓存配置
  CACHE_TTL_DEFAULT: "3600"
  CACHE_TTL_SHORT: "300"
  CACHE_TTL_LONG: "86400"
  
  # 监控配置
  METRICS_ENABLED: "true"
  METRICS_PORT: "9090"
  HEALTH_CHECK_INTERVAL: "30"
  
  # 安全配置
  JWT_SECRET_KEY: "placeholder-change-in-production"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRE_MINUTES: "1440"
  CORS_ORIGINS: "https://api.athena-patent.com,https://app.athena-patent.com"
  
  # 性能配置
  MAX_CONCURRENT_REQUESTS: "1000"
  REQUEST_TIMEOUT: "120"
  MAX_BATCH_SIZE: "100"
  
  # AI服务配置
  OPENAI_MODEL: "gpt-4"
  OPENAI_MAX_TOKENS: "4096"
  OPENAI_TEMPERATURE: "0.1"
  
  # 外部服务配置
  NOTIFICATION_WEBHOOK: "https://hooks.athena-patent.com/notifications"
  BACKUP_WEBHOOK: "https://backup.athena-patent.com/webhook"
---
# 生产环境Nginx配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: athena-nginx-config
  namespace: athena-production
  labels:
    app: athena-platform
    component: nginx
data:
  nginx.conf: |
    events {
        worker_connections 1024;
        use epoll;
        multi_accept on;
    }
    
    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;
        
        # 日志格式
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time"';
        
        access_log /var/log/nginx/access.log main;
        error_log /var/log/nginx/error.log warn;
        
        # 性能优化
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;
        
        # 客户端限制
        client_max_body_size 50M;
        client_body_timeout 60s;
        client_header_timeout 60s;
        
        # Gzip压缩
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/json
            application/javascript
            application/xml+rss
            application/atom+xml
            image/svg+xml;
        
        # 限流配置
        limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
        limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/s;
        
        # 上游服务器
        upstream athena_api {
            least_conn;
            server athena-api-service:8005 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }
        
        # 主服务器配置
        server {
            listen 80;
            server_name api.athena-patent.com;
            
            # 重定向到HTTPS
            return 301 https://$server_name$request_uri;
        }
        
        server {
            listen 443 ssl http2;
            server_name api.athena-patent.com;
            
            # SSL配置
            ssl_certificate /etc/nginx/ssl/cert.pem;
            ssl_certificate_key /etc/nginx/ssl/key.pem;
            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
            ssl_prefer_server_ciphers off;
            ssl_session_cache shared:SSL:10m;
            ssl_session_timeout 10m;
            
            # 安全头
            add_header X-Frame-Options DENY;
            add_header X-Content-Type-Options nosniff;
            add_header X-XSS-Protection "1; mode=block";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
            
            # API路由
            location /api/ {
                limit_req zone=api burst=100 nodelay;
                
                proxy_pass http://athena_api;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                
                proxy_connect_timeout 30s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
                
                proxy_buffering on;
                proxy_buffer_size 4k;
                proxy_buffers 8 4k;
            }
            
            # 健康检查
            location /health {
                proxy_pass http://athena_api;
                access_log off;
            }
            
            # 静态文件
            location /static/ {
                alias /app/static/;
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
            
            # 监控端点
            location /metrics {
                proxy_pass http://athena_api;
                allow 127.0.0.1;
                allow 10.0.0.0/8;
                deny all;
            }
        }
    }
---
# 生产环境应用日志配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: athena-logging-config
  namespace: athena-production
  labels:
    app: athena-platform
    component: logging
data:
  logging.yaml: |
    version: 1
    disable_existing_loggers: false
    
    formatters:
      standard:
        format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
        datefmt: "%Y-%m-%d %H:%M:%S"
      
      json:
        format: '{"timestamp": "%(asctime)s", "level": "%(levelname)s", "logger": "%(name)s", "message": "%(message)s", "module": "%(module)s", "function": "%(funcName)s", "line": %(lineno)d}'
        datefmt: "%Y-%m-%dT%H:%M:%S"
      
      detailed:
        format: "%(asctime)s [%(levelname)s] %(name)s (%(filename)s:%(lineno)d): %(message)s"
        datefmt: "%Y-%m-%d %H:%M:%S"
    
    handlers:
      console:
        class: logging.StreamHandler
        level: INFO
        formatter: standard
        stream: ext://sys.stdout
      
      file:
        class: logging.handlers.RotatingFileHandler
        level: INFO
        formatter: json
        filename: /app/logs/athena.log
        maxBytes: 104857600  # 100MB
        backupCount: 10
        encoding: utf8
      
      error_file:
        class: logging.handlers.RotatingFileHandler
        level: ERROR
        formatter: detailed
        filename: /app/logs/athena-error.log
        maxBytes: 52428800  # 50MB
        backupCount: 5
        encoding: utf8
      
      audit_file:
        class: logging.handlers.RotatingFileHandler
        level: INFO
        formatter: json
        filename: /app/logs/audit.log
        maxBytes: 104857600  # 100MB
        backupCount: 10
        encoding: utf8
    
    loggers:
      athena:
        level: INFO
        handlers: [console, file, audit_file]
        propagate: false
      
      athena.auth:
        level: INFO
        handlers: [console, file, audit_file]
        propagate: false
      
      uvicorn:
        level: INFO
        handlers: [console, file]
        propagate: false
      
      fastapi:
        level: INFO
        handlers: [console, file]
        propagate: false
      
      sqlalchemy:
        level: WARNING
        handlers: [console, file]
        propagate: false
    
    root:
      level: INFO
      handlers: [console, file, error_file]