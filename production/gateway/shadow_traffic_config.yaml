# Gateway架构并行运行配置
# Gateway Shadow Traffic Configuration

# =============================================================================
# 影子流量配置
# =============================================================================
shadow_traffic:
  enabled: true

  # 流量镜像比例（0-100）
  mirror_percentage: 10

  # 要镜像的端点
  endpoints:
    - path: "/api/v1/xiaonuo/*"
      methods: ["GET", "POST"]

  # 目标服务
  target:
    gateway:
      host: "127.0.0.1"
      port: 8080
      protocol: "http"

    legacy:
      host: "127.0.0.1"
      port: 8005
      protocol: "http"

# =============================================================================
# 双写验证配置
# =============================================================================
dual_write:
  enabled: true

  # 验证策略
  validation:
    # 响应比较模式: strict, lenient, custom
    mode: "lenient"

    # 忽略的字段
    ignore_fields:
      - "timestamp"
      - "request_id"
      - "trace_id"

    # 超时配置
    timeout:
      gateway: 5  # 秒
      legacy: 5

  # 差异处理
  diff_handling:
    # 记录差异
    log_diffs: true

    # 告警阈值
    alert_threshold: 0.05  # 5%差异率

    # 最大容忍差异
    max_tolerance: 0.1  # 10%差异率

# =============================================================================
# 性能对比监控
# =============================================================================
performance_monitoring:
  enabled: true

  # 指标收集
  metrics:
    - name: "response_time"
      comparison: "percent"
      threshold: 20  # Gateway响应时间不应比Legacy慢20%

    - name: "error_rate"
      comparison: "absolute"
      threshold: 0.01  # 错误率差异不超过1%

    - name: "throughput"
      comparison: "percent"
      threshold: 10  # 吞吐量差异不超过10%

  # 报告生成
  reporting:
    interval: 300  # 每5分钟生成一次报告
    retention: 7  # 保留7天的报告

# =============================================================================
# 自动回滚配置
# =============================================================================
auto_rollback:
  enabled: true

  # 触发条件
  triggers:
    # 错误率触发
    error_rate:
      enabled: true
      threshold: 0.05  # 5%错误率
      window: 300  # 5分钟窗口

    # 响应时间触发
    response_time:
      enabled: true
      threshold: 2.0  # P95响应时间超过2秒
      window: 300

    # 差异率触发
    diff_rate:
      enabled: true
      threshold: 0.1  # 10%差异率
      window: 600  # 10分钟窗口

  # 回滚动作
  actions:
    # 停止Gateway流量
    stop_gateway_traffic: true

    # 发送告警
    send_alert: true

    # 记录事件
    log_event: true

    # 生成报告
    generate_report: true

# =============================================================================
# 流量切换配置
# =============================================================================
traffic_switching:
  # 当前阶段: shadow, dual_write, partial_cutover, full_cutover
  current_stage: "shadow"

  # 阶段配置
  stages:
    shadow:
      description: "影子流量阶段"
      gateway_percentage: 0
      legacy_percentage: 100

    dual_write:
      description: "双写阶段"
      gateway_percentage: 0
      legacy_percentage: 100

    partial_cutover:
      description: "部分切流阶段"
      gateway_percentage: 10
      legacy_percentage: 90

    full_cutover:
      description: "完全切流阶段"
      gateway_percentage: 100
      legacy_percentage: 0

  # 自动切换条件
  auto_switch:
    enabled: false

    # 切换检查间隔（秒）
    check_interval: 3600

    # 稳定运行时间（秒）
    stable_duration: 86400  # 24小时

# =============================================================================
# 监控和告警
# =============================================================================
monitoring:
  # Prometheus配置
  prometheus:
    enabled: true
    port: 9090
    path: "/metrics"

  # 告警配置
  alerts:
    # Gateway告警
    gateway_down:
      enabled: true
      severity: critical

    # Legacy告警
    legacy_down:
      enabled: true
      severity: warning

    # 性能差异告警
    performance_diff:
      enabled: true
      severity: warning
      threshold: 0.2

    # 数据差异告警
    data_diff:
      enabled: true
      severity: warning
      threshold: 0.05
