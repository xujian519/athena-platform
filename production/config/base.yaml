# Athena平台基础配置
# Base Configuration for Athena Platform
# 创建时间: 2025-12-18
# 版本: v1.0.0

# ============================================================================
# 应用基础信息
# ============================================================================
app:
  name: "athena-platform"
  version: "1.0.0"
  description: "Athena智能工作平台"
  environment: "${ENVIRONMENT:development}"
  debug: "${DEBUG:false}"
  log_level: "${LOG_LEVEL:INFO}"

# ============================================================================
# 服务器配置
# ============================================================================
server:
  host: "${HOST:0.0.0.0}"
  port: "${PORT:8000}"
  workers: "${WORKERS:1}"
  reload: "${RELOAD:false}"

# CORS配置
cors:
  allow_origins:
    - "${FRONTEND_URL:http://localhost:3000}"
    - "${ADMIN_URL:http://localhost:8001}"
  allow_credentials: true
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allow_headers:
    - "*"

# ============================================================================
# 数据库配置
# ============================================================================
database:
  # PostgreSQL主数据库
  postgres:
    host: "${POSTGRES_HOST:localhost}"
    port: "${POSTGRES_PORT:5432}"
    user: "${POSTGRES_USER:postgres}"
    password: "${POSTGRES_PASSWORD:postgres}"
    database: "${POSTGRES_DB:athena_db}"
    pool_size: "${POSTGRES_POOL_SIZE:20}"
    max_overflow: "${POSTGRES_MAX_OVERFLOW:30}"
    pool_timeout: "${POSTGRES_POOL_TIMEOUT:30}"
    pool_recycle: "${POSTGRES_POOL_RECYCLE:3600}"
    echo: "${POSTGRES_ECHO:false}"

  # Qdrant向量数据库
  qdrant:
    host: "${QDRANT_HOST:localhost}"
    port: "${QDRANT_PORT:6333}"
    api_key: "${QDRANT_API_KEY:}"
    collection: "${QDRANT_COLLECTION:athena_vectors}"
    timeout: "${QDRANT_TIMEOUT:30}"

  # Redis缓存
  redis:
    host: "${REDIS_HOST:localhost}"
    port: "${REDIS_PORT:6379}"
    db: "${REDIS_DB:0}"
    password: "${REDIS_PASSWORD:}"
    max_connections: "${REDIS_MAX_CONNECTIONS:100}"
    retry_on_timeout: "${REDIS_RETRY_ON_TIMEOUT:true}"

# ============================================================================
# AI和机器学习配置
# ============================================================================
ai:
  # OpenAI配置
  openai:
    api_key: "${OPENAI_API_KEY:}"
    model: "${OPENAI_MODEL:gpt-3.5-turbo}"
    max_tokens: "${OPENAI_MAX_TOKENS:2000}"
    temperature: "${OPENAI_TEMPERATURE:0.7}"
    timeout: "${OPENAI_TIMEOUT:30}"

  # Anthropic配置
  anthropic:
    api_key: "${ANTHROPIC_API_KEY:}"
    model: "${ANTHROPIC_MODEL:claude-3-sonnet-20240229}"
    max_tokens: "${ANTHROPIC_MAX_TOKENS:2000}"
    temperature: "${ANTHROPIC_TEMPERATURE:0.7}"
    timeout: "${ANTHROPIC_TIMEOUT:30}"

  # HuggingFace配置
  huggingface:
    cache_dir: "${HF_CACHE_DIR:./cache/huggingface}"
    token: "${HF_TOKEN:}"
    model_timeout: "${HF_MODEL_TIMEOUT:300}"

# ============================================================================
# 文件存储配置
# ============================================================================
storage:
  # 本地存储
  local:
    upload_dir: "${UPLOAD_DIR:./uploads}"
    max_file_size: "${MAX_FILE_SIZE:100MB}"
    allowed_extensions:
      - "pdf"
      - "docx"
      - "txt"
      - "md"
      - "jpg"
      - "png"
      - "json"
      - "yaml"
      - "csv"

  # 向量存储路径
  vectors:
    model_cache: "${VECTOR_MODEL_CACHE:./models/vector}"
    data_path: "${VECTOR_DATA_PATH:./data/vectors_qdrant}"

# ============================================================================
# 日志配置
# ============================================================================
logging:
  level: "${LOG_LEVEL:INFO}"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

  # 日志文件配置
  file:
    path: "${LOG_FILE_PATH:./logs/app.log}"
    max_size: "${LOG_MAX_SIZE:100MB}"
    backup_count: "${LOG_BACKUP_COUNT:5}"

  # 日志处理器
  handlers:
    console:
      enabled: "${LOG_CONSOLE_ENABLED:true}"
      level: "${LOG_CONSOLE_LEVEL:INFO}"
    file:
      enabled: "${LOG_FILE_ENABLED:true}"
      level: "${LOG_FILE_LEVEL:DEBUG}"
    sentry:
      enabled: "${SENTRY_ENABLED:false}"
      dsn: "${SENTRY_DSN:}"
      level: "${SENTRY_LEVEL:ERROR}"

# ============================================================================
# 监控和指标
# ============================================================================
monitoring:
  # Prometheus指标
  prometheus:
    enabled: "${PROMETHEUS_ENABLED:false}"
    port: "${PROMETHEUS_PORT:9090}"
    path: "${PROMETHEUS_PATH:/metrics}"

  # 健康检查
  health_check:
    enabled: "${HEALTH_CHECK_ENABLED:true}"
    endpoint: "${HEALTH_CHECK_ENDPOINT:/health}"
    interval: "${HEALTH_CHECK_INTERVAL:30}"

  # 性能监控
  performance:
    slow_query_threshold: "${SLOW_QUERY_THRESHOLD:1.0}"
    memory_threshold: "${MEMORY_THRESHOLD:0.8}"
    cpu_threshold: "${CPU_THRESHOLD:0.8}"

# ============================================================================
# 安全配置
# ============================================================================
security:
  # JWT配置
  jwt:
    secret_key: "${JWT_SECRET_KEY:your-secret-key-change-in-production}"
    algorithm: "${JWT_ALGORITHM:HS256}"
    access_token_expire_minutes: "${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:30}"
    refresh_token_expire_days: "${JWT_REFRESH_TOKEN_EXPIRE_DAYS:7}"

  # CORS和认证
  auth:
    enabled: "${AUTH_ENABLED:true}"
    require_token: "${AUTH_REQUIRE_TOKEN:false}"
    token_header: "${AUTH_TOKEN_HEADER:Authorization}"

  # 加密配置
  encryption:
    key: "${ENCRYPTION_KEY:your-encryption-key-change-in-production}"
    algorithm: "${ENCRYPTION_ALGORITHM:AES-256-GCM}"

# ============================================================================
# API配置
# ============================================================================
api:
  # API版本控制
  versioning:
    enabled: "${API_VERSIONING_ENABLED:true}"
    default_version: "${API_DEFAULT_VERSION:v1}"
    supported_versions:
      - "v1"
      - "v2"

  # 限流配置
  rate_limiting:
    enabled: "${RATE_LIMITING_ENABLED:true}"
    requests_per_minute: "${RATE_LIMIT_RPM:100}"
    burst_size: "${RATE_LIMIT_BURST:200}"

  # API文档
  docs:
    enabled: "${API_DOCS_ENABLED:true}"
    url: "${API_DOCS_URL:/docs}"
    redoc_url: "${API_REDOC_URL:/redoc}"

# ============================================================================
# 缓存配置
# ============================================================================
cache:
  # 应用缓存
  application:
    enabled: "${APP_CACHE_ENABLED:true}"
    ttl: "${APP_CACHE_TTL:3600}"
    max_size: "${APP_CACHE_MAX_SIZE:1000}"

  # 模型缓存
  model:
    enabled: "${MODEL_CACHE_ENABLED:true}"
    ttl: "${MODEL_CACHE_TTL:86400}"
    max_size: "${MODEL_CACHE_MAX_SIZE:100}"

# ============================================================================
# 任务队列配置
# ============================================================================
tasks:
  # Celery配置（如果启用）
  celery:
    enabled: "${CELERY_ENABLED:false}"
    broker_url: "${CELERY_BROKER_URL:redis://localhost:6379/1}"
    result_backend: "${CELERY_RESULT_BACKEND:redis://localhost:6379/2}"
    task_serializer: "${CELERY_TASK_SERIALIZER:json}"
    result_serializer: "${CELERY_RESULT_SERIALIZER:json}"
    accept_content: "${CELERY_ACCEPT_CONTENT:json}"
    timezone: "${CELERY_TIMEZONE:UTC}"

# ============================================================================
# 开发环境特定配置
# ============================================================================
development:
  # 热重载
  auto_reload: "${DEV_AUTO_RELOAD:true}"

  # 调试工具
  debug_toolbar: "${DEV_DEBUG_TOOLBAR:false}"
  profiling: "${DEV_PROFILING:false}"

  # 测试数据
  seed_data: "${DEV_SEED_DATA:false}"
  demo_mode: "${DEV_DEMO_MODE:false}"

# ============================================================================
# 生产环境特定配置
# ============================================================================
production:
  # 性能优化
  workers: "${PROD_WORKERS:4}"
  worker_class: "${PROD_WORKER_CLASS:uvicorn.workers.UvicornWorker}"

  # 安全强化
  ssl_enabled: "${PROD_SSL_ENABLED:false}"
  ssl_cert_path: "${PROD_SSL_CERT_PATH:}"
  ssl_key_path: "${PROD_SSL_KEY_PATH:}"

  # 监控和告警
  alerting:
    enabled: "${PROD_ALERTING_ENABLED:false}"
    webhook_url: "${PROD_ALERT_WEBHOOK_URL:}"
    email_enabled: "${PROD_ALERT_EMAIL_ENABLED:false}"
    email_smtp_server: "${PROD_ALERT_SMTP_SERVER:}"
    email_from: "${PROD_ALERT_EMAIL_FROM:}"
    email_to: "${PROD_ALERT_EMAIL_TO:}"

# ============================================================================
# 功能开关
# ============================================================================
features:
  # 实验性功能
  experimental_features:
    nlp_enhanced: "${FEATURE_NLP_ENHANCED:false}"
    multimodal: "${FEATURE_MULTIMODAL:false}"
    advanced_search: "${FEATURE_ADVANCED_SEARCH:true}"

  # 可选模块
  optional_modules:
    knowledge_graph: "${FEATURE_KNOWLEDGE_GRAPH:true}"
    patent_analysis: "${FEATURE_PATENT_ANALYSIS:true}"
    legal_ai: "${FEATURE_LEGAL_AI:true}"