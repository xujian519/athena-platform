# 动态提示词系统生产环境配置
# Dynamic Prompt System Production Configuration
# 版本: 2.0.0

# ============================================================================
# 动态提示词系统配置
# ============================================================================
dynamic_prompt_system:
  # 场景识别配置
  scenario_identifier:
    enable_llm_fallback: false
    cache_size: 1024
    enable_metrics: true
    max_input_length: 100000  # 100KB

  # 规则检索配置
  scenario_rule_retriever:
    cache_ttl: 3600  # 1小时
    enable_metrics: true
    query_timeout: 10
    # 允许的领域白名单
    allowed_domains:
      - patent
      - trademark
      - legal
      - copyright
      - other
    # 允许的任务类型白名单
    allowed_task_types:
      - creativity_analysis
      - novelty_analysis
      - infringement
      - similarity
      - validity
      - drafting
      - search
      - other
    # 允许的阶段白名单
    allowed_phases:
      - application
      - examination
      - opposition
      - litigation
      - other

  # 提示词生成配置
  prompt_generator:
    # Lyra优化配置
    lyra_optimization:
      enabled: true
      model: "lyra-v2"
      max_tokens: 2000
      temperature: 0.7

    # 模板渲染配置
    template_rendering:
      enable_jinja2: true
      auto_escape: true  # 自动HTML转义，防止XSS
      max_render_time: 5

    # 变量替换配置
    variable_substitution:
      enable_html_escaping: true  # 启用HTML转义
      max_variable_length: 5000   # 变量最大长度

# ============================================================================
# 能力调用配置（优化版本）
# ============================================================================
capabilities:
  # MCP服务器配置
  mcp:
    enabled: true
    pool_size: 10
    timeout: 30
    retry_attempts: 3
    retry_delay: 1.0
    max_concurrent_calls: 50

  # RESTful服务配置
  restful:
    enabled: true
    pool_size: 20
    max_connections: 100
    timeout: 30
    keepalive_expiry: 30
    http2_enabled: true  # 启用HTTP/2多路复用
    connect_timeout: 10
    read_timeout: 30

  # WebSocket服务配置
  websocket:
    enabled: true
    pool_size: 5
    timeout: 60
    ping_interval: 20
    ping_timeout: 10
    max_message_size: 1048576  # 1MB

  # 内部服务配置
  internal:
    enabled: true
    timeout: 10
    max_concurrent_calls: 100

  # 通用配置
  common:
    enable_metrics: true
    enable_retry: true
    max_retries: 3
    retry_base_delay: 1.0
    enable_circuit_breaker: false  # 熔断器（可选）
    circuit_breaker_threshold: 5

# ============================================================================
# 缓存配置
# ============================================================================
cache:
  # 场景识别缓存
  scenario_cache:
    enabled: true
    ttl: 3600      # 1小时
    max_size: 1024 # 最大缓存条目数
    cleanup_interval: 300  # 5分钟清理一次

  # 规则检索缓存
  rule_cache:
    enabled: true
    ttl: 3600
    max_size: 512
    cleanup_interval: 300

  # L1内存缓存
  memory_cache:
    enabled: true
    max_size_mb: 512
    eviction_policy: "lru"  # 最近最少使用

  # L2 Redis缓存
  redis_cache:
    enabled: true
    ttl: 7200  # 2小时
    key_prefix: "athena:prompt:"
    max_memory: "1gb"
    eviction_policy: "allkeys-lru"

# ============================================================================
# 安全配置
# ============================================================================
security:
  # 输入验证
  input_validation:
    enable: true
    max_input_length: 100000
    strip_control_chars: true
    normalize_whitespace: false

  # 输出转义
  output_escaping:
    enable_html_escaping: true
    enable_js_escaping: false
    enable_css_escaping: false

  # Cypher注入防护
  cypher_injection_protection:
    enable: true
    use_parameterized_queries: true
    validate_identifiers: true

  # SQL注入防护
  sql_injection_protection:
    enable: true
    use_parameterized_queries: true

  # XSS防护
  xss_protection:
    enable: true
    auto_escape_templates: true
    content_security_policy: "default-src 'self'"

  # CSRF防护
  csrf_protection:
    enable: true
    token_expiry: 3600

  # 速率限制
  rate_limiting:
    enabled: true
    requests_per_minute: 100
    requests_per_hour: 1000
    burst: 50
    per_ip: true
    per_user: true

# ============================================================================
# 监控配置
# ============================================================================
monitoring:
  # Prometheus指标
  prometheus:
    enabled: true
    port: 9090
    path: "/metrics"
    # 指标收集间隔
    collect_interval: 60  # 秒

  # 性能指标
  metrics:
    enabled: true
    collect_interval: 60
    retention_days: 7

    # 要收集的指标
    collect_counters:
      - total_requests
      - successful_requests
      - failed_requests
      - cache_hits
      - cache_misses

    collect_gauges:
      - current_requests
      - cache_size
      - active_connections
      - memory_usage

    collect_histograms:
      - request_duration
      - response_size
      - processing_time

  # 健康检查
  health_check:
    enabled: true
    endpoint: "/health"
    interval: 30  # 秒
    timeout: 5

    # 检查项
    checks:
      - name: "database"
        enabled: true
        timeout: 3

      - name: "neo4j"
        enabled: true
        timeout: 3

      - name: "redis"
        enabled: true
        timeout: 2

      - name: "mcp_servers"
        enabled: true
        timeout: 5

  # 请求追踪
  tracing:
    enabled: true
    sample_rate: 0.1  # 10%采样
    exporter: "jaeger"
    jaeger_endpoint: "${JAEGER_ENDPOINT:-http://localhost:14268/api/traces}"

  # 告警配置
  alerts:
    enabled: true

    # 错误率告警
    error_rate:
      enabled: true
      threshold: 0.05  # 5%
      window: 300  # 5分钟

    # 响应时间告警
    response_time:
      enabled: true
      threshold: 2000  # 2秒
      percentile: 95  # p95

    # 缓存命中率告警
    cache_hit_rate:
      enabled: true
      threshold: 0.5  # 50%
      window: 600  # 10分钟

# ============================================================================
# 日志配置（结构化日志）
# ============================================================================
logging:
  version: 1
  disable_existing_loggers: false

  formatters:
    standard:
      format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
      datefmt: "%Y-%m-%d %H:%M:%S"

    json:
      class: "pythonjsonlogger.jsonlogger.JsonFormatter"
      format: "%(asctime)s %(levelname)s %(name)s %(message)s"

  handlers:
    console:
      class: "logging.StreamHandler"
      level: "INFO"
      formatter: "standard"
      stream: "ext://sys.stdout"

    file:
      class: "logging.handlers.RotatingFileHandler"
      level: "INFO"
      formatter: "json"
      filename: "/var/log/athena/prompt_system.log"
      maxBytes: 104857600  # 100MB
      backupCount: 10

    error_file:
      class: "logging.handlers.RotatingFileHandler"
      level: "ERROR"
      formatter: "json"
      filename: "/var/log/athena/prompt_system_error.log"
      maxBytes: 52428800  # 50MB
      backupCount: 5

  loggers:
    prompt_system:
      level: "INFO"
      handlers: ["console", "file", "error_file"]
      propagate: false

    core.legal_world_model:
      level: "DEBUG"
      handlers: ["console", "file"]
      propagate: false

    core.capabilities:
      level: "DEBUG"
      handlers: ["console", "file"]
      propagate: false

# ============================================================================
# 资源限制
# ============================================================================
resources:
  # 内存限制
  memory:
    max_usage_mb: 2048
    warning_threshold: 0.8
    gc_threshold: 0.85

  # CPU限制
  cpu:
    max_workers: 4
    warning_threshold: 0.9

  # 连接限制
  connections:
    max_concurrent_requests: 1000
    max_concurrent_per_user: 10
    max_queue_size: 100

  # 超时限制
  timeouts:
    request_timeout: 30
    scenario_identification_timeout: 5
    rule_retrieval_timeout: 10
    capability_invocation_timeout: 30
    prompt_generation_timeout: 10

# ============================================================================
# 功能开关
# ============================================================================
features:
  # 核心功能
  enable_scenario_identification: true
  enable_rule_retrieval: true
  enable_prompt_generation: true
  enable_capability_invocation: true

  # 优化功能
  enable_caching: true
  enable_metrics: true
  enable_tracing: false  # 默认关闭，按需开启
  enable_retry: true
  enable_connection_pooling: true

  # 实验性功能
  enable_llm_fallback: false
  enable_advanced_analytics: false

# ============================================================================
# 部署配置
# ============================================================================
deployment:
  # 容器配置
  container:
    image: "athena/dynamic-prompt-system:v2.0.0"
    replicas: 3
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "2000m"
        memory: "2Gi"

  # 滚动更新配置
  rolling_update:
    max_surge: 1
    max_unavailable: 0
    min_ready_seconds: 30

  # 健康检查
  liveness_probe:
    http_get:
      path: /health/live
      port: 8000
    initial_delay_seconds: 30
    period_seconds: 10
    timeout_seconds: 5
    failure_threshold: 3

  readiness_probe:
    http_get:
      path: /health/ready
      port: 8000
    initial_delay_seconds: 10
    period_seconds: 5
    timeout_seconds: 3
    failure_threshold: 3
