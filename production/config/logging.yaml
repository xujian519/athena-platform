# ============================================
# Athena工作平台 - 日志配置
# ============================================
# 版本: 2.0.0
# 更新日期: 2026-01-13
# ============================================

version: 1
disable_existing_loggers: false

# ============================================
# 日志格式定义
# ============================================
formatters:
  # 标准格式（控制台）
  standard:
    format: '%(asctime)s | %(levelname)-8s | %(name)s:%(lineno)d | %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

  # 详细格式（文件）
  detailed:
    format: '%(asctime)s | %(levelname)-8s | %(name)s:%(funcName)s:%(lineno)d | %(process)d | %(thread)d | %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

  # JSON格式（结构化日志）
  json:
    '()': 'pythonjsonlogger.jsonlogger.JsonFormatter'
    format: '%(asctime)s %(levelname)s %(name)s %(funcName)s %(lineno)d %(message)s'

  # 简洁格式（开发调试）
  simple:
    format: '[%(levelname)s] %(name)s: %(message)s'

# ============================================
# 日志处理器
# ============================================
handlers:
  # 控制台输出（标准格式）
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  # 控制台错误输出
  console_error:
    class: logging.StreamHandler
    level: ERROR
    formatter: standard
    stream: ext://sys.stderr

  # 应用日志文件（轮转）
  app_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: /var/log/athena/app.log
    maxBytes: 10485760  # 10MB
    backupCount: 10
    encoding: utf-8
    delay: true

  # 错误日志文件（轮转）
  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: /var/log/athena/error.log
    maxBytes: 10485760  # 10MB
    backupCount: 10
    encoding: utf-8
    delay: true

  # 安全日志文件（不轮转，单独管理）
  security_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: /var/log/athena/security.log
    maxBytes: 10485760  # 10MB
    backupCount: 10
    encoding: utf-8
    delay: true

  # 性能日志文件
  performance_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: /var/log/athena/performance.log
    maxBytes: 10485760  # 10MB
    backupCount: 10
    encoding: utf-8
    delay: true

  # API访问日志
  access_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filename: /var/log/athena/access.log
    maxBytes: 52428800  # 50MB
    backupCount: 5
    encoding: utf-8
    delay: true

# ============================================
# 日志记录器配置
# ============================================
loggers:
  # 核心模块日志
  core:
    level: INFO
    handlers: [console, app_file]
    propagate: false

  # 安全模块日志
  core.security:
    level: WARNING
    handlers: [console, security_file, error_file]
    propagate: false

  # API模块日志
  core.api:
    level: INFO
    handlers: [console, access_file]
    propagate: false

  # 意图识别日志
  core.intent:
    level: INFO
    handlers: [console, app_file]
    propagate: false

  # 存储模块日志
  core.storage:
    level: INFO
    handlers: [console, app_file]
    propagate: false

  # 智能体协作日志
  core.agent_collaboration:
    level: INFO
    handlers: [console, app_file]
    propagate: false

  # 性能监控日志
  core.monitoring:
    level: INFO
    handlers: [console, performance_file]
    propagate: false

  # 知识图谱日志
  core.knowledge_graph:
    level: INFO
    handlers: [console, app_file]
    propagate: false

  # 第三方库日志（降低级别）
  uvicorn:
    level: WARNING
    handlers: [console]
    propagate: false

  uvicorn.access:
    level: INFO
    handlers: [access_file]
    propagate: false

  uvicorn.error:
    level: ERROR
    handlers: [error_file]
    propagate: false

  sqlalchemy:
    level: WARNING
    handlers: [console]
    propagate: false

  httpx:
    level: WARNING
    handlers: [console]
    propagate: false

  qdrant_client:
    level: WARNING
    handlers: [console]
    propagate: false

  redis:
    level: WARNING
    handlers: [console]
    propagate: false

# ============================================
# 根日志记录器
# ============================================
root:
  level: INFO
  handlers: [console, app_file, error_file]

# ============================================
# 使用说明
# ============================================
#
# 1. 在代码中使用：
#    import logging
#    logger = logging.getLogger(__name__)
#    logger.info("信息日志")
#    logger.error("错误日志")
#
# 2. 加载配置：
#    import logging.config
#    import yaml
#
#    with open('config/logging.yaml', 'r') as f:
#        config = yaml.safe_load(f)
#        logging.config.dictConfig(config)
#
# 3. 日志级别：
#    DEBUG < INFO < WARNING < ERROR < CRITICAL
#
# 4. 日志轮转：
#    - 单个文件最大10MB
#    - 保留10个备份文件
#    - 总日志大小约110MB
#
# 5. 日志目录：
#    确保目录存在并可写：
#    sudo mkdir -p /var/log/athena
#    sudo chown $USER /var/log/athena
#    chmod 755 /var/log/athena
#
# ============================================
