# Athena工作平台Elasticsearch配置
# Elasticsearch Configuration

# 集群配置
cluster:
  name: "athena-cluster"
  nodes:
    - host: localhost
      port: 9200
      scheme: http

# 连接配置
connection:
  timeout: 30
  max_retries: 3
  retry_on_timeout: true

# 索引配置
indices:
  # 专利搜索索引
  patents:
    name: "patents"
    settings:
      number_of_shards: 3
      number_of_replicas: 1
      max_result_window: 50000
      analysis:
        analyzer:
          chinese_analyzer:
            type: "custom"
            tokenizer: "ik_max_word"
            filter: ["lowercase", "stop"]

    mappings:
      properties:
        patent_id:
          type: "keyword"
        title:
          type: "text"
          analyzer: "chinese_analyzer"
          fields:
            keyword:
              type: "keyword"
        abstract:
          type: "text"
          analyzer: "chinese_analyzer"
        applicant:
          type: "keyword"
        ipc_code:
          type: "keyword"
        application_date:
          type: "date"
          format: "yyyy-MM-dd"
        publication_date:
          type: "date"
          format: "yyyy-MM-dd"
        claims:
          type: "text"
          analyzer: "chinese_analyzer"
        embedding_vector:
          type: "dense_vector"
          dims: 768
          similarity: "cosine"

  # 知识图谱索引
  knowledge_graph:
    name: "knowledge_graph"
    settings:
      number_of_shards: 2
      number_of_replicas: 1

    mappings:
      properties:
        entity_id:
          type: "keyword"
        entity_type:
          type: "keyword"
        name:
          type: "text"
          analyzer: "chinese_analyzer"
        description:
          type: "text"
          analyzer: "chinese_analyzer"
        relations:
          type: "nested"
          properties:
            target_id:
              type: "keyword"
            relation_type:
              type: "keyword"
            weight:
              type: "float"

  # 日志索引
  logs:
    name: "athena-logs"
    settings:
      number_of_shards: 1
      number_of_replicas: 0
      index.lifecycle.name: "logs-policy"
      index.lifecycle.rollover_alias: "athena-logs"

# 搜索配置
search:
  # 默认搜索参数
  default_size: 20
  max_size: 100
  min_score: 0.5

  # 专利搜索配置
  patent_search:
    highlight:
      pre_tags: ["<mark>"]
      post_tags: ["</mark>"]
      fields:
        title: {}
        abstract: {fragment_size: 150}
        claims: {fragment_size: 200}

    # 搜索权重
    weights:
      title: 2.0
      abstract: 1.5
      claims: 1.0
      applicant: 0.8

# 性能配置
performance:
  # 批量操作
  bulk:
    size: 1000
    timeout: 60

  # 缓存配置
  cache:
    query_cache: true
    request_cache: true
    field_data_cache: true

# 监控配置
monitoring:
  # 指标收集
  metrics:
    enabled: true
    interval: 30

  # 慢查询日志
  slow_log:
    threshold: "1s"
    level: "info"

# 安全配置
security:
  enabled: false
  username: null
  password: null
  api_key: null