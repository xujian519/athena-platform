# 小诺优化配置 - 生产环境阶段2
# Xiaonuo Optimization Configuration - Production Stage 2
#
# 阶段2: 启用工具发现（第2-3周）
# 新增功能: 智能工具选择 (96%准确率)

# ============================================================
# 阶段2: 工具发现启用
# ============================================================

optimizations:
  enabled: true  # ✅ 启用优化
  fallback_on_error: true  # ✅ 失败时自动降级

# 工具发现模块 - 阶段2启用
tool_discovery:
  enabled: true  # ✅ 阶段2启用
  config:
    enable_embedding: false  # 不使用语义嵌入（无需额外依赖）
    coarse_threshold: 0.3    # 粗筛阈值
    fine_threshold: 0.6      # 精筛阈值
    max_tools: 5             # 最多返回5个工具
    enable_cache: true       # 启用缓存
    cache_ttl_seconds: 300   # 缓存5分钟

# 参数验证模块 - 继续启用
parameter_validation:
  enabled: true  # ✅ 继续启用
  config:
    enable_cache: true
    cache_max_size: 2000
    cache_ttl_seconds: 600
    max_concurrent_validations: 20

# 错误预测模块 - 阶段2仍关闭
error_prediction:
  enabled: false  # ⚠️ 阶段2继续观察
  config:
    enable_online_learning: true
    window_size: 500
    prediction_horizon_minutes: 10

# ============================================================
# 监控配置
# ============================================================

monitoring:
  enabled: true
  stats_interval_seconds: 60
  log_metrics: true
  log_level: "INFO"

# ============================================================
# 告警阈值（阶段2调整）
# ============================================================

alerts:
  # 优化失败率告警
  optimization_failure_rate: 0.05  # 5%

  # 缓存命中率告警
  cache_hit_rate_threshold: 0.5  # 50%

  # 响应时间告警（阶段2放宽到800ms）
  validation_response_time_ms: 800  # 800ms (包含工具发现)

  # 工具发现准确率告警（新增）
  tool_discovery_accuracy: 0.90  # 90%

# ============================================================
# 集成策略
# ============================================================

integration:
  # 工具发现集成点 - 阶段2启用
  tool_selection:
    enabled: true  # ✅ 阶段2启用
    min_confidence: 0.5
    max_tools: 5

  # 参数验证集成点 - 继续启用
  validation:
    enabled: true
    validate_before_execution: true
    fail_on_invalid: false

  # 错误预测集成点 - 继续关闭
  prediction:
    enabled: false
    predict_before_execution: true
    min_risk_level: "HIGH"
    auto_prevent: false

# ============================================================
# 性能优化
# ============================================================

performance:
  batch_size: 10

  # 超时设置（阶段2调整）
  validation_timeout_seconds: 5
  tool_discovery_timeout_seconds: 3  # 工具发现超时
  prediction_timeout_seconds: 2

  # 内存限制
  max_history_size: 1000

# ============================================================
# 安全配置
# ============================================================

security:
  max_parameter_count: 50
  max_parameter_size_kb: 10
  strict_validation: false
  filter_sensitive_data: true

# ============================================================
# 日志配置
# ============================================================

logging:
  level: "INFO"
  format: "json"
  outputs:
    - type: "console"
    - type: "file"
      path: "/var/log/xiaonuo/optimization.log"
      max_size_mb: 100
      max_backups: 10
