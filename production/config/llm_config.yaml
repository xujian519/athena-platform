# Athena平台LLM配置
#
# 说明：个人使用平台，已启用真实LLM

# LLM提供商配置
LLM_PROVIDER: "zhipuai"
LLM_MODEL: "glm-4-plus"
LLM_API_KEY: "9efe5766a7cd4bb687e40082ee4032b6.0mYTotbC7aRmoNCe"

# LLM功能开关
ENABLE_LLM_FOR_PLANNING: true    # ExplicitPlanner - 已启用 ✅
ENABLE_LLM_FOR_COMPLEXITY: true   # TaskComplexityAnalyzer - 需启用 ⚠️
ENABLE_LLM_FOR_ANALYSIS: false    # 其他分析功能 - 按需启用

# LLM性能配置
LLM_TIMEOUT: 60                  # 请求超时时间（秒）
LLM_MAX_RETRIES: 3               # 最大重试次数
LLM_TEMPERATURE: 0.7             # 生成温度（0-1，越高越随机）

# 成本控制
LLM_DAILY_BUDGET: 50             # 每日预算（元）
LLM_MAX_TOKENS_PER_REQUEST: 2000 # 每次请求最大token数

# 监控配置
ENABLE_LLM_MONITORING: true      # 启用LLM调用监控
LOG_LLM_REQUESTS: true           # 记录LLM请求日志
LOG_LLM_RESPONSES: false          # 记录LLM响应日志（可能包含敏感信息）

# 回退配置
LLM_FALLBACK_TO_MOCK: true       # LLM失败时是否回退到模拟模式
LLM_MOCK_MODE: false             # 强制使用模拟模式（用于测试）
