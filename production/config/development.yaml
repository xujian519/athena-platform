# Athena平台开发环境配置
# Development Environment Configuration

# 继承基础配置
extends: "base.yaml"

# ============================================================================
# 开发环境特定设置
# ============================================================================
app:
  environment: "development"
  debug: true
  log_level: "DEBUG"

# ============================================================================
# 服务器配置
# ============================================================================
server:
  reload: true
  workers: 1

# ============================================================================
# 数据库配置（开发环境）
# ============================================================================
database:
  postgres:
    echo: true
    pool_size: 5
    max_overflow: 10

# ============================================================================
# 开发工具配置
# ============================================================================
development:
  auto_reload: true
  debug_toolbar: true
  profiling: true
  seed_data: true
  demo_mode: true

# ============================================================================
# 安全配置（开发环境宽松设置）
# ============================================================================
security:
  jwt:
    access_token_expire_minutes: 1440  # 24小时
    refresh_token_expire_days: 30

# ============================================================================
# 日志配置（开发环境详细日志）
# ============================================================================
logging:
  level: "DEBUG"
  handlers:
    console:
      enabled: true
      level: "DEBUG"
    file:
      enabled: true
      level: "DEBUG"

# ============================================================================
# 功能开关（开发环境启用所有功能）
# ============================================================================
features:
  experimental_features:
    nlp_enhanced: true
    multimodal: true
    advanced_search: true

# ============================================================================
# 开发环境变量覆盖
# ============================================================================
env_overrides:
  DEBUG: "true"
  RELOAD: "true"
  LOG_LEVEL: "DEBUG"
  AUTH_REQUIRE_TOKEN: "false"
  API_DOCS_ENABLED: "true"
  HEALTH_CHECK_ENABLED: "true"
  CORS_ENABLED: "true"
  DEV_AUTO_RELOAD: "true"
  DEV_DEBUG_TOOLBAR: "true"
  DEV_PROFILING: "true"
  DEV_SEED_DATA: "true"
  DEV_DEMO_MODE: "true"