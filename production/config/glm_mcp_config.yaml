# 智谱GLM MCP服务配置
# Zhipu GLM MCP Servers Configuration
#
# 本配置文件用于集成智谱AI的四个MCP服务到Athena工作平台
# This config file integrates Zhipu AI's four MCP services into Athena Workspace

# GLM API密钥 (与平台配置一致)
# GLM API Key (consistent with platform config)
glm_api_key: "54a69837dfd643d8ab7a7a72756ef837.uWBCuChZSM4aDRyq"

# MCP服务配置
# MCP Services Configuration
mcp_servers:
  # 1. 视觉理解MCP (Vision Understanding MCP)
  zai_mcp_server:
    name: "zai-mcp-server"
    type: "stdio"
    command: "npx"
    args: ["-y", "@z_ai/mcp-server"]
    env:
      Z_AI_API_KEY: "${glm_api_key}"
      Z_AI_MODE: "ZHIPU"
    description: "智谱视觉理解MCP - 图像/视频分析、UI截图转换、OCR文字提取等"
    capabilities:
      - ui_to_artifact              # UI截图转代码/提示词/设计规范
      - extract_text_from_screenshot # OCR文字提取
      - diagnose_error_screenshot   # 错误截图诊断
      - understand_technical_diagram # 技术图纸理解
      - analyze_data_visualization  # 数据可视化分析
      - ui_diff_check               # UI差异对比
      - image_analysis              # 通用图像理解
      - video_analysis              # 视频场景分析
    status: "enabled"

  # 2. 联网搜索MCP (Web Search MCP)
  web_search_prime:
    name: "web-search-prime"
    type: "http"
    url: "https://open.bigmodel.cn/api/mcp/web_search_prime/mcp"
    headers:
      Authorization: "Bearer ${glm_api_key}"
    description: "智谱联网搜索MCP - 实时网络搜索、智能摘要"
    capabilities:
      - web_search          # 网络搜索
      - real_time_search    # 实时搜索
      - intelligent_summary # 智能摘要
    status: "enabled"

  # 3. 网页读取MCP (Web Reader MCP)
  web_reader:
    name: "web-reader"
    type: "http"
    url: "https://open.bigmodel.cn/api/mcp/web_reader/mcp"
    headers:
      Authorization: "Bearer ${glm_api_key}"
    description: "智谱网页读取MCP - 网页内容抓取、正文提取"
    capabilities:
      - web_reader          # 网页内容读取
      - content_extraction  # 内容提取
      - metadata_extraction # 元数据提取
      - link_list           # 链接列表
    status: "enabled"

  # 4. 开源仓库MCP (Open Source Repository MCP)
  zread:
    name: "zread"
    type: "http"
    url: "https://open.bigmodel.cn/api/mcp/zread/mcp"
    headers:
      Authorization: "Bearer ${glm_api_key}"
    description: "智谱开源仓库MCP - GitHub仓库文档、代码结构、文件内容读取"
    capabilities:
      - search_doc          # 搜索仓库文档
      - get_repo_structure  # 获取仓库结构
      - read_file           # 读取文件内容
    status: "enabled"

# 本平台集成配置
# Platform Integration Configuration
platform_integration:
  # 是否启用智谱MCP服务
  enable_glm_mcp: true

  # 优先级配置 (当平台有多个相似服务时)
  priority:
    # 视觉理解: 智谱MCP > 本地多模态
    vision_understanding: ["glm_mcp", "local_multimodal"]
    # 联网搜索: 智谱MCP > bing-cn > academic-search
    web_search: ["glm_mcp", "bing_cn", "academic_search"]
    # 网页读取: 智谱MCP > jina-ai > browser_automation
    web_reader: ["glm_mcp", "jina_ai", "browser_automation"]
    # GitHub: 智谱MCP > github-mcp-server
    github: ["glm_mcp", "github_mcp"]

  # 成本配置
  cost_config:
    glm_mcp_per_request: 0.05  # 每次请求成本(估算)
    local_per_hour: 0.5        # 本地处理每小时成本
    gpu_cost_per_hour: 1.0     # GPU使用成本

  # 性能配置
  performance_config:
    glm_mcp_avg_time: 5.0      # GLM MCP平均处理时间(秒)
    local_avg_time: 3.0        # 本地平均处理时间(秒)
    network_delay: 1.0         # 网络延迟

  # 使用策略
  usage_strategy:
    # 数据敏感度判断
    data_sensitivity:
      public: "use_glm_mcp"           # 公开数据使用GLM MCP
      internal: "use_local"            # 内部数据使用本地
      confidential: "use_local"        # 机密数据使用本地
      secret: "use_local_only"         # 绝密数据仅使用本地

    # 质量要求
    quality_requirement:
      high: "use_glm_mcp"              # 高质量要求使用GLM MCP
      medium: "use_hybrid"             # 中等质量要求混合使用
      low: "use_local"                 # 低质量要求使用本地

    # 批量处理
    batch_processing:
      small_batch: "<=5 items: use_glm_mcp"
      medium_batch: "6-20 items: use_hybrid"
      large_batch: ">20 items: use_local"

# 小诺统一工具调用接口(UTCI)集成
# Xiaonuo Unified Tool Call Interface Integration
xiaonuo_utci:
  # 工具注册
  tool_registration:
    # 视觉理解工具
    vision_tools:
      - name: "glm_ui_to_artifact"
        description: "UI截图转换为代码/提示词"
        mcp_server: "zai-mcp-server"
        mcp_tool: "ui_to_artifact"
        category: "multimodal"
      - name: "glm_ocr_extract"
        description: "OCR文字提取"
        mcp_server: "zai-mcp-server"
        mcp_tool: "extract_text_from_screenshot"
        category: "multimodal"
      - name: "glm_image_analysis"
        description: "通用图像理解"
        mcp_server: "zai-mcp-server"
        mcp_tool: "image_analysis"
        category: "multimodal"
      - name: "glm_video_analysis"
        description: "视频场景分析"
        mcp_server: "zai-mcp-server"
        mcp_tool: "video_analysis"
        category: "multimodal"

    # 搜索工具
    search_tools:
      - name: "glm_web_search"
        description: "智谱联网搜索"
        mcp_server: "web-search-prime"
        mcp_tool: "web_search"
        category: "search"
      - name: "glm_realtime_search"
        description: "实时网络搜索"
        mcp_server: "web-search-prime"
        mcp_tool: "realtime_search"
        category: "search"

    # 网页读取工具
    web_reader_tools:
      - name: "glm_web_reader"
        description: "智谱网页读取"
        mcp_server: "web-reader"
        mcp_tool: "webReader"
        category: "web_scraping"

    # GitHub工具
    github_tools:
      - name: "glm_search_repo_doc"
        description: "搜索GitHub仓库文档"
        mcp_server: "zread"
        mcp_tool: "search_doc"
        category: "github"
      - name: "glm_get_repo_structure"
        description: "获取仓库结构"
        mcp_server: "zread"
        mcp_tool: "get_repo_structure"
        category: "github"
      - name: "glm_read_github_file"
        description: "读取GitHub文件"
        mcp_server: "zread"
        mcp_tool: "read_file"
        category: "github"

# 监控配置
# Monitoring Configuration
monitoring:
  # 启用健康检查
  enable_health_check: true

  # 健康检查间隔(秒)
  health_check_interval: 300

  # 性能监控
  performance_monitoring:
    enable: true
    metrics:
      - request_count
      - response_time
      - success_rate
      - error_rate
      - cost_tracking

  # 告警配置
  alerting:
    enable: true
    thresholds:
      error_rate: 0.05           # 错误率超过5%告警
      response_time: 10.0        # 响应时间超过10秒告警
      cost_daily: 100.0          # 日成本超过100元告警

# 日志配置
# Logging Configuration
logging:
  level: "INFO"
  format: "json"
  file_path: "logs/glm_mcp_integration.log"
  max_size: "100MB"
  max_backups: 10
  compression: "gzip"

# 文档链接
# Documentation Links
documentation:
  vision_mcp: "https://docs.bigmodel.cn/cn/coding-plan/mcp/vision-mcp-server"
  web_search: "https://docs.bigmodel.cn/cn/guide/tools/web-search#mcp-server"
  web_reader: "https://docs.bigmodel.cn/cn/coding-plan/mcp/reader-mcp-server"
  github_repo: "https://docs.bigmodel.cn/cn/coding-plan/mcp/zread-mcp-server"
  quick_start: "https://docs.bigmodel.cn/cn/coding-plan/mcp"
