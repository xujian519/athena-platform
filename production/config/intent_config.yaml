# 意图识别服务配置文件
# Intent Recognition Service Configuration
# Version: 1.0.0
# Created: 2025-01-17

# 全局配置
global:
  # 项目根目录（支持环境变量覆盖）
  project_root: "${PROJECT_ROOT:-/Users/xujian/Athena工作平台}"

  # 环境类型: development, staging, production
  environment: "${INTENT_ENV:-development}"

  # 日志级别: DEBUG, INFO, WARNING, ERROR
  log_level: "${LOG_LEVEL:-INFO}"

  # 是否启用性能统计
  enable_stats: true

  # 是否启用缓存
  enable_cache: true

# 模型配置
models:
  # BGE-M3 模型配置 (MPS优化版本)
  bge_m3:
    # 模型路径（支持环境变量）
    model_path: "${BGE_MODEL_PATH:-${global.project_root}/models/converted/BAAI/bge-m3}"

    # 设备类型: auto, cuda, mps, cpu
    # MPS (Metal Performance Shaders) - Apple Silicon GPU加速
    device: "${DEVICE:-mps}"

    # 批处理大小
    batch_size: 32

    # 最大序列长度
    max_length: 512

    # 是否使用半精度（FP16）
    # MPS推荐使用FP16以获得最佳性能和内存效率
    use_fp16: true

    # 缓存目录
    cache_dir: "${TRANSFORMERS_CACHE:-${global.project_root}/cache/models}"

  # MPS优化配置
  mps_optimization:
    # 启用MPS优化
    enabled: true

    # 内存碎片整理（MPS推荐）
    enable_memory_efficient_attention: true

    # 编译优化（加速推理）
    compile_model: false

  # BERT 模型配置
  bert:
    model_name: "${BERT_MODEL_NAME:-bert-base-chinese}"

    device: "${DEVICE:-auto}"

    max_length: 512

    cache_dir: "${TRANSFORMERS_CACHE:-${global.project_root}/cache/models}"

# 缓存配置
cache:
  # 嵌入向量缓存
  embedding:
    # 缓存类型: memory, redis, file
    type: memory

    # 内存缓存最大条目数
    max_size: 1000

    # 缓存TTL（秒）
    ttl: 3600

    # Redis配置（当type=redis时使用）
    redis:
      host: "${REDIS_HOST:-localhost}"
      port: "${REDIS_PORT:-6379}"
      db: 0
      password: "${REDIS_PASSWORD:-}"

  # 语义相似度缓存
  semantic:
    type: memory

    max_size: 500

    ttl: 1800

# 意图分类配置
intents:
  # 默认意图
  default_intent: "GENERAL_CHAT"

  # 意图类别定义
  categories:
    # 专利相关意图
    patent:
      - PATENT_SEARCH          # 专利检索
      - PATENT_ANALYSIS        # 专利分析
      - PATENT_COMPARISON      # 专利对比
      - PATENT_DRAFTING        # 专利撰写
      - PATENT_TRANSLATION     # 专利翻译

    # 法律相关意图
    legal:
      - LEGAL_CONSULTING       # 法律咨询
      - LEGAL_RESEARCH         # 法律检索
      - CONTRACT_ANALYSIS      # 合同分析

    # 代码相关意图
    code:
      - CODE_GENERATION        # 代码生成
      - CODE_REVIEW            # 代码审查
      - CODE_DEBUGGING         # 代码调试
      - CODE_REFCTORING        # 代码重构

    # 通用意图
    general:
      - GENERAL_CHAT           # 日常聊天
      - QUESTION_ANSWERING     # 问答
      - TASK_MANAGEMENT        # 任务管理
      - KNOWLEDGE_QUERY        # 知识查询

# 性能配置
performance:
  # 超时配置（秒）
  timeouts:
    model_load: 300           # 模型加载超时
    single_inference: 10      # 单次推理超时
    batch_inference: 30       # 批量推理超时
    total_request: 60         # 总请求超时

  # 并发配置
  concurrency:
    max_workers: 4            # 最大工作线程数
    max_batch_size: 32        # 最大批处理大小

  # 内存管理
  memory:
    enable_gc: true           # 启用垃圾回收
    gc_threshold: 1000        # GC触发阈值（调用次数）
    clear_cache_interval: 600 # 缓存清理间隔（秒）

# 监控配置
monitoring:
  # 是否启用Prometheus指标
  enable_metrics: false

  # 指标端口
  metrics_port: 9091

  # 统计信息保留时间（秒）
  stats_retention: 86400

# 开发配置
development:
  # 是否启用调试模式
  debug: false

  # 是否输出详细日志
  verbose: true

  # 是否保存中间结果
  save_intermediate: false

  # 中间结果保存路径
  intermediate_path: "${global.project_root}/data/intent_intermediate"

# 测试配置
testing:
  # 测试数据路径
  test_data_path: "${global.project_root}/tests/data/intent"

  # Mock模式（不加载真实模型）
  mock_mode: false

  # 断言阈值
  confidence_threshold: 0.6

# 安全配置
security:
  # 输入长度限制
  max_input_length: 10000

  # 是否启用输入清洗
  enable_sanitization: true

  # 允许的文件扩展名（用于文件输入）
  allowed_extensions:
    - ".txt"
    - ".json"
    - ".md"

# 集成配置
integration:
  # 依赖服务配置
  services:
    # 嵌入服务
    embedding:
      enabled: true
      endpoint: "${EMBEDDING_SERVICE_ENDPOINT:-}"
      timeout: 10

    # NLP服务
    nlp:
      enabled: true
      endpoint: "${NLP_SERVICE_ENDPOINT:-}"
      timeout: 5

    # 知识图谱服务
    knowledge_graph:
      enabled: false
      endpoint: "${KG_SERVICE_ENDPOINT:-}"
      timeout: 15
