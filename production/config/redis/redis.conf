# Redis 配置文件
# Redis Configuration for Athena Platform

# 绑定地址
bind 0.0.0.0

# 端口
port 6379

# 守护进程模式
daemonize no

# 持久化配置
save 900 1
save 300 10
save 60 10000

# RDB配置
dbfilename dump.rdb
dir /data

# AOF配置
appendonly yes
appendfilename appendonly.aof
appendfsync everysec

# 内存管理
maxmemory 2gb
maxmemory-policy allkeys-lru

# 日志配置
loglevel notice
logfile ""

# 数据库数量
databases 16

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 客户端配置
timeout 0
tcp-keepalive 300

# 安全配置
# requirepass your_password_here
