# Athena平台生产环境配置
# Production Environment Configuration

# 继承基础配置
extends: "base.yaml"

# ============================================================================
# 生产环境特定设置
# ============================================================================
app:
  environment: "production"
  debug: false
  log_level: "INFO"

# ============================================================================
# 服务器配置（生产环境优化）
# ============================================================================
server:
  reload: false
  workers: 4

# 生产环境
production:
  workers: 4
  worker_class: "uvicorn.workers.UvicornWorker"

# ============================================================================
# 数据库配置（生产环境优化）
# ============================================================================
database:
  postgres:
    echo: false
    pool_size: 50
    max_overflow: 100

# ============================================================================
# 安全配置（生产环境强化）
# ============================================================================
security:
  jwt:
    access_token_expire_minutes: 30
    refresh_token_expire_days: 7

# 生产环境
production:
  ssl_enabled: true
  ssl_cert_path: "${SSL_CERT_PATH:/etc/ssl/certs/athena.crt}"
  ssl_key_path: "${SSL_KEY_PATH:/etc/ssl/private/athena.key}"

# ============================================================================
# 日志配置（生产环境精简日志）
# ============================================================================
logging:
  level: "INFO"
  handlers:
    console:
      enabled: true
      level: "INFO"
    file:
      enabled: true
      level: "INFO"

# ============================================================================
# 监控配置（生产环境启用）
# ============================================================================
monitoring:
  prometheus:
    enabled: true

  # 告警配置
  production:
    alerting:
      enabled: true
      webhook_url: "${ALERT_WEBHOOK_URL:}"
      email_enabled: true
      email_smtp_server: "${SMTP_SERVER:smtp.gmail.com}"
      email_from: "${ALERT_EMAIL_FROM:alerts@athena.com}"
      email_to: "${ALERT_EMAIL_TO:admin@athena.com}"

# ============================================================================
# 缓存配置（生产环境优化）
# ============================================================================
cache:
  application:
    enabled: true
    ttl: 7200  # 2小时
    max_size: 10000

  model:
    enabled: true
    ttl: 604800  # 7天
    max_size: 1000

# ============================================================================
# 功能开关（生产环境保守设置）
# ============================================================================
features:
  experimental_features:
    nlp_enhanced: false  # 生产环境默认关闭实验功能
    multimodal: false
    advanced_search: true

  # 双模型协同推理
  dual_model_reasoning:
    enabled: true
    primary_model: "glm-4.7"
    validator_model: "deepseek-chat"  # 使用DeepSeek-V3（快速版）而非deepseek-reasoner
    confidence_threshold: 0.8

    # 数学类
    cross_validation_for:
      - math_reasoning
      - sequence_problems
      - complex_proof

      # 物理类
      - physics_mechanics
      - physics_electromagnetism
      - physics_optics
      - physics_thermodynamics
      - physics_modern

      # 化学类
      - chemistry_reaction
      - chemistry_equilibrium
      - chemistry_organic
      - chemistry_electrochemistry
      - chemistry_calculation

      # 生物类
      - biology_genetics
      - biology_physiology
      - biology_ecology
      - biology_molecular
      - biology_evolution

      # 综合理科
      - science_reasoning
      - science_calculation
      - science_analysis