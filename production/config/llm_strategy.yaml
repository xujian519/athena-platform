# Athena统一LLM层 - 模型选择策略配置
# Model Selection Strategy Configuration

version: "1.0.0"
description: "定义不同任务类型的模型选择策略和偏好设置"

# 默认策略
default_strategy: "balanced"

# 策略定义
strategies:
  # 成本优化策略 - 优先使用低成本/免费模型
  cost_optimized:
    description: "成本优化策略"
    prefer_local: true
    max_cost_per_request: 0.1
    weights:
      cost: 0.40
      quality: 0.30
      performance: 0.30

  # 性能优化策略 - 优先使用低延迟模型
  performance_optimized:
    description: "性能优化策略"
    max_latency_ms: 2000
    weights:
      cost: 0.20
      quality: 0.30
      performance: 0.50

  # 质量优化策略 - 优先使用高质量模型
  quality_optimized:
    description: "质量优化策略"
    min_quality_score: 0.9
    weights:
      cost: 0.15
      quality: 0.60
      performance: 0.25

  # 平衡策略 - 综合考虑成本、性能、质量
  balanced:
    description: "平衡策略"
    weights:
      cost: 0.30
      quality: 0.35
      performance: 0.35

  # 本地优先策略 - 优先使用本地模型
  local_first:
    description: "本地优先策略"
    prefer_local: true
    local_bonus: 0.30
    weights:
      cost: 0.20
      quality: 0.30
      performance: 0.20

# 任务类型映射
task_mapping:
  # 推理类任务 - 使用质量优化策略（基于实际测试优化）
  novelty_analysis:
    strategy: "quality_optimized"
    preferred_models: ["glm-4-plus", "qwen-max", "deepseek-reasoner"]
    enable_thinking: true
    max_tokens: 4000
    # 添加复杂度阈值
    complexity_threshold: 0.6  # 高复杂度使用glm-4-plus，低复杂度使用qwen-plus

  creativity_analysis:
    strategy: "quality_optimized"
    preferred_models: ["glm-4-plus", "qwen-max", "deepseek-reasoner"]
    enable_thinking: true
    max_tokens: 4000
    complexity_threshold: 0.7

  invalidation_analysis:
    strategy: "quality_optimized"
    preferred_models: ["glm-4-plus", "qwen-max", "deepseek-reasoner"]
    enable_thinking: true
    max_tokens: 4000
    complexity_threshold: 0.6

  oa_response:
    strategy: "quality_optimized"
    preferred_models: ["glm-4-plus", "qwen-max"]
    enable_thinking: true
    max_tokens: 5000
    complexity_threshold: 0.5

  # 日常对话 - 使用成本优化策略（优化后）
  general_chat:
    strategy: "cost_optimized"
    preferred_models: ["qwen-plus", "qwen2.5-7b-instruct-gguf", "deepseek-chat"]
    max_tokens: 1000

  conversation:
    strategy: "cost_optimized"
    preferred_models: ["qwen-plus", "qwen2.5-7b-instruct-gguf", "deepseek-chat"]
    max_tokens: 1000

  simple_chat:
    strategy: "cost_optimized"
    preferred_models: ["qwen2.5-7b-instruct-gguf"]
    max_tokens: 500

  # 专利搜索和分析 - 使用平衡策略（优化后）
  patent_search:
    strategy: "balanced"
    preferred_models: ["glm-4-flash", "qwen-plus", "deepseek-chat"]
    max_tokens: 2000

  tech_analysis:
    strategy: "balanced"
    preferred_models: ["glm-4-flash", "qwen-plus", "glm-4-plus"]
    max_tokens: 3000

  # 数学推理 - 使用质量优化
  math_reasoning:
    strategy: "quality_optimized"
    preferred_models: ["deepseek-reasoner", "glm-4-plus"]
    enable_thinking: true
    max_tokens: 3000

  # 简单问答 - 使用本地优先
  simple_qa:
    strategy: "local_first"
    preferred_models: ["qwen2.5-7b-instruct-gguf"]
    max_tokens: 500

  # 起草任务 - 使用本地模型
  draft:
    strategy: "cost_optimized"
    preferred_models: ["qwen2.5-7b-instruct-gguf"]
    max_tokens: 2000

# 成本控制
cost_control:
  # 每日预算限制（元）
  daily_budget: 10.0
  # 单次请求最大成本（元）
  max_cost_per_request: 0.5
  # 超预算时的策略
  over_budget_strategy: "fallback_to_local"
  # 成本告警阈值（元）
  cost_alert_threshold: 5.0

# 性能配置（基于实际测试数据优化）
performance:
  # 最大延迟阈值（毫秒）- 推理任务调整到30秒
  max_latency_ms:
    default: 10000
    reasoning_tasks: 30000  # 推理任务（实测21秒）
    chat_tasks: 5000        # 对话任务
  # 超时重试次数
  max_retries: 2
  # 请求超时时间（秒）
  request_timeout: 120  # API调用超时
  # 目标响应时间（秒）
  target_latency:
    simple: 2.0     # 简单任务
    medium: 10.0    # 中等任务
    complex: 25.0   # 复杂任务

# 质量控制
quality:
  # 最小质量分数阈值
  min_quality_score: 0.7
  # 启用交叉验证的任务类型
  enable_cross_validation:
    - "novelty_analysis"
    - "creativity_analysis"
  # 交叉验证模型
  cross_validation_models:
    primary: "glm-4-plus"
    secondary: "deepseek-reasoner"

# 降级策略
fallback:
  # 主模型失败时的降级顺序
  fallback_order:
    - "glm-4-plus"
    - "deepseek-reasoner"
    - "glm-4-flash"
    - "deepseek-chat"
    - "qwen2.5-7b-instruct-gguf"
  # 降级到本地模型的阈值
  fallback_to_local_threshold: 3
  # 全部失败时的错误消息
  all_failed_message: "抱歉，所有模型均不可用，请稍后重试。"

# 缓存配置
cache:
  # 启用响应缓存
  enabled: true
  # 缓存过期时间（秒）
  ttl: 3600
  # 缓存最大条目数
  max_entries: 1000
  # 需要缓存的任务类型
  cacheable_tasks:
    - "simple_qa"
    - "general_chat"
    - "patent_search"

# 监控配置
monitoring:
  # 启用性能监控
  enabled: true
  # 记录每个请求的详细信息
  log_requests: true
  # 统计窗口大小（请求数）
  stats_window: 100
  # 启用成本追踪
  track_cost: true
  # 启用延迟追踪
  track_latency: true
