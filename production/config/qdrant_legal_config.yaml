# Qdrant配置 - 法律系统优化版
service:
  http_port: 6333
  grpc_port: 6334
  max_request_size_mb: 32

storage:
  # 性能优化配置
  performance:
    max_search_threads: 8
    max_searches_per_request: 10
    search_batch_size: 100

  # 内存配置
  optimizers:
    default_segment_number: 4
    indexing_threshold: 20000
    max_optimization_threads: 2
    cleanup_interval_sec: 10

  # 向量存储配置
  vector:
    size: 1024  # 统一为1024维
    distance: Cosine
    storage_type: MemoryMapped

  # 索引配置
  index:
    hnsw:
      m: 16
      ef_construct: 200
      full_scan_threshold: 10000

  # 快照配置
  snapshots:
    path: /snapshots
    creation_interval_sec: 3600  # 每小时创建快照
    retention_days: 7

logging:
  level: INFO
  format: json

cluster:
  enabled: false  # 单实例部署

service:
  telemetry_disabled: false
  enable_cors: true
  cors_allow_origin: "*"

security:
  enable_api_key: false  # 开发环境暂时关闭