# =============================================================================
# Athena工作平台 - 生产环境配置 v2.0
# =============================================================================

[general]
# 环境标识
environment = "production"
version = "2.0.0"
deployment_date = "2025-12-30"

# 项目路径
project_root = "/Users/xujian/Athena工作平台"

# =============================================================================
# 服务配置
# =============================================================================

[services.xiaonuo]
name = "小诺统一网关"
enabled = true
port = 8100
host = "0.0.0.0"
workers = 1
log_level = "INFO"
reload = false

# 健康检查
[services.xiaonuo.health_check]
enabled = true
endpoint = "/health"
interval_seconds = 30
timeout_seconds = 5
failure_threshold = 3

[services.xiaona]
name = "小娜专利专家"
enabled = true
port = 8001
host = "0.0.0.0"
workers = 1
log_level = "INFO"

# =============================================================================
# 数据库配置
# =============================================================================

[databases.postgresql]
enabled = true
host = "localhost"
port = 5432
database = "athena_prod"
pool_size = 10
max_overflow = 20

[databases.redis]
enabled = true
host = "localhost"
port = 6379
db = 0
max_connections = 50

[databases.qdrant]
enabled = true
host = "localhost"
port = 6333
collection_name = "athena_vectors"

# =============================================================================
# 会话管理配置
# =============================================================================

[session]
# 会话超时时间（秒）
timeout = 3600

# 每个会话最大消息数
max_messages_per_session = 100

# 会话数据库路径
database_path = "/Users/xujian/Athena工作平台/data/sessions/session_memory.db"

# 自动清理间隔（秒）
cleanup_interval = 300

# =============================================================================
# 性能优化配置
# =============================================================================

[performance]
# MPS加速（Apple Silicon GPU）
mps_enabled = true

# 批处理大小
batch_size = 16

# 最大并发请求数
max_concurrent_requests = 100

# 请求超时（秒）
request_timeout = 30

# =============================================================================
# BERT模型配置
# =============================================================================

[models.bert]
# 模型路径
model_path = "/Users/xujian/Athena工作平台/models/bert-intent-classifier-v2"

# 设备配置
device = "mps"  # mps, cpu, cuda

# 推理配置
max_length = 128
batch_size = 16

# =============================================================================
# 日志配置
# =============================================================================

[logging]
level = "INFO"
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

[logging.files]
# 主日志
main = "/Users/xujian/Athena工作平台/logs/athena.log"

# 服务日志
xiaonuo = "/Users/xujian/Athena工作平台/logs/xiaonuo.log"
xiaona = "/Users/xujian/Athena工作平台/logs/xiaona.log"

# 部署日志
deploy = "/Users/xujian/Athena工作平台/logs/deploy_v2.log"

# 日志轮转
[logging.rotation]
max_bytes = 10485760  # 10MB
backup_count = 5

# =============================================================================
# 监控配置
# =============================================================================

[monitoring]
# Prometheus metrics
prometheus_enabled = true
prometheus_port = 9090

# 健康检查端点
health_check_enabled = true

# 性能指标收集
metrics_collection = true

# =============================================================================
# 安全配置
# =============================================================================

[security]
# CORS配置
cors_origins = ["*"]
cors_methods = ["GET", "POST", "OPTIONS"]
cors_headers = ["*"]

# 速率限制
rate_limit_enabled = true
rate_limit_requests = 100
rate_limit_window = 60  # 秒

# =============================================================================
# 智能体配置
# =============================================================================

[agents.xiaonuo]
name = "小诺·双鱼座"
role = "平台总调度官"
description = "Athena平台的智能体协调中心"

[agents.xiaona]
name = "小娜·天秤女神"
role = "专利法律专家"
description = "专业的知识产权法律服务提供者"

[agents.yunxi]
name = "云熙"
role = "IP管理系统"
description = "案卷全生命周期管理"

[agents.xiaochen]
name = "小宸"
role = "自媒体专家"
description = "内容创作、社交媒体运营"

# =============================================================================
# 功能开关
# =============================================================================

[features]
# 对话式参数收集
conversational_param_collection = true

# 智能拒绝处理
smart_rejection = true

# 会话记忆持久化
session_memory = true

# BERT意图分类
bert_intent_classifier = true

# 参数验证
parameter_validation = true

# =============================================================================
# 部署配置
# =============================================================================

[deployment]
# 零停机部署
zero_downtime = true

# 自动回滚
auto_rollback = true

# 健康检查超时
health_check_timeout = 30

# 备份保留天数
backup_retention_days = 7
