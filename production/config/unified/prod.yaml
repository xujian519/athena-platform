# ========================================
# Athena平台 - 生产环境配置
# Production Environment Configuration
# ========================================
# 说明: 生产环境专用配置，覆盖base.yaml中的值
#       敏感信息应从环境变量读取，不应硬编码
# 创建时间: 2025-12-29
# ========================================

# ========== 环境标识 ==========
platform:
  environment: "production"
  debug: false

# ========== 日志配置 ==========
logging:
  level: "${LOG_LEVEL:WARNING}"  # 生产环境只记录警告和错误
  format: "structured"  # 结构化日志，便于日志聚合
  output:
    - type: "file"
      level: "INFO"
      path: "${LOG_PATH:/var/log/athena}/athena.log"
      max_size: "500MB"
      backup_count: 30

# ========== API服务配置 ==========
api:
  host: "${API_HOST:0.0.0.0}"
  port: "${API_PORT:8000}"
  workers: "${API_WORKERS:8}"  # 生产环境使用更多worker
  reload: false
  
  cors:
    origins: "${CORS_ORIGINS:https://athena.example.com}"  # 生产环境限制来源

# ========== 数据库配置 ==========
database:
  postgres:
    host: "${POSTGRES_HOST}"
    port: "${POSTGRES_PORT:5432}"
    user: "${POSTGRES_USER}"
    password: "${POSTGRES_PASSWORD}"  # 从环境变量读取
    database: "${POSTGRES_DB}"
    pool_size: "${POSTGRES_POOL_SIZE:20}"
    max_overflow: "${POSTGRES_MAX_OVERFLOW:40}"
    pool_pre_ping: true
    pool_recycle: 3600
    
  sqlite:
    path: "${SQLITE_PATH:/var/lib/athena/knowledge_graph.db}"
    
  qdrant:
    host: "${QDRANT_HOST}"
    port: "${QDRANT_PORT:6333}"
    collection: "${QDRANT_COLLECTION}"
    timeout: 30
    prefer_grpc: true

# ========== Redis配置 ==========
redis:
  host: "${REDIS_HOST}"
  port: "${REDIS_PORT:6379}"
  password: "${REDIS_PASSWORD}"  # 从环境变量读取
  db: "${REDIS_DB:0}"
  max_connections: "${REDIS_MAX_CONNECTIONS:100}"
  
  cache:
    default_ttl: 3600  # 生产环境1小时缓存

# ========== Nebula图数据库配置 ==========
nebula:
  host: "${NEBULA_HOST}"
  port: "${NEBULA_PORT:9669}"
  user: "${NEBULA_USER}"
  password: "${NEBULA_PASSWORD}"
  space: "${NEBULA_SPACE}"

# ========== AI模型配置 ==========
models:
  embedding:
    model: "${EMBEDDING_MODEL:bge-m3}"
    device: "${EMBEDDING_DEVICE:cuda}"  # 生产环境优先使用GPU
    batch_size: "${EMBEDDING_BATCH_SIZE:64}"
    dimension: "${EMBEDDING_DIMENSION:1024}"
    max_seq_length: "${EMBEDDING_MAX_SEQ_LENGTH:8192}"
    
  llm:
    provider: "${LLM_PROVIDER:openai}"
    model: "${LLM_MODEL:gpt-4}"
    api_key: "${LLM_API_KEY}"  # 从环境变量读取
    temperature: "${LLM_TEMPERATURE:0.5}"
    
  nlp:
    device: "${NLP_DEVICE:cuda}"

# ========== 任务队列配置 ==========
tasks:
  celery:
    broker_url: "${CELERY_BROKER_URL}"
    result_backend: "${CELERY_RESULT_BACKEND}"
    worker_prefetch_multiplier: 4
    worker_max_tasks_per_child: 1000

# ========== 存储配置 ==========
storage:
  local:
    data_path: "${STORAGE_LOCAL_PATH:/var/lib/athena/data}"
    temp_path: "${STORAGE_TEMP_PATH:/var/lib/athena/temp}"
    
  external:
    enabled: "${EXTERNAL_STORAGE_ENABLED:true}"
    provider: "${EXTERNAL_STORAGE_PROVIDER}"
    endpoint: "${EXTERNAL_STORAGE_ENDPOINT}"
    access_key: "${EXTERNAL_STORAGE_ACCESS_KEY}"
    secret_key: "${EXTERNAL_STORAGE_SECRET_KEY}"
    bucket: "${EXTERNAL_STORAGE_BUCKET}"

# ========== 安全配置 ==========
security:
  jwt:
    secret: "${JWT_SECRET}"  # 从环境变量读取，必须设置强密码
    algorithm: "${JWT_ALGORITHM:HS256}"
    expire_minutes: "${JWT_EXPIRE_MINUTES:1440}"
    
  rate_limit:
    enabled: true
    requests_per_minute: "${RATE_LIMIT_RPM:100}"
    burst: "${RATE_LIMIT_BURST:20}"

# ========== 监控配置 ==========
monitoring:
  prometheus:
    enabled: true
    port: "${PROMETHEUS_PORT:9090}"
    
  performance:
    enabled: true
    sample_rate: "${PERFORMANCE_SAMPLE_RATE:0.01}"  # 生产环境1%采样

# ========== 功能开关 ==========
features:
  enabled_modules:
    - "core.agent"
    - "core.nlp"
    - "core.search"
    - "core.vector"
    - "services.patent"
    - "services.legal"
  
  experimental:
    new_search_algorithm: false  # 生产环境关闭实验性功能
    ai_optimization: true
    auto_scaling: true
