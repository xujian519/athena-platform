# Athena工作平台 - 内存告警配置
# Memory Alerts Configuration

# =============================================================================
# 告警规则配置
# =============================================================================

alerts:
  # 高内存使用告警
  high_memory_usage:
    enabled: true
    severity: warning
    threshold_mb: 1000
    critical_threshold_mb: 1500
    message: "内存使用超过阈值"
    recommendations:
      - "检查是否有缓存未设置过期时间"
      - "检查是否有全局变量持续增长"
      - "检查是否有文件/数据库连接未关闭"
      - "考虑增加内存限制或重启服务"

  # 内存增长告警
  memory_growth:
    enabled: true
    severity: warning
    threshold_percent: 15
    critical_threshold_percent: 50
    min_duration_minutes: 5
    message: "内存持续增长超过阈值"
    recommendations:
      - "检查是否有循环引用"
      - "检查是否有大对象未释放"
      - "使用内存分析工具(如memory_profiler)定位问题"
      - "考虑使用weakref打破循环引用"

  # GC对象增长告警
  gc_objects_growth:
    enabled: true
    severity: warning
    threshold_percent: 20
    min_duration_minutes: 5
    message: "GC对象数量持续增长"
    recommendations:
      - "检查是否有对象创建后未释放"
      - "检查是否有缓存未设置淘汰策略"
      - "检查是否有事件监听器未取消"
      - "考虑使用objgraph分析对象引用"

  # GC对象数量告警
  high_gc_objects:
    enabled: true
    severity: warning
    threshold_count: 100000
    critical_threshold_count: 200000
    message: "GC对象数量过多"
    recommendations:
      - "执行垃圾回收: gc.collect()"
      - "检查对象引用链"
      - "优化缓存策略"

# =============================================================================
# 通知渠道配置
# =============================================================================

notification:
  # 告警冷却时间（分钟）
  cooldown_minutes: 30

  # 启用的通知渠道
  channels:
    - log        # 日志记录（始终启用）
    # - slack     # Slack通知（需配置webhook）
    # - email     # 邮件通知（需配置SMTP）
    # - webhook   # Webhook通知（需配置URL）

  # Slack配置
  slack:
    enabled: false
    webhook_url: "${SLACK_WEBHOOK_URL}"
    channel: "#alerts"
    username: "Athena Monitor"
    icon_emoji": ":warning:"

  # 邮件配置
  email:
    enabled: false
    smtp_host: "smtp.example.com"
    smtp_port: 587
    smtp_user: "${SMTP_USER}"
    smtp_password: "${SMTP_PASSWORD}"
    from_address: "athena@example.com"
    to_addresses:
      - "admin@example.com"
      - "ops@example.com"

  # Webhook配置
  webhook:
    enabled: false
    url: "${ALERT_WEBHOOK_URL}"
    method: "POST"
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer ${WEBHOOK_TOKEN}"

# =============================================================================
# 监控配置
# =============================================================================

monitoring:
  # 检查间隔（秒）
  check_interval: 60

  # 快照历史大小
  snapshot_history_size: 1440  # 保留24小时（每分钟一个）

  # 自动垃圾回收
  auto_gc: true

  # Prometheus导出
  prometheus:
    enabled: true
    port: 9090
    metrics_path: /metrics

# =============================================================================
# 环境特定配置
# =============================================================================

environments:
  # 生产环境
  production:
    memory_threshold_mb: 1000
    growth_threshold_percent: 15
    gc_objects_threshold: 100000
    check_interval: 60
    alert_cooldown_minutes: 30

  # 预发布环境
  staging:
    memory_threshold_mb: 1500
    growth_threshold_percent: 20
    gc_objects_threshold: 150000
    check_interval: 120
    alert_cooldown_minutes: 60

  # 开发环境
  development:
    memory_threshold_mb: 2000
    growth_threshold_percent: 30
    gc_objects_threshold: 200000
    check_interval: 300
    alert_cooldown_minutes: 120

# =============================================================================
# Grafana面板配置
# =============================================================================

grafana:
  dashboard_id: "athena-memory-monitoring"
  title: "Athena内存监控"
  panels:
    - title: "内存使用量"
      type: graph
      targets:
        - prometheus_query: 'athena_memory_usage_mb{service="athena"}'
      legend: true
      yaxes:
        - format: bytes
          label: 内存

    - title: "内存使用百分比"
      type: graph
      targets:
        - prometheus_query: 'athena_memory_percent{service="athena"}'
      legend: true
      yaxes:
        - format: percent
          label: 百分比

    - title: "GC对象数量"
      type: graph
      targets:
        - prometheus_query: 'athena_gc_objects_count{service="athena"}'
      legend: true
      yaxes:
        - format: short
          label: 对象数

    - title: "内存告警"
      type: stat
      targets:
        - prometheus_query: 'sum(rate(athena_memory_alerts_total{service="athena"}[5m]))'
      legend: false
      thresholds:
        - value: 0
          color: green
        - value: 1
          color: yellow
        - value: 5
          color: red

# =============================================================================
# Prometheus告警规则
# =============================================================================

prometheus_alerts:
  - name: AthenaHighMemoryUsage
    expr: athena_memory_usage_mb{service="athena"} > 1000
    for: 5m
    labels:
      severity: warning
      team: platform
    annotations:
      summary: "Athena内存使用过高"
      description: "实例 {{ $labels.instance }} 内存使用 {{ $value }}MB 超过阈值 1000MB"

  - name: AthenaCriticalMemoryUsage
    expr: athena_memory_usage_mb{service="athena"} > 1500
    for: 2m
    labels:
      severity: critical
      team: platform
    annotations:
      summary: "Athena内存使用严重过高"
      description: "实例 {{ $labels.instance }} 内存使用 {{ $value }}MB 超过严重阈值 1500MB"

  - name: AthenaMemoryGrowth
    expr: |
      rate(athena_memory_usage_mb{service="athena"}[15m]) > 10
    for: 10m
    labels:
      severity: warning
      team: platform
    annotations:
      summary: "Athena内存持续增长"
      description: "实例 {{ $labels.instance }} 内存增长速率 {{ $value }}MB/分钟"

  - name: AthenaHighGCObjects
    expr: athena_gc_objects_count{service="athena"} > 100000
    for: 5m
    labels:
      severity: warning
      team: platform
    annotations:
      summary: "Athena GC对象数量过多"
      description: "实例 {{ $labels.instance }} GC对象数 {{ $value }} 超过阈值 100000"

# =============================================================================
# 告警升级策略
# =============================================================================

escalation:
  # 告警升级规则
  rules:
    - condition: "severity == 'critical'"
      actions:
        - type: notify_immediate
          channels: [slack, email, webhook]

    - condition: "severity == 'warning' AND duration_minutes > 30"
      actions:
        - type: escalate
          to_severity: critical
          channels: [slack, email]

    - condition: "alert_count_last_hour > 10"
      actions:
        - type: notify_management
          message: "频繁内存告警，需要立即关注"

  # 告警抑制规则
  silences:
    - name: "maintenance_window"
      matchers:
        - name: severity
          value: warning
      start_time: "02:00"
      end_time: "04:00"
      comment: "维护窗口期间抑制warning级别告警"

# =============================================================================
# 修复建议自动化
# =============================================================================

auto_remediation:
  enabled: false  # 谨慎启用自动修复

  actions:
    - name: force_garbage_collection
      trigger: "gc_objects_count > 150000"
      action: "gc.collect()"
      description: "强制执行垃圾回收"

    - name: clear_caches
      trigger: "memory_growth_percent > 30 AND duration_minutes > 10"
      action: "clear_all_caches()"
      description: "清空所有缓存"

    - name: restart_service
      trigger: "memory_mb > 2000"
      action: "systemctl restart athena"
      description: "重启服务（需谨慎）"
