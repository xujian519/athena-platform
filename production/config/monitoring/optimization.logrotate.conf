##############################################################################
# Athena优化系统日志轮转配置
# Log Rotation Configuration for Optimization System
##############################################################################

/Users/xujian/Athena工作平台/logs/optimization*.log {
    # 每天轮转
    daily

    # 保留30天的日志
    rotate 30

    # 如果日志文件不存在，不报错
    missingok

    # 如果日志文件为空，不轮转
    notifempty

    # 压缩旧日志
    compress

    # 延迟压缩（保留最近的日志未压缩）
    delaycompress

    # 轮转后创建新日志文件
    create 0644 xujian staff

    # 添加日期后缀
    dateext

    # 日期格式
    dateformat -%Y%m%d-%s

    # 日志文件大小限制（超过100MB立即轮转）
    maxsize 100M

    # 保留脚本
    sharedscripts
    postrotate
        # 通知服务重新打开日志文件
        if [ -f /Users/xujian/Athena工作平台/logs/optimization_service.pid ]; then
            # 发送重新打开日志信号（如果服务支持）
            # kill -USR1 $(cat /Users/xujian/Athena工作平台/logs/optimization_service.pid) 2>/dev/null || true
            :
        fi
    endscript
}
