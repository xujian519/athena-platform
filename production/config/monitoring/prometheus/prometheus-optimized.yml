# Prometheus配置文件 (优化版)
# Prometheus Configuration for Athena Platform (Optimized)
#
# 修复问题:
# - 添加XiaoNuo统一网关监控
# - 添加核心服务监控 (统一身份认证、YunPat代理、自主控制等)
# - 添加MCP服务器监控
# - 更新服务名称与实际容器名称匹配
#
# 使用方法:
#   替换 config/monitoring/prometheus/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: "Athena工作平台"
    owner: "Athena & 小诺"

# 告警规则文件 (相对于config/monitoring/prometheus/目录)
rule_files:
  - "../alert_rules.yml"
  - "rules/athena_business_metrics.yml"
  - "rules/prompt_system_alerts.yml"
  - "../prometheus-router-rules.yml"

# 监控配置
scrape_configs:
  # ==================== Prometheus自身监控 ====================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ==================== 基础设施层监控 ====================
  # PostgreSQL监控
  - job_name: 'postgres'
    static_configs:
      - targets: ['host.docker.internal:5432']
    scrape_interval: 30s

  # Redis监控
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s

  # Qdrant监控
  - job_name: 'qdrant'
    static_configs:
      - targets: ['athena-qdrant:6333']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Neo4j监控
  - job_name: 'neo4j'
    static_configs:
      - targets: ['athena-neo4j:2004']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # ==================== 核心服务层监控 ====================
  # API网关监控
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['athena-api-gateway:8080']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # 统一身份认证监控
  - job_name: 'unified-identity'
    static_configs:
      - targets: ['athena-unified-identity:8010']
    metrics_path: '/health'
    scrape_interval: 30s

  # YunPat专利代理监控
  - job_name: 'yunpat-agent'
    static_configs:
      - targets: ['athena-yunpat-agent:8020']
    metrics_path: '/api/health'
    scrape_interval: 30s

  # 浏览器自动化监控
  - job_name: 'browser-automation'
    static_configs:
      - targets: ['athena-browser-automation:8030']
    metrics_path: '/health'
    scrape_interval: 30s

  # 自主控制监控
  - job_name: 'autonomous-control'
    static_configs:
      - targets: ['athena-autonomous-control:8040']
    metrics_path: '/health'
    scrape_interval: 30s

  # 专利分析监控
  - job_name: 'patent-analysis'
    static_configs:
      - targets: ['athena-patent-analysis:8050']
    metrics_path: '/health'
    scrape_interval: 30s

  # 专利搜索监控
  - job_name: 'patent-search'
    static_configs:
      - targets: ['athena-patent-search:8060']
    metrics_path: '/health'
    scrape_interval: 30s

  # 知识图谱服务监控
  - job_name: 'knowledge-graph'
    static_configs:
      - targets: ['athena-knowledge-graph-service:8070']
    metrics_path: '/health'
    scrape_interval: 30s

  # JoyAgent优化监控
  - job_name: 'joyagent-optimization'
    static_configs:
      - targets: ['athena-joyagent-optimization:8035']
    metrics_path: '/api/v1/health'
    scrape_interval: 30s

  # ==================== 应用层监控 ====================
  # XiaoNuo统一网关监控
  - job_name: 'xiaonuo-gateway'
    static_configs:
      - targets: ['athena-xiaonuo-gateway:8100']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # 意图识别监控
  - job_name: 'intent-recognition'
    static_configs:
      - targets: ['athena-intent-recognition:8002']
    metrics_path: '/health'
    scrape_interval: 30s

  # 可视化工具监控
  - job_name: 'visualization-tools'
    static_configs:
      - targets: ['athena-visualization-tools:8091']
    metrics_path: '/health'
    scrape_interval: 30s

  # ==================== MCP服务器层监控 ====================
  # MCP服务器监控组
  - job_name: 'mcp-servers'
    static_configs:
      - targets:
          - 'athena-academic-search-mcp:8200'
          - 'athena-patent-search-mcp:8201'
          - 'athena-patent-downloader-mcp:8202'
          - 'athena-jina-ai-mcp:8203'
          - 'athena-chrome-mcp:8205'
          - 'athena-gaode-mcp:8206'
          - 'athena-github-mcp:8207'
          - 'athena-google-patents-meta-mcp:8208'
    metrics_path: '/health'
    scrape_interval: 30s

  # ==================== 系统监控 ====================
  # Node Exporter (系统指标)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['athena-node-exporter:9100']
    scrape_interval: 30s

  # cAdvisor (容器指标)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['athena-cadvisor:8081']
    scrape_interval: 30s

  # ==================== 遗留服务监控 (兼容性保留) ====================
  # 注意: 以下服务可能不存在，仅用于兼容性
  # 如果服务不可用，Prometheus会自动跳过
  - job_name: 'patent-service-legacy'
    static_configs:
      - targets: ['patent-service:8001']
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'user-service-legacy'
    static_configs:
      - targets: ['user-service:8002']
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'search-service-legacy'
    static_configs:
      - targets: ['search-service:8003']
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'crawler-service-legacy'
    static_configs:
      - targets: ['crawler-service:8300']
    metrics_path: '/metrics'
    scrape_interval: 30s

# ==================== 告警管理器配置 ====================
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'athena-alertmanager:9093'

