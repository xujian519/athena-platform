# Athena平台业务指标告警规则
# Business Metrics Alert Rules for Athena Platform
#
# 包含以下业务指标:
# - XiaoNuo网关业务指标
# - Agent协作指标
# - 意图识别指标
# - 向量搜索性能
# - 知识图谱查询
# - MCP服务器健康度
# - 工具调用成功率

groups:
  # ==================== XiaoNuo网关业务指标 ====================
  - name: xiaonuo_gateway_metrics
    rules:
      - alert: XiaoNuoGatewayDown
        expr: up{job="xiaonuo-gateway"} == 0
        for: 1m
        labels:
          severity: critical
          service: xiaonuo
        annotations:
          summary: "小诺网关已停止"
          description: "小诺统一网关({{ $labels.instance }})已宕机超过1分钟"

      - alert: XiaoNuoHighErrorRate
        expr: |
          rate(xiaonuo_errors_total[5m]) /
          rate(xiaonuo_requests_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: xiaonuo
        annotations:
          summary: "小诺网关错误率过高"
          description: "小诺网关错误率已达到 {{ $value | humanizePercentage }}"

      - alert: XiaoNuoHighLatency
        expr: |
          histogram_quantile(0.95,
            rate(xiaonuo_request_duration_seconds_bucket[5m])
          ) > 3
        for: 5m
        labels:
          severity: warning
          service: xiaonuo
        annotations:
          summary: "小诺网关响应缓慢"
          description: "小诺网关P95延迟已达到 {{ $value }}秒"

      - alert: XiaoNuoLowSuccessRate
        expr: |
          rate(xiaonuo_requests_success_total[5m]) /
          rate(xiaonuo_requests_total[5m]) < 0.9
        for: 5m
        labels:
          severity: warning
          service: xiaonuo
        annotations:
          summary: "小诺网关成功率过低"
          description: "小诺网关成功率已降至 {{ $value | humanizePercentage }}"

  # ==================== Agent协作指标 ====================
  - name: agent_collaboration_metrics
    rules:
      - alert: AgentCoordinationFailure
        expr: |
          rate(agent_collaboration_failures_total[5m]) /
          rate(agent_collaboration_attempts_total[5m]) > 0.2
        for: 5m
        labels:
          severity: warning
          service: agent-coordination
        annotations:
          summary: "Agent协作失败率过高"
          description: "Agent协作失败率已达到 {{ $value | humanizePercentage }}"

      - alert: AgentTaskTimeout
        expr: |
          rate(agent_task_timeout_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: agent-coordination
        annotations:
          summary: "Agent任务超时"
          description: "Agent任务超时率已达到 {{ $value }}/秒"

      - alert: AgentQueueBacklog
        expr: agent_queue_length > 100
        for: 10m
        labels:
          severity: warning
          service: agent-coordination
        annotations:
          summary: "Agent任务队列积压"
          description: "Agent任务队列积压已达到 {{ $value }} 个任务"

  # ==================== 意图识别指标 ====================
  - name: intent_recognition_metrics
    rules:
      - alert: IntentRecognitionDown
        expr: up{job="intent-recognition"} == 0
        for: 1m
        labels:
          severity: critical
          service: intent-recognition
        annotations:
          summary: "意图识别服务已停止"
          description: "意图识别服务已宕机"

      - alert: IntentRecognitionLowAccuracy
        expr: intent_accuracy < 0.85
        for: 10m
        labels:
          severity: warning
          service: intent-recognition
        annotations:
          summary: "意图识别准确率过低"
          description: "意图识别准确率已降至 {{ $value | humanizePercentage }}"

      - alert: IntentRecognitionHighLatency
        expr: |
          histogram_quantile(0.95,
            rate(intent_recognition_duration_seconds_bucket[5m])
          ) > 2
        for: 5m
        labels:
          severity: warning
          service: intent-recognition
        annotations:
          summary: "意图识别响应缓慢"
          description: "意图识别P95延迟已达到 {{ $value }}秒"

  # ==================== 向量搜索性能 ====================
  - name: vector_search_metrics
    rules:
      - alert: VectorSearchSlow
        expr: |
          histogram_quantile(0.95,
            rate(vector_search_duration_seconds_bucket[5m])
          ) > 3
        for: 5m
        labels:
          severity: warning
          service: vector-search
        annotations:
          summary: "向量搜索响应缓慢"
          description: "向量搜索P95延迟已达到 {{ $value }}秒"

      - alert: VectorSearchFailure
        expr: |
          rate(vector_search_failures_total[5m]) /
          rate(vector_search_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: vector-search
        annotations:
          summary: "向量搜索失败率过高"
          description: "向量搜索失败率已达到 {{ $value | humanizePercentage }}"

      - alert: QdrantStorageHigh
        expr: |
          qdrant_collections_size_bytes /
          qdrant_collections_max_size_bytes > 0.9
        for: 10m
        labels:
          severity: warning
          service: qdrant
        annotations:
          summary: "Qdrant存储使用率过高"
          description: "Qdrant存储使用率已达到 {{ $value | humanizePercentage }}"

  # ==================== 知识图谱查询 ====================
  - name: knowledge_graph_metrics
    rules:
      - alert: KnowledgeGraphDown
        expr: up{job="knowledge-graph"} == 0
        for: 1m
        labels:
          severity: critical
          service: knowledge-graph
        annotations:
          summary: "知识图谱服务已停止"
          description: "知识图谱服务已宕机"

      - alert: KnowledgeGraphSlowQuery
        expr: |
          histogram_quantile(0.95,
            rate(graph_query_duration_seconds_bucket[5m])
          ) > 5
        for: 5m
        labels:
          severity: warning
          service: knowledge-graph
        annotations:
          summary: "知识图谱查询缓慢"
          description: "知识图谱查询P95延迟已达到 {{ $value }}秒"

      - alert: Neo4jStorageHigh
        expr: |
          neo4j_database_size_bytes /
          neo4j_database_max_size_bytes > 0.85
        for: 10m
        labels:
          severity: warning
          service: neo4j
        annotations:
          summary: "Neo4j存储使用率过高"
          description: "Neo4j存储使用率已达到 {{ $value | humanizePercentage }}"

  # ==================== MCP服务器健康度 ====================
  - name: mcp_servers_health
    rules:
      - alert: MCPServerDown
        expr: up{job="mcp-servers"} == 0
        for: 2m
        labels:
          severity: warning
          service: mcp-server
        annotations:
          summary: "MCP服务器已停止"
          description: "MCP服务器 {{ $labels.instance }} 已停止响应"

      - alert: MultipleMCPServersDown
        expr: |
          count(up{job="mcp-servers"} == 0) > 2
        for: 2m
        labels:
          severity: critical
          service: mcp-server
        annotations:
          summary: "多个MCP服务器已停止"
          description: "{{ $value }} 个MCP服务器已停止响应"

      - alert: MCPHighErrorRate
        expr: |
          rate(mcp_errors_total[5m]) /
          rate(mcp_requests_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: mcp-server
        annotations:
          summary: "MCP服务器错误率过高"
          description: "MCP服务器错误率已达到 {{ $value | humanizePercentage }}"

  # ==================== 工具调用成功率 ====================
  - name: tool_execution_metrics
    rules:
      - alert: ToolExecutionFailure
        expr: |
          rate(tool_execution_failures_total[5m]) /
          rate(tool_execution_attempts_total[5m]) > 0.15
        for: 5m
        labels:
          severity: warning
          service: tool-execution
        annotations:
          summary: "工具执行失败率过高"
          description: "工具执行失败率已达到 {{ $value | humanizePercentage }}"

      - alert: BrowserAutomationDown
        expr: up{job="browser-automation"} == 0
        for: 2m
        labels:
          severity: warning
          service: browser-automation
        annotations:
          summary: "浏览器自动化服务已停止"
          description: "浏览器自动化服务已宕机"

  # ==================== YunPat专利代理指标 ====================
  - name: yunpat_agent_metrics
    rules:
      - alert: YunPatAgentDown
        expr: up{job="yunpat-agent"} == 0
        for: 1m
        labels:
          severity: critical
          service: yunpat-agent
        annotations:
          summary: "YunPat专利代理已停止"
          description: "YunPat专利代理服务已宕机"

      - alert: PatentProcessingSlow
        expr: |
          histogram_quantile(0.95,
            rate(patent_processing_duration_seconds_bucket[5m])
          ) > 30
        for: 10m
        labels:
          severity: warning
          service: yunpat-agent
        annotations:
          summary: "专利处理速度过慢"
          description: "专利处理P95延迟已达到 {{ $value }}秒"

      - alert: PatentQueueBacklog
        expr: patent_processing_queue_length > 500
        for: 10m
        labels:
          severity: warning
          service: yunpat-agent
        annotations:
          summary: "专利处理队列积压"
          description: "专利处理队列积压已达到 {{ $value }} 个"

  # ==================== 缓存性能指标 ====================
  - name: cache_performance_metrics
    rules:
      - alert: CacheHitRateLow
        expr: |
          rate(cache_hits_total[5m]) /
          rate(cache_requests_total[5m]) < 0.7
        for: 10m
        labels:
          severity: warning
          service: cache
        annotations:
          summary: "缓存命中率过低"
          description: "缓存命中率已降至 {{ $value | humanizePercentage }}"

      - alert: RedisMemoryHigh
        expr: |
          redis_memory_used_bytes /
          redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis内存使用率过高"
          description: "Redis内存使用率已达到 {{ $value | humanizePercentage }}"

  # ==================== 多模态处理指标 ====================
  - name: multimodal_processing_metrics
    rules:
      - alert: MultimodalProcessingSlow
        expr: |
          histogram_quantile(0.95,
            rate(multimodal_processing_duration_seconds_bucket[5m])
          ) > 10
        for: 5m
        labels:
          severity: warning
          service: multimodal-processing
        annotations:
          summary: "多模态处理速度过慢"
          description: "多模态处理P95延迟已达到 {{ $value }}秒"

      - alert: MultimodalFailure
        expr: |
          rate(multimodal_processing_failures_total[5m]) /
          rate(multimodal_processing_attempts_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: multimodal-processing
        annotations:
          summary: "多模态处理失败率过高"
          description: "多模态处理失败率已达到 {{ $value | humanizePercentage }}"

  # ==================== 平台整体健康度 ====================
  - name: platform_health
    interval: 30s
    rules:
      - alert: PlatformCriticalServicesDown
        expr: |
          count(
            up{job=~"xiaonuo-gateway|yunpat-agent|intent-recognition"} == 0
          ) > 0
        for: 1m
        labels:
          severity: critical
          service: platform
        annotations:
          summary: "平台关键服务已停止"
          description: "{{ $value }} 个关键服务已停止，平台功能可能受影响"

      - alert: PlatformDegraded
        expr: |
          count(
            up{job=~"xiaonuo-gateway|yunpat-agent|intent-recognition|knowledge-graph|autonomous-control"} == 0
          ) > 1
        for: 2m
        labels:
          severity: warning
          service: platform
        annotations:
          summary: "平台性能下降"
          description: "{{ $value }} 个服务已停止，平台性能下降"
