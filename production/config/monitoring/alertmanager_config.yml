# AlertManager配置 - OA答复系统
# AlertManager Configuration - Office Action Response System
#
# 定义告警路由和通知配置
# Define alert routing and notification configuration
#
# 作者: 小诺·双鱼公主
# 创建时间: 2026-01-26
# 版本: v1.0.0

global:
  # 全局配置
  resolve_timeout: 5m
  # SMTP配置 (用于邮件通知)
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alertmanager@athena-platform.local'
  smtp_auth_username: 'alertmanager'
  smtp_auth_password: 'changeme'

# 模板配置
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# 路由配置
route:
  # 默认接收器
  receiver: 'default'
  # 分组等待时间
  group_wait: 10s
  # 分组间隔时间
  group_interval: 10s
  # 重复告警间隔时间
  repeat_interval: 12h
  # 路由树
  routes:
    # 严重级别告警 - 立即通知
    - match:
        severity: critical
      receiver: 'critical_alerts'
      group_wait: 10s
      repeat_interval: 5m
      continue: true

    # 警告级别告警 - 汇总通知
    - match:
        severity: warning
      receiver: 'warning_alerts'
      group_wait: 30s
      repeat_interval: 30m

    # OA答复系统特定路由
    - match:
        service: oa_response_system
      receiver: 'oa_response_team'
      group_by: ['alertname', 'service']
      routes:
        # 性能相关告警
        - match_re:
            alertname: '.*Latency.*'
          receiver: 'oa_response_performance'
        # 质量相关告警
        - match_re:
            alertname: '.*Quality.*'
          receiver: 'oa_response_quality'
        # 可用性相关告警
        - match_re:
            alertname: '.*Down|.*Unavailable.*'
          receiver: 'oa_response_availability'

# 接收器配置
receivers:
  # 默认接收器
  - name: 'default'
    email_configs:
      - to: 'team@athena-platform.local'
        headers:
          Subject: '[Athena] {{ .GroupLabels.alertname }}'

  # 严重告警接收器 - 多通道通知
  - name: 'critical_alerts'
    email_configs:
      - to: 'oncall@athena-platform.local'
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
    # 可选: 添加Slack、微信等通知渠道
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
    #     channel: '#critical-alerts'
    #     title: '[CRITICAL] {{ .GroupLabels.alertname }}'

  # 警告告警接收器
  - name: 'warning_alerts'
    email_configs:
      - to: 'team@athena-platform.local'
        headers:
          Subject: '[WARNING] {{ .GroupLabels.alertname }}'

  # OA答复团队接收器
  - name: 'oa_response_team'
    email_configs:
      - to: 'oa-response-team@athena-platform.local'
        headers:
          Subject: '[OA答复系统] {{ .GroupLabels.alertname }}'

  # OA答复性能团队
  - name: 'oa_response_performance'
    email_configs:
      - to: 'oa-response-perf@athena-platform.local'
        headers:
          Subject: '[性能告警] {{ .GroupLabels.alertname }}'

  # OA答复质量团队
  - name: 'oa_response_quality'
    email_configs:
      - to: 'oa-response-quality@athena-platform.local'
        headers:
          Subject: '[质量告警] {{ .GroupLabels.alertname }}'

  # OA答复可用性团队
  - name: 'oa_response_availability'
    email_configs:
      - to: 'oa-response-oncall@athena-platform.local'
        headers:
          Subject: '[可用性告警] {{ .GroupLabels.alertname }}'

# 抑制规则
inhibit_rules:
  # 如果服务已经下线，抑制该服务的所有其他告警
  - source_match:
      service: oa_response_system
      alertname: 'OAResponseServiceDown'
    target_match_re:
      alertname: '.*'
    equal: ['service']
    target_match_re:
      alertname: 'OAResponseServiceDown'

  # 如果有严重错误率告警，抑制警告级别的错误率告警
  - source_match:
      severity: critical
      alertname: 'OAResponseCriticalErrorRate'
    target_match:
      severity: warning
      alertname: 'OAResponseHighErrorRate'

  # 如果有严重延迟告警，抑制警告级别的延迟告警
  - source_match:
      severity: critical
      alertname: 'OAResponseVeryHighLatency'
    target_match:
      severity: warning
      alertname: 'OAResponseHighLatency'

# 时间间隔配置 (用于限制告警频率)
time_intervals:
  - name: 'business_hours'
    time_intervals:
      - times:
          - start_time: '09:00'
            end_time: '18:00'
        weekdays: ['monday:friday']

  - name: 'off_hours'
    time_intervals:
      - times:
          - start_time: '18:00'
            end_time: '09:00'
        weekdays: ['monday:friday']
      - weekdays: ['saturday', 'sunday']

