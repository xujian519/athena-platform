# Prometheus配置 - OA答复系统监控
# Prometheus Configuration - Office Action Response System Monitoring
#
# 完整的Prometheus配置示例
# Complete Prometheus configuration example
#
# 作者: 小诺·双鱼公主
# 创建时间: 2026-01-26
# 版本: v1.0.0

global:
  scrape_interval: 15s  # 抓取间隔
  evaluation_interval: 15s  # 规则评估间隔
  external_labels:
    cluster: 'athena-platform'
    environment: 'production'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'localhost:9093'
      timeout: 10s
      api_version: v2

# 告警规则文件
rule_files:
  - '/etc/prometheus/alert_rules/*.yml'
  # 或者使用相对路径
  # - 'alert_rules/*.yml'

# 抓取配置
scrape_configs:
  # ===== OA答复系统主服务 =====
  - job_name: 'oa_response_system'
    static_configs:
      - targets:
          - 'localhost:8020'  # OA答复系统服务端口
    scrape_interval: 15s
    metrics_path: '/metrics'
    honor_labels: true
    honor_timestamps: true

  # ===== Prometheus自监控 =====
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'

  # ===== Node Exporter (系统指标) =====
  - job_name: 'node_exporter'
    static_configs:
      - targets:
          - 'localhost:9100'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # ===== cAdvisor (容器指标) =====
  - job_name: 'cadvisor'
    static_configs:
      - targets:
          - 'localhost:8080'
    honor_labels: true

  # ===== Redis监控 =====
  - job_name: 'redis'
    static_configs:
      - targets:
          - 'localhost:9121'

  # ===== PostgreSQL监控 =====
  - job_name: 'postgres'
    static_configs:
      - targets:
          - 'localhost:9187'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'postgresql:5432'

  # ===== Qdrant监控 =====
  - job_name: 'qdrant'
    static_configs:
      - targets:
          - 'localhost:6333'
    metrics_path: '/metrics'

  # ===== Grafana监控 =====
  - job_name: 'grafana'
    static_configs:
      - targets:
          - 'localhost:3000'

# 存储配置
storage:
  tsdb:
    path: /var/lib/prometheus/
    retention.time: 15d  # 保留15天数据
    retention.size: 50GB  # 最大存储50GB

# 远程写入配置 (可选)
# remote_write:
#   - url: "http://remote-storage/api/v1/write"
#     queue_config:
#       capacity: 10000
#       max_shards: 200
#       min_shards: 1
#       max_samples_per_send: 5000
#       batch_send_deadline: 5s
#       min_backoff: 30ms
#       max_backoff: 100ms

# 追踪配置 (用于性能分析)
tracing:
  endpoint: "localhost:4318"  # OTel Collector
  client_type: grpc
  headers:
    X-Prometheus-Remote-Write-Version: "0.1.0"

# HTTP配置
