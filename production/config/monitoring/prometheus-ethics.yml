# Prometheus配置文件 - Athena伦理框架监控
# Prometheus Configuration for Athena Ethics Framework Monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'athena-platform'
    environment: 'production'

# 告警规则配置
rule_files:
  - "ethics_alerts.yml"

# 抓取配置
scrape_configs:
  # 伦理框架指标（使用宿主机IP访问）
  - job_name: 'athena-ethics-framework'
    static_configs:
      - targets:
        - '192.168.0.105:9091'
        labels:
          service: 'ethics-framework'
          component: 'monitoring'
    scrape_interval: 5s
    scrape_timeout: 5s

  # 可选：如果使用其他监控端点
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['localhost:9100']

# 告警管理器配置（可选）
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'localhost:9093'
