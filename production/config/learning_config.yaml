# 学习与适应模块配置文件
# Learning & Adaptation Module Configuration
# 版本: 1.0.0
# 更新时间: 2026-01-24

# ==================== 基本配置 ====================
module:
  name: "Learning & Adaptation Module"
  version: "1.0.0"
  environment: "production"  # development | staging | production
  debug: false
  log_level: "INFO"  # DEBUG | INFO | WARNING | ERROR | CRITICAL

# ==================== 数据库配置 ====================
database:
  # 主数据库 (PostgreSQL)
  primary:
    host: "${DB_HOST:-localhost}"
    port: "${DB_PORT:-5432}"
    name: "${DB_NAME:-athena}"
    user: "${DB_USER:-athena}"
    password: "${DB_PASSWORD:-athena_password}"
    pool_size: 20
    max_overflow: 10
    pool_timeout: 30
    pool_recycle: 3600

  # Redis缓存
  redis:
    host: "${REDIS_HOST:-localhost}"
    port: "${REDIS_PORT:-6379}"
    db: "${REDIS_DB:-0}"
    password: "${REDIS_PASSWORD:-}"
    max_connections: 50
    socket_timeout: 5
    socket_connect_timeout: 5

  # 向量数据库 (Qdrant)
  vector_db:
    host: "${QDRANT_HOST:-localhost}"
    port: "${QDRANT_PORT:-6333}"
    collection_name: "learning_embeddings"
    vector_size: 768
    distance: "Cosine"

# ==================== 学习引擎配置 ====================
learning_engine:
  # 学习参数
  parameters:
    learning_rate: 0.001
    batch_size: 32
    epochs: 100
    early_stopping_patience: 10
    validation_split: 0.2

  # 模型存储
  model_storage:
    path: "${DATA_DIR:-./data}/learning/models"
    save_on_improvement: true
    save_interval: 5  # 每5个epoch保存一次
    keep_best_n: 3  # 保留最好的3个模型

  # 经验回放
  experience_replay:
    buffer_size: 10000
    sampling_strategy: "prioritized"  # uniform | prioritized
    prioritize_alpha: 0.6
    prioritize_beta: 0.4
    prioritize_beta_increment: 0.001

# ==================== 在线学习配置 ====================
online_learning:
  # 灾难遗忘防护
  forgetting_protection:
    enabled: true
    ewc_lambda: 1000.0
    ewc_gamma: 0.9
    memory_replay_size: 1000

  # 增量学习
  incremental:
    window_size: 100
    update_frequency: 10
    adaptation_rate: 0.01

  # 性能监控
  monitoring:
    performance_threshold: 0.8
    forgetting_threshold: 0.2
    alert_on_degradation: true

# ==================== 强化学习配置 ====================
reinforcement_learning:
  # Q-Learning参数
  q_learning:
    learning_rate: 0.1
    discount_factor: 0.95
    epsilon: 1.0
    epsilon_min: 0.01
    epsilon_decay: 0.995

  # 奖励函数
  rewards:
    positive_feedback_weight: 1.0
    negative_feedback_weight: -1.0
    completion_bonus: 0.5
    error_penalty: -0.3
    response_time_penalty: -0.01

  # 训练配置
  training:
    episodes: 1000
    max_steps_per_episode: 100
    update_frequency: 10
    target_network_update: 100

# ==================== 元学习配置 ====================
meta_learning:
  # MAML参数
  maml:
    inner_learning_rate: 0.01
    outer_learning_rate: 0.001
    inner_iterations: 5
    meta_batch_size: 32

  # 任务采样
  task_sampling:
    num_tasks: 10
    shots: 5  # 5-shot learning
    ways: 3  # 3-way classification

# ==================== API配置 ====================
api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  reload: false

  # 中间件
  middleware:
    cors_enabled: true
    cors_origins: ["*"]  # 生产环境应限制具体域名
    cors_methods: ["GET", "POST", "PUT", "DELETE"]
    cors_headers: ["*"]

    # 限流
    rate_limit:
      enabled: true
      requests_per_minute: 60
      burst: 10

    # 认证
    authentication:
      enabled: true
      type: "jwt"  # jwt | api_key
      jwt_secret: "${JWT_SECRET:-your-secret-key}"
      jwt_algorithm: "HS256"
      jwt_expiration: 3600  # 秒

  # 超时配置
  timeouts:
    request_timeout: 30  # 秒
    learning_task_timeout: 300  # 5分钟

# ==================== 监控和告警配置 ====================
monitoring:
  # Prometheus指标
  prometheus:
    enabled: true
    port: 9090
    path: "/metrics"

  # 日志聚合
  logging:
    level: "INFO"
    format: "json"  # json | text
    output: ["stdout", "file"]
    file_path: "${LOG_DIR:-./logs}/learning.log"
    rotation: "daily"
    retention: "30d"

  # 告警规则
  alerts:
    enabled: true
    channels: ["log", "webhook"]

    # 告警阈值
    thresholds:
      error_rate: 0.05  # 5%
      response_time_p95: 2000  # 2秒
      memory_usage: 0.85  # 85%
      cpu_usage: 0.80  # 80%
      disk_usage: 0.90  # 90%

    # Webhook配置
    webhook:
      url: "${ALERT_WEBHOOK_URL:-}"
      method: "POST"
      headers:
        Content-Type: "application/json"

# ==================== 资源限制配置 ====================
resources:
  # 内存限制
  memory:
    model_cache_size: 1073741824  # 1GB
    buffer_cache_size: 536870912  # 512MB
    max_allocation: 2147483648  # 2GB

  # CPU限制
  cpu:
    max_workers: 4
    learning_threads: 2
    io_threads: 2

  # GPU配置 (可选)
  gpu:
    enabled: false
    device_ids: [0]
    memory_fraction: 0.8

# ==================== 安全配置 ====================
security:
  # 输入验证
  input_validation:
    max_request_size: 10485760  # 10MB
    max_batch_size: 1000
    sanitize_input: true

  # 敏感数据保护
  sensitive_data:
    encrypt_at_rest: true
    encrypt_in_transit: true
    log_masking: true  # 日志中遮蔽敏感信息

  # 访问控制
  access_control:
    enabled: true
    default_deny: true
    allowed_roles: ["admin", "user", "service"]

# ==================== 实验追踪配置 ====================
experiment_tracking:
  enabled: false
  backend: "mlflow"  # mlflow | wandb | tensorboard

  mlflow:
    tracking_uri: "${MLFLOW_TRACKING_URI:-http://localhost:5000}"
    experiment_name: "LearningModule"
    auto_log: true

# ==================== A/B测试配置 ====================
ab_testing:
  enabled: false
  traffic_split:
    control: 0.5
    treatment: 0.5

  metrics:
    primary: "success_rate"
    secondary: ["response_time", "user_satisfaction"]

# ==================== 特性开关配置 ====================
feature_flags:
  enable_meta_learning: true
  enable_online_learning: true
  enable_reinforcement_learning: true
  enable_transfer_learning: true
  enable_knowledge_distillation: false

  # 实验性功能
  experimental_features:
    auto_hyperparameter_tuning: false
    neural_architecture_search: false
    multi_task_learning: false

# ==================== 部署配置 ====================
deployment:
  # 健康检查
  health_check:
    enabled: true
    interval: 30  # 秒
    timeout: 5
    failure_threshold: 3
    success_threshold: 2

  # 就绪检查
  readiness_check:
    enabled: true
    endpoint: "/api/v1/learning/health"

  # 启动检查
  startup_check:
    enabled: true
    timeout: 60  # 秒

  # 优雅关闭
  graceful_shutdown:
    enabled: true
    timeout: 30  # 秒
    wait_for_tasks: true

# ==================== 备份和恢复配置 ====================
backup:
  enabled: true
  schedule: "0 2 * * *"  # 每天凌晨2点

  # 备份内容
  what:
    - models
    - experience_replay_buffers
    - learning_statistics
    - configuration

  # 备份位置
  where:
    type: "s3"  # s3 | local | azure
    path: "${BACKUP_PATH:-s3://athena-backups/learning}"

  # 保留策略
  retention:
    daily: 7
    weekly: 4
    monthly: 3

# ==================== 环境特定配置覆盖 =================---
environments:
  development:
    debug: true
    log_level: "DEBUG"
    api:
      reload: true
    monitoring:
      prometheus:
        enabled: false

  staging:
    debug: false
    log_level: "INFO"
    feature_flags:
      enable_meta_learning: true
      enable_online_learning: true

  production:
    debug: false
    log_level: "WARNING"
    api:
      workers: 8
    monitoring:
      alerts:
        enabled: true
    security:
      access_control:
        enabled: true
