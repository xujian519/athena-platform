# =============================================================================
# PostgreSQL 本地高性能配置
# 适用于 Athena 工作平台的本地开发/生产环境
# 系统内存: 32GB+ (请根据实际情况调整)
# 存储: SSD
# =============================================================================

# -----------------------------------------------------------------------------
# 内存配置
# -----------------------------------------------------------------------------

# 共享缓冲区 - PostgreSQL 专用的内存
# 推荐: 系统内存的 25%，但不超过 8GB
shared_buffers = 2GB

# 有效缓存大小 - 操作系统缓存 + shared_buffers
# 推荐: 系统内存的 50-75%
effective_cache_size = 12GB

# 工作内存 - 每个查询操作的排序、哈希等操作内存
# 推荐: (系统内存 - shared_buffers) / max_connections
work_mem = 32MB

# 维护工作内存 - VACUUM、CREATE INDEX 等操作
maintenance_work_mem = 512MB

# -----------------------------------------------------------------------------
# 查询规划器配置
# -----------------------------------------------------------------------------

# 随机页面成本 - SSD 应该设置为较低值
# HDD: 4.0, SSD: 1.1-2.0
random_page_cost = 1.1

# 启用位图扫描
enable_bitmapscan = on

# 启用哈希连接
enable_hashjoin = on

# 启用嵌套循环
enable_nestloop = on

# 启用合并连接
enable_mergejoin = on

# 默认统计信息目标
default_statistics_target = 100

# -----------------------------------------------------------------------------
# 连接配置
# -----------------------------------------------------------------------------

# 最大连接数
max_connections = 200

# 超时设置
statement_timeout = 60000        # 60秒
idle_in_transaction_session_timeout = 10000  # 10秒 - 防止空闲事务
lock_timeout = 5000              # 5秒

# -----------------------------------------------------------------------------
# WAL (Write-Ahead Log) 配置
# -----------------------------------------------------------------------------

# WAL 级别 - 本地开发可以降低
wal_level = minimal

# 最小 WAL 数量
min_wal_size = 1GB

# 最大 WAL 数量
max_wal_size = 4GB

# 检查点间隔
checkpoint_timeout = 15min

# 检查点完成目标
checkpoint_completion_target = 0.9

# -----------------------------------------------------------------------------
# 并行查询配置
# -----------------------------------------------------------------------------

# 最大并行工作进程数
max_parallel_workers_per_gather = 4

# 并行工作进程总数
max_parallel_workers = 8

# 并行维护操作
max_parallel_maintenance_workers = 4

# 最小表大小才使用并行扫描
min_parallel_table_scan_size = 8MB

# -----------------------------------------------------------------------------
# 自动清理配置
# -----------------------------------------------------------------------------

# 自动清理延迟
autovacuum_max_workers = 4

# 自动清理 naptime
autovacuum_naptime = 10s

# 自动清理阈值
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# 自动清理缩放因子
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# -----------------------------------------------------------------------------
# 日志配置 (可选 - 性能优化时可关闭)
# -----------------------------------------------------------------------------

# 慢查询日志
log_min_duration_statement = 1000  # 记录超过 1 秒的查询

# 日志格式
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# -----------------------------------------------------------------------------
# 其他优化
# -----------------------------------------------------------------------------

# 同步提交 - 本地开发可以关闭以提高性能
# 生产环境建议保持 on
synchronous_commit = off

# 死锁检测
deadlock_timeout = 1s

# 强制同步写 - SSD 可以关闭
fsync = on

# -----------------------------------------------------------------------------
# 注意事项
# -----------------------------------------------------------------------------
# 1. 此配置假设系统有 32GB+ 内存
# 2. 如果内存较少，请相应减少 shared_buffers 和 effective_cache_size
# 3. 如果使用 HDD，请将 random_page_cost 设置为 4.0
# 4. 修改配置后需要重启 PostgreSQL:
#    macOS: brew services restart postgresql
#    Linux: sudo systemctl restart postgresql
# =============================================================================
