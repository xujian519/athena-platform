# Athena工作平台端口分配
# 最后更新: 2025-12-13
# 状态: 已验证与实际部署一致

services:
  # 核心服务
  api_gateway: 8080          # API网关（前端和外部访问入口）
  unified_identity: 8010     # 统一身份认证服务
  yunpat_agent: 8020         # YunPat专利代理服务
  browser_automation: 8030   # 浏览器自动化服务
  autonomous_control: 8040    # 自主控制系统

  # 数据服务
  patent_analysis: 8050      # 专利分析服务（新增）
  visualization_tools: 8091   # 可视化工具服务（修正端口）
  patent_search: 8060        # 专利搜索服务（新增）

  # 基础设施服务
  postgres_exporter: 9187    # PostgreSQL导出器
  redis_exporter: 9121       # Redis导出器
  elasticsearch_exporter: 9114 # Elasticsearch导出器

  # 监控服务
  prometheus: 9090           # Prometheus监控
  grafana: 3000              # Grafana可视化
  alertmanager: 9093         # 告警管理

  # 辅助服务
  node-exporter: 9100       # 系统指标收集
  cadvisor: 8081             # 容器指标收集（修正端口冲突）

# 服务间通信端口（内部使用）
internal_ports:
  athena_memory: 8008         # 内存服务（待部署）
  crawler_service: 8300      # 爬虫服务（待部署）
  search_service: 8500       # 搜索服务（待部署）

# 环境映射
environments:
  development:
    prometheus: 9091
    grafana: 3001
  staging:
    prometheus: 9092
    grafana: 3002
  production:
    prometheus: 9090
    grafana: 3000
