# 本地部署配置
# Local Deployment Configuration

# API服务配置
api:
  host: "0.0.0.0"  # 允许局域网访问
  port: 8080
  workers: 4
  reload: false

# CORS配置（局域网）
cors:
  enabled: true
  origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
    - "http://127.0.0.1:3000"
    - "http://192.168.1.*:3000"  # 支持局域网IP段
  methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  headers: ["*"]
  credentials: true

# Qdrant向量库配置
qdrant:
  url: "http://localhost:6333"
  timeout: 30
  retry: 3
  retry_delay: 1

# Nebula知识图谱配置
nebula:
  host: "localhost"
  port: 19669
  user: "root"
  password: "nebula"
  timeout: 30
  pool_size: 10

# Embedding模型配置（使用平台MPS优化BGE模型）
embedding:
  provider: "platform"  # 使用平台内置BGE服务
  model_name: "BAAI/bge-m3"  # 默认模型: 1024维（BGE-M3），平衡性能和精度
  model_path: "/Users/xujian/Athena工作平台/models/converted/BAAI/bge-m3"  # MPS优化模型路径
  device: "mps"  # Apple Silicon GPU加速
  dimension: 768  # BAAI/bge-m3的向量维度
  timeout: 60
  max_tokens: 512
  batch_size: 32
  cache_enabled: true  # 启用嵌入缓存
  cache_size: 1000
  normalize_embeddings: true  # 归一化向量（提升搜索效果）

# 缓存配置
cache:
  enabled: true
  type: "memory"  # 使用内存缓存
  max_size: 1000
  ttl: 3600  # 1小时

# 日志配置
logging:
  level: "INFO"
  format: "structured"
  file:
    enabled: true
    path: "logs/intelligent_router.log"
    max_size: "100MB"
    rotation: 10

# 性能配置
performance:
  max_concurrent_requests: 50
  request_timeout: 60
  max_batch_size: 100

# 安全配置（简化版，仅用于局域网）
security:
  enable_auth: false  # 局域网使用，暂不启用认证
  api_key_header: "X-API-Key"  # 可选的API Key（用于未来扩展）
  rate_limit:
    enabled: true
    requests_per_minute: 1000  # 局域网内可以很高
