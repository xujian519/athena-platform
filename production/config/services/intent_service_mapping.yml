# ==============================================================================
# Athena工作平台 - 增强意图→服务映射配置
# Enhanced Intent to Service Mapping Configuration
# ==============================================================================
#
# 本文件定义了用户意图到具体服务的映射关系，支持按需启动。
#
# 映射结构:
#   - 意图类别
#     - 具体意图: [需要启动的服务列表]
#   - 服务会按依赖关系自动排序并启动
#
# ==============================================================================

intent_mapping:
  # ==================== 专利相关意图 ====================
  patent:
    PATENT_SEARCH:
      services:
        - patent-search
        - yunpat-agent
      description: "专利检索需要专利搜索服务和YunPat代理"
      priority_services: [postgresql, redis, qdrant]

    PATENT_DRAFTING:
      services:
        - yunpat-agent
        - joyagent-optimization
      description: "专利撰写需要YunPat代理和JoyAgent优化服务"

    PATENT_ANALYSIS:
      services:
        - patent-analysis
        - yunpat-agent
      description: "专利分析需要专利分析服务"

    CLAIM_DRAFTING_STRATEGY:
      services:
        - yunpat-agent
        - joyagent-optimization
      description: "权利要求撰写策略"

    CLAIM_AMENDMENT:
      services:
        - yunpat-agent
        - joyagent-optimization
      description: "权利要求修改"

    INVALIDATION_DRAFTING:
      services:
        - yunpat-agent
        - patent-analysis
      description: "无效请求书撰写"

    INFRINGEMENT_ANALYSIS:
      services:
        - patent-analysis
        - yunpat-agent
      description: "侵权分析"

  # ==================== 法律相关意图 ====================
  legal:
    LEGAL_QUERY:
      services:
        - yunpat-agent
        - knowledge-graph-service
      description: "法律查询需要知识图谱服务"

    LEGAL_RESEARCH:
      services:
        - yunpat-agent
        - knowledge-graph-service
        - laws-knowledge-base
      description: "法律研究需要法律知识库"

    ARGUMENT_DRAFTING:
      services:
        - yunpat-agent
        - joyagent-optimization
      description: "论点撰写"

    CONTRACT_ANALYSIS:
      services:
        - yunpat-agent
        - ai-services
      description: "合同分析"

    COMPLIANCE_CHECK:
      services:
        - yunpat-agent
        - patent-analysis
      description: "合规检查"

  # ==================== 代码相关意图 ====================
  coding:
    CODE_GENERATION:
      services:
        - ai-services
        - ai-models
      description: "代码生成需要AI服务"

    CODE_OPTIMIZATION:
      services:
        - ai-services
        - optimization-service
      description: "代码优化"

    DEBUGGING:
      services:
        - ai-services
      description: "调试问题"

  # ==================== 数据分析相关意图 ====================
  analysis:
    DATA_ANALYSIS:
      services:
        - knowledge-graph-service
        - vectorkg-unified
      description: "数据分析需要知识图谱和向量服务"

    KNOWLEDGE_GRAPH:
      services:
        - knowledge-graph-service
        - nebula-graph
      description: "知识图谱查询"

    VISUALIZATION:
      services:
        - visualization-tools
      description: "数据可视化"

    REPORT_GENERATION:
      services:
        - visualization-tools
        - patent-analysis
      description: "报告生成"

  # ==================== AI/机器学习相关意图 ====================
  ai:
    AI_MODEL_TRAINING:
      services:
        - ai-models
        - optimization-service
      description: "AI模型训练"

    MODEL_INFERENCE:
      services:
        - ai-services
        - ai-models
      description: "模型推理"

    MULTIMODAL_ANALYSIS:
      services:
        - multimodal
        - ai-models
        - qdrant
      description: "多模态分析"

    EMBEDDING_GENERATION:
      services:
        - jina-ai-mcp
      description: "向量嵌入生成"

  # ==================== 搜索相关意图 ====================
  search:
    PATENT_SEARCH:
      services:
        - patent-search
        - yunpat-agent
      description: "专利搜索"

    ACADEMIC_SEARCH:
      services:
        - academic-search-mcp
      description: "学术论文搜索"

    WEB_SEARCH:
      services:
        - crawler-service
      description: "网页搜索"

    KNOWLEDGE_SEARCH:
      services:
        - knowledge-graph-service
        - vectorkg-unified
      description: "知识库搜索"

  # ==================== 地图/位置相关意图 ====================
  location:
    MAP_NAVIGATION:
      services:
        - gaode-mcp
      description: "地图导航需要高德地图MCP"

    GEOCODING:
      services:
        - gaode-mcp
      description: "地理编码"

    ROUTE_PLANNING:
      services:
        - gaode-mcp
      description: "路径规划"

  # ==================== 浏览器自动化相关意图 ====================
  browser:
    BROWSER_AUTOMATION:
      services:
        - browser-automation
        - chrome-mcp
      description: "浏览器自动化"

    WEB_SCRAPING:
      services:
        - browser-automation
        - chrome-mcp
        - crawler-service
      description: "网页爬取"

    SCREENSHOT_CAPTURE:
      services:
        - browser-automation
        - chrome-mcp
      description: "截图捕获"

  # ==================== Git/版本控制相关意图 ====================
  git:
    GITHUB_INTEGRATION:
      services:
        - github-mcp
      description: "GitHub集成"

    REPOSITORY_ANALYSIS:
      services:
        - github-mcp
      description: "仓库分析"

    CODE_REVIEW:
      services:
        - github-mcp
        - ai-services
      description: "代码审查"

  # ==================== 文档处理相关意图 ====================
  document:
    DOCUMENT_PROCESSING:
      services:
        - document-processing-service
      description: "文档处理"

    PDF_EXTRACTION:
      services:
        - patent-downloader-mcp
      description: "PDF提取"

    TEXT_EXTRACTION:
      services:
        - document-processing-service
      description: "文本提取"

  # ==================== 通信/协作相关意图 ====================
  communication:
    EMAIL_PROCESSING:
      services:
        - communication-hub
      description: "邮件处理"

    NOTIFICATION:
      services:
        - communication-hub
      description: "通知"

    TEAM_COLLABORATION:
      services:
        - intelligent-collaboration
      description: "团队协作"

  # ==================== 优化/推理相关意图 ====================
  optimization:
    OPTIMIZATION:
      services:
        - optimization-service
        - joyagent-optimization
      description: "优化任务"

    PROBLEM_SOLVING:
      services:
        - optimization-service
        - ai-services
      description: "问题解决"

    JUDGMENT_PREDICTION:
      services:
        - optimization-service
      description: "判决预测"

  # ==================== 生活服务相关意图 ====================
  lifestyle:
    LIFESTYLE_SERVICE:
      services: []
      description: "生活服务（基础服务即可）"

    WEATHER_QUERY:
      services: []
      description: "天气查询（通过外部API）"

    SCHEDULE_MANAGEMENT:
      services:
        - config-center
      description: "日程管理"

  # ==================== 系统控制相关意图 ====================
  system:
    SYSTEM_CONTROL:
      services:
        - xiaonuo-control-center
      description: "系统控制需要控制中心"

    SERVICE_MANAGEMENT:
      services:
        - xiaonuo-control-center
      description: "服务管理"

    HEALTH_CHECK:
      services: []
      description: "健康检查（通过监控面板）"

    PLATFORM_STATUS:
      services: []
      description: "平台状态查询"

  # ==================== 默认意图 ====================
  default:
    DEFAULT:
      services:
        - postgresql
        - redis
        - qdrant
        - api-gateway
      description: "默认启动基础服务"

# ==============================================================================
# 服务分组（用于批量启动）
# ==============================================================================

service_groups:
  infrastructure:
    - postgresql
    - redis
    - qdrant
    - nebula-metad
    - nebula-storaged
    - nebula-graph

  core_services:
    - api-gateway
    - unified-identity
    - yunpat-agent
    - patent-analysis
    - patent-search
    - knowledge-graph-service

  ai_services:
    - ai-models
    - ai-services
    - multimodal
    - joyagent-optimization

  mcp_servers:
    - academic-search-mcp
    - patent-search-mcp
    - patent-downloader-mcp
    - jina-ai-mcp
    - gaode-mcp
    - chrome-mcp
    - github-mcp

  applications:
    - xiaonuo-gateway
    - xiaonuo-control-center
    - intent-recognition
    - config-center

# ==============================================================================
# 服务启动优先级规则
# ==============================================================================

startup_rules:
  # 必须启动的服务（P0 + P1非按需）
  mandatory:
    - postgresql
    - redis
    - qdrant
    - nebula-graph
    - api-gateway
    - unified-identity
    - yunpat-agent
    - patent-analysis
    - patent-search
    - knowledge-graph-service
    - xiaonuo-gateway
    - xiaonuo-control-center
    - intent-recognition
    - config-center

  # 按需启动的服务
  on_demand:
    - browser-automation
    - autonomous-control
    - joyagent-optimization
    - crawler-service
    - intelligent-collaboration
    - optimization-service
    - visualization-tools
    - knowledge-unified
    - vectorkg-unified
    - ai-models
    - ai-services
    - academic-search-mcp
    - patent-search-mcp
    - patent-downloader-mcp
    - jina-ai-mcp
    - gaode-mcp
    - chrome-mcp
    - github-mcp
    - google-patents-meta-mcp
    - bing-cn-mcp
    - postgres-mcp

  # 启动顺序：按层级
  layer_order:
    - infrastructure
    - core_services
    - mcp_servers
    - applications
