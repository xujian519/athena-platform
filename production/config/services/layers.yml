# Athena工作平台 - 服务层级配置
# Services Layers Configuration
#
# 定义4层架构的启动顺序、超时配置和层级间依赖关系

layers:
  # ==================== 第1层：基础设施层 ====================
  - id: 1
    name: infrastructure
    display_name: 基础设施层
    description: 数据库、缓存、消息队列等基础服务
    startup_order: 1
    startup_timeout: 180  # 3分钟
    startup_strategy: parallel  # 层内服务并行启动
    health_check_interval: 10
    health_check_retries: 3
    shutdown_timeout: 30
    depends_on_layers: []
    max_parallel: 10  # 最多同时启动10个服务
    services:
      - postgresql
      - redis
      - qdrant
      - nebula-metad
      - nebula-storaged
      - nebula-graph
    resource_pool:
      cpus: "12.0"
      memory: 32G
    labels:
      - critical
      - infrastructure

  # ==================== 第2层：核心服务层 ====================
  - id: 2
    name: core_services
    display_name: 核心服务层
    description: API网关、专利分析、知识图谱等核心业务服务
    startup_order: 2
    startup_timeout: 120  # 2分钟
    startup_strategy: parallel  # 层内服务并行启动
    health_check_interval: 15
    health_check_retries: 3
    shutdown_timeout: 30
    depends_on_layers:
      - infrastructure
    max_parallel: 8
    services:
      - api-gateway
      - unified-identity
      - yunpat-agent
      - browser-automation
      - autonomous-control
      - patent-analysis
      - patent-search
      - knowledge-graph-service
      - joyagent-optimization
    resource_pool:
      cpus: "16.0"
      memory: 32G
    labels:
      - critical
      - business

  # ==================== 第3层：MCP服务器层 ====================
  - id: 3
    name: mcp_servers
    display_name: MCP服务器层
    description: Model Context Protocol服务器，提供专业化AI服务
    startup_order: 3
    startup_timeout: 90  # 1.5分钟
    startup_strategy: parallel
    health_check_interval: 20
    health_check_retries: 2
    shutdown_timeout: 20
    depends_on_layers:
      - infrastructure
      - core_services
    max_parallel: 8  # 所有MCP服务器可以并行启动
    services:
      - academic-search-mcp
      - patent-search-mcp
      - patent-downloader-mcp
      - jina-ai-mcp
      - gaode-mcp
      - chrome-mcp
      - github-mcp
      - google-patents-meta-mcp
    resource_pool:
      cpus: "8.0"
      memory: 16G
    labels:
      - ai
      - mcp

  # ==================== 第4层：应用层 ====================
  - id: 4
    name: applications
    display_name: 应用层
    description: 面向用户的应用服务和网关
    startup_order: 4
    startup_timeout: 60  # 1分钟
    startup_strategy: parallel
    health_check_interval: 15
    health_check_retries: 3
    shutdown_timeout: 20
    depends_on_layers:
      - core_services
      - mcp_servers
    max_parallel: 5
    services:
      - xiaonuo-gateway
      - intent-recognition
      - visualization-tools
    resource_pool:
      cpus: "6.0"
      memory: 12G
    labels:
      - user-facing
      - application

# ==================== 全局配置 ====================
global_config:
  # 平台整体启动超时
  total_startup_timeout: 480  # 8分钟

  # 服务间启动间隔
  service_start_interval: 2  # 秒

  # 健康检查全局配置
  health_check:
    global_interval: 30  # 默认检查间隔
    global_timeout: 10   # 默认检查超时
    global_retries: 3    # 默认重试次数

  # 失败处理策略
  failure_handling:
    on_service_failure: continue  # continue | stop | rollback
    on_layer_failure: stop        # 继续下一层 or 停止启动
    max_layer_failures: 3         # 最多允许失败层数

  # 启动优化配置
  optimization:
    enable_parallel_startup: true
    enable_dependency_skip: false   # 跳过不可用依赖的服务
    enable_quick_start: false       # 快速启动模式（跳过部分健康检查）

  # 日志配置
  logging:
    startup_log_level: INFO
    health_check_log_level: DEBUG
    enable_progress_bar: true

# ==================== 监控告警配置 ====================
monitoring:
  # Prometheus监控指标
  metrics:
    enabled: true
    port: 9091
    path: /metrics

  # 启动时间告警阈值
  startup_time_alerts:
    warning: 300  # 5分钟
    critical: 420  # 7分钟

  # 服务健康率告警
  health_rate_alerts:
    warning: 95    # 95%
    critical: 90   # 90%

# ==================== 回滚策略 ====================
rollback:
  enabled: true
  max_rollback_attempts: 3
  rollback_timeout: 120
  rollback_snapshot_dir: /tmp/athena-rollback

# ==================== 启动验证配置 ====================
validation:
  # 启动后验证
  post_startup_checks:
    - name: critical_services_health
      description: 验证所有关键服务健康
      services:
        - postgresql
        - redis
        - qdrant
        - api-gateway
        - xiaonuo-gateway

    - name: api_connectivity
      description: 验证API网关连通性
      endpoint: http://localhost:8100/health

    - name: database_connectivity
      description: 验证数据库连接
      databases:
        - postgresql
        - redis
        - qdrant

  # 启动成功条件
  success_criteria:
    min_healthy_services: 95  # 至少95%服务健康
    max_failed_critical: 0    # 关键服务不允许失败
    max_startup_time: 480     # 最大启动时间8分钟
