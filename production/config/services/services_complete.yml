# =====================================================================
# Athena工作平台 - 完整服务元数据配置（59个服务）
# Complete Services Metadata Configuration
# =====================================================================
#
# 本文件定义了平台所有59个微服务的元数据，包括：
# - 服务名称和层级
# - 端口配置
# - 依赖关系
# - 健康检查配置
# - 启动优先级
# - 是否按需启动
#
# =====================================================================

services:
  # ##########################################################################
  # 第1层：基础设施层服务 (Infrastructure Layer) - 优先级P0，必须启动
  # ##########################################################################

  postgresql:
    name: PostgreSQL数据库
    layer: infrastructure
    priority: P0
    on_demand: false
    image: postgres:15-alpine
    ports:
      internal: 5432
      external: 5432
    environment:
      POSTGRES_DB: athena
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: ${DB_PASSWORD:-athena123}
    volumes:
      - ../../data/postgres:/var/lib/postgresql/data
    health_check:
      type: tcp
      port: 5432
      interval: 10
      timeout: 5
    dependencies: []
    resource_limits:
      cpus: "2.0"
      memory: 4G
    labels:
      - database
      - primary

  redis:
    name: Redis缓存
    layer: infrastructure
    priority: P0
    on_demand: false
    image: redis:7-alpine
    ports:
      internal: 6379
      external: 6379
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - ../../data/redis:/data
    health_check:
      type: tcp
      port: 6379
      interval: 10
      timeout: 5
    dependencies: []
    resource_limits:
      cpus: "1.0"
      memory: 2G

  qdrant:
    name: Qdrant向量数据库
    layer: infrastructure
    priority: P0
    on_demand: false
    image: qdrant/qdrant:v1.7.4
    ports:
      internal: 6333
      external: 6333
      grpc: 6334
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - ../../data/qdrant:/qdrant/storage
    health_check:
      type: http
      port: 6333
      path: /health
      interval: 30
      timeout: 10
    dependencies: []
    resource_limits:
      cpus: "4.0"
      memory: 16G

  nebula-metad:
    name: NebulaGraph Meta服务
    layer: infrastructure
    priority: P0
    on_demand: false
    image: vesoft/nebula-metad:v3.6.0
    ports:
      internal: 9559
      external: 9559
    dependencies: []
    resource_limits:
      cpus: "1.0"
      memory: 2G

  nebula-storaged:
    name: NebulaGraph Storage服务
    layer: infrastructure
    priority: P0
    on_demand: false
    image: vesoft/nebula-storaged:v3.6.0
    ports:
      internal: 9779
      external: 9779
    dependencies:
      - nebula-metad
    resource_limits:
      cpus: "2.0"
      memory: 4G

  nebula-graph:
    name: NebulaGraph图数据库
    layer: infrastructure
    priority: P0
    on_demand: false
    image: vesoft/nebula-graph:v3.6.0
    ports:
      internal: 9669
      external: 9669
    health_check:
      type: tcp
      port: 9669
      interval: 15
      timeout: 10
    dependencies:
      - nebula-metad
      - nebula-storaged
    resource_limits:
      cpus: "2.0"
      memory: 4G

