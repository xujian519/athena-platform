# =============================================================================
# Athena平台本地PostgreSQL配置文件
# 针对中国专利数据库优化的配置
# 作者: 徐健
# 创建日期: 2025-12-13
# =============================================================================

# -----------------------------------------------------------------------------
# 连接设置
# -----------------------------------------------------------------------------
listen_addresses = 'localhost'          # 只监听本地连接
port = 5432
max_connections = 200                   # 最大连接数
superuser_reserved_connections = 3      # 为超级用户保留的连接
unix_socket_directories = '/tmp'        # Unix套接字目录

# -----------------------------------------------------------------------------
# 内存设置（根据实际服务器资源调整）
# -----------------------------------------------------------------------------
# 共享缓冲区（建议设置为系统内存的25%）
shared_buffers = 4GB
# 大页支持
huge_pages = try
# 临时缓冲区
temp_buffers = 256MB
# 工作内存（每个排序操作）
work_mem = 256MB
# 维护工作内存
maintenance_work_mem = 1GB

# -----------------------------------------------------------------------------
# WAL（Write-Ahead Logging）设置
# -----------------------------------------------------------------------------
# WAL级别（minimal, replica, or logical）
wal_level = replica
# WAL文件大小
max_wal_size = 4GB
# 最小WAL文件大小
min_wal_size = 1GB
# WAL检查点超时
checkpoint_timeout = 15min
# 检查点完成目标
checkpoint_completion_target = 0.9
# 预写日志缓冲区
wal_buffers = 64MB
# 提交延迟（提高批量写入性能）
commit_delay = 0
commit_siblings = 5

# -----------------------------------------------------------------------------
# 归档设置（用于数据备份）
# -----------------------------------------------------------------------------
archive_mode = on
archive_command = 'cp %p /backup/postgresql/archive/%f'
# 归档超时
archive_timeout = 300

# -----------------------------------------------------------------------------
# 复制设置（主从复制）
# -----------------------------------------------------------------------------
max_wal_senders = 3
wal_keep_segments = 32
hot_standby = on
max_standby_archive_delay = 30s
max_standby_streaming_delay = 30s
wal_receiver_status_interval = 10s
hot_standby_feedback = off

# -----------------------------------------------------------------------------
# 查询规划器
# -----------------------------------------------------------------------------
# 顺序扫描阈值
seq_page_cost = 1.0
# 随机页面访问成本
random_page_cost = 1.1
# CPU代价
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025
# 并行查询
effective_cache_size = 12GB
# 默认统计信息目标
default_statistics_target = 100

# -----------------------------------------------------------------------------
# 日志记录
# -----------------------------------------------------------------------------
# 日志收集
logging_collector = on
# 日志目录
log_directory = '/var/log/postgresql'
# 日志文件名
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
# 日志轮转
log_rotation_age = 1d
log_rotation_size = 100MB
# 日志级别
log_min_messages = warning
# 记录所有SQL
log_statement = 'mod'  # 记录所有修改数据的SQL
# 记录慢查询
log_min_duration_statement = 1000
# 记录检查点
log_checkpoints = on
# 记录连接
log_connections = on
log_disconnections = on
# 记录锁等待
log_lock_waits = on
# 记录临时文件
log_temp_files = 10MB

# -----------------------------------------------------------------------------
# 运行时统计
# -----------------------------------------------------------------------------
# 跟踪活动会话
track_activities = on
# 跟踪计数
track_counts = on
# 跟踪IO
track_io_timing = on
# 跟踪功能
track_functions = all
# 临时统计
temp_file_limit = -1

# -----------------------------------------------------------------------------
# 自动清理
# -----------------------------------------------------------------------------
# 启用自动清理
autovacuum = on
# 自动清理阈值
autovacuum_max_workers = 3
# 自动清理休眠时间
autovacuum_naptime = 1min
# 自动清理阈值比例
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
# 自动清理阈值比例
autovacuum_vacuum_scale_factor = 0.2
autovacuum_analyze_scale_factor = 0.1
# 冻结最大年龄
autovacuum_freeze_max_age = 200000000
# 冻结表的最大年龄
autovacuum_multixact_freeze_max_age = 400000000
# 每个自动清理进程可处理的表数
autovacuum_vacuum_cost_delay = 20ms
autovacuum_vacuum_cost_limit = -1

# -----------------------------------------------------------------------------
# 客户端连接默认设置
# -----------------------------------------------------------------------------
# 搜索路径
search_path = '"$user", public, patents'
# 时区
timezone = 'Asia/Shanghai'
# 日期时间格式
DateStyle = 'iso, mdy'
# ICU规则
icu_validation_level = WARNING

# -----------------------------------------------------------------------------
# 区域设置
# -----------------------------------------------------------------------------
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
# 默认文本搜索配置
default_text_search_config = 'pg_catalog.english'

# -----------------------------------------------------------------------------
# 其他默认设置
-----------------------------------------------------------------------------
dynamic_shared_memory_type = posix
# 扩展库
shared_preload_libraries = 'pg_stat_statements, auto_explain, pg_trgm, btree_gin'
# JIT编译
jit = on

