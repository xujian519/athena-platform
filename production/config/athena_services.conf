# =============================================================================
# Athena 工作平台服务配置文件
# =============================================================================

# 调试模式
DEBUG=false

# 服务超时设置（秒）
SERVICE_START_TIMEOUT=30
HEALTH_CHECK_TIMEOUT=10

# 日志配置
LOG_LEVEL=INFO
LOG_ROTATION=daily
LOG_RETENTION_DAYS=7

# 核心服务配置
CORE_SERVICES=("redis" "postgresql" "xiaonuo" "nlp-service" "vector-service")

# 可选服务配置
OPTIONAL_SERVICES=("elasticsearch" "knowledge-graph" "patent-retrieval" "mcp-manager" "crawler-manager")

# 服务端口配置
REDIS_PORT=6379
POSTGRESQL_PORT=5432
ELASTICSEARCH_PORT=9200
XIAONUO_PORT=8080
NLP_SERVICE_PORT=8081
VECTOR_SERVICE_PORT=8082
KNOWLEDGE_GRAPH_PORT=8083
PATENT_RETRIEVAL_PORT=8084
MCP_MANAGER_PORT=8085
CRAWLER_MANAGER_PORT=8086

# 启动延迟配置（秒）
STARTUP_DELAY_BASE=2
STARTUP_DELAY_SERVICE=5

# 健康检查间隔（秒）
HEALTH_CHECK_INTERVAL=5
HEALTH_CHECK_RETRIES=6

# 是否启用自动重启
AUTO_RESTART=true

# 是否启用服务监控
SERVICE_MONITORING=true