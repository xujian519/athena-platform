# Athena工作平台性能优化配置
# 最后更新: 2025-12-13
# 版本: 1.0

# 数据库性能配置
database:
  # PostgreSQL优化
  postgresql:
    # 连接池配置
    pool:
      min_size: 10          # 最小连接数
      max_size: 50          # 最大连接数
      max_idle: 30          # 最大空闲连接数
      max_overflow: 20      # 允许超出max_size的连接数
      timeout: 30           # 获取连接超时时间(秒)

    # 查询优化
    query:
      statement_timeout: 30000      # 查询超时时间(毫秒)
      idle_in_transaction_session_timeout: 60000  # 事务空闲超时
      lock_timeout: 30000           # 锁等待超时
      effective_cache_size: "4GB"   # 有效缓存大小
      work_mem: "256MB"             # 工作内存
      maintenance_work_mem: "1GB"   # 维护工作内存

    # 索引策略
    indexes:
      # 专利数据索引
      patents:
        - name: "idx_patents_applicant"
          columns: ["applicant_name"]
          type: "btree"
        - name: "idx_patents_application_date"
          columns: ["application_date"]
          type: "btree"
        - name: "idx_patents_ipc"
          columns: ["ipc_classification"]
          type: "hash"
        - name: "idx_patents_title"
          columns: ["title"]
          type: "gin"
          with: "to_tsvector('chinese', title)"

    # 分区配置
    partitioning:
      # 按年份分区专利表
      patents_table:
        type: "range"
        column: "application_date"
        partitions:
          - "patents_2015_2019"
          - "patents_2020_2024"
          - "patents_2025_future"

  # Redis优化
  redis:
    # 内存配置
    maxmemory: "2gb"
    maxmemory_policy: "allkeys-lru"

    # 持久化配置
    save:
      - "900 1"    # 15分钟内有1个key变化就保存
      - "300 10"   # 5分钟内有10个key变化就保存
      - "60 10000" # 1分钟内有10000个key变化就保存

    # 连接池
    connection_pool:
      max_connections: 100
      retry_on_timeout: true
      socket_timeout: 5
      socket_connect_timeout: 5

    # 过期策略
    expire:
      search_cache: 3600       # 搜索缓存1小时
      user_session: 1800       # 用户会话30分钟
      api_response: 300        # API响应5分钟

# 缓存策略配置
cache:
  # 多级缓存架构
  levels:
    # L1: 应用内存缓存
    l1_memory:
      enabled: true
      max_size: "512MB"
      ttl: 300  # 5分钟
      eviction_policy: "lru"

    # L2: Redis缓存
    l2_redis:
      enabled: true
      max_size: "1GB"
      ttl: 3600  # 1小时
      eviction_policy: "allkeys-lru"

    # L3: 数据库查询缓存
    l3_database:
      enabled: true
      query_timeout: 10
      result_size_limit: 10000

  # 缓存键策略
  keys:
    prefix: "athena:"
    separator: ":"

  # 缓存场景
  scenarios:
    # 专利搜索结果缓存
    patent_search:
      ttl: 1800      # 30分钟
      max_size: 1000 # 最多缓存1000个搜索结果

    # 用户偏好缓存
    user_preferences:
      ttl: 86400     # 24小时
      max_size: 10000

    # 系统配置缓存
    system_config:
      ttl: 604800    # 7天
      max_size: 100

# API性能配置
api:
  # 限流配置
  rate_limiting:
    enabled: true
    # 全局限流
    global:
      requests_per_minute: 1000
      burst: 100
    # 用户级别限流
    user:
      requests_per_minute: 100
      burst: 20
    # IP级别限流
    ip:
      requests_per_minute: 50
      burst: 10

  # 连接优化
  connection:
    keep_alive: true
    timeout: 30
    max_connections: 1000

  # 响应优化
  response:
    compression:
      enabled: true
      algorithms: ["gzip", "deflate", "br"]
      level: 6
    caching:
      static_files: 86400    # 静态文件缓存1天
      api_response: 60       # API响应缓存1分钟

  # 异步处理
  async:
    enabled: true
    workers: 4               # 异步工作进程数
    queue_size: 10000        # 队列大小
    batch_size: 100          # 批处理大小

# 网络优化配置
network:
  # HTTP/2配置
  http2:
    enabled: true
    max_concurrent_streams: 100

  # CDN配置
  cdn:
    enabled: true
    provider: "cloudflare"
    cache_ttl: 2592000       # 30天
    # 静态资源CDN
    static_resources:
      enabled: true
      domains: ["cdn.athena-platform.com"]

  # 连接池
  connection_pooling:
    enabled: true
    max_connections: 100
    keep_alive_timeout: 60
    connect_timeout: 10
    read_timeout: 30

# 搜索优化配置
search:
  # Elasticsearch优化
  elasticsearch:
    # 索引优化
    index:
      number_of_shards: 3
      number_of_replicas: 1
      refresh_interval: "30s"

    # 查询优化
    query:
      max_result_window: 10000
      default_timeout: "10s"

    # 聚合缓存
    aggregation_cache:
      enabled: true
      ttl: 300  # 5分钟

  # 向量搜索优化
  vector_search:
    # Qdrant优化
    qdrant:
      # 索引配置
      hnsw_config:
        m: 16
        ef_construct: 100
        full_scan_threshold: 10000

      # 搜索配置
      search_config:
        ef: 64
        limit: 100

      # 量化配置
        # 如果内存紧张，可以启用量化
      quantization:
        enabled: false
        scalar:
          type: "int8"
          min: 0
          max: 255

# 后台任务优化
background_tasks:
  # Celery优化
  celery:
    # Worker配置
    worker:
      concurrency: 4          # 工作进程数
      prefetch_multiplier: 1  # 预取倍数
      max_tasks_per_child: 1000 # 每个子进程最大任务数

    # 队列配置
    queue:
      routing_key: "task"
      exchange: "tasks"

    # 任务路由
    task_routes:
      "patents.analysis": "analysis_queue"
      "patents.search": "search_queue"
      "patents.export": "export_queue"

    # 批处理配置
    batch:
      enabled: true
      batch_size: 50
      timeout: 60

# 监控性能指标
monitoring:
  # 性能指标收集
  metrics:
    enabled: true
    collection_interval: 15  # 秒

    # 关键指标
    key_metrics:
      - response_time_p95     # 95分位响应时间
      - response_time_p99     # 99分位响应时间
      - throughput_rps        # 每秒请求数
      - error_rate            # 错误率
      - cpu_usage             # CPU使用率
      - memory_usage          # 内存使用率
      - disk_io               # 磁盘IO
      - network_io            # 网络IO

  # 性能基准
  benchmarks:
    # API响应时间目标
    api_response_time:
      p50: "100ms"
      p95: "500ms"
      p99: "1s"

    # 数据库查询时间目标
    database_query:
      simple: "10ms"
      complex: "100ms"
      batch: "1s"

    # 缓存命中率目标
    cache_hit_rate:
      l1: 0.8     # 80%
      l2: 0.7     # 70%
      l3: 0.6     # 60%

# 自动扩缩容配置
autoscaling:
  enabled: true

  # 基于CPU的扩缩容
  cpu:
    min_instances: 2
    max_instances: 10
    target_utilization: 70
    scale_up_threshold: 80
    scale_down_threshold: 50

  # 基于内存的扩缩容
  memory:
    min_instances: 2
    max_instances: 8
    target_utilization: 75
    scale_up_threshold: 85
    scale_down_threshold: 60

  # 基于请求队列的扩缩容
  queue:
    min_instances: 2
    max_instances: 20
    threshold: 100  # 队列长度阈值

# 资源限制配置
resource_limits:
  # 内存限制
  memory:
    api_service: "1GB"
    worker_service: "2GB"
    database_service: "4GB"

  # CPU限制
  cpu:
    api_service: "2 cores"
    worker_service: "4 cores"
    database_service: "8 cores"

  # 文件句柄限制
  file_descriptors:
    api_service: 10000
    worker_service: 20000
    database_service: 50000

# 优化建议
optimization_suggestions:
  # 数据库优化
  database:
    - "定期执行VACUUM和ANALYZE"
    - "监控慢查询日志"
    - "优化索引使用"
    - "考虑读写分离"

  # 缓存优化
  cache:
    - "使用Redis集群提高可用性"
    - "实施缓存预热策略"
    - "监控缓存命中率"
    - "定期清理过期缓存"

  # API优化
  api:
    - "实施响应压缩"
    - "使用连接池"
    - "实施异步处理"
    - "优化序列化格式"