# Athena工作平台 Nginx 负载均衡配置
# 最后更新: 2025-12-13

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# 性能优化配置
events {
    worker_connections 10240;  # 每个工作进程的最大连接数
    use epoll;               # 使用epoll事件模型
    multi_accept on;         # 一次接受多个连接
}

# HTTP配置
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main_ext '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" "$http_x_forwarded_for" '
                       'rt=$request_time uct="$upstream_connect_time" '
                       'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main_ext;

    # 基础配置
    sendfile on;                    # 启用sendfile
    tcp_nopush on;                  # 优化TCP包
    tcp_nodelay on;                 # 禁用Nagle算法
    keepalive_timeout 65;           # 保持连接时间
    keepalive_requests 1000;        # 每个连接的最大请求数
    reset_timedout_connection on;   # 重置超时连接
    client_body_timeout 30;         # 客户端请求体超时
    client_header_timeout 30;       # 客户端请求头超时
    send_timeout 30;                # 发送超时

    # 缓冲区配置
    client_header_buffer_size 32k;      # 客户端请求头缓冲区大小
    large_client_header_buffers 4 32k;  # 大请求头缓冲区
    client_max_body_size 100M;           # 最大请求体大小
    client_body_buffer_size 128k;        # 客户端请求体缓冲区大小

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # 速率限制
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=search_limit:10m rate=2r/s;

    # 连接限制
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # 上游服务器配置
    upstream api_gateway {
        least_conn;  # 最少连接数策略

        # API网关服务器列表
        server localhost:8080 weight=1 max_fails=3 fail_timeout=30s;
        server localhost:8081 weight=1 max_fails=3 fail_timeout=30s;
        server localhost:8082 weight=1 max_fails=3 fail_timeout=30s;

        # keep-alive连接
        keepalive 32;
    }

    upstream unified_identity {
        # Session保持 - 使用ip_hash策略
        ip_hash;

        # 统一身份认证服务
        server localhost:8010 weight=1 max_fails=3 fail_timeout=30s;
        server localhost:8011 weight=1 max_fails=3 fail_timeout=30s;

        keepalive 16;
    }

    upstream yunpat_agent {
        least_conn;

        # YunPat专利代理服务
        server localhost:8020 weight=2 max_fails=3 fail_timeout=30s;
        server localhost:8021 weight=2 max_fails=3 fail_timeout=30s;
        server localhost:8022 weight=1 max_fails=3 fail_timeout=30s backup;

        keepalive 32;
    }

    upstream patent_search {
        least_conn;

        # 专利搜索服务
        server localhost:8060 weight=1 max_fails=3 fail_timeout=30s;
        server localhost:8061 weight=1 max_fails=3 fail_timeout=30s;

        keepalive 32;
    }

    # 缓存配置
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m
                     max_size=1g inactive=60m use_temp_path=off;

    # 主服务器配置
    server {
        listen 80;
        listen [::]:80;
        server_name athena.localhost;

        # 连接限制
        limit_conn conn_limit 20;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 主路由
        location / {
            root /var/www/athena;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;

            # 静态文件缓存
            location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        # API网关路由
        location /api/ {
            # 速率限制
            limit_req zone=api_limit burst=20 nodelay;

            # 代理配置
            proxy_pass http://api_gateway/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时配置
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 缓冲配置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # 缓存配置
            proxy_cache api_cache;
            proxy_cache_methods GET HEAD;
            proxy_cache_valid 200 5m;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_bypass $http_pragma $http_authorization;

            # 健康检查
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        }

        # 身份认证路由
        location /auth/ {
            # 代理配置
            proxy_pass http://unified_identity/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 不缓存认证请求
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # 专利搜索路由
        location /search/ {
            # 搜索请求限制
            limit_req zone=search_limit burst=5 nodelay;

            # 代理配置
            proxy_pass http://patent_search/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 较长的超时时间
            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # 缓存搜索结果
            proxy_cache api_cache;
            proxy_cache_valid 200 10m;
        }

        # 健康检查端点
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Nginx状态
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow ::1;
            deny all;
        }
    }
}
