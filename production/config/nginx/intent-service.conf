# 意图识别服务 - Nginx生产环境配置
# Intent Recognition Service - Nginx Production Configuration

# 上游服务器定义
upstream intent_service_backend {
    # 负载均衡策略: least_conn（最少连接）
    least_conn;

    # 后端服务器列表
    server 127.0.0.1:8000 max_fails=3 fail_timeout=30s;
    # 如有多个实例，添加更多服务器
    # server 127.0.0.1:8001 max_fails=3 fail_timeout=30s;
    # server 127.0.0.1:8002 max_fails=3 fail_timeout=30s;

    # 保持连接
    keepalive 32;
}

# HTTP服务器配置（重定向到HTTPS）
server {
    listen 80;
    listen [::]:80;
    server_name api.athena.example.com;

    # Let's Encrypt验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他请求重定向到HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS服务器配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.athena.example.com;

    # SSL证书配置
    ssl_certificate /etc/nginx/ssl/athena.example.com.crt;
    ssl_certificate_key /etc/nginx/ssl/athena.example.com.key;

    # SSL安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 安全头部
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # 日志配置
    access_log /var/log/nginx/intent-service-access.log;
    error_log /var/log/nginx/intent-service-error.log warn;

    # 客户端上传大小限制
    client_max_body_size 10M;

    # 客户端超时配置
    client_body_timeout 60s;
    client_header_timeout 60s;

    # API代理配置
    location /api/v1/intent/ {
        # CORS头部（由FastAPI中间件处理）
        # Nginx只负责转发

        # 代理到上游服务
        proxy_pass http://intent_service_backend;

        # 代理头部配置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时配置
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # 健康检查
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    # API文档（生产环境可选禁用）
    location /docs {
        proxy_pass http://intent_service_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 生产环境建议限制访问
        # allow 192.168.1.0/24;
        # deny all;
    }

    # 健康检查端点（无需认证）
    location /api/v1/intent/health {
        proxy_pass http://intent_service_backend;
        access_log off;  # 不记录健康检查日志
    }

    # Prometheus指标端点（限制访问）
    location /api/v1/intent/metrics {
        proxy_pass http://intent_service_backend;

        # 仅允许内网访问
        allow 127.0.0.1;
        allow 192.168.1.0/24;
        deny all;
    }

    # 静态文件缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        proxy_pass http://intent_service_backend;
    }

    # 速率限制区域定义（在http块中）
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # 应用速率限制
    # location /api/v1/intent/ {
    #     limit_req zone=api_limit burst=20 nodelay;
    #     proxy_pass http://intent_service_backend;
    # }
}

# 监控端点配置（可选）
server {
    listen 127.0.0.1:9090;
    server_name localhost;

    # Nginx状态
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}
