# Athena Rust缓存 - 生产环境配置

cache:
  # LLM缓存配置
  llm:
    hot_size: 10000      # 热数据层大小
    warm_size: 100000    # 温数据层大小
    ttl: 3600           # 生存时间（秒）

  # 搜索缓存配置
  search:
    hot_size: 5000       # 热数据层大小
    warm_size: 50000     # 温数据层大小
    ttl: 1800           # 生存时间（秒）

monitoring:
  # Prometheus监控
  prometheus:
    enabled: true
    port: 8000
    path: /metrics

performance:
  # 性能调优
  max_concurrent_requests: 1000
  request_timeout: 30
  connection_pool_size: 100

logging:
  # 日志配置
  level: INFO
  format: json
  output: "production/logs/rust_cache.log"
