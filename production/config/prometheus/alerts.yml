# Athena智能路由系统 - Prometheus告警规则
# Prometheus Alert Rules for Athena Intelligent Router

groups:
  - name: athena_alerts
    interval: 30s
    rules:
      # 高错误率告警
      - alert: HighErrorRate
        expr: |
          rate(athena_search_requests_total{status="error"}[5m]) /
          rate(athena_search_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
          service: athena-intelligent-router
        annotations:
          summary: "错误率过高"
          description: "过去5分钟错误率超过5%: {{ $value | humanizePercentage }}"
          runbook_url: "https://github.com/athena/runbooks"

      # 响应时间过慢告警
      - alert: SlowResponseTime
        expr: |
          histogram_quantile(0.95, athena_search_duration_seconds) > 1
        for: 5m
        labels:
          severity: warning
          service: athena-intelligent-router
        annotations:
          summary: "响应时间过慢"
          description: "P95响应时间超过1秒: {{ $value }}s"
          runbook_url: "https://github.com/athena/runbooks"

      # 缓存命中率过低告警
      - alert: LowCacheHitRate
        expr: |
          rate(athena_cache_hits_total[5m]) /
          (rate(athena_cache_hits_total[5m]) + rate(athena_cache_misses_total[5m])) < 0.2
        for: 10m
        labels:
          severity: info
          service: athena-intelligent-router
        annotations:
          summary: "缓存命中率过低"
          description: "缓存命中率低于20%: {{ $value | humanizePercentage }}"
          runbook_url: "https://github.com/athena/runbooks"

      # 内存使用率过高告警
      - alert: HighMemoryUsage
        expr: |
          athena_memory_usage_bytes / (1024*1024*1024) > 4
        for: 5m
        labels:
          severity: warning
          service: athena-intelligent-router
        annotations:
          summary: "内存使用率过高"
          description: "内存使用超过4GB: {{ $value }}GB"
          runbook_url: "https://github.com/athena/runbooks"

      # 熔断器打开告警
      - alert: CircuitBreakerOpen
        expr: |
          athena_circuit_breaker_state > 0
        for: 1m
        labels:
          severity: critical
          service: athena-intelligent-router
        annotations:
          summary: "熔断器打开"
          description: "熔断器 {{ $labels.breaker_name }} 已打开"
          runbook_url: "https://github.com/athena/runbooks"

      # Qdrant搜索失败率过高
      - alert: HighQdrantFailureRate
        expr: |
          rate(athena_qdrant_search_duration_seconds_bucket[5m]) == 0
        for: 2m
        labels:
          severity: critical
          service: athena-intelligent-router
        annotations:
          summary: "Qdrant搜索失败"
          description: "Qdrant搜索请求全部失败或无响应"
          runbook_url: "https://github.com/athena/runbooks"

      # 限流拒绝率过高
      - alert: HighRateLimitRejectionRate
        expr: |
          rate(athena_rate_limit_rejections_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
          service: athena-intelligent-router
        annotations:
          summary: "限流拒绝率过高"
          description: "每秒限流拒绝数超过10: {{ $value }}"
          runbook_url: "https://github.com/athena/runbooks"

      # 活跃请求数过多
      - alert: HighActiveRequests
        expr: |
          athena_active_requests > 100
        for: 2m
        labels:
          severity: warning
          service: athena-intelligent-router
        annotations:
          summary: "活跃请求数过多"
          description: "当前活跃请求数: {{ $value }}"
          runbook_url: "https://github.com/athena/runbooks"
