# Prometheus配置文件
# Prometheus Configuration for Athena Intelligent Router

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'athena-intelligent-router'
    environment: 'production'

# 告警规则配置
rule_files:
  - '/etc/prometheus/alerts.yml'

# 告警管理器配置 (可选)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # 钉钉告警
          # - 'dingtalk-webhook:8060'
          # Email告警
          # - 'email-alerts:9093'

# 抓取配置
scrape_configs:
  # Athena智能路由API
  - job_name: 'athena-intelligent-router'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: 'athena-intelligent-router'
          environment: 'production'

  # Prometheus自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
