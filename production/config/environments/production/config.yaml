# Athena工作平台 - 生产环境配置

# 环境标识
environment: "production"

# 应用配置
app:
  name: "athena-work-platform"
  version: "2.0.0"
  debug: false
  log_level: "INFO"

# 服务端口配置
ports:
  athena_main: "${ATHENA_PORT:8000}"
  athena_memory: "${ATHENA_MEMORY_PORT:8008}"
  xiaonuo_memory: "${XIAONUO_MEMORY_PORT:8083}"
  athena_identity: "${ATHENA_IDENTITY_PORT:8010}"
  memory_integration: "${MEMORY_INTEGRATION_PORT:8011}"
  pdf_processing: "${PDF_PROCESSING_PORT:8090}"
  memgpt_core: "${MEMGPT_CORE_PORT:8899}"
  memgpt_gateway: "${MEMGPT_GATEWAY_PORT:8901}"
  paraformer_api: "${PARAFORMER_API_PORT:8003}"
  vector_memory: "${VECTOR_MEMORY_PORT:8004}"
  web_crawler: "${WEB_CRAWLER_PORT:8902}"
  web_crawler_alt: "${WEB_CRAWLER_ALT_PORT:8900}"

# 数据库配置
database:
  host: "${DATABASE_HOST}"
  port: "${DATABASE_PORT:5432}"
  name: "${DATABASE_NAME}"
  user: "${DATABASE_USER}"
  password: "${DATABASE_PASSWORD}"
  sslmode: "require"

  # 连接池配置
  pool:
    min_size: 10
    max_size: 50
    max_idle: 300
    timeout: 30
    health_check_period: 30

# Redis配置
redis:
  host: "${REDIS_HOST}"
  port: "${REDIS_PORT:6379}"
  db: "${REDIS_DB:0}"
  password: "${REDIS_PASSWORD}"
  ssl: true

  # 连接池配置
  pool:
    max_connections: 100
    retry_on_timeout: true

# 缓存配置
cache:
  enabled: true
  default_ttl: 3600  # 1小时
  debug: false

  # 生产环境缓存优化
  performance:
    high_availability: true
    cluster_mode: true

# API配置
api:
  # 限流配置
  rate_limiting:
    enabled: true
    requests_per_minute: 1000
    burst_size: 100

  # CORS配置
  cors:
    enabled: true
    origins:
      - "https://athena-platform.com"
      - "https://app.athena-platform.com"

  # 安全配置
  security:
    force_https: true
    helmet_headers: true
    csrf_protection: true

# 监控配置
monitoring:
  # 性能监控
  performance_monitoring:
    enabled: true
    detailed_metrics: true
    alert_thresholds:
      cpu_usage: 80
      memory_usage: 85
      disk_usage: 90
      response_time: 1000  # ms

  # 健康检查
  health_check:
    enabled: true
    interval: 30
    public_endpoint: true

  # 告警配置
  alerts:
    enabled: true
    channels:
      - email
      - slack
      - webhook

# 日志配置
logging:
  level: "INFO"
  format: "json"
  file_output: true
  console_output: false

  # 生产环境日志文件
  file:
    path: "/var/log/athena/athena.log"
    max_size: "100MB"
    backup_count: 10
    rotation: "daily"

  # 日志聚合
  aggregation:
    enabled: true
    elasticsearch:
      enabled: true
      index: "athena-logs"

# 安全配置
security:
  # 认证配置
  authentication:
    jwt_expiry: 3600
    refresh_token_expiry: 86400

  # 加密配置
  encryption:
    at_rest: true
    key_rotation: true
    algorithm: "AES-256-GCM"

  # 访问控制
  access_control:
    ip_whitelist: true
    rate_limiting: true
    audit_logging: true

# 备份配置
backup:
  enabled: true
  schedule: "0 2 * * *"  # 每天凌晨2点
  retention_days: 30
  encryption: true

# 性能优化
performance:
  # 连接优化
  connection_pooling:
    enabled: true
    max_connections: 1000

  # 缓存优化
  caching:
    aggressive: true
    cdn_enabled: true

  # 压缩配置
  compression:
    enabled: true
    level: 6
    types:
      - text/html
      - text/css
      - application/javascript
      - application/json