# Athena生产环境模型配置
# Local Model Optimization Configuration

environment: "production"

# 模型配置
models:
  # 设备配置 (自动检测MPS/CUDA/CPU)
  device:
    auto_detect: true
    priority: ["mps", "cuda", "cpu"]
    fallback_to_cpu: true

  # BGE模型配置
  bge:
    # 默认模型
    default_model: "BAAI/bge-m3"

    # 模型路径配置
    paths:
      converted_dir: "/Users/xujian/Athena工作平台/models/converted"
      local_dir: "/Users/xujian/Athena工作平台/models"

    # 支持的模型
    available_models:
      - name: "bge-small-zh-v1.5"
        dimension: 512
        max_seq_length: 512
        path: "bge-small-zh-v1.5"
        pooler:
          pooling_mode_mean_tokens: true

      - name: "BAAI/bge-m3"
        dimension: 768
        max_seq_length: 512
        path: "BAAI/bge-m3"
        pooler:
          pooling_mode_mean_tokens: true
        # 默认使用
        default: true

      - name: "BAAI/bge-m3"
        dimension: 1024
        max_seq_length: 512
        path: "BAAI/bge-m3"
        pooler:
          pooling_mode_mean_tokens: true
        # 高精度场景使用
        use_case: "high_accuracy"

      - name: "nomic-embed-text-v1.5"
        dimension: 768
        max_seq_length: 8192
        path: "nomic-embed-text-v1.5"
        # 长文本场景使用
        use_case: "long_text"

  # 意图识别模型
  intent:
    models:
      - name: "enhanced_intent_classifier"
        path: "models/intent/enhanced_intent_classifier"
        version: "v20251218"
        accuracy: 0.99

      - name: "lightweight_intent_classifier"
        path: "models/intent/lightweight_intent_classifier"
        version: "v20251218"
        accuracy: 0.95
        # 默认使用 (快速响应)
        default: true

# 批处理配置
batch_processing:
  enabled: true
  default_batch_size: 32
  min_batch_size: 8
  max_batch_size: 64
  timeout_ms: 50

  # 自适应批处理
  adaptive:
    enabled: true
    target_latency_ms: 50
    adjustment_factor: 0.1

  # 优先级队列
  priority_queue:
    enabled: true
    levels:
      - name: "high"
        priority: 1
        weight: 3
      - name: "medium"
        priority: 2
        weight: 2
      - name: "low"
        priority: 3
        weight: 1

# 缓存配置
cache:
  # L1内存缓存
  l1_memory:
    enabled: true
    max_size_mb: 500
    eviction_policy: "lru"

  # L2 Redis缓存
  l2_redis:
    enabled: true
    host: "${REDIS_HOST}"
    port: "${REDIS_PORT:6379}"
    db: 1  # 使用独立的DB
    ttl: 86400  # 24小时

  # L3磁盘缓存
  l3_disk:
    enabled: true
    cache_dir: "/Users/xujian/Athena工作平台/cache/model_embeddings"
    ttl: -1  # 永久

  # 缓存策略
  strategy:
    write_through: true  # 同时写L1和L2
    write_back: false
    preload:
      enabled: true
      models:
        - "BAAI/bge-m3"
        - "lightweight_intent_classifier"

# 监控配置
monitoring:
  enabled: true
  sample_interval_sec: 5
  retention_hours: 168  # 7天

  # 性能指标
  metrics:
    - name: "inference_latency_ms"
      type: "gauge"
      threshold:
        warning: 100
        critical: 200

    - name: "throughput_per_sec"
      type: "gauge"

    - name: "memory_usage_mb"
      type: "gauge"
      threshold:
        warning: 4096
        critical: 6144

    - name: "gpu_utilization"
      type: "gauge"
      threshold:
        warning: 80
        critical: 95

    - name: "cache_hit_rate"
      type: "gauge"
      threshold:
        warning: 0.5
        critical: 0.3

  # 告警配置
  alerts:
    enabled: true
    channels:
      - type: "log"
        level: "WARNING"

      - type: "webhook"
        url: "${ALERT_WEBHOOK_URL}"
        level: "CRITICAL"

# 性能优化配置
optimization:
  # MPS优化
  mps:
    enabled: true
    memory_efficient: true
    # MPS内存优化配置
    max_memory_mb: 8192  # 8GB
    offload_to_cpu: false

  # 混合精度
  mixed_precision:
    enabled: false  # 可选启用
    dtype: "float16"

  # 量化配置
  quantization:
    enabled: false  # 可选启用
    precision: "int8"
    accuracy_threshold: 0.01

# 分层加载配置
tiered_loading:
  enabled: true

  # HOT层 (常驻内存)
  hot:
    memory_limit_mb: 2048
    models:
      - name: "BAAI/bge-m3"
        preload: true
      - name: "lightweight_intent_classifier"
        preload: true

  # WARM层 (快速加载)
  warm:
    memory_limit_mb: 4096
    models:
      - name: "BAAI/bge-m3"
        preload: false
      - name: "nomic-embed-text-v1.5"
        preload: false

  # COLD层 (按需加载)
  cold:
    models:
      # 已移除法律模型，统一使用BGE-M3

# 日志配置
logging:
  level: "INFO"
  format: "json"

  # 模型加载日志
  model_loading:
    log_device_info: true
    log_model_info: true
    log_performance: true

# 健康检查
health_check:
  enabled: true
  interval_sec: 60

  # 检查项
  checks:
    - name: "model_availability"
      enabled: true

    - name: "device_status"
      enabled: true

    - name: "memory_usage"
      enabled: true
      threshold_mb: 6144

    - name: "cache_health"
      enabled: true
