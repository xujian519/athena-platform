# 工具测试配置
# Tool Test Configuration
#
# 为需要初始化参数的工具提供默认配置

# 通用默认配置
defaults:
  # 数据库配置
  database:
    host: "localhost"
    port: 5432
    username: "test_user"
    password: "test_password"
    database: "test_db"

  # Redis配置
  redis:
    host: "localhost"
    port: 6379
    db: 0
    password: null

  # 缓存配置
  cache:
    enabled: true
    ttl: 3600
    max_size: 10000

  # 超时配置
  timeout:
    default: 30
    short: 5
    long: 300

  # 日志配置
  logging:
    level: "INFO"
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# 工具特定配置
tool_configs:

  # === BUILTIN类别 ===
  builtin.Tool:
    tool_id: "test_tool"
    name: "Test Tool"
    category: "utility"
    description: "测试工具"

  builtin.MonitoredToolCallResult:
    tool_name: "test_tool"
    call_params: {}
    result: {}
    execution_time: 0.1
    success: true
    error: null

  # === SERVICE类别 ===
  service.BrowserAutomationTool:
    headless: true
    timeout: 30000

  service.BrowserToolManager:
    max_concurrent: 3
    default_timeout: 30000

  service.CrawlerTool:
    max_pages: 10
    concurrent_requests: 3
    timeout: 30

  service.CrawlerToolManager:
    max_concurrent_crawlers: 5

  service.DatabaseManager:
    db_type: "postgresql"
    connection_string: "postgresql://test_user:test_password@localhost:5432/test_db"

  # === AUTOMATION类别 ===
  automation.DouyinUserInfoScraper:
    proxy_enabled: false
    max_retries: 3
    timeout: 30

  automation.AthenaPlaywrightAgent:
    headless: true
    timeout: 30000

  automation.AthenaBrowserGLMAgent:
    headless: true
    timeout: 30000

  automation.ConnectionManager:
    max_connections: 100
    keepalive_timeout: 30

  automation.AthenaBrowserUseManager:
    max_browsers: 3
    default_timeout: 30000

  # === UTILITY类别 ===
  utility.RedisCacheManager:
    redis_url: "redis://localhost:6379/0"
    default_ttl: 3600
    max_size: 10000

  utility.SmartDelayManager:
    min_delay: 0.1
    max_delay: 5.0
    initial_delay: 1.0

  utility.OptimizedAsyncCrawler:
    max_concurrent: 10
    timeout: 30
    retry_attempts: 3

  utility.MCPTool:
    name: "test_mcp_tool"
    description: "Test MCP Tool"
    input_schema: {}
    server: "test_server"

  utility.ProgressLogHandler:
    log_level: "INFO"
    show_progress: true

  utility.NLPRequestHandler:
    model_name: "gpt-3.5-turbo"
    max_tokens: 2000
    temperature: 0.7

  utility.RobustnessManager:
    max_retries: 3
    timeout: 30
    fallback_enabled: true

  utility.AlertManager:
    enabled: true
    check_interval: 60

  utility.AdvancedMemoryManager:
    max_memory_size: 10000
    eviction_policy: "LRU"

  utility.BaseAgent:
    agent_id: "test_agent"
    name: "Test Agent"
    config: {}

  utility.AthenaCoreAgent:
    agent_id: "athena_core_test"
    name: "Athena Core Test"
    model: "gpt-3.5-turbo"

  utility.XiaonaFamilyAgent:
    agent_id: "xiaona_family_test"
    name: "小诺家庭测试"
    language: "zh"

  utility.XuNuoSearchAgent:
    agent_id: "xunuo_search_test"
    name: "许诺搜索测试"
    search_engine: "default"

  utility.MessageHandler:
    max_message_size: 1048576
    timeout: 30

  utility.TestAgent:
    agent_id: "test_agent"
    name: "Test Agent"

  utility.DocumentStorageManager:
    storage_path: "/tmp/test_storage"
    max_size: 104857600

  utility.BertEmbeddingService:
    model_name: "bert-base-chinese"
    batch_size: 32
    max_length: 512

  utility.FileManager:
    base_path: "/tmp"
    max_file_size: 104857600

  utility.XiaonaAgent:
    agent_id: "xiaona_test"
    name: "小诺测试"
    version: "1.0.0"

  utility.ProductionNLPService:
    model_name: "gpt-3.5-turbo"
    api_key_env: "OPENAI_API_KEY"

  utility.ProductionStorageManager:
    connection_string_env: "DATABASE_URL"
    pool_size: 10

  utility.ParallelStorageExecutor:
    max_workers: 4
    batch_size: 100

  utility.FaultToleranceManager:
    max_retries: 3
    circuit_breaker_threshold: 5

  # === MCP类别 ===
  mcp.ProgressLogHandler:
    log_level: "INFO"
    update_interval: 1.0

# 测试环境配置
test_environment:
  # 是否使用Mock数据
  use_mock: true

  # 是否跳过网络请求
  skip_network: true

  # 测试数据目录
  test_data_dir: "tests/data"

  # 是否生成详细报告
  verbose: true

# 工具类别配置
category_config:
  builtin:
    requires_config: true
    config_required_for:
      - Tool
      - MonitoredToolCallResult
    auto_instantiate: false

  search:
    requires_config: false
    auto_instantiate: true

  service:
    requires_config: true
    config_required_for:
      - BrowserAutomationTool
      - CrawlerTool
      - DatabaseManager
    auto_instantiate: false

  automation:
    requires_config: true
    config_required_for:
      - DouyinUserInfoScraper
      - AthenaPlaywrightAgent
      - AthenaBrowserGLMAgent
    auto_instantiate: false

  utility:
    requires_config: true
    config_required_for:
      - RedisCacheManager
      - MCPTool
      - BaseAgent
    auto_instantiate: false

  mcp:
    requires_config: true
    auto_instantiate: false
