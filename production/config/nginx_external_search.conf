# Athena外部搜索引擎API负载均衡配置
upstream external_search_backend {
    least_conn;
    server localhost:8080 max_fails=3 fail_timeout=30s;
    # 可以添加更多服务器实例
    # server localhost:8081 max_fails=3 fail_timeout=30s;
    # server localhost:8082 max_fails=3 fail_timeout=30s;

    keepalive 32;
}

# 缓存配置
proxy_cache_path /Users/xujian/Athena工作平台/cache/nginx
                 levels=1:2
                 keys_zone=external_search_cache:10m
                 max_size=1g
                 inactive=60m
                 use_temp_path=off;

# 限流配置
limit_req_zone $binary_remote_addr zone=external_search_limit:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;

    # 安全头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Access-Control-Allow-Origin "*";
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
    add_header Access-Control-Allow-Headers "Content-Type, Authorization";

    # 日志配置
    access_log /Users/xujian/Athena工作平台/logs/external_search_access.log;
    error_log /Users/xujian/Athena工作平台/logs/external_search_error.log;

    # 根路径
    location / {
        proxy_pass http://external_search_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 搜索接口 - 带缓存和限流
    location /search {
        # 限流
        limit_req zone=external_search_limit burst=20 nodelay;

        # 缓存配置
        proxy_cache external_search_cache;
        proxy_cache_valid 200 5m;  # 成功响应缓存5分钟
        proxy_cache_valid 404 1m;  # 404响应缓存1分钟
        proxy_cache_valid 500 30s; # 服务器错误缓存30秒

        # 缓存键包含查询参数
        proxy_cache_key "$scheme$request_method$host$request_uri";

        # 缓存控制头
        add_header X-Cache-Status $upstream_cache_status;
        proxy_no_cache $cookie_nocache $arg_nocache $comment_nocache $arg_q;

        # 代理设置
        proxy_pass http://external_search_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 搜索接口特殊超时配置
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 45s;
    }

    # 健康检查接口 - 不缓存
    location /health {
        proxy_pass http://external_search_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 健康检查快速响应
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;

        # 不缓存健康检查
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # 指标接口 - 不缓存
    location /metrics {
        proxy_pass http://external_search_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;

        # 不缓存指标数据
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # API文档
    location /docs {
        proxy_pass http://external_search_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态文件缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

