
# Patent数据库优化配置
# 生成时间: 2025-01-09
# 针对大数据量(2800万+)的优化方案

patent_db_pool_config:
  # 基础连接配置
  host: localhost
  port: 5432
  database: patent_db
  user: xujian
  
  # 连接池大小配置（针对大数据量优化）
  pool_config:
    min_connections: 20      # 最小连接数（原10→20）
    max_connections: 100     # 最大连接数（原50→100）
    connection_timeout: 10.0 # 连接超时（原5.0→10.0）
    idle_timeout: 600.0      # 空闲超时（原300→600秒）
    max_lifetime: 7200.0     # 最大生命周期（原3600→7200秒，2小时）
    health_check_interval: 60.0  # 健康检查间隔（原30→60秒）
    
  # 性能优化配置
  performance:
    # 查询优化
    enable_query_cache: true
    query_cache_size: 1000
    query_cache_ttl: 3600
    
    # 批量操作优化
    batch_size: 1000         # 批量查询大小
    batch_insert_size: 500   # 批量插入大小
    
    # 预编译语句
    enable_prepared_statements: true
    statement_cache_size: 100
    
  # 监控配置
  monitoring:
    enable_slow_query_log: true
    slow_query_threshold: 5.0  # 慢查询阈值（秒）
    enable_connection_stats: true
    stats_retention_days: 30

# 使用说明：
# 1. 在代码中导入配置：
#    from core.database.patent_pool_config import patent_db_pool_config
#    
# 2. 创建连接池：
#    pool = PostgreSQLPool(patent_db_pool_config, PoolConfig(**patent_db_pool_config['pool_config']))
#    
