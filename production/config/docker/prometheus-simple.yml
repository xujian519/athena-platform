# Prometheus简化配置 - 用于本地生产环境
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'athena-ai'
    environment: 'production-local'

# 告警管理器配置 (可选)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: []

# 规则文件
rule_files:
  - "/etc/prometheus/rules/*.yml"

# 抓取配置
scrape_configs:
  # Prometheus自监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 5s

  # Node Exporter监控
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']
    scrape_interval: 10s

  # Qdrant向量数据库监控
  - job_name: 'qdrant'
    static_configs:
      - targets: ['athena-prod-qdrant:6333']
    scrape_interval: 30s
    metrics_path: '/metrics'

  # PostgreSQL监控 (需要安装postgres_exporter)
  # - job_name: 'postgresql'
  #   static_configs:
  #     - targets: ['host.docker.internal:9187']
  #   scrape_interval: 30s

  # Redis监控 (需要安装redis_exporter)
