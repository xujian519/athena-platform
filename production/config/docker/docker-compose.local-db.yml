# Athena生产环境配置 - 使用本地PostgreSQL和Redis
# Production Environment with Local PostgreSQL and Redis

# Docker Compose配置文件 - 移除废弃的version字段
# 技术决策: TD-001 - 统一图数据库选择为Neo4j

services:
  # =========================
  # Qdrant向量数据库
  # =========================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: athena-prod-qdrant
    ports:
      - "6335:6333"  # HTTP API (使用6335避免冲突)
      - "6336:6334"  # gRPC API
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    restart: unless-stopped
    networks:
      - athena-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    labels:
      - "com.athena.service=qdrant"
      - "com.athena.environment=production"

  # =========================
  # Neo4j图数据库 (TD-001: 统一图数据库)
  # =========================
  neo4j:
    image: neo4j:5-community
    container_name: athena-prod-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/athena_prod_password
      - NEO4J_dbms_default__database=neo4j
      - NEO4J_dbms_memory_pagecache_size=1G
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=512m
      - NEO4J_dbms_connector_bolt_advertised__address=:7687
      - NEO4J_dbms_connector_http_advertised__address=:7474
      - NEO4J_dbms_logs_debug_level=INFO
      # 修复DNS解析问题
      - NEO4J_dbms_jvm_additional=-Djava.net.preferIPv4Stack=true
    ports:
      - "7475:7474"  # HTTP (使用7475避免冲突)
      - "7688:7687"  # Bolt (使用7688避免冲突)
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
    networks:
      - athena-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    labels:
      - "com.athena.service=neo4j"
      - "com.athena.environment=production"
      - "com.athena.domain=graph"

  # =========================
  # Prometheus监控系统
  # =========================
  prometheus:
    image: prom/prometheus:latest
    container_name: athena-prod-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus-simple.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    networks:
      - athena-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.athena.service=prometheus"
      - "com.athena.environment=production"

  # =========================
  # Grafana可视化平台
  # =========================
  grafana:
    image: grafana/grafana:latest
    container_name: athena-prod-grafana
    ports:
      - "3001:3000"  # 使用3001端口避免冲突
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ../../infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../infrastructure/monitoring/grafana-dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - athena-network
    depends_on:
      - prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.athena.service=grafana"
      - "com.athena.environment=production"

networks:
  athena-network:
    name: athena-network

# =========================
# 迁移说明 (TD-001)
# =========================
#
# 从 NebulaGraph 迁移到 Neo4j:
# 1. 停止 NebulaGraph 服务:
#    docker-compose -f docker-compose.local-db.yml down nebula-metad nebula-graphd nebula-storaged
#
# 2. 备份 NebulaGraph 数据 (如需要):
#    docker exec athena-prod-nebula-storaged nebula-backup ...
#
# 3. 启动 Neo4j 服务:
#    docker-compose -f docker-compose.local-db.yml up -d neo4j
#
# 4. 数据迁移 (如有需要):
#    - 使用 nGQL 导出脚本从 NebulaGraph 导出数据
#    - 使用 Cypher 导入脚本将数据导入 Neo4j
#
# 5. 验证服务:
#    - Neo4j Browser: http://localhost:7475
#    - Bolt 连接: bolt://localhost:7688
#
# =========================
