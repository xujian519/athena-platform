# Athena工作平台 - MCP服务器层 Docker Compose配置
# MCP Servers Layer - Model Context Protocol Servers
#
# 包含8个专业MCP服务器：学术搜索、专利下载、专利搜索、Jina AI、高德地图、Chrome、GitHub、谷歌专利元数据

version: '3.8'

services:
  # ==================== 学术搜索MCP服务器 ====================
  academic-search-mcp:
    build:
      context: ../../mcp-servers/academic-search-mcp-server
      dockerfile: Dockerfile
    image: athena/academic-search-mcp:latest
    container_name: athena-academic-search-mcp
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      PYTHONUNBUFFERED: 1
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
      LOG_LEVEL: INFO
      API_GATEWAY_URL: http://api-gateway:8080
    volumes:
      - ../../logs/academic-search-mcp:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8200 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      api-gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    networks:
      - athena-network
    labels:
      - "com.athena.layer=mcp_servers"
      - "com.athena.type=academic-search"

  # ==================== 专利搜索MCP服务器 ====================
  patent-search-mcp:
    build:
      context: ../../mcp-servers/patent-search-mcp-server
      dockerfile: Dockerfile
    image: athena/patent-search-mcp:latest
    container_name: athena-patent-search-mcp
    restart: unless-stopped
    ports:
      - "8201:8201"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PYTHONUNBUFFERED: 1
      POSTGRES_HOST: host.docker.internal  # 连接本地PostgreSQL 17.7
      POSTGRES_PORT: 5432
      POSTGRES_DB: athena
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: ${DB_PASSWORD:-athena123}
      LOG_LEVEL: INFO
      API_GATEWAY_URL: http://api-gateway:8080
    volumes:
      - ../../logs/patent-search-mcp:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8201 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      api-gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    networks:
      - athena-network
    labels:
      - "com.athena.layer=mcp_servers"
      - "com.athena.type=patent-search"

  # ==================== 专利下载MCP服务器 ====================
  patent-downloader-mcp:
    build:
      context: ../../mcp-servers/patent-downloader-mcp-server
      dockerfile: Dockerfile
    image: athena/patent-downloader-mcp:latest
    container_name: athena-patent-downloader-mcp
    restart: unless-stopped
    ports:
      - "8202:8202"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PYTHONUNBUFFERED: 1
      POSTGRES_HOST: host.docker.internal  # 连接本地PostgreSQL 17.7
      POSTGRES_PORT: 5432
      POSTGRES_DB: athena
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: ${DB_PASSWORD:-athena123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      DOWNLOAD_DIR: /app/data/patents
      LOG_LEVEL: INFO
      API_GATEWAY_URL: http://api-gateway:8080
    volumes:
      - ../../logs/patent-downloader-mcp:/app/logs
      - ../../data/patents:/app/data/patents
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8202 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    networks:
      - athena-network
    labels:
      - "com.athena.layer=mcp_servers"
      - "com.athena.type=patent-download"

  # ==================== Jina AI MCP服务器 ====================
  jina-ai-mcp:
    build:
      context: ../../mcp-servers/jina-ai-mcp-server
      dockerfile: Dockerfile
    image: athena/jina-ai-mcp:latest
    container_name: athena-jina-ai-mcp
    restart: unless-stopped
    ports:
      - "8203:8203"
    environment:
      PYTHONUNBUFFERED: 1
      JINA_API_KEY: ${JINA_API_KEY:-}
      LOG_LEVEL: INFO
      API_GATEWAY_URL: http://api-gateway:8080
    volumes:
      - ../../logs/jina-ai-mcp:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8203 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      api-gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    networks:
      - athena-network
    labels:
      - "com.athena.layer=mcp_servers"
      - "com.athena.type=jina-ai"

  # ==================== 高德地图MCP服务器 ====================
  gaode-mcp:
    build:
      context: ../../mcp-servers/gaode-mcp-server
      dockerfile: Dockerfile
    image: athena/gaode-mcp:latest
    container_name: athena-gaode-mcp
    restart: unless-stopped
    ports:
      - "8206:8206"
    environment:
      PYTHONUNBUFFERED: 1
      GAODE_API_KEY: ${GAODE_API_KEY:-}
      LOG_LEVEL: INFO
      API_GATEWAY_URL: http://api-gateway:8080
    volumes:
      - ../../logs/gaode-mcp:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8206 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      api-gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    networks:
      - athena-network
    labels:
      - "com.athena.layer=mcp_servers"
      - "com.athena.type=gaode-map"

  # ==================== Chrome MCP服务器 ====================
  chrome-mcp:
    build:
      context: ../../mcp-servers/chrome-mcp-server
      dockerfile: Dockerfile
    image: athena/chrome-mcp:latest
    container_name: athena-chrome-mcp
    restart: unless-stopped
    ports:
      - "8205:8205"
    environment:
      PYTHONUNBUFFERED: 1
      BROWSER_AUTOMATION_URL: http://browser-automation:8030
      LOG_LEVEL: INFO
      HEADLESS: "true"
    volumes:
      - ../../logs/chrome-mcp:/app/logs
      - /dev/shm:/dev/shm  # 共享内存，用于Chrome
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8205 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      browser-automation:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    shm_size: 1gb
    networks:
      - athena-network
    labels:
      - "com.athena.layer=mcp_servers"
      - "com.athena.type=chrome"

  # ==================== GitHub MCP服务器 ====================
  github-mcp:
    build:
      context: ../../mcp-servers/github-mcp-server
      dockerfile: Dockerfile
    image: athena/github-mcp:latest
    container_name: athena-github-mcp
    restart: unless-stopped
    ports:
      - "8207:8207"
    environment:
      NODE_ENV: production
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      LOG_LEVEL: info
      API_GATEWAY_URL: http://api-gateway:8080
    volumes:
      - ../../logs/github-mcp:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8207 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      api-gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    networks:
      - athena-network
    labels:
      - "com.athena.layer=mcp_servers"
      - "com.athena.type=github"

  # ==================== 谷歌专利元数据MCP服务器 ====================
  google-patents-meta-mcp:
    build:
      context: ../../mcp-servers/google-patents-meta-server
      dockerfile: Dockerfile
    image: athena/google-patents-meta-mcp:latest
    container_name: athena-google-patents-meta-mcp
    restart: unless-stopped
    ports:
      - "8208:8208"
    environment:
      PYTHONUNBUFFERED: 1
      LOG_LEVEL: INFO
      API_GATEWAY_URL: http://api-gateway:8080
    volumes:
      - ../../logs/google-patents-meta-mcp:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8208 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      api-gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    networks:
      - athena-network
    labels:
      - "com.athena.layer=mcp_servers"
      - "com.athena.type=google-patents"

