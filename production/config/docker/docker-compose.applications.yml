# Athena工作平台 - 应用层 Docker Compose配置
# Applications Layer - User-Facing Applications
#
# 包含面向用户的应用服务：XiaoNuo网关、意图识别、可视化工具

version: '3.8'

services:
  # ==================== XiaoNuo统一网关 ====================
  xiaonuo-gateway:
    build:
      context: ../../apps/xiaonuo
      dockerfile: Dockerfile
    image: athena/xiaonuo-gateway:latest
    container_name: athena-xiaonuo-gateway
    restart: unless-stopped
    ports:
      - "8100:8100"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PYTHONUNBUFFERED: 1
      API_GATEWAY_URL: http://api-gateway:8080
      ACADEMIC_SEARCH_MCP_URL: http://academic-search-mcp:8200
      PATENT_SEARCH_MCP_URL: http://patent-search-mcp:8201
      PATENT_DOWNLOADER_MCP_URL: http://patent-downloader-mcp:8202
      JINA_AI_MCP_URL: http://jina-ai-mcp:8203
      JOYAGENT_OPTIMIZATION_URL: http://joyagent-optimization:8035
      POSTGRES_HOST: host.docker.internal  # 连接本地PostgreSQL 17.7
      POSTGRES_PORT: 5432
      POSTGRES_DB: athena
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: ${DB_PASSWORD:-athena123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      LOG_LEVEL: INFO
      ENABLE_ORCHESTRATOR: "true"
    volumes:
      - ../../logs/xiaonuo:/app/logs
      - ../../config:/app/config:ro
    command: python start_gateway.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      api-gateway:
        condition: service_healthy
      academic-search-mcp:
        condition: service_healthy
      patent-search-mcp:
        condition: service_healthy
      jina-ai-mcp:
        condition: service_healthy
      joyagent-optimization:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    networks:
      - athena-network
    labels:
      - "com.athena.layer=applications"
      - "com.athena.type=gateway"
      - "com.athena.critical=true"

  # ==================== 意图识别服务 ====================
  intent-recognition:
    build:
      context: ../../api
      dockerfile: Dockerfile
    image: athena/intent-recognition:latest
    container_name: athena-intent-recognition
    restart: unless-stopped
    ports:
      - "8002:8002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PYTHONUNBUFFERED: 1
      POSTGRES_HOST: host.docker.internal  # 连接本地PostgreSQL 17.7
      POSTGRES_PORT: 5432
      POSTGRES_DB: athena
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: ${DB_PASSWORD:-athena123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MODEL_PATH: /app/models
      LOG_LEVEL: INFO
    volumes:
      - ../../logs/intent-recognition:/app/logs
      - ../../models:/app/models:ro
    command: python -m uvicorn intent_recognition_api_v11:app --host 0.0.0.0 --port 8002
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    networks:
      - athena-network
    labels:
      - "com.athena.layer=applications"
      - "com.athena.type=intent"

  # ==================== 可视化工具 ====================
  visualization-tools:
    build:
      context: ../../services/visualization-tools
      dockerfile: Dockerfile
    image: athena/visualization-tools:latest
    container_name: athena-visualization-tools
    restart: unless-stopped
    ports:
      - "8091:8091"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PYTHONUNBUFFERED: 1
      POSTGRES_HOST: host.docker.internal  # 连接本地PostgreSQL 17.7
      POSTGRES_PORT: 5432
      POSTGRES_DB: athena
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: ${DB_PASSWORD:-athena123}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      NEBULA_HOST: nebula-graph
      NEBULA_PORT: 9669
      LOG_LEVEL: INFO
    volumes:
      - ../../logs/visualization-tools:/app/logs
      - ../../data/visualizations:/app/data/visualizations
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      qdrant:
        condition: service_healthy
      nebula-graph:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    networks:
      - athena-network
    labels:
      - "com.athena.layer=applications"
      - "com.athena.type=visualization"

