# Athena工作平台 - 基础设施层 Docker Compose配置
# Infrastructure Layer - Databases, Caches, and Storage Services
#
# 包含所有基础设施服务：PostgreSQL、Redis、Qdrant、Neo4j
#
# ⚠️ NebulaGraph 已于 2026-01-27 废弃
# 替代方案: Neo4j 5.26.19
# 相关文档: core/nebula/DEPRECATED.md


services:
  # ==================== PostgreSQL数据库（本地版本） ====================
  # 注意：使用本地PostgreSQL 17.7版本，不使用Docker容器
  # 连接方式：host.docker.internal:5432
  # 如需启用Docker版本，取消以下注释并确保端口不冲突
  # postgresql:
  #   image: postgres:15-alpine
  #   container_name: athena-postgresql
  #   restart: unless-stopped
  #   ports:
  #     - "5433:5432"  # 使用不同端口避免冲突
  #   environment:
  #     POSTGRES_DB: athena
  #     POSTGRES_USER: athena
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-athena123}
  #     PGDATA: /var/lib/postgresql/data/pgdata
  #   volumes:
  #     - ../../data/postgres:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U athena -d athena"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 30s
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '2.0'
  #         memory: 4G
  #       reservations:
  #         cpus: '1.0'
  #         memory: 2G
  #   networks:
  #     - athena-network
  #   labels:
  #     - "com.athena.layer=infrastructure"
  #     - "com.athena.type=database"

  # ==================== Redis缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: athena-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "6379:6379"
    volumes:
      - ../../data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    networks:
      - athena-network
    labels:
      - "com.athena.layer=infrastructure"
      - "com.athena.type=cache"

  # ==================== Qdrant向量数据库 ====================
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: athena-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
    volumes:
      - ../../data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 16G
        reservations:
          cpus: '2.0'
          memory: 8G
    networks:
      - athena-network
    labels:
      - "com.athena.layer=infrastructure"
      - "com.athena.type=vector-db"

  # ==================== NebulaGraph 服务集群 (已废弃) ====================
  # ⚠️ NebulaGraph 已于 2026-01-27 废弃
  # 废弃原因: 平台全面使用 Neo4j 作为知识图谱数据库
  # 替代方案: Neo4j 5.26.19
  # 相关文档: core/nebula/DEPRECATED.md
  # 资源节省: 约 7GB 内存
  #
  # 如需恢复 (不推荐)，取消以下注释:
  #
  # # nebula-metad:
  # #   image: vesoft/nebula-metad:v3.6.0
  # #   container_name: athena-nebula-metad
  # #   ... (完整配置见备份文件)
  #
  # # nebula-storaged:
  # #   image: vesoft/nebula-storaged:v3.6.0
  # #   ... (完整配置见备份文件)
  #
  # # nebula-graph:
  # #   image: vesoft/nebula-graph:v3.6.0
  # #   ... (完整配置见备份文件)

