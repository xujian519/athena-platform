# Athena工作平台 - 核心服务层 Docker Compose配置
# Core Services Layer - Business Logic Services
#
# 包含核心业务服务：API网关、专利分析、知识图谱、YunPat代理等

version: '3.8'

services:
  # ==================== API网关 ====================
  api-gateway:
    build:
      context: ../../services/api-gateway
      dockerfile: Dockerfile
    image: athena/api-gateway:latest
    container_name: athena-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # 用于连接本地PostgreSQL
    environment:
      NODE_ENV: production
      PORT: 8080
      POSTGRES_HOST: host.docker.internal  # 连接本地PostgreSQL 17.7
      POSTGRES_PORT: 5432
      POSTGRES_DB: athena
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: ${DB_PASSWORD:-athena123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      LOG_LEVEL: info
    volumes:
      - ../../logs/api-gateway:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    networks:
      - athena-network
    labels:
      - "com.athena.layer=core_services"
      - "com.athena.type=gateway"

  # ==================== 统一身份认证 ====================
  unified-identity:
    build:
      context: ../../services/unified-identity
      dockerfile: Dockerfile
    image: athena/unified-identity:latest
    container_name: athena-unified-identity
    restart: unless-stopped
    ports:
      - "8010:8010"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PYTHONUNBUFFERED: 1
      POSTGRES_HOST: host.docker.internal  # 连接本地PostgreSQL 17.7
      POSTGRES_PORT: 5432
      POSTGRES_DB: athena
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: ${DB_PASSWORD:-athena123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      LOG_LEVEL: INFO
    volumes:
      - ../../logs/unified-identity:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    networks:
      - athena-network
    labels:
      - "com.athena.layer=core_services"
      - "com.athena.type=auth"

  # ==================== YunPat专利代理 ====================
  yunpat-agent:
    build:
      context: ../../services/yunpat-agent
      dockerfile: Dockerfile
    image: athena/yunpat-agent:latest
    container_name: athena-yunpat-agent
    restart: unless-stopped
    ports:
      - "8020:8020"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PYTHONUNBUFFERED: 1
      POSTGRES_HOST: host.docker.internal  # 连接本地PostgreSQL 17.7
      POSTGRES_PORT: 5432
      POSTGRES_DB: athena
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: ${DB_PASSWORD:-athena123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      LOG_LEVEL: INFO
    volumes:
      - ../../logs/yunpat-agent:/app/logs
      - ../../data/patents:/app/data/patents
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    networks:
      - athena-network
    labels:
      - "com.athena.layer=core_services"
      - "com.athena.type=patent"

  # ==================== 浏览器自动化 ====================
  browser-automation:
    build:
      context: ../../services/browser-automation-service
      dockerfile: Dockerfile
    image: athena/browser-automation:latest
    container_name: athena-browser-automation
    restart: unless-stopped
    ports:
      - "8030:8030"
    environment:
      PYTHONUNBUFFERED: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      LOG_LEVEL: INFO
      HEADLESS: "true"
    volumes:
      - ../../logs/browser-automation:/app/logs
      - /dev/shm:/dev/shm  # 共享内存，用于Chrome
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    shm_size: 2gb  # Chrome需要大共享内存
    networks:
      - athena-network
    labels:
      - "com.athena.layer=core_services"
      - "com.athena.type=automation"

  # ==================== 自主控制 ====================
  autonomous-control:
    build:
      context: ../../services/autonomous-control
      dockerfile: Dockerfile
    image: athena/autonomous-control:latest
    container_name: athena-autonomous-control
    restart: unless-stopped
    ports:
      - "8040:8040"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PYTHONUNBUFFERED: 1
      POSTGRES_HOST: host.docker.internal  # 连接本地PostgreSQL 17.7
      POSTGRES_PORT: 5432
      POSTGRES_DB: athena
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: ${DB_PASSWORD:-athena123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      LOG_LEVEL: INFO
    volumes:
      - ../../logs/autonomous-control:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8040/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    networks:
      - athena-network
    labels:
      - "com.athena.layer=core_services"
      - "com.athena.type=control"

  # ==================== 专利分析 ====================
  patent-analysis:
    build:
      context: ../../services/patent-analysis
      dockerfile: Dockerfile
    image: athena/patent-analysis:latest
    container_name: athena-patent-analysis
    restart: unless-stopped
    ports:
      - "8050:8050"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PYTHONUNBUFFERED: 1
      POSTGRES_HOST: host.docker.internal  # 连接本地PostgreSQL 17.7
      POSTGRES_PORT: 5432
      POSTGRES_DB: athena
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: ${DB_PASSWORD:-athena123}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      NEBULA_HOST: nebula-graph
      NEBULA_PORT: 9669
      LOG_LEVEL: INFO
    volumes:
      - ../../logs/patent-analysis:/app/logs
      - ../../data/patents:/app/data/patents
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      qdrant:
        condition: service_healthy
      nebula-graph:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    networks:
      - athena-network
    labels:
      - "com.athena.layer=core_services"
      - "com.athena.type=analysis"

  # ==================== 专利搜索 ====================
  patent-search:
    build:
      context: ../../services/patent-search
      dockerfile: Dockerfile
    image: athena/patent-search:latest
    container_name: athena-patent-search
    restart: unless-stopped
    ports:
      - "8060:8060"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PYTHONUNBUFFERED: 1
      POSTGRES_HOST: host.docker.internal  # 连接本地PostgreSQL 17.7
      POSTGRES_PORT: 5432
      POSTGRES_DB: athena
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: ${DB_PASSWORD:-athena123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      LOG_LEVEL: INFO
    volumes:
      - ../../logs/patent-search:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8060/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    networks:
      - athena-network
    labels:
      - "com.athena.layer=core_services"
      - "com.athena.type=search"

  # ==================== 知识图谱服务 ====================
  knowledge-graph-service:
    build:
      context: ../../services/knowledge-graph-service
      dockerfile: Dockerfile
    image: athena/knowledge-graph-service:latest
    container_name: athena-knowledge-graph-service
    restart: unless-stopped
    ports:
      - "8070:8070"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PYTHONUNBUFFERED: 1
      NEBULA_HOST: nebula-graph
      NEBULA_PORT: 9669
      POSTGRES_HOST: host.docker.internal  # 连接本地PostgreSQL 17.7
      POSTGRES_PORT: 5432
      POSTGRES_DB: athena
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: ${DB_PASSWORD:-athena123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      LOG_LEVEL: INFO
    volumes:
      - ../../logs/knowledge-graph-service:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      nebula-graph:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    networks:
      - athena-network
    labels:
      - "com.athena.layer=core_services"
      - "com.athena.type=knowledge-graph"

  # ==================== JoyAgent优化服务 ====================
  joyagent-optimization:
    build:
      context: ../../services/joyagent-optimization-service
      dockerfile: Dockerfile
    image: athena/joyagent-optimization:latest
    container_name: athena-joyagent-optimization
    restart: unless-stopped
    ports:
      - "8035:8035"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PYTHONUNBUFFERED: 1
      POSTGRES_HOST: host.docker.internal  # 连接本地PostgreSQL 17.7
      POSTGRES_PORT: 5432
      POSTGRES_DB: athena
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: ${DB_PASSWORD:-athena123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      LOG_LEVEL: INFO
    volumes:
      - ../../logs/joyagent-optimization:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8035/api/v1/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    networks:
      - athena-network
    labels:
      - "com.athena.layer=core_services"
      - "com.athena.type=optimization"

