# Athena 统一数据库架构解决方案
# Unified Database Architecture for Athena Platform
# Neo4j + Qdrant + PostgreSQL + Redis

services:
  # =========================
  # Qdrant 向量数据库 (统一实例)
  # =========================
  athena-qdrant:
    image: qdrant/qdrant:latest
    container_name: athena_qdrant_unified
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=4
    volumes:
      - ../../modules/storage/qdrant_storage:/qdrant/storage:rw
    networks:
      - unified-db-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 16G
        reservations:
          cpus: '2.0'
          memory: 8G
    labels:
      - "com.athena.service=qdrant-unified"
      - "com.athena.environment=production"
      - "com.athena.domain=all"

  # =========================
  # Neo4j 图数据库 (统一图数据库解决方案)
  # =========================
  neo4j:
    image: neo4j:5-community
    container_name: athena_neo4j
    hostname: athena-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/athena_neo4j_2024
      - NEO4J_dbms_default__database=neo4j
      - NEO4J_dbms_memory_pagecache_size=1G
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=512m
      - NEO4J_dbms_connector_bolt_advertised__address=:7687
      - NEO4J_dbms_connector_http_advertised__address=:7474
      - NEO4J_dbms_logs_debug_level=INFO
      # 修复DNS解析问题
      - NEO4J_dbms_jvm_additional=-Djava.net.preferIPv4Stack=true
      # =========================
      # SSL/TLS 安全配置 (Neo4j v5 语法)
      # =========================
      # Bolt协议SSL配置
      - NEO4J_dbms_ssl_policy_bolt_enabled=true
      - NEO4J_dbms_ssl_policy_bolt_base_directory=certificates/bolt
      - NEO4J_dbms_ssl_policy_bolt_private_key=private.key
      - NEO4J_dbms_ssl_policy_bolt_public_certificate=public.crt
      - NEO4J_dbms_ssl_policy_bolt_client_auth=NONE
      # Bolt TLS级别 (OPTIONAL/REQUIRED)
      - NEO4J_dbms_connector_bolt_tls__level=OPTIONAL
    extra_hosts:
      - "athena-neo4j:127.0.0.1"
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - ../../data/neo4j/data:/data
      - ../../data/neo4j/logs:/logs
      - ../../data/neo4j/certificates:/var/lib/neo4j/certificates
    networks:
      - unified-db-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    labels:
      - "com.athena.service=neo4j"
      - "com.athena.environment=production"
      - "com.athena.domain=legal"

  # =========================
  # Redis 缓存 (可选)
  # =========================
  athena-redis:
    image: redis:7-alpine
    container_name: athena_redis_unified
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
      - ./config/redis/redis.conf:/etc/redis/redis.conf:ro
    networks:
      - unified-db-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    labels:
      - "com.athena.service=redis-unified"
      - "com.athena.environment=production"
    profiles:
      - cache

networks:
  unified-db-network:
    name: unified-db-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# =========================
# 使用说明
# =========================
#
# 1. 启动所有服务:
#    docker-compose -f docker-compose.unified-databases.yml up -d
#
# 2. 仅启动核心服务 (不含Redis):
#    docker-compose -f docker-compose.unified-databases.yml up -d athena-qdrant neo4j
#
# 3. 启动核心服务 + Redis:
#    docker-compose -f docker-compose.unified-databases.yml --profile cache up -d
#
# 4. 停止服务:
#    docker-compose -f docker-compose.unified-databases.yml down
#
# 5. 查看日志:
#    docker-compose -f docker-compose.unified-databases.yml logs -f [service_name]
#
# =========================
# 服务端口映射
# =========================
#
# Qdrant:
#   - 6333: HTTP API
#   - 6334: gRPC API
#
# Neo4j:
#   - 7474: HTTP (Web UI)
#   - 7687: Bolt (数据库连接)
#
# Redis:
#   - 6379: Redis服务
#
# =========================
# 资源配置
# =========================
#
# 总资源需求:
#   CPU: 4-6核
#   内存: 12-16GB
#   存储: 50GB+
#
# =========================
# 数据持久化
# =========================
#
# Qdrant:     ./qdrant_storage/
# Neo4j:      ../../data/neo4j/data/
# Redis:      ./redis/data/
#
# =========================
# Qdrant Collections (建议)
# =========================
#
# - agent_memory_vectors   (记忆系统)
# - conversation_vectors   (对话记录)
# - knowledge_vectors      (知识库)
# - legal_vectors          (法律系统)
# - patent_vectors         (专利系统)
# - document_vectors       (文档系统)
#
# =========================
# Neo4j 节点标签 (建议)
# =========================
#
# - Patent          (专利)
# - LegalRule       (法律规则)
# - Law             (法律条文)
# - Decision        (判决/决定)
# - Concept         (概念)
# - TechnicalField  (技术领域)
# - IPC             (IPC分类)
#
# =========================
