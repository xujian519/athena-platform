cache:
  llm:
    hot_size: 10000
    ttl: 3600
    warm_size: 100000
  search:
    hot_size: 5000
    ttl: 1800
    warm_size: 50000
monitoring:
  alert_thresholds:
    hit_rate_critical: 0.3
    hit_rate_warning: 0.5
    memory_warning: 1073741824
    qps_warning: 100000
  metrics_update_interval: 60
  prometheus_port: 8000
performance:
  connection_pool_size: 100
  max_concurrent_requests: 1000
  request_timeout: 30
