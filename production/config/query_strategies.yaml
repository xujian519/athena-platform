# Athena 查询策略配置
# Query Strategy Configuration for Athena Platform

# 领域查询策略
# Domain Query Strategies
domain_strategies:
  patent:
    description: "专利领域查询策略"
    vector_weight: 0.2
    kg_weight: 0.3
    rule_weight: 0.5
    reasoning: "专利更依赖精确规则和知识图谱"

  legal:
    description: "法律领域查询策略"
    vector_weight: 0.3
    kg_weight: 0.2
    rule_weight: 0.5
    reasoning: "法律条文重视精确规则匹配"

  trademark:
    description: "商标领域查询策略"
    vector_weight: 0.4
    kg_weight: 0.2
    rule_weight: 0.4
    reasoning: "商标更依赖语义相似度"

  copyright:
    description: "版权领域查询策略"
    vector_weight: 0.3
    kg_weight: 0.2
    rule_weight: 0.5
    reasoning: "版权保护重视规则匹配"

  general:
    description: "通用查询策略"
    vector_weight: 0.5
    kg_weight: 0.3
    rule_weight: 0.2
    reasoning: "通用任务更依赖语义搜索"

# 缓存配置
# Cache Configuration
cache:
  l1_cache:
    max_size: 2000
    ttl: 3600

  l2_cache:
    enabled: true
    ttl: 7200
    max_memory: "512mb"
    policy: "allkeys-lru"

# 向量索引配置
# Vector Index Configuration
vector_index:
  pgvector:
    index_type: "ivfflat"
    lists: 100
    probes: 10

  qdrant:
    collection_name: "patent_rules_production"
    vector_size: 768
    distance: "Cosine"
    indexing_threshold: 20000

# 数据库连接池配置
# Database Connection Pool Configuration
connection_pool:
  postgres:
    min_connections: 5
    max_connections: 20
    connection_timeout: 30
    idle_timeout: 600

  qdrant:
    timeout: 10
    max_retries: 3

  nebulagraph:
    pool_size: 10
    timeout: 10

# 性能优化配置
# Performance Optimization Configuration
performance:
  query:
    batch_size: 20
    max_wait_time: 0.05
    parallel_queries: 10
    timeout: 30

  embedding:
    model_name: "BAAI/bge-m3"
    device: "cpu"
    batch_size: 32

# 监控配置
# Monitoring Configuration
monitoring:
  prometheus:
    enabled: true
    host: "localhost"
    port: 9090
    metrics_path: "/metrics"

  grafana:
    enabled: true
    host: "localhost"
    port: 3000
    dashboards:
      - athena_overview
      - query_performance
      - cache_statistics

  logging:
    level: "INFO"
    format: "json"
    output: "/var/log/athena/production.log"
