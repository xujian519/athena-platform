# Athena工作平台 - 统一Docker Compose配置
# Athena Platform - Unified Docker Compose Configuration
#
# 一键启动所有基础设施和监控服务
# 使用: docker-compose up -d

version: '3.8'

# ==================== 基础设施服务 ====================
services:
  # Redis缓存服务
  redis:
    image: redis:7-alpine
    container_name: athena-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis-data:/data
    networks:
      - athena-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Qdrant向量数据库
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: athena-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - athena-network
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Neo4j图数据库
  neo4j:
    image: neo4j:5.15-community
    container_name: athena-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j-data:/data
    networks:
      - athena-network
    environment:
      - NEO4J_AUTH=neo4j/athena_neo4j_2024
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
    healthcheck:
      test: ["CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/7474' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Prometheus监控
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: athena-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/docker/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - athena-network
    depends_on:
      - redis
      - qdrant
      - neo4j

  # Grafana可视化
  grafana:
    image: grafana/grafana:10.2.2
    container_name: athena-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./config/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - athena-network
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    depends_on:
      - prometheus

  # Alertmanager告警
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: athena-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./config/docker/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - athena-network
    depends_on:
      - prometheus

  # ==================== MCP服务 ====================

  # Open-WebSearch MCP - 多引擎并行搜索 (无需API密钥)
  open-websearch:
    image: ghcr.io/aas-ee/open-web-search:latest
    container_name: athena-open-websearch
    restart: unless-stopped
    ports:
      - "3001:3000"  # 使用3001端口，Grafana使用3000
    environment:
      NODE_ENV: production
      MODE: both
      # 多引擎并行搜索配置
      DEFAULT_SEARCH_ENGINE: duckduckgo  # 默认引擎
      ALLOWED_SEARCH_ENGINES: "duckduckgo,bing,exa,baidu,csdn,juejin"  # 可用引擎列表
      ENABLE_CORS: "true"
      CORS_ORIGIN: "*"
      # 性能优化配置
      MAX_CONCURRENT_REQUESTS: "10"     # 增加并发请求数 (原5→10)
      REQUEST_TIMEOUT: "15000"          # 增加超时时间 (原10s→15s)
      RATE_LIMIT_DELAY: "500"           # 减少请求延迟 (原1000ms→500ms)
    networks:
      - athena-network

# ==================== 网络配置 ====================
networks:
  athena-network:
    name: athena-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

# ==================== 数据卷配置 ====================
volumes:
  redis-data:
    name: athena-redis-data
  qdrant-data:
    name: athena-qdrant-data
  neo4j-data:
    name: athena-neo4j-data
  prometheus-data:
    name: athena-prometheus-data
  grafana-data:
    name: athena-grafana-data
  alertmanager-data:
    name: athena-alertmanager-data
