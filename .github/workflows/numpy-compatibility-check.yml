name: Numpy兼容性检查

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # 每周一早上8点运行
    - cron: '0 8 * * 1'

jobs:
  numpy-compatibility:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: 设置Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install numpy>=2.0.0
        pip install pandas scipy scikit-learn torch

    - name: 运行numpy兼容性测试
      run: |
        python3 test_numpy_compatibility.py
      continue-on-error: ${{ matrix.python-version != '3.11' }}

    - name: 分析numpy使用情况
      run: |
        python3 tools/unify_numpy_stack.py --output numpy_report_${{ matrix.python-version }}.json

    - name: 检查兼容性问题
      run: |
        python3 tools/fix_numpy_compatibility.py --directory . --dry-run > compatibility_issues.txt
        echo "发现的问题数量:"
        grep -c "修复文件" compatibility_issues.txt || echo "0"

    - name: 性能基准测试
      run: |
        python3 m4_optimization_success.py > performance_${{ matrix.python-version }}.txt
        echo "性能测试结果:"
        grep -E "(加速比|MPS设备)" performance_${{ matrix.python-version }}.txt || echo "未检测到MPS设备"

    - name: 上传报告
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: numpy-compatibility-reports-python${{ matrix.python-version }}
        path: |
          numpy_report_${{ matrix.python-version }}.json
          compatibility_issues.txt
          performance_${{ matrix.python-version }}.txt

    - name: 生成兼容性徽章
      if: matrix.python-version == '3.11'
      run: |
        # 检查是否通过所有测试
        if python3 test_numpy_compatibility.py; then
          echo "✅ Python 3.11 兼容性: 通过"
        else
          echo "❌ Python 3.11 兼容性: 失败"
          exit 1
        fi

  security-scan:
    runs-on: ubuntu-latest
    needs: numpy-compatibility

    steps:
    - uses: actions/checkout@v4

    - name: 运行安全扫描
      run: |
        pip install safety bandit
        safety check --json --output safety-report.json || true
        bandit -r . -f json -o bandit-report.json || true

    - name: 上传安全报告
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          safety-report.json
          bandit-report.json