name: CI Quality Gate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: 🔍 Gitleaks secret scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 📊 Trivy vulnerability scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: 📤 Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  python-quality:
    name: 🐍 Python Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: 📦 Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/base.txt
        pip install -r requirements/dev.txt

    - name: 🔍 pip-audit security audit
      run: pip-audit --format=json --output=pip-audit-report.json

    - name: 📤 Upload audit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pip-audit-report-${{ matrix.python-version }}
        path: pip-audit-report.json

    - name: 🎨 Black code formatting check
      run: black --check --diff .

    - name: 🔍 isort import sorting check
      run: isort --check-only --diff .

    - name: 🔍 flake8 linting
      run: flake8 . --format=json --output-file=flake8-report.json

    - name: 📊 Upload flake8 report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: flake8-report-${{ matrix.python-version }}
        path: flake8-report.json

    - name: 🧪 MyPy type checking
      run: mypy . --json-report mypy-report || true

    - name: 📤 Upload MyPy report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: mypy-report-${{ matrix.python-version }}
        path: mypy-report

    - name: 🧪 Run tests with coverage
      run: |
        pytest --cov=. --cov-report=xml --cov-report=html --cov-report=json --junit-xml=junit.xml

    - name: 📊 Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: |
          coverage.xml
          htmlcov/
          coverage.json
          junit.xml

    - name: 🏆 Coverage Badge
      uses: tj-actions/coverage-badge-py@v2
      with:
        output: coverage-badge.svg

  node-quality:
    name: 📦 Node.js Quality Checks
    runs-on: ubuntu-latest
    if: hashFiles('package.json') != ''
    steps:
    - uses: actions/checkout@v4

    - name: 📦 Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 🔍 npm audit security check
      run: npm audit --audit-level=high --json > npm-audit.json || true

    - name: 📤 Upload npm audit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: npm-audit-report
        path: npm-audit.json

    - name: 🏗️ TypeScript type checking
      run: npm run build --if-present

    - name: 🔍 ESLint check
      run: npx eslint . --format=json --output-file=eslint-report.json || true

    - name: 📤 Upload ESLint report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: eslint-report
        path: eslint-report.json

  performance-check:
    name: ⚡ Performance Checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/base.txt

    - name: ⚡ Import performance test
      run: |
        python -c "
import time
import sys
start = time.time()
# Test core imports
try:
    import numpy as np
    import pandas as pd
    import flask
    from pydantic import BaseModel
    import_time = time.time() - start
    print(f'✅ Core imports successful in {import_time:.2f}s')
    if import_time > 5.0:
        print('⚠️ Warning: Slow import performance')
        sys.exit(1)
except ImportError as e:
    print(f'❌ Import failed: {e}')
    sys.exit(1)
"

  quality-gate:
    name: 🚪 Quality Gate
    runs-on: ubuntu-latest
    needs: [security-scan, python-quality, node-quality, performance-check]
    if: always()
    steps:
    - uses: actions/checkout@v4

    - name: ✅ Quality Gate Check
      run: |
        echo "🔍 Checking quality gate status..."

        # Check if all required jobs passed
        if [ "${{ needs.security-scan.result }}" != "success" ]; then
          echo "❌ Security scan failed"
          exit 1
        fi

        if [ "${{ needs.python-quality.result }}" != "success" ]; then
          echo "❌ Python quality checks failed"
          exit 1
        fi

        if [ "${{ needs.node-quality.result }}" != "success" ]; then
          echo "❌ Node.js quality checks failed"
          exit 1
        fi

        if [ "${{ needs.performance-check.result }}" != "success" ]; then
          echo "❌ Performance checks failed"
          exit 1
        fi

        echo "✅ All quality gates passed!"
        echo "🎉 Ready for merge!"

    - name: 📊 Summary Report
      if: always()
      run: |
        echo "## 🚪 Quality Gate Summary" >> $GITHUB_STEP_SUMMARY
        echo "| ✅ Check | 📊 Status |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
        echo "| 🔒 Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| 🐍 Python Quality | ${{ needs.python-quality.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| 📦 Node.js Quality | ${{ needs.node-quality.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| ⚡ Performance | ${{ needs.performance-check.result }} |" >> $GITHUB_STEP_SUMMARY
