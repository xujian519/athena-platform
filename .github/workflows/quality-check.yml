name: Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # 每天北京时间09:00运行（UTC 01:00）
    - cron: '0 1 * * *'

jobs:
  quality-check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov black isort mypy

    - name: 缓存pip依赖
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: 代码格式检查 (Black)
      run: |
        echo "检查代码格式..."
        black --check --diff .
        echo "✅ Black格式检查通过"

    - name: 导入排序检查 (isort)
      run: |
        echo "检查导入排序..."
        isort --check-only --diff .
        echo "✅ isort检查通过"

    - name: 代码风格检查 (Flake8)
      run: |
        echo "执行Flake8代码风格检查..."
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        echo "✅ Flake8检查完成"

    - name: 类型检查 (MyPy)
      run: |
        echo "执行MyPy类型检查..."
        mypy apps/ --ignore-missing-imports --no-strict-optional || true
        echo "✅ MyPy检查完成"

    - name: 运行自定义质量检查器
      run: |
        echo "运行自定义代码质量检查..."
        python3 code_quality_checker.py . --report quality_check_report.txt
        echo "✅ 自定义质量检查完成"

    - name: 运行一致性检查器
      run: |
        echo "运行一致性检查..."
        python3 consistency_checker.py . --report consistency_check_report.txt
        echo "✅ 一致性检查完成"

    - name: 运行拼写检查器
      run: |
        echo "运行拼写检查..."
        python3 spell_checker.py . --report spell_check_report.txt
        echo "✅ 拼写检查完成"

    - name: 运行测试
      run: |
        echo "运行单元测试..."
        python -m pytest tests/ --cov=apps --cov-report=xml --cov-report=html || true
        echo "✅ 测试完成"

    - name: 检查安全漏洞
      run: |
        echo "检查安全漏洞..."
        pip install safety bandit
        safety check --json --output safety_report.json || true
        bandit -r apps/ -f json -o bandit_report.json || true
        echo "✅ 安全检查完成"

    - name: 生成质量报告
      run: |
        echo "生成综合质量报告..."
        python3 -c "
import json
import os
from datetime import datetime

# 收集所有检查结果
reports = {}
for report_file in ['quality_check_report.txt', 'consistency_check_report.txt', 'spell_check_report.txt']:
    if os.path.exists(report_file):
        with open(report_file, 'r', encoding='utf-8') as f:
            reports[report_file] = f.read()

# 生成JSON报告
quality_data = {
    'timestamp': datetime.now().isoformat(),
    'python_version': '${{ matrix.python-version }}',
    'checks': {
        'black': 'completed',
        'isort': 'completed',
        'flake8': 'completed',
        'mypy': 'completed',
        'custom_quality': os.path.exists('quality_check_report.txt'),
        'consistency': os.path.exists('consistency_check_report.txt'),
        'spelling': os.path.exists('spell_check_report.txt'),
        'tests': 'completed',
        'security': 'completed'
    },
    'reports_available': list(reports.keys())
}

with open('quality_summary.json', 'w', encoding='utf-8') as f:
    json.dump(quality_data, f, indent=2, ensure_ascii=False)

print('✅ 质量报告生成完成')
print(f'检查项目: {len(quality_data[\"checks\"])}')
print(f'可用报告: {len(reports)}')
"

    - name: 上传质量报告
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: quality-reports-${{ matrix.python-version }}
        path: |
          quality_check_report.txt
          consistency_check_report.txt
          spell_check_report.txt
          safety_report.json
          bandit_report.json
          quality_summary.json
          htmlcov/
        retention-days: 30

    - name: 质量门禁检查
      run: |
        echo "执行质量门禁检查..."
        python3 -c "
import json
import sys

# 读取质量摘要
try:
    with open('quality_summary.json', 'r', encoding='utf-8') as f:
        quality_data = json.load(f)

    print('=== 质量门禁检查 ===')
    print(f'检查时间: {quality_data[\"timestamp\"]}')
    print(f'Python版本: {quality_data[\"python_version\"]}')

    # 定义质量标准
    quality_standards = {
        'required_checks': ['black', 'isort', 'flake8', 'custom_quality', 'consistency', 'spelling'],
        'max_security_issues': 5,
        'min_coverage': 70  # 最低代码覆盖率
    }

    # 检查必需的检查项
    passed_checks = []
    failed_checks = []

    for check in quality_standards['required_checks']:
        if quality_data['checks'].get(check, False) == 'completed' or quality_data['checks'].get(check, False) == True:
            passed_checks.append(check)
            print(f'✅ {check} - 通过')
        else:
            failed_checks.append(check)
            print(f'❌ {check} - 失败')

    # 检查安全报告
    security_issues = 0
    try:
        with open('safety_report.json', 'r') as f:
            safety_data = json.load(f)
            security_issues += len(safety_data.get('vulnerabilities', []))
    except:
        pass

    try:
        with open('bandit_report.json', 'r') as f:
            bandit_data = json.load(f)
            security_issues += len(bandit_data.get('results', []))
    except:
        pass

    print(f'安全漏洞数量: {security_issues}')

    # 总体评估
    total_checks = len(quality_standards['required_checks'])
    passed_count = len(passed_checks)

    if passed_count == total_checks and security_issues <= quality_standards['max_security_issues']:
        print('\\n🎉 所有质量检查通过！')
        print(f'通过检查: {passed_count}/{total_checks}')
        print(f'安全漏洞: {security_issues} (≤ {quality_standards[\"max_security_issues\"]})')
        sys.exit(0)
    else:
        print('\\n❌ 质量检查未完全通过')
        print(f'通过检查: {passed_count}/{total_checks}')
        print(f'安全漏洞: {security_issues} (> {quality_standards[\"max_security_issues\"]})')

        if failed_checks:
            print(f'失败的检查: {\", \".join(failed_checks)}')

        sys.exit(1)

except FileNotFoundError:
    print('❌ 质量报告文件不存在')
    sys.exit(1)
except Exception as e:
    print(f'❌ 质量门禁检查失败: {e}')
    sys.exit(1)
"

    - name: 评论Pull Request (如果有)
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');

          try {
            const qualityData = JSON.parse(fs.readFileSync('quality_summary.json', 'utf8'));

            const comment = `## 📊 代码质量检查报告

            **检查时间:** ${qualityData.timestamp}
            **Python版本:** ${qualityData.python_version}

            ### ✅ 通过的检查
            ${Object.entries(qualityData.checks)
              .filter(([key, value]) => value === 'completed' || value === true)
              .map(([key]) => `- ${key}`)
              .join('\n')}

            ### 📋 检查详情
            ${qualityData.reports_available.map(report => `- ${report}`).join('\n')}

            ---
            *此评论由GitHub Actions自动生成*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          } catch (error) {
            console.log('无法评论PR:', error.message);
          }