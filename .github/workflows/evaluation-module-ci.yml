# ============================================================================
# Athena评估模块 - CI/CD工作流
# ============================================================================
# 功能:
#   1. 代码质量检查
#   2. 运行完整测试套件
#   3. 构建Docker镜像
#   4. 部署到生产环境
#
# 触发条件:
#   - Push到main分支
#   - Pull Request
#   - 手动触发
# ============================================================================

name: Evaluation Module CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'core/evaluation/**'
      - 'tests/core/evaluation/**'
      - 'docs/api/EVALUATION_API.md'
      - 'docs/evaluation/**'
      - '.github/workflows/evaluation-module-ci.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'core/evaluation/**'
      - 'tests/core/evaluation/**'

  workflow_dispatch:
    inputs:
      skip_tests:
        description: '跳过测试'
        required: false
        type: boolean
        default: false
      deploy_environment:
        description: '部署环境'
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging

# 环境变量
env:
  PYTHON_VERSION: '3.11'
  PROJECT_NAME: athena-evaluation-module
  REGISTRY: ghcr.io

# 权限
permissions:
  contents: read
  packages: write

# 并发控制
concurrency:
  group: evaluation-module-ci
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # 代码质量检查
  # ==========================================================================
  code-quality:
    name: 代码质量检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black isort mypy

      - name: 运行Flake8
        run: |
          flake8 core/evaluation/ tests/core/evaluation/ \
            --max-line-length=120 \
            --ignore=E203,E266,W503 \
            --exclude=__pycache__

      - name: 运行Black检查
        run: |
          black --check core/evaluation/ tests/core/evaluation/ --line-length=120

      - name: 运行isort检查
        run: |
          isort --check-only core/evaluation/ tests/core/evaluation/

  # ==========================================================================
  # 单元测试
  # ==========================================================================
  unit-tests:
    name: 单元测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-benchmark
          pip install -r requirements.txt || true

      - name: 运行单元测试
        run: |
          pytest tests/core/evaluation/test_*.py \
            -v --tb=short \
            --cov=core.evaluation \
            --cov-report=xml \
            --cov-report=term-missing

      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: evaluation-unit
          name: evaluation-module-unit-coverage

  # ==========================================================================
  # 集成测试
  # ==========================================================================
  integration-tests:
    name: 集成测试
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: athena_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/athena_test

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install -r requirements.txt || true

      - name: 运行集成测试
        run: |
          pytest tests/core/evaluation/integration/ \
            -v --tb=short \
            --cov=core.evaluation \
            --cov-append \
            --cov-report=xml

      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: evaluation-integration
          name: evaluation-module-integration-coverage

  # ==========================================================================
  # 质量评估器测试
  # ==========================================================================
  quality-assessor-tests:
    name: 质量评估器专项测试
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          pip install -r requirements.txt || true

      - name: 运行质量评估器测试
        run: |
          pytest tests/core/evaluation/test_quality_assessor.py \
            -v --tb=short || echo "质量评估器测试文件不存在，跳过"

  # ==========================================================================
  # 性能测试
  # ==========================================================================
  performance-tests:
    name: 性能测试
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-benchmark
          pip install -r requirements.txt || true

      - name: 运行性能测试
        run: |
          pytest tests/core/evaluation/test_performance*.py \
            -v --benchmark-only \
            --benchmark-json=benchmark_results.json || echo "性能测试文件不存在，跳过"

      - name: 存储基准测试结果
        uses: benchmark-action/github-action-benchmark@v1
        if: hashFiles('benchmark_results.json') != ''
        with:
          tool: 'pytest'
          output-file-path: benchmark_results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false

  # ==========================================================================
  # 构建Docker镜像
  # ==========================================================================
  build:
    name: 构建Docker镜像
    runs-on: ubuntu-latest
    needs: [code-quality, integration-tests]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 构建并推送镜像
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.evaluation
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================================================
  # 部署到Staging
  # ==========================================================================
  deploy-staging:
    name: 部署到Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.athena.example.com

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 部署
        run: |
          echo "部署评估模块到Staging环境..."
          # 这里添加实际的部署命令
          # 例如: kubectl apply -f k8s/staging/

      - name: 健康检查
        run: |
          echo "等待服务启动..."
          sleep 30
          curl -f https://staging.athena.example.com/health || exit 1

      - name: 评估功能测试
        run: |
          echo "测试评估模块功能..."
          python3 -c "
import asyncio
import sys
sys.path.insert(0, '.')

async def test_evaluation():
    from core.evaluation.evaluation_engine import EvaluationEngine

    engine = EvaluationEngine(agent_id='staging_test')
    await engine.initialize()

    # 测试基础评估
    result = await engine.evaluate({'test': 'data'})
    print(f'评估结果: {result}')
    assert 'score' in result, '评估结果缺少score字段'
    print('✓ Staging环境评估模块测试通过')

asyncio.run(test_evaluation())
          " || echo '评估模块测试跳过(需要实际环境)'

  # ==========================================================================
  # 部署到Production
  # ==========================================================================
  deploy-production:
    name: 部署到Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_environment == 'production'
    environment:
      name: production
      url: https://athena.example.com

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 创建部署回滚
        run: |
          echo "保存当前版本用于回滚..."
          echo "${{ needs.build.outputs.image-tag }}" > rollback_version.txt

      - name: 部署
        run: |
          echo "部署评估模块到Production环境..."
          # 这里添加实际的部署命令

      - name: 健康检查
        run: |
          echo "等待服务启动..."
          sleep 60
          curl -f https://athena.example.com/health || exit 1

      - name: 运行烟雾测试
        run: |
          python3 -c "
import asyncio
import sys
sys.path.insert(0, '.')

async def smoke_test():
    from core.evaluation.enhanced_evaluation_module import EnhancedEvaluationModule

    module = EnhancedEvaluationModule(agent_id='production_smoke_test')
    await module.initialize()

    # 测试质量评估
    task = {
        'id': 'test_task',
        'target_type': 'response',
        'target_id': 'test_001',
        'evaluation_type': 'quality',
        'criteria': [
            {'dimension': 'accuracy', 'weight': 0.4},
            {'dimension': 'completeness', 'weight': 0.3},
            {'dimension': 'relevance', 'weight': 0.3}
        ]
    }

    result = await module.evaluate_task(task)
    assert result['success'], '评估任务失败'
    assert result['score'] >= 0 and result['score'] <= 1, '评估分数应在0-1之间'
    print('✓ 生产环境烟雾测试通过')

asyncio.run(smoke_test())
          "

  # ==========================================================================
  # 质量报告生成
  # ==========================================================================
  quality-report:
    name: 生成质量报告
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_environment == 'production'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 生成质量报告
        run: |
          python3 -c "
import asyncio
import sys
import json
sys.path.insert(0, '.')

async def generate_report():
    from core.evaluation.enhanced_quality_assessor import EnhancedQualityAssessor

    assessor = EnhancedQualityAssessor()
    await assessor.initialize()

    # 生成系统质量报告
    report = await assessor.generate_quality_report(
        scope='system',
        include_recommendations=True
    )

    print('=== 质量评估报告 ===')
    print(json.dumps(report, indent=2, ensure_ascii=False))

    # 保存报告
    with open('quality_report.json', 'w', encoding='utf-8') as f:
        json.dump(report, f, indent=2, ensure_ascii=False)

asyncio.run(generate_report())
          " || echo "质量报告生成跳过(需要实际环境)"

      - name: 上传质量报告
        uses: actions/upload-artifact@v4
        if: hashFiles('quality_report.json') != ''
        with:
          name: quality-report
          path: quality_report.json

  # ==========================================================================
  # 通知
  # ==========================================================================
  notify:
    name: 发送通知
    runs-on: ubuntu-latest
    needs: [build, deploy-staging, deploy-production]
    if: always()

    steps:
      - name: 发送成功通知
        if: ${{ needs.deploy-production.result == 'success' }}
        run: |
          echo "✅ 评估模块部署成功！"

      - name: 发送失败通知
        if: ${{ needs.deploy-production.result == 'failure' }}
        run: |
          echo "❌ 评估模块部署失败！"
