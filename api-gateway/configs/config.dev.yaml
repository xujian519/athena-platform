# 开发环境配置文件
# 继承自 config.yaml，仅覆盖开发环境特有配置

server:
  port: 8080                   # 开发环境端口

auth:
  jwt_secret: "dev-secret-key-for-development-only"  # 开发环境密钥
  access_token_exp: 120        # 开发环境访问令牌2小时
  refresh_token_exp: 48         # 开发环境刷新令牌48小时

logging:
  level: "debug"               # 开发环境使用debug级别
  format: "text"               # 开发环境使用文本格式便于阅读
  output: "stdout"             # 开发环境输出到控制台

# 开发环境的上游服务可能运行在本地不同端口
upstream:
  timeout: 10                  # 开发环境较短的超时时间
  services:
    user_service:
      url: "http://localhost:8001"
    order_service:
      url: "http://localhost:8002"
    payment_service:
      url: "http://localhost:8003"