# 生产环境配置文件
# 继承自 config.yaml，仅覆盖生产环境特有配置

server:
  port: 80                      # 生产环境标准HTTP端口

auth:
  jwt_secret: "${JWT_SECRET}"    # 从环境变量读取JWT密钥
  access_token_exp: 30           # 生产环境访问令牌30分钟
  refresh_token_exp: 8           # 生产环境刷新令牌8小时

logging:
  level: "warn"                 # 生产环境使用warn级别减少日志
  format: "json"                # 生产环境使用JSON格式便于日志分析
  output: "file"                # 生产环境输出到文件
  file_path: "/var/log/athena-gateway/app.log"
  max_size: 500                 # 生产环境更大的日志文件
  max_backups: 10               # 生产环境保留更多备份
  max_age: 90                   # 生产环境保留更长时间

upstream:
  timeout: 60                   # 生产环境更长的超时时间
  services:
    user_service:
      url: "http://user-service:8001"    # 使用服务名
    order_service:
      url: "http://order-service:8002"   # 使用服务名
    payment_service:
      url: "http://payment-service:8003" # 使用服务名

# 生产环境数据库配置
database:
  host: "${DB_HOST:localhost}"
  port: ${DB_PORT:5432}
  username: "${DB_USER:athena}"
  password: "${DB_PASSWORD}"
  database: "${DB_NAME:athena_gateway}"

# 生产环境Redis配置
redis:
  host: "${REDIS_HOST:localhost}"
  port: ${REDIS_PORT:6379}
  password: "${REDIS_PASSWORD:}"
  database: ${REDIS_DB:0}

# 生产环境监控配置
monitoring:
  enable_metrics: true
  enable_pprof: false           # 生产环境关闭pprof