# Athena iMessage Remote Control Configuration
# Athena iMessage 远程控制配置文件

# iMessage 配置
imessage:
  enabled: true
  # 允许的发件人号码（白名单）
  allowed_senders:
    - "+8615662710999"  # 徐健的手机号

  # 默认智能体
  default_agent: "xiaonuo"

  # 消息长度限制
  max_message_length: 4000

  # imsg 工具配置
  imsg:
    cli_path: "~/.local/bin/imsg"  # imsg 命令路径
    db_path: null  # 可选：自定义数据库路径 (默认 ~/Library/Messages/chat.db)

  # 语音支持
  voice:
    enabled: true
    auto_transcribe: true

# 智能体配置
agents:
  # 小诺智能体
  xiaonuo:
    enabled: true
    name: "小诺"
    description: "专利检索和分析助手"
    endpoint: "http://localhost:8000/api/xiaonuo"
    timeout: 300  # 5分钟
    max_retries: 2

    # 支持的任务类型
    task_types:
      - "patent_search"      # 专利检索
      - "patent_analysis"    # 专利分析
      - "info_query"         # 信息查询
      - "reminder"           # 提醒事项

    # 命令触发词
    trigger_keywords:
      - "小诺"
      - "xiaonuo"
      - "@小诺"

  # Athena 智能体
  athena:
    enabled: true
    name: "Athena"
    description: "高级分析和推理助手"
    endpoint: "http://localhost:8000/api/athena"
    timeout: 600  # 10分钟
    max_retries: 2

    # 支持的任务类型
    task_types:
      - "complex_analysis"   # 复杂分析
      - "reasoning"          # 推理任务
      - "report_generation"  # 报告生成
      - "deep_research"      # 深度研究

    # 命令触发词
    trigger_keywords:
      - "Athena"
      - "athena"
      - "@Athena"
      - "雅典娜"

# Obsidian 配置
obsidian:
  # 仓库路径
  vault_path: "/Users/xujian/Library/Mobile Documents/iCloud~md~obsidian/Documents/Athena"

  # 组织方式：task_type | date | agent
  organize_by: "task_type"

  # 是否创建每日笔记
  create_daily_note: true

  # 每日笔记模板
  daily_note_template: |
    # {date}

    ## 任务记录

    ## 对话摘要

    ## 重要发现

  # 任务详情模板
  task_template: |
    # {task_name}

    **执行时间**: {timestamp}
    **智能体**: {agent}
    **命令**: {command}

    ## 执行摘要
    {summary}

    ## 详细结果
    {details}

    ## 元数据
    - 任务ID: {task_id}
    - 执行时长: {duration}
    - 状态: {status}

# 反馈配置
feedback:
  # 反馈模式：simple | standard | detailed | smart
  mode: "smart"

  # 摘要长度限制
  summary_max_length: 500

  # 是否包含文件链接
  include_file_links: true

  # 是否包含后续建议
  include_suggestions: true

  # 智能模式阈值
  smart_mode_thresholds:
    simple: 30      # 简单任务：< 30秒
    standard: 120   # 标准任务：30-120秒
    detailed: 300   # 详细任务：> 120秒

# 安全配置
security:
  # 启用命令验证
  enable_command_validation: true

  # 最大并发任务数
  max_concurrent_tasks: 5

  # 任务队列大小
  task_queue_size: 100

  # 日志级别：DEBUG | INFO | WARNING | ERROR
  log_level: "INFO"

  # 敏感操作确认
  confirm_sensitive_ops: true

# 命令模式配置
command_patterns:
  # 专利检索模式
  patent_search:
    patterns:
      - "检索.*专利"
      - "搜索.*专利"
      - "查找.*专利"
      - "patent.*search"
    agent: "xiaonuo"
    task_type: "patent_search"

  # 专利分析模式
  patent_analysis:
    patterns:
      - "分析.*专利"
      - "评估.*创造性"
      - "patent.*analysis"
    agent: "xiaonuo"
    task_type: "patent_analysis"

  # 复杂分析模式
  complex_analysis:
    patterns:
      - "@Athena.*分析"
      - "深度.*分析"
      - "complex.*analysis"
    agent: "athena"
    task_type: "complex_analysis"

  # 信息查询模式
  info_query:
    patterns:
      - "查询.*"
      - "找.*联系"
      - "info.*query"
    agent: "xiaonuo"
    task_type: "info_query"
