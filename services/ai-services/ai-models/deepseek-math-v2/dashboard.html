<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeekMath V2技术监控仪表板</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5em;
            font-weight: 300;
        }

        .header p {
            margin: 10px 0 0 0;
            opacity: 0.9;
            font-size: 1.1em;
        }

        .services {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        .service-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
            border-left: 5px solid #3498db;
            transition: all 0.3s ease;
        }

        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .service-title {
            font-size: 1.4em;
            font-weight: 600;
            color: #2c3e50;
            margin: 0 0 15px 0;
        }

        .service-status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .status-running {
            background: #d4edda;
            color: #155724;
        }

        .status-stopped {
            background: #f8d7da;
            color: #721c24;
        }

        .service-url {
            background: #e9ecef;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            margin: 10px 0;
            word-break: break-all;
        }

        .features {
            margin-top: 15px;
        }

        .feature-item {
            background: white;
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 5px;
            border-left: 3px solid #28a745;
        }

        .tech-section {
            background: #f1f3f4;
            padding: 30px;
            margin: 30px;
            border-radius: 10px;
        }

        .tech-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .tech-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .tech-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .refresh-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            margin: 20px;
            transition: background 0.3s ease;
        }

        .refresh-btn:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 DeepSeekMath V2技术集成</h1>
            <p>Athena智能工作平台专利分析AI增强系统</p>
            <button class="refresh-btn" onclick="checkAllServices()">🔄 刷新状态</button>
        </div>

        <div class="services">
            <div class="service-card">
                <div class="service-title">🔍 GRPO优化器</div>
                <div id="grpo-status" class="service-status status-stopped">检查中...</div>
                <div class="service-url">http://localhost:8020</div>
                <div class="features">
                    <div class="feature-item">✅ 无奖励强化学习</div>
                    <div class="feature-item">✅ 群体相对策略优化</div>
                    <div class="feature-item">✅ KL散度约束</div>
                </div>
            </div>

            <div class="service-card">
                <div class="service-title">📊 专利数据生成器</div>
                <div id="data-status" class="service-status status-stopped">检查中...</div>
                <div class="service-url">http://localhost:8022</div>
                <div class="features">
                    <div class="feature-item">✅ 8倍数据增强</div>
                    <div class="feature-item">✅ 智能质量筛选</div>
                    <div class="feature-item">✅ 多策略生成</div>
                </div>
            </div>
        </div>

        <div class="tech-section">
            <h2 style="text-align: center; color: #2c3e50;">🎯 核心技术特性</h2>
            <div class="tech-grid">
                <div class="tech-card">
                    <div class="tech-icon">🔧</div>
                    <h3>无奖励RL</h3>
                    <p>无需复杂奖励模型的强化学习</p>
                </div>
                <div class="tech-card">
                    <div class="tech-icon">📈</div>
                    <h3>两阶段学习</h3>
                    <p>从基础到高级的渐进式学习框架</p>
                </div>
                <div class="tech-card">
                    <div class="tech-icon">🎯</div>
                    <h3>大规模生成</h3>
                    <p>每个输入生成8个高质量样本</p>
                </div>
                <div class="tech-card">
                    <div class="tech-icon">🧠</div>
                    <h3>专利特化</h3>
                    <p>专为专利分析和推理优化的AI能力</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function checkService(serviceUrl, statusId) {
            try {
                const response = await fetch(serviceUrl + '/health');
                if (response.ok) {
                    document.getElementById(statusId).textContent = '✅ 运行中';
                    document.getElementById(statusId).className = 'service-status status-running';
                } else {
                    document.getElementById(statusId).textContent = '❌ 服务异常';
                    document.getElementById(statusId).className = 'service-status status-stopped';
                }
            } catch (error) {
                document.getElementById(statusId).textContent = '❌ 未启动';
                document.getElementById(statusId).className = 'service-status status-stopped';
            }
        }

        function checkAllServices() {
            checkService('http://localhost:8020', 'grpo-status');
            checkService('http://localhost:8022', 'data-status');
        }

        // 页面加载时检查服务状态
        window.onload = function() {
            checkAllServices();
            // 每30秒自动刷新状态
            setInterval(checkAllServices, 30000);
        };
    </script>
</body>
</html>
