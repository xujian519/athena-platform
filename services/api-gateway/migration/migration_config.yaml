# Athena服务迁移配置文件

# 服务配置
services:
  # 专利检索服务 (现有服务)
  patent-search:
    name: "yunpat-agent"
    current_path: "../yunpat_agent"  # 当前服务路径
    target_path: "../services/api-gateway/adapters/patent_search_adapter.py"  # 目标适配器路径
    port: 8050
    health_check: "/health"
    health_threshold: 5000  # ms
    timeout: 30000  # ms
    retry_attempts: 3
    backup: true  # 是否创建备份
    dependencies:
      - "redis"
      - "postgresql"
    
  # 专利撰写服务 (新建服务)
  patent-writing:
    name: "patent-writing-service"
    current_path: null  # 新建服务
    target_path: "../services/api-gateway/adapters/patent_writing_adapter.py"
    port: 8051
    health_check: "/health"
    health_threshold: 8000  # ms
    timeout: 60000  # ms
    retry_attempts: 2
    backup: false
    dependencies:
      - "mongodb"
      - "elasticsearch"
    
  # 认证服务 (新建服务)
  authentication:
    name: "authentication-service"
    current_path: null  # 新建服务
    target_path: "../services/api-gateway/adapters/authentication_adapter.py"
    port: 8052
    health_check: "/health"
    health_threshold: 3000  # ms
    timeout: 10000  # ms
    retry_attempts: 1
    backup: false
    dependencies:
      - "redis"
      - "postgresql"
    jwt_config:
      secret: "your-jwt-secret-key-change-in-production"
      algorithm: "HS256"
      expires_in: 86400  # 24小时
      issuer: "athena-platform"
    
  # 技术分析服务 (新建服务)
  technical-analysis:
    name: "technical-analysis-service"
    current_path: null  # 新建服务
    target_path: "../services/api-gateway/adapters/technical_analysis_adapter.py"
    port: 8053
    health_check: "/health"
    health_threshold: 10000  # ms
    timeout: 120000  # ms
    retry_attempts: 2
    backup: false
    dependencies:
      - "elasticsearch"
      - "qdrant"
      - "python-ml"

# API网关配置
gateway:
  name: "api-gateway"
  path: "../services/api-gateway"
  port: 8080
  config_path: "../services/api-gateway/config/adapters.json"
  health_check: "/health"
  health_threshold: 2000  # ms
  timeout: 15000  # ms
  
  # 路由配置
  routes:
    # 专利检索路由
    - path: "/api/v1/patents/search"
      service: "patent-search"
      method: "POST"
      timeout: 30000
      auth_required: false
      
    - path: "/api/v1/patents/analyze"
      service: "patent-search"
      method: "POST"
      timeout: 60000
      auth_required: true
      
    - path: "/api/v1/patents/rules"
      service: "patent-search"
      method: "GET"
      timeout: 10000
      auth_required: true
      
    - path: "/api/v1/patents/chat"
      service: "patent-search"
      method: "POST"
      timeout: 30000
      auth_required: true
      
    # 专利撰写路由
    - path: "/api/v1/patents/drafts"
      service: "patent-writing"
      method: "POST"
      timeout: 60000
      auth_required: true
      
    - path: "/api/v1/patents/claims/generate"
      service: "patent-writing"
      method: "POST"
      timeout: 45000
      auth_required: true
      
    - path: "/api/v1/patents/workflows/*"
      service: "patent-writing"
      method: "GET"
      timeout: 10000
      auth_required: true
      
    # 认证路由
    - path: "/api/v1/auth/login"
      service: "authentication"
      method: "POST"
      timeout: 10000
      auth_required: false
      
    - path: "/api/v1/auth/register"
      service: "authentication"
      method: "POST"
      timeout: 15000
      auth_required: false
      
    - path: "/api/v1/auth/refresh"
      service: "authentication"
      method: "POST"
      timeout: 5000
      auth_required: false
      
    - path: "/api/v1/auth/verify"
      service: "authentication"
      method: "POST"
      timeout: 5000
      auth_required: false
      
    # 技术分析路由
    - path: "/api/v1/analysis/*"
      service: "technical-analysis"
      method: "POST"
      timeout: 120000
      auth_required: true

# 数据库配置
databases:
  postgresql:
    host: "localhost"
    port: 5432
    database: "athena_platform"
    username: "athena_user"
    password: "athena_password"
    
  redis:
    host: "localhost"
    port: 6379
    database: 0
    password: "redis_password"
    
  mongodb:
    host: "localhost"
    port: 27017
    database: "patent_writing"
    username: "mongo_user"
    password: "mongo_password"
    
  elasticsearch:
    host: "localhost"
    port: 9200
    index_prefix: "athena"
    
  qdrant:
    host: "localhost"
    port: 6333
    collection: "patent_vectors"

# 迁移配置
migration:
  # 迁移前是否备份
  backup_before_migration: true
  
  # 迁移后是否测试
  test_after_migration: true
  
  # 失败时是否自动回滚
  rollback_on_failure: true
  
  # 迁移超时时间 (秒)
  timeout_seconds: 300
  
  # 备份保留天数
  backup_retention_days: 7
  
  # 迁移步骤
  steps:
    - "pre_migration_checks"
    - "create_backups"
    - "migrate_services"
    - "update_gateway_config"
    - "test_functionality"
    - "generate_report"
  
  # 测试用例
  test_cases:
    # 专利搜索测试
    - service: "patent-search"
      endpoint: "/api/v1/patents/search"
      method: "POST"
      data:
        query: "人工智能"
        limit: 10
      expected_status: 200
      
    # 认证测试
    - service: "authentication"
      endpoint: "/api/v1/auth/login"
      method: "POST"
      data:
        username: "testuser"
        password: "testpass"
      expected_status: 200
      
    # 技术分析测试
    - service: "technical-analysis"
      endpoint: "/api/v1/analysis/patentability"
      method: "POST"
      data:
        title: "测试专利"
        abstract: "测试摘要"
      expected_status: 200

# 监控配置
monitoring:
  # 健康检查间隔 (秒)
  health_check_interval: 30
  
  # 性能指标收集
  metrics_enabled: true
  
  # 日志级别
  log_level: "INFO"
  
  # 告警配置
  alerts:
    # 服务不可用告警
    service_unavailable:
      enabled: true
      threshold: 3  # 连续失败次数
      
    # 响应时间告警
    response_time:
      enabled: true
      threshold: 5000  # ms
      
    # 错误率告警
    error_rate:
      enabled: true
      threshold: 0.05  # 5%

# 安全配置
security:
  # CORS配置
  cors:
    enabled: true
    origins: ["http://localhost:3000", "http://localhost:8080"]
    methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    headers: ["Content-Type", "Authorization"]
    
  # 限流配置
  rate_limiting:
    enabled: true
    window_size: 900  # 15分钟
    max_requests: 100
    
  # JWT配置
  jwt:
    secret_key: "your-super-secret-jwt-key"
    algorithm: "HS256"
    access_token_expire: 3600  # 1小时
    refresh_token_expire: 604800  # 7天

# 环境配置
environments:
  development:
    debug: true
    log_level: "DEBUG"
    hot_reload: true
    
  testing:
    debug: true
    log_level: "INFO"
    test_data: true
    
  production:
    debug: false
    log_level: "WARNING"
    ssl_enabled: true
    cluster_mode: true