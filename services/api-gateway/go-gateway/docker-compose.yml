version: '3.8'

services:
  # API网关服务
  athena-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"   # HTTP API端口
      - "9090:9090"   # 监控端口
    environment:
      - ATHENA_GATEWAY_SERVER_PORT=8080
      - ATHENA_GATEWAY_SERVER_HOST=0.0.0.0
      - ATHENA_GATEWAY_SERVER_MODE=release
      - ATHENA_GATEWAY_DATABASE_HOST=postgres
      - ATHENA_GATEWAY_DATABASE_PORT=5432
      - ATHENA_GATEWAY_DATABASE_USER=athena
      - ATHENA_GATEWAY_DATABASE_PASSWORD=athena_password
      - ATHENA_GATEWAY_DATABASE_DB_NAME=athena_gateway
      - ATHENA_GATEWAY_DATABASE_SSL_MODE=disable
      - ATHENA_GATEWAY_REDIS_HOST=redis
      - ATHENA_GATEWAY_REDIS_PORT=6379
      - ATHENA_GATEWAY_JWT_SECRET=your-super-secret-jwt-key-at-least-32-characters-long
      - ATHENA_GATEWAY_JWT_EXPIRATION_TIME=3600
      - ATHENA_GATEWAY_JWT_REFRESH_TIME=604800
      - ATHENA_GATEWAY_JWT_ISSUER=athena-gateway
      - ATHENA_GATEWAY_RATE_LIMIT_ENABLED=true
      - ATHENA_GATEWAY_RATE_LIMIT_REQUESTS_PER_MINUTE=100
      - ATHENA_GATEWAY_RATE_LIMIT_BURST_SIZE=200
      - ATHENA_GATEWAY_MONITORING_ENABLED=true
      - ATHENA_GATEWAY_MONITORING_PORT=9090
      - ATHENA_GATEWAY_MONITORING_PATH=/metrics
      - ATHENA_GATEWAY_LOGGING_LEVEL=info
      - ATHENA_GATEWAY_LOGGING_FORMAT=json
      - ATHENA_GATEWAY_LOGGING_OUTPUT=stdout
    depends_on:
      - postgres
      - redis
    networks:
      - athena-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=athena_gateway
      - POSTGRES_USER=athena
      - POSTGRES_PASSWORD=athena_password
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - athena-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U athena -d athena_gateway"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - athena-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    depends_on:
      - athena-gateway
    networks:
      - athena-network
    restart: unless-stopped

  # Grafana仪表板
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - athena-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  athena-network:
    driver: bridge