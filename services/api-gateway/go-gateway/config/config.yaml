server:
  port: 8080
  host: "0.0.0.0"
  mode: "debug"  # debug, release, test
  read_timeout: 30
  write_timeout: 30
  idle_timeout: 60

database:
  host: "localhost"
  port: 5432
  user: "athena"
  password: "athena_password"
  db_name: "athena_gateway"
  ssl_mode: "disable"
  max_idle_conns: 10
  max_open_conns: 100
  max_lifetime: 3600

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 20

jwt:
  secret: "your-super-secret-jwt-key-at-least-32-characters-long"
  expiration_time: 3600    # 秒
  refresh_time: 604800    # 秒 (7天)
  issuer: "athena-gateway"

rate_limit:
  enabled: true
  requests_per_minute: 100
  burst_size: 200
  whitelist_enabled: false
  whitelist:
    - "127.0.0.1"
    - "::1"

services:
  auth:
    url: "http://localhost:9001"
    timeout: 30
    retry_attempts: 3
    circuit_breaker:
      enabled: true
      threshold: 5
      timeout: 60
      reset_timeout: 300
      failure_rate: 0.5
  patent_search:
    url: "http://localhost:9002"
    timeout: 45
    retry_attempts: 3
    circuit_breaker:
      enabled: true
      threshold: 5
      timeout: 60
      reset_timeout: 300
      failure_rate: 0.5
  user_management:
    url: "http://localhost:9003"
    timeout: 30
    retry_attempts: 3
    circuit_breaker:
      enabled: true
      threshold: 5
      timeout: 60
      reset_timeout: 300
      failure_rate: 0.5
  analytics:
    url: "http://localhost:9004"
    timeout: 60
    retry_attempts: 2
    circuit_breaker:
      enabled: true
      threshold: 3
      timeout: 120
      reset_timeout: 600
      failure_rate: 0.3

monitoring:
  enabled: true
  port: 9090
  path: "/metrics"
  metrics_url: ""

logging:
  level: "info"  # debug, info, warn, error
  format: "json"  # json, text
  output: "stdout"  # stdout, file
  filename: "gateway.log"
  max_size: 100    # MB
  max_backups: 10
  max_age: 30      # days
  compress: true