# Dolphin文档解析服务配置
# Dolphin Document Parser Configuration for Athena Platform

# 服务配置
service:
  name: "Dolphin文档解析服务"
  version: "1.0.0"
  port: 8013
  host: "0.0.0.0"
  debug: false

# 模型配置
models:
  # PaddleOCR配置
  ocr:
    enabled: true
    use_angle_cls: true
    language: "ch"  # 支持中英文
    use_gpu: false
    show_log: false
    # OCR模型路径（可选，用于自定义模型）
    det_model_dir: null
    rec_model_dir: null
    cls_model_dir: null

  # Layout Parser配置
  layout:
    enabled: true
    # 预训练模型配置
    model_name: "PubLayNet"  # PubLayNet, Prima, MFD
    config_path: "lp://PubLayNet/mask_rcnn_R_50_FPN_3x/config"
    model_path: "lp://PubLayNet/mask_rcnn_R_50_FPN_3x/model"
    # 检测阈值
    score_threshold: 0.8
    nms_threshold: 0.5
    # 自定义模型路径（可选）
    custom_model_path: null

# 文件处理配置
file_processing:
  # 支持的文件格式
  supported_formats:
    - ".pdf"
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".tiff"
    - ".bmp"
    - ".docx"

  # 文件大小限制（MB）
  max_file_size: 50

  # PDF处理配置
  pdf:
    max_pages: 10  # 最大处理页数
    dpi: 200       # 图像分辨率
    extract_images: true  # 提取图像

  # 图像处理配置
  image:
    max_width: 2000  # 最大宽度
    max_height: 2000  # 最大高度
    quality: 95      # JPEG质量

  # 处理超时（秒）
  timeout:
    pdf: 120
    image: 30
    docx: 60

# 存储配置
storage:
  # 临时目录
  upload_directory: "/tmp/dolphin_uploads"
  processed_directory: "/tmp/dolphin_processed"
  cache_directory: "/tmp/dolphin_cache"

  # 清理配置
  cleanup:
    auto_cleanup: true
    retention_hours: 24  # 保留时间（小时）
    max_cache_size_mb: 1024  # 最大缓存大小

# 性能配置
performance:
  # 并发处理
  max_concurrent_tasks: 5

  # 批处理
  batch_size: 8

  # 内存限制（MB）
  memory_limit: 2048

  # CPU使用限制
  cpu_limit: 80

# 缓存配置
cache:
  # 启用缓存
  enabled: true

  # 缓存策略
  strategy: "lru"  # lru, lfu, fifo

  # 缓存大小
  max_size: 1000

  # 缓存过期（小时）
  ttl: 24

# 日志配置
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

  # 日志文件
  file:
    enabled: true
    path: "/Users/xujian/Athena工作平台/logs/dolphin_parser.log"
    max_size_mb: 100
    backup_count: 5

  # 控制台日志
  console:
    enabled: true

# API配置
api:
  # CORS设置
  cors:
    allow_origins: ["*"]
    allow_methods: ["*"]
    allow_headers: ["*"]
    allow_credentials: true

  # 请求限制
  rate_limit:
    enabled: false
    requests_per_minute: 60

  # 请求大小限制（MB）
  max_request_size: 100

# 集成配置
integration:
  # 与GLM视觉服务的集成
  glm_vision:
    enabled: true
    endpoint: "http://localhost:8091"
    timeout: 30

  # 与多模态处理器的集成
  multimodal_processor:
    enabled: true
    endpoint: "http://localhost:8012"
    timeout: 60

# 输出配置
output:
  # 默认输出格式
  default_format: "json"  # json, xml, yaml

  # 包含的内容
  include:
    layout_analysis: true
    ocr_text: true
    confidence_scores: true
    bounding_boxes: true
    processing_time: true

  # 结构化输出
  structured_output:
    enabled: true
    format_content: true
    preserve_hierarchy: true

# 错误处理
error_handling:
  # 重试配置
  retry:
    max_attempts: 3
    backoff_factor: 2

  # 错误响应
  include_stack_trace: false
  include_error_details: true

# 监控配置
monitoring:
  # 启用监控
  enabled: true

  # 指标收集
  metrics:
    request_count: true
    processing_time: true
    error_rate: true
    model_performance: true

  # 健康检查
  health_check:
    enabled: true
    interval_seconds: 30

# 开发配置
development:
  # 调试模式
  debug_mode: false

  # 热重载
  auto_reload: true

  # 测试数据
  test_data_path: "/Users/xujian/Athena工作平台/test_data/dolphin_samples"

# 安全配置
security:
  # 文件验证
  validate_file_types: true
  scan_for_malware: false

  # 路径安全
  restrict_file_paths: true
  allowed_directories:
    - "/tmp/dolphin_uploads"
    - "/tmp/dolphin_processed"
    - "/tmp/dolphin_cache"