[tool.poetry]
name = "athena-platform"
version = "0.1.0"
description = "Athena工作平台 - 企业级AI代理协作平台"
authors = ["徐健 <xujian519@gmail.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.11"

# 核心依赖
Pillow = "*"
aiofiles = "*"
aiohttp = "*"
asyncpg = "*"
celery = "*"
click = "*"
fastapi = "*"
httpx = "*"
jieba = "*"
loguru = "*"
neo4j = "*"
numpy = "*"
opencv-python-headless = "*"
openpyxl = "*"
pandas = "*"
passlib[bcrypt] = "*"
pgvector = "*"
pillow = "*"
prometheus-client = "*"
psutil = "*"
psycopg = "*"
psycopg2-binary = "*"
pydantic = "*"
pydantic-settings = "*"
pytesseract = "*"
python-dotenv = "*"
python-jose[cryptography] = "*"
python-multipart = "*"
qdrant-client = "*"
redis = "*"
requests = "*"
scikit-learn = "*"
sentence-transformers = "*"
tenacity = "*"
torch = "*"
torchvision = "*"
transformers = "*"
uvicorn[standard] = "*"

[tool.poetry.group.dev.dependencies]
